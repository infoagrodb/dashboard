<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Recuentos de Campo · Infoagro</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f3d2b">
<style>
  :root{
    --verde-oscuro:#1f3d2b;
    --verde:#3f6b3f;
    --verde-claro:#8fbf6a;
    --verde-pastel:#e7efdd;
    --crema:#f6f3ea;
    --ambar:#c98a2b;
    --ambar-bg:#fbf0dc;
    --rojo:#a4402d;
    --rojo-bg:#f8e6e1;
    --texto:#20241f;
    --texto-suave:#5b5f52;
    --borde:#d8d2c1;
    --blanco:#ffffff;
    --radio:14px;
    --sombra:0 2px 10px rgba(31,61,43,0.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--crema);
    color:var(--texto);
    overscroll-behavior-y:contain;
  }
  h1,h2,h3{font-family:Georgia,"Times New Roman",serif;margin:0 0 4px;color:var(--verde-oscuro);}
  h1{font-size:1.25rem;}
  h2{font-size:1.15rem;}
  h3{font-size:0.98rem;letter-spacing:.01em;}
  p{margin:0 0 8px;color:var(--texto-suave);font-size:0.9rem;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;font-size:1rem;}

  /* ---- App shell ---- */
  #app{max-width:560px;margin:0 auto;min-height:100%;background:var(--crema);display:flex;flex-direction:column;}
  header.topbar{
    position:sticky;top:0;z-index:20;
    background:var(--verde-oscuro);color:var(--blanco);
    padding:12px 16px;display:flex;align-items:center;gap:10px;
    box-shadow:var(--sombra);
  }
  header.topbar .leaf{font-size:1.3rem;}
  header.topbar .title{flex:1;}
  header.topbar .title small{display:block;color:#c9dcc0;font-size:0.7rem;font-weight:normal;}
  .topbar-icon-btn{
    background:rgba(255,255,255,0.12);border:none;width:38px;height:38px;border-radius:50%;
    font-size:1.15rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;
  }
  .topbar-icon-btn:active{background:rgba(255,255,255,0.22);}
  main{flex:1;padding:16px;padding-bottom:100px;}
  .screen{display:none;}
  .screen.active{display:block;animation:fadein .18s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

  /* ---- Pill de estado flotante (spatial / glass) ---- */
  #app{position:relative;}
  .estado-pill{
    position:sticky; top:8px; z-index:19;
    margin:-20px 16px 0; 
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(18px) saturate(1.4);
    -webkit-backdrop-filter:blur(18px) saturate(1.4);
    border:1px solid rgba(255,255,255,0.7);
    border-radius:18px;
    padding:11px 14px;
    box-shadow:0 10px 30px rgba(31,61,43,0.18), 0 1px 2px rgba(31,61,43,0.08);
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    transition:background .3s ease;
    cursor:pointer;
  }
  .estado-pill .icono-wrap{
    width:36px; height:36px; border-radius:11px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background:rgba(63,107,63,0.15);
  }
  .estado-pill.offline .icono-wrap{background:rgba(201,138,43,0.18);}
  .estado-pill.error .icono-wrap{background:rgba(164,64,45,0.16);}
  .estado-pill .txt{flex:1; min-width:0;}
  .estado-pill .txt .t1{font-weight:700; font-size:0.85rem; color:var(--verde-oscuro);}
  .estado-pill.offline .txt .t1{color:#8a5c15;}
  .estado-pill.error .txt .t1{color:var(--rojo);}
  .estado-pill .txt .t2{font-size:0.72rem; color:var(--texto-suave); margin-top:1px;}

  .dot-live{width:9px; height:9px; border-radius:50%; background:var(--verde-claro); position:relative;}
  .dot-live::after{
    content:''; position:absolute; inset:-4px; border-radius:50%;
    border:2px solid var(--verde-claro); opacity:0; animation:pulse-ring 2s ease-out infinite;
  }
  @keyframes pulse-ring{
    0%{transform:scale(0.6); opacity:0.7;}
    70%{transform:scale(1.8); opacity:0;}
    100%{opacity:0;}
  }
  .ring-sync{width:20px; height:20px; border-radius:50%;
    border:3px solid rgba(63,107,63,0.2); border-top-color:var(--verde);
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .estado-pill .barra-progreso{
    width:100%; height:4px; background:rgba(63,107,63,0.15); border-radius:99px; overflow:hidden; margin-top:8px;
  }
  .estado-pill .barra-progreso .fill{
    height:100%; background:var(--verde); border-radius:99px; width:0%;
    transition:width .4s ease;
  }

  .card{background:var(--blanco);border:1px solid var(--borde);border-radius:var(--radio);padding:16px;margin-bottom:14px;box-shadow:var(--sombra);}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:0.78rem;color:var(--texto-suave);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;}
  .field input,.field select,.field textarea{
    width:100%;padding:11px 12px;border:1px solid var(--borde);border-radius:10px;background:#fff;color:var(--texto);
  }
  .field textarea{resize:vertical;min-height:60px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    padding:13px 18px;border-radius:12px;border:none;font-weight:600;font-size:0.95rem;
    min-height:48px;width:100%;
  }
  .btn-primary{background:var(--verde);color:#fff;}
  .btn-primary:active{background:var(--verde-oscuro);}
  .btn-ghost{background:transparent;color:var(--verde);border:1.5px solid var(--verde);}
  .btn-amber{background:var(--ambar);color:#fff;}
  .btn-danger{background:transparent;color:var(--rojo);border:1.5px solid var(--rojo);}
  .btn-sm{width:auto;min-height:38px;padding:8px 14px;font-size:0.85rem;}
  .btn-row{display:flex;gap:10px;margin-top:6px;}
  .btn-row .btn{flex:1;}
  .btn:disabled{opacity:.45;pointer-events:none;}

  .fab{
    position:fixed;left:20px;bottom:22px;z-index:30;
    width:58px;height:58px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    padding:0;font-size:1.7rem;line-height:1;
    box-shadow:0 6px 18px rgba(31,61,43,0.35), 0 2px 6px rgba(31,61,43,0.2);
  }

  /* progress */
  .progress-wrap{margin-bottom:14px;}
  .progress-label{display:flex;justify-content:space-between;font-size:0.82rem;color:var(--texto-suave);margin-bottom:6px;}
  .progress-bar{height:8px;background:var(--verde-pastel);border-radius:99px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--verde);border-radius:99px;transition:width .2s;}

  /* familia sections */
  .familia{margin-bottom:10px;border:1px solid var(--borde);border-radius:12px;overflow:hidden;background:#fff;}
  .familia summary{
    list-style:none;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;
    cursor:pointer;background:var(--verde-pastel);font-weight:700;color:var(--verde-oscuro);font-size:0.88rem;
  }
  .familia summary::-webkit-details-marker{display:none;}
  .familia summary .chev{transition:transform .15s;font-size:0.8rem;}
  .familia[open] summary .chev{transform:rotate(90deg);}
  .familia .filas{padding:6px 14px 10px;}
  .fila-tipo{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #efece2;}
  .fila-tipo:last-child{border-bottom:none;}
  .fila-tipo .nombre{flex:1;font-size:0.86rem;line-height:1.25;}
  .fila-tipo input{width:78px;text-align:center;padding:9px 4px;}
  .fila-tipo input.touched{border-color:var(--verde);background:var(--verde-pastel);}

  /* session list */
  .session-item{
    display:flex;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--borde);border-radius:12px;
    background:#fff;margin-bottom:10px;
  }
  .session-item .meta{flex:1;min-width:0;}
  .session-item .meta .t1{font-weight:700;font-size:0.92rem;}
  .session-item .meta .t2{font-size:0.78rem;color:var(--texto-suave);}
  .tag{
    font-size:0.66rem;font-weight:700;text-transform:uppercase;padding:5px 10px;border-radius:99px;letter-spacing:.02em;
    display:flex;align-items:center;gap:5px;flex-shrink:0;
  }
  .tag.draft{background:#efece2;color:#6b6656;}
  .tag.pending_sync{background:var(--ambar-bg);color:var(--ambar);}
  .tag.synced{background:var(--verde-pastel);color:var(--verde);}
  .tag.error{background:var(--rojo-bg);color:var(--rojo);}
  .tag.syncing{background:var(--verde-pastel);color:var(--verde);}
  .tag .mini-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .tag.draft .mini-dot{background:#6b6656;}
  .tag.pending_sync .mini-dot{background:var(--ambar);}
  .tag.synced .mini-dot{background:var(--verde);}
  .tag.error .mini-dot{background:var(--rojo);}
  .tag .mini-ring{width:10px;height:10px;border-radius:50%;border:2px solid rgba(63,107,63,0.25);border-top-color:var(--verde);animation:spin 0.8s linear infinite;flex-shrink:0;}

  .empty{text-align:center;padding:40px 16px;color:var(--texto-suave);}
  .empty .big{font-size:2.4rem;margin-bottom:8px;}


  table.resumen{width:100%;border-collapse:collapse;font-size:0.82rem;}
  table.resumen th{text-align:left;color:var(--texto-suave);font-weight:600;font-size:0.72rem;text-transform:uppercase;padding:6px 4px;border-bottom:1px solid var(--borde);}
  table.resumen td{padding:7px 4px;border-bottom:1px solid #efece2;}
  table.resumen td.num{text-align:right;font-variant-numeric:tabular-nums;}

  .backlink{
    display:inline-flex;align-items:center;gap:6px;color:var(--verde-oscuro);font-weight:700;font-size:0.9rem;
    margin-bottom:14px;background:var(--blanco);border:1px solid var(--borde);border-radius:99px;
    padding:8px 16px;box-shadow:var(--sombra);
  }
  .badge-compania{
    display:inline-flex;align-items:center;gap:6px;background:var(--verde-pastel);color:var(--verde-oscuro);
    font-weight:700;font-size:0.82rem;padding:6px 14px;border-radius:99px;margin-bottom:8px;
  }
  .info-icon-btn{
    width:22px;height:22px;border-radius:50%;border:1.5px solid var(--verde);color:var(--verde);
    background:none;font-size:0.8rem;font-weight:700;line-height:1;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;padding:0;
  }

  .config-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #efece2;font-size:0.86rem;}
  .config-row input{width:64px;text-align:center;padding:6px;}

  .toast{
    position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
    background:var(--verde-oscuro);color:#fff;padding:10px 18px;border-radius:99px;font-size:0.85rem;
    box-shadow:0 4px 14px rgba(0,0,0,0.25);z-index:50;opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
  .toast.err{background:var(--rojo);}

  .foto-thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .foto-thumb{position:relative;width:64px;height:64px;border-radius:10px;overflow:hidden;border:1px solid var(--borde);}
  .foto-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .foto-thumb .del{
    position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;
    background:rgba(0,0,0,0.55);color:#fff;border:none;font-size:0.7rem;line-height:20px;padding:0;
  }
  .foto-thumb .badge-sync{
    position:absolute;bottom:2px;left:2px;background:rgba(0,0,0,0.55);color:#fff;
    font-size:0.6rem;padding:1px 5px;border-radius:6px;
  }

  .firma-box{margin-bottom:16px;}
  .firma-box:last-child{margin-bottom:0;}
  .firma-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:0.85rem;font-weight:600;color:var(--verde-oscuro);}
  .firma-canvas{
    width:100%;height:140px;display:block;border:1.5px dashed var(--borde);border-radius:10px;
    background:#fff;touch-action:none;
  }

  /* ---- Hoja de impresión (Descargar PDF) — vertical, una sola página ---- */
  #printArea{display:none;}
  .print-membrete{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #1f3d2b;padding-bottom:5px;margin-bottom:6px;}
  .print-membrete .empresa{font-family:Georgia,serif;font-weight:700;font-size:0.98rem;color:#1f3d2b;line-height:1.15;}
  .print-membrete .lugar{font-size:0.62rem;color:#5b5f52;}
  .print-membrete .doc-titulo{font-size:0.68rem;letter-spacing:.06em;text-transform:uppercase;color:#5b5f52;margin-top:3px;}
  .print-membrete .folio{text-align:right;font-size:0.9rem;font-weight:700;color:#1f3d2b;max-width:140px;}
  .print-membrete .folio small{display:block;font-size:0.58rem;font-weight:600;color:#5b5f52;text-transform:uppercase;}
  .print-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px 10px;font-size:0.63rem;margin-bottom:5px;}
  .print-grid div{padding:1px 0;}
  .print-grid div b{display:block;color:#5b5f52;font-weight:600;font-size:0.54rem;text-transform:uppercase;letter-spacing:.02em;}
  .print-obs{font-size:0.6rem;border:1px solid #ccc;padding:2px 6px;margin-bottom:5px;min-height:12px;}
  table.print-table{width:100%;border-collapse:collapse;font-size:0.5rem;}
  table.print-table th, table.print-table td{border:1px solid #999;padding:0.5px 2px;text-align:center;line-height:1.25;}
  table.print-table th{background:#e7efdd;font-size:0.48rem;padding:1.5px 2px;}
  table.print-table td.desc{text-align:left;}
  table.print-table td.col-sin-usar{background:#f5f3ec;}
  table.print-table tr.familia-row td{background:#f2efe4;font-weight:700;text-align:left;font-size:0.52rem;padding:1px 3px;}
  .print-firma{display:flex;justify-content:space-between;margin-top:8px;font-size:0.62rem;}
  .print-firma div{width:46%;border-top:1px solid #666;padding-top:2px;text-align:center;}
  .print-firma img{max-height:34px;}

  .print-page2{page-break-before:always; padding-top:4mm;}
  .print-page2 h2{font-family:Georgia,serif;font-size:0.85rem;color:#1f3d2b;margin:0 0 8px;}
  .print-mapa-wrap{display:flex; justify-content:center; margin-bottom:10px;}
  .print-mapa-svg{border:1px solid #4a5d38; border-radius:4px;}
  .print-gps-tabla{width:100%; border-collapse:collapse; font-size:0.56rem;}
  .print-gps-tabla th, .print-gps-tabla td{border:1px solid #ccc; padding:1.5px 4px; text-align:center;}
  .print-gps-tabla th{background:#e7efdd;}
  .print-gps-nota{font-size:0.56rem; color:#5b5f52; margin-top:6px;}

  html{-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact;}
  #printArea, #printArea *{-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact;}

  @media print{
    body *{visibility:hidden;}
    #printArea, #printArea *{visibility:visible;}
    html, body{background:#fff !important;}
    #printArea{display:block;position:absolute;top:0;left:0;width:100%;padding:8mm;background:#fff !important;}
    @page{size:letter portrait;margin:8mm;background:#fff;}
  }
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <span class="leaf">🌱</span>
    <div class="title">Recuentos de Campo
      <small>División Agrícola Comasa · Infoagro</small>
    </div>
    <button class="topbar-icon-btn" onclick="goScreen('screen-config')" aria-label="Sincronización" title="Sincronización">⚙️</button>
  </header>

  <div class="estado-pill" id="estadoPill">
    <div class="icono-wrap" id="pillIconWrap"><span id="pillIcon"><div class="dot-live"></div></span></div>
    <div class="txt">
      <div class="t1" id="pillT1">En línea</div>
      <div class="t2" id="pillT2">Todo sincronizado</div>
    </div>
  </div>

  <main>

    <!-- ============ HOME ============ -->
    <section id="screen-home" class="screen active">

      <h2>Evaluaciones</h2>
      <div id="sessionList"></div>
      <div id="emptyState" class="empty" style="display:none;">
        <div class="big">🌿</div>
        <p>Todavía no hay evaluaciones. Toca "Nueva evaluación" para empezar un recuento en el lote.</p>
      </div>
    </section>

    <!-- ============ FORM HEADER ============ -->
    <section id="screen-form" class="screen">
      <button class="backlink" onclick="goScreen('screen-home')">← Evaluaciones</button>
      <div style="display:flex;align-items:center;gap:8px;">
        <h2 style="margin:0;">Nueva evaluación</h2>
        <button class="info-icon-btn" onclick="toast('Datos generales del recuento: estos campos se copian en cada planta evaluada.')" aria-label="Información" title="Información">ⓘ</button>
      </div>
      <div id="companiaHeaderBadge" class="badge-compania" style="display:none;"></div>
      <div class="card">
        <div class="field">
          <label>Fecha</label>
          <input type="date" id="f_fecha">
        </div>
        <div class="field">
          <label>Sector</label>
          <select id="f_sector" onchange="onSectorChange()"></select>
        </div>
        <div class="field">
          <label>Ciclo</label>
          <select id="f_ciclo"></select>
        </div>
        <div class="field">
          <label>Finca</label>
          <select id="f_finca" onchange="onFincaChange()"></select>
        </div>
        <div class="field">
          <label>Lote</label>
          <select id="f_lote"></select>
        </div>
        <div class="field">
          <label>Edad del cultivo (días)</label>
          <input type="number" id="f_edad">
        </div>
        <div class="field">
          <label>Área evaluada (mzn)</label>
          <input type="number" step="0.01" id="f_area">
        </div>
        <div class="field">
          <label>Aplicación reciente (opcional)</label>
          <input type="text" id="f_aplicacion" placeholder="Ej. Fungicida I">
        </div>
        <div class="field">
          <label>Población plantas/m</label>
          <input type="number" step="0.01" id="f_poblacion">
        </div>
        <div class="field">
          <label>Elaborado por</label>
          <input type="text" id="f_tecnico" placeholder="Nombre del técnico">
        </div>
        <div class="field">
          <label>Estado fenológico</label>
          <input type="text" id="f_estado_fenologico" placeholder="Ej. Reproductivo">
        </div>
        <div class="field">
          <label>Observación</label>
          <textarea id="f_observacion" placeholder="Notas de campo…"></textarea>
        </div>
      </div>
      <button class="btn btn-primary" onclick="iniciarEvaluacion()">Iniciar evaluación planta por planta →</button>
    </section>

    <!-- ============ PLANTA (modal por estación) ============ -->
    <section id="screen-planta" class="screen">
      <button class="backlink" onclick="volverAFormulario()">← Editar datos generales (finca, lote, ciclo...)</button>
      <div class="progress-wrap">
        <div class="progress-label">
          <span style="display:flex;align-items:center;gap:6px;">
            <span id="plantaLabel">Planta 1 de 7</span>
            <button class="info-icon-btn" onclick="toast('Registra lo que observas en esta planta. Los campos que no apliquen quedan en 0.')" aria-label="Información" title="Información">ⓘ</button>
          </span>
          <span id="plantaLote"></span>
        </div>
        <div class="progress-bar"><div id="plantaFill" class="progress-fill" style="width:14%;"></div></div>
      </div>

      <div class="card" style="padding:12px 14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <h3 style="margin:0;">📍 Ubicación de esta planta</h3>
          <button class="btn btn-ghost btn-sm" id="btnGpsPlanta" onclick="capturarGPSPlanta()">Actualizar</button>
        </div>
        <div id="gpsPlantaResult" style="font-size:0.78rem;color:var(--texto-suave);margin-top:6px;"></div>
      </div>

      <div class="card" id="cardFotos" style="padding:12px 14px;display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <h3 style="margin:0;">📷 Fotos de esta planta</h3>
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('fotoInput').click()">+ Agregar fo
