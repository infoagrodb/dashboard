<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard Ejecutivo - División Agrícola Comasa</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root {
  --bg-organic: #f4f7f5;
  --text-main: #1e293b;
  --text-muted: #64748b;
  
  --grad-header: linear-gradient(135deg, #1b4332 0%, #2d6a4f 50%, #40916c 100%);
  --grad-verde: linear-gradient(135deg, #2d6a4f 0%, #52b788 100%);
  --grad-naranja: linear-gradient(135deg, #e76f51 0%, #f4a261 100%);
  --grad-soft-bg: linear-gradient(180deg, #ffffff 0%, #f8faf9 100%);

  --shadow-sm: 0 2px 10px -2px rgba(45, 106, 79, 0.05);
  --shadow-md: 0 4px 15px -5px rgba(27, 67, 50, 0.08);
  --shadow-lg: 0 10px 25px -3px rgba(0, 0, 0, 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

/* === CORRECCIÓN RESPONSIVA: Evitar scroll horizontal global === */
body { font-family: 'Inter', sans-serif; background: var(--bg-organic); color: var(--text-main); padding: 12px 20px; font-size: 12px; overflow-x: hidden; }

.dashboard-container { max-width: 1800px; margin: 0 auto; width: 100%; }

/* === ENCABEZADO ULTRA-COMPACTO === */
.page-hdr-container {
  background: var(--grad-header);
  border-radius: 8px;
  padding: 10px 16px;
  color: #ffffff;
  box-shadow: var(--shadow-sm);
  margin-bottom: 12px;
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
}
.hdr-title-group { display: flex; align-items: baseline; gap: 12px; }
.hdr-title { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; margin: 0;}
.hdr-sub { font-size: 11px; color: #b7e4c7; font-weight: 500; }

.live { display:flex; align-items:center; gap:6px; font-size:11px; color:#e2e8f0; margin-bottom: 4px; justify-content: flex-end;}
.dot { width:8px; height:8px; border-radius:50%; background:#52b788; box-shadow: 0 0 0 2px rgba(82, 183, 136, 0.3); }
.dot.error{background:#e76f51; box-shadow: 0 0 0 2px rgba(231, 111, 81, 0.3);} 
.dot.loading{background:#f4a261; box-shadow: 0 0 0 2px rgba(244, 162, 97, 0.3);}

.btn-organic-action {
  border: none; height: 26px; border-radius: 6px;
  font-weight: 600; font-size: 11px; padding: 0 12px;
  display: inline-flex; align-items: center; gap: 4px; color: white; background: var(--grad-naranja); transition: all 0.2s ease; cursor: pointer; box-shadow: var(--shadow-sm);
}
.btn-organic-action:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }

/* === FILTROS COMPACTOS === */
.filters-inline-container {
  background: var(--grad-soft-bg);
  border-radius: 8px;
  box-shadow: var(--shadow-sm);
  padding: 12px 16px;
  margin-bottom: 16px;
  border: 1px solid rgba(82, 183, 136, 0.15);
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  position: relative;
  z-index: 50;
}
.filter-item-wrap { display: flex; flex-direction: column; gap: 4px; position: relative; }
.fg-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.02em; color: var(--text-muted); font-weight: 700; }
.form-control, .msel-btn {
  background-color: #ffffff; border: 1px solid rgba(163, 177, 198, 0.4); border-radius: 6px;
  color: var(--text-main); font-size: 12px; padding: 6px 10px; width: 100%; cursor: pointer; font-family: inherit; font-weight: 500; transition: border 0.2s; height: 30px;
}
.form-control:focus, .msel-btn:focus { outline: none; border-color: #40916c; }

.msel { position:relative; width: 100%; }
.msel-btn { text-align:left; display: flex; justify-content: space-between; align-items: center;}
.msel-panel { display:none; position:absolute; top:calc(100% + 2px); left:0; background:#ffffff; border:1px solid rgba(82, 183, 136, 0.2); border-radius:8px; box-shadow:var(--shadow-lg); padding:6px; max-height:220px; overflow:auto; min-width:200px; z-index:60; }
.msel-panel.open{ display:block; }
.msel-item{ display:flex; align-items:center; gap:6px; padding:6px 8px; font-size:12px; border-radius:4px; cursor:pointer; color: var(--text-main); transition: background 0.1s;}
.msel-item label{ display:flex; align-items:center; gap:6px; cursor:pointer; width:100%; margin: 0; font-weight: 500;}
.msel-item input[type="checkbox"] { accent-color: #2d6a4f; width: 12px; height: 12px; cursor: pointer;}
.msel-item:hover{ background:rgba(82, 183, 136, 0.1); }

/* === CHIPS COMPACTOS === */
.chips { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.chip { background:rgba(82, 183, 136, 0.12); color: #1b4332; border-radius:12px; padding:4px 10px; font-size:11px; font-weight: 600; display:flex; align-items:center; gap:6px; border: 1px solid rgba(82, 183, 136, 0.2);}
.chip button{ border:none; background:rgba(27, 67, 50, 0.1); border-radius: 50%; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; cursor:pointer; font-weight:700; color:#1b4332; font-size: 9px; transition: all 0.2s; }
.chip button:hover { background: #e76f51; color: white; }

/* === TABS === */
.tabs { display:flex; gap:20px; margin-bottom:16px; border-bottom:1px solid rgba(163, 177, 198, 0.3); padding-bottom: 0px;}
.tab-btn { padding:6px 4px; font-size:13px; font-family: inherit; font-weight: 600; border:none; background:none; cursor:pointer; color:var(--text-muted); border-bottom:3px solid transparent; margin-bottom:-2px; transition:all 0.2s; }
.tab-btn:hover { color: #2d6a4f; }
.tab-btn.active{ color:#1b4332; border-bottom-color:#40916c; }
.tab-panel{ display:none; } .tab-panel.active{ display:block; animation: fadeIn 0.2s ease-in-out; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* === CARDS & LAYOUT CORREGIDOS PARA RESPONSIVIDAD === */
.section-title { font-size: 13px; font-weight: 700; color: #1b4332; text-transform: uppercase; margin: 16px 0 10px; border-left: 3px solid #52b788; padding-left: 8px; display: flex; align-items: center;}

/* Aplicación de min-width: 0 para que Grid no desborde la pantalla */
.card { background: white; border-radius: 8px; padding: 12px 16px; box-shadow: var(--shadow-sm); border: 1px solid rgba(82, 183, 136, 0.12); margin-bottom: 12px; min-width: 0; width: 100%; overflow-x: auto;}
.card-title { font-size: 12px; font-weight: 700; color: #1e293b; margin-bottom: 10px; border-bottom: 1px solid rgba(82, 183, 136, 0.1); padding-bottom: 8px; }
.card-desc { font-size: 11px; color: var(--text-muted); margin-bottom: 12px; font-weight: 500;}

/* Cuadrículas con minmax(0, 1fr) forzando el comportamiento responsivo en Chart.js */
.grid2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-bottom: 12px; width: 100%; }
.grid1 { margin-bottom: 12px; width: 100%; }

/* === KPIs COMPACTOS === */
.kpi-container{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:16px; width: 100%; }
.kpi{ background:white; border-radius:8px; padding:12px 14px; box-shadow:var(--shadow-sm); border: 1px solid rgba(82, 183, 136, 0.12); border-left:4px solid #2d6a4f; display: flex; flex-direction: column; justify-content: center; min-width: 0;}
.kpi.bad{ border-left-color:#e76f51; }
.kpi-label{ font-size:10px; font-weight: 700; color:var(--text-muted); text-transform: uppercase; margin-bottom:4px; }
.kpi-val{ font-size:22px; font-weight:700; color: #1b4332; line-height: 1.1;}
.kpi-sub{ font-size:11px; color:#94A3B8; margin-top:4px; font-weight: 500;}
.kpi-status{ display:inline-flex; align-items: center; justify-content: center; font-size:10px; font-weight:700; margin-top:8px; padding:2px 8px; border-radius:8px; width: fit-content;}
.status-ok{background:#d1fae5;color:#065f46;} .status-bad{background:#fee2e2;color:#991b1b;} .status-na{background:#f1f5f9;color:#475569;}
.kpi-group-title{ font-size:13px; font-weight:700; color:#1b4332; margin:16px 0 8px; border-bottom: 1px solid rgba(82, 183, 136, 0.2); padding-bottom: 4px;}

/* === TABLAS === */
table.alert-table{ width:100%; border-collapse:separate; border-spacing: 0; font-size:11px; }
table.alert-table th, table.alert-table td{ padding:8px; border-bottom:1px solid rgba(163, 177, 198, 0.2); text-align:right; }
table.alert-table th{ text-align:center; cursor:pointer; background:#f8faf9; font-size:11px; font-weight: 700; color: #1b4332; white-space:nowrap; text-transform: uppercase; border-top: 1px solid rgba(163, 177, 198, 0.2);}
table.alert-table td:first-child, table.alert-table td:nth-child(2), table.alert-table th:first-child, table.alert-table th:nth-child(2){ text-align:left; }
table.alert-table tr.subtotal{ font-weight:700; background:#f8faf9; color: #1b4332;}
table.alert-table tr.total{ font-weight:700; background:rgba(82, 183, 136, 0.1); color: #1b4332;}
td.cell-ok { color: #059669 !important; font-weight: 700; } td.cell-bad { color: #dc2626 !important; font-weight: 700; } td.cell-warn { color: #d97706 !important; font-weight: 700; }
.toggle-row{ display:flex; align-items:center; gap:8px; margin-bottom:10px; font-size:11px; font-weight: 600; color: var(--text-main);}
.toggle-row input { accent-color: #2d6a4f; width: 12px; height: 12px; cursor: pointer;}

/* Toggle Buttons UI */
.toggle-btn { padding: 6px 12px; border-radius: 4px; border: 1px solid #CBD5E1; background: #F8FAFC; color: #334155; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit;}
.toggle-btn.active { background: #1b4332; color: white; border-color: #1b4332; }

table.heat-table{ width:100%; border-collapse:separate; border-spacing: 0; font-size:11px; }
table.heat-table th,table.heat-table td{ padding:6px; text-align:center; border:1px solid rgba(163, 177, 198, 0.2); white-space:nowrap; }
table.heat-table th{ background:#1b4332; color: white; font-weight: 600; text-transform: uppercase;}
table.heat-table td:first-child{ text-align:left; font-weight:700; background:#f8faf9; position:sticky; left:0; border-right: 2px solid rgba(82, 183, 136, 0.3); color: #1b4332;}
.cell-bad { color: #DC2626; font-weight: 600; background: #FEE2E2; }
.cell-ok { color: #059669; font-weight: 600; background: #D1FAE5; }
.cell-warn { color: #D97706; font-weight: 600; background: #FEF3C7; }

/* Legenda y Mensajes */
.legend{ display:flex; gap:12px; flex-wrap:wrap; margin-top:10px; font-size:11px; color:var(--text-muted); font-weight: 600;}
.legend span{ display:flex; align-items:center; gap:4px; }
.ldot{ width:8px; height:8px; border-radius:50%; }
.ldash{ width:12px; height:0; border-top:2px dashed #e76f51; }
.status-msg,.error-msg{ text-align:center; padding:20px; font-size:12px; color:var(--text-muted); background: white; border-radius: 8px; box-shadow:var(--shadow-sm); font-weight: 600;}
.error-msg{ color:#dc2626; border-left: 4px solid #dc2626;}
footer{ text-align:center; margin-top:20px; font-size:10px; color:#94A3B8; font-weight: 500; padding-bottom: 10px;}

/* === CAMBIO DE BREAKPOINT === De 800px a 1024px para mejor transición en tablets/laptops */
@media (max-width: 1024px) { .grid2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="dashboard-container">
  <!-- ENCABEZADO OPTIMIZADO -->
  <div class="page-hdr-container">
    <div class="hdr-title-group">
      <h1 class="hdr-title">Dashboard Operativo y Financiero</h1>
      <span class="hdr-sub">| Productor: División Agrícola Comasa</span>
    </div>
    <div>
      <div class="live"><div class="dot loading" id="status-dot"></div><span id="update-time">Conectando...</span></div>
      <button class="btn-organic-action" onclick="init()">↻ Actualizar</button>
    </div>
  </div>

  <!-- FILTROS OPTIMIZADOS -->
  <div class="filters-inline-container" onclick="closeDropdownsEvent(event)">
    <div class="filter-item-wrap">
      <div class="fg-label">Ciclo</div>
      <select id="sel-ciclo" class="form-control" onchange="onCicloChange()"></select>
    </div>
    <div class="filter-item-wrap">
      <div class="fg-label">Actividad (Combinar)</div>
      <div class="msel">
        <button type="button" class="msel-btn" id="btn-actividad" onclick="togglePanel(event, 'panel-actividad')"></button>
        <div class="msel-panel" id="panel-actividad"></div>
      </div>
    </div>
    <div class="filter-item-wrap">
      <div class="fg-label">Sector (Comparar)</div>
      <div class="msel">
        <button type="button" class="msel-btn" id="btn-sector" onclick="togglePanel(event, 'panel-sector')"></button>
        <div class="msel-panel" id="panel-sector"></div>
      </div>
    </div>
    <div class="filter-item-wrap">
      <div class="fg-label">Período</div>
      <select id="sel-periodo" class="form-control" onchange="state.periodo=this.value; render()">
        <option value="10">Últimos 10 días</option>
        <option value="20">Últimos 20 días</option>
        <option value="30">Últimos 30 días</option>
        <option value="todo" selected>Todo el ciclo</option>
      </select>
    </div>
    <div class="filter-item-wrap">
      <div class="fg-label">Comparar Ciclo</div>
      <select id="sel-compare" class="form-control" onchange="render()"><option value="">Ninguno</option></select>
    </div>
  </div>

  <div class="chips" id="chips"></div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('resumen')">Resumen Operativo</button>
    <button class="tab-btn" onclick="showTab('avanzado')">Análisis Avanzado</button>
    <button class="tab-btn" onclick="showTab('equipos')">Equipos</button>
  </div>

  <div id="tab-resumen" class="tab-panel active">
    <div id="content"><div class="status-msg">Cargando datos desde Google Sheets...</div></div>
  </div>
  <div id="tab-avanzado" class="tab-panel">
    <div id="content-avanzado"><div class="status-msg">Cargando...</div></div>
  </div>
  <div id="tab-equipos" class="tab-panel">
    <div id="content-equipos"><div class="status-msg">Cargando...</div></div>
  </div>

  <footer>Conectado en vivo a Google Sheets (Odoo_Ordenes_Campo) - Proveedor: Comasa</footer>
</div>

<script>
/* ===================== CONFIGURACIÓN Y COLORES ORGÁNICOS ===================== */
// FORZAR LOCALIZACIÓN A US PARA TODO CHART.JS (Comas en miles, Puntos en decimales)
Chart.defaults.locale = 'en-US';
Chart.defaults.font.family = "'Inter', sans-serif";
Chart.defaults.color = "#64748B";
Chart.defaults.plugins.tooltip.backgroundColor = "rgba(27, 67, 50, 0.95)";
Chart.defaults.plugins.tooltip.titleFont = { size: 12, weight: 'bold' };
Chart.defaults.plugins.tooltip.bodyFont = { size: 11 };
Chart.defaults.plugins.tooltip.padding = 8;

const SHEET_ID='1JvLHhYiZ9QpF5EQg1AWdXx-D7Y6kwno_LZWsB3sagig';
const API_KEY='AIzaSyAzWECpeQSEq1cwVpuCf6kt_kklb5sEKf4';
const TAB1='Avances y combustible del 2022 a la fecha';
const TAB2='Combustible infoagro';

const PRESUPUESTOS={
 'Arado/Romplona':{lts:18.18,hm:0.78},'Subsuelo':{lts:23.40,hm:1.28},'Grada':{lts:9.60,hm:0.45},
 'Mureo':{lts:8.84,hm:0.52},'Siembra':{lts:7.56,hm:1.17},'Quema':{lts:2.29,hm:0.34},
 'Sello':{lts:1.85,hm:0.29},'Post emergente':{lts:1.63,hm:0.29},'Fungicida I':{lts:2.39,hm:0.38},
 'Fungicida II':{lts:2.09,hm:0.31},'Fungicida III':{lts:1.74,hm:0.26},'Fungicida IV':{lts:1.61,hm:0.25},
 'Fungicida V':{lts:1.75,hm:0.28},'Fungicida VI':{lts:1.78,hm:0.34},'Fungicida VII':{lts:1.44,hm:0.23},
 'Fungicida VIII':{lts:1.90,hm:0.30},'Insecticida':{lts:2.54,hm:0.45},'Arranque':{lts:13.01,hm:1.54},
 'Combina':{lts:31.40,hm:1.00}
};
const ACT_ORDER_LIST=['Arado/Romplona','Subsuelo','Grada','Mureo','Siembra','Quema','Sello','Post emergente',
 'Fungicida I','Fungicida II','Fungicida III','Fungicida IV','Fungicida V','Fungicida VI','Fungicida VII','Fungicida VIII',
 'Insecticida','Arranque','Combina','Fertilizacion Mecanizada Caña','Nivelacion','Cultivadora','Riego',
 'Chapoda/Basureo/Limpia','Re-Siembra','Surcado'];

const HM_CATS=['tractor pequeño','tractor mediano','tractor grande','combinas','combina'];

/* Paleta de Colores Orgánicos */
const COLORS=['#1b4332','#40916c','#f4a261','#e76f51','#2d6a4f','#52b788','#e9c46a','#f4a261','#264653','#2a9d8f'];
const MESES_ES={ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,set:8,oct:9,nov:10,dic:11};

/* ===================== HELPERS ===================== */
let raw1=[],raw2=[],charts={};
let state={ciclo:'',actSel:[],secSel:[],periodo:'todo',compareCiclo:'',crossFinca:null,crossCat:null,crossWeek:null,actsAvail:[],secsAvail:[]};

function destroy(id){ if(charts[id]){try{charts[id].destroy();}catch(e){}} }
function toNum(v){ if(v===undefined||v===null||v==='') return 0; const s=String(v).replace(/,/g,''); const n=parseFloat(s); return isNaN(n)?0:n; }
function get(o,...keys){ for(const k of keys){ if(o[k]!==undefined&&o[k]!=='') return o[k]; } return ''; }
function norm(s){ return String(s||'').trim().toLowerCase(); }
function parseDate(s){
  if(!s) return null;
  s=String(s).trim().toLowerCase();
  let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/); if(m) return new Date(+m[1],+m[2]-1,+m[3]);
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/); if(m) return new Date(+m[3],+m[2]-1,+m[1]);
  m=s.match(/^(\d{1,2})[\s\-]+de[\s\-]+([a-z]{3,})[\s\-]+de[\s\-]+(\d{4})$/);
  if(m&&MESES_ES[m[2].slice(0,3)]!==undefined) return new Date(+m[3],MESES_ES[m[2].slice(0,3)],+m[1]);
  m=s.match(/^(\d{1,2})[\s\-]+([a-z]{3,})[\s\-]+(\d{4})$/);
  if(m&&MESES_ES[m[2].slice(0,3)]!==undefined) return new Date(+m[3],MESES_ES[m[2].slice(0,3)],+m[1]);
  return null;
}
function dkey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtShort(d){ return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0'); }
function isoWeek(d){
  const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const dn=(dt.getUTCDay()+6)%7; dt.setUTCDate(dt.getUTCDate()-dn+3);
  const firstThu=new Date(Date.UTC(dt.getUTCFullYear(),0,4));
  const wk=1+Math.round(((dt-firstThu)/86400000-3+((firstThu.getUTCDay()+6)%7))/7);
  return dt.getUTCFullYear()+'-S'+String(wk).padStart(2,'0');
}
function isComasa(r){ return norm(get(r,'proveedor del servicio'))==='comasa' && norm(get(r,'compañia','compañía'))==='division agricola comasa'; }
function rowAvance(r){ return toNum(get(r,'cant. avance mzn','cantidad avance mzn')); }
function rowLts(r){ return toNum(get(r,'cant. lts diesel','cantidad diesel ltrs')); }
function rowHme(r){ return toNum(get(r,'hora motor efectivo','hme')); }
function isHmCat(r){ return HM_CATS.includes(norm(get(r,'categoria equipo'))); }

function cicloInfo(c){
  const m=c.match(/^(.*?)(\d{4})$/); const year=m?+m[2]:0; let base=(m?m[1]:c).trim().toLowerCase();
  base=base.replace('invest. y des.','inv. desarrollo').replace('investigacion y desarrollo','inv. desarrollo');
  let rank;
  if(base.startsWith('mani')) rank=0;
  else if(base.startsWith('servicio')) rank=1;
  else if(base.startsWith('caña')||base.startsWith('cana')) rank=2;
  else rank=3;
  return {rank,base,year};
}
function cicloSort(a,b){
  const A=cicloInfo(a),B=cicloInfo(b);
  if(A.rank!==B.rank) return A.rank-B.rank;
  if(A.rank===3 && A.base!==B.base) return A.base<B.base?-1:1;
  return A.year-B.year;
}
function actRank(a){ const i=ACT_ORDER_LIST.indexOf(a); return i===-1?1000:i; }
function actSort(a,b){ const ra=actRank(a),rb=actRank(b); if(ra!==rb) return ra-rb; return a<b?-1:1; }

/* ===================== FETCH ===================== */
async function fetchTab(tabName,range){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(tabName+'!'+range)}?key=${API_KEY}`;
  const res=await fetch(url);
  if(!res.ok) throw new Error('HTTP '+res.status+' al leer '+tabName);
  const json=await res.json();
  return json.values||[];
}
function rowsToObjects(values){
  if(!values.length) return [];
  const header=values[0].map(h=>norm(h));
  return values.slice(1).map(row=>{ const o={}; header.forEach((h,i)=>{ o[h]=row[i]!==undefined?row[i]:''; }); return o; });
}

async function init(){
  const dot=document.getElementById('status-dot');
  dot.className='dot loading'; document.getElementById('update-time').textContent='Conectando...';
  document.getElementById('content').innerHTML='<div class="status-msg">Cargando datos desde Google Sheets (puede tardar unos segundos)...</div>';
  try{
    const [v1,v2]=await Promise.all([fetchTab(TAB1,'A1:M'),fetchTab(TAB2,'A1:T')]);
    raw1=rowsToObjects(v1); raw2=rowsToObjects(v2);
    const ciclos=[...new Set(raw1.filter(isComasa).map(r=>get(r,'ciclo')))].filter(Boolean).sort(cicloSort);
    const sel=document.getElementById('sel-ciclo'); sel.innerHTML='';
    ciclos.forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });
    const def=ciclos.find(c=>norm(c)==='mani 2026')||ciclos[0];
    sel.value=def;
    onCicloChange();
    dot.className='dot';
    document.getElementById('update-time').textContent=new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
  }catch(err){
    dot.className='dot error'; document.getElementById('update-time').textContent='Error de conexion';
    document.getElementById('content').innerHTML=`<div class="error-msg">No se pudo conectar a Google Sheets: ${err.message}</div>`;
  }
}

/* ===================== SELECTORES ===================== */
function onCicloChange(){
  const ciclo=document.getElementById('sel-ciclo').value;
  state.ciclo=ciclo;
  const acts=[...new Set(raw1.filter(r=>isComasa(r)&&get(r,'ciclo')===ciclo).map(r=>get(r,'actividad')))].filter(Boolean).sort(actSort);
  const secs=[...new Set(raw1.filter(r=>isComasa(r)&&get(r,'ciclo')===ciclo).map(r=>get(r,'sector')))].filter(Boolean).sort();
  state.actsAvail=acts; state.secsAvail=secs;
  state.actSel=[acts.includes('Arado/Romplona')?'Arado/Romplona':acts[0]];
  state.secSel=[];
  state.crossFinca=null; state.crossCat=null; state.crossWeek=null;
  buildMultiselect('actividad',acts,state.actSel);
  buildMultiselect('sector',secs,state.secSel);
  const cmp=document.getElementById('sel-compare'); cmp.innerHTML='<option value="">Ninguno</option>';
  const ciclosAll=[...new Set(raw1.filter(isComasa).map(r=>get(r,'ciclo')))].filter(c=>c&&c!==ciclo).sort(cicloSort);
  ciclosAll.forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; cmp.appendChild(o); });
  render();
}

function togglePanel(e, id){
  e.stopPropagation();
  const panel=document.getElementById(id);
  const wasOpen=panel.classList.contains('open');
  closeDropdownsEvent({target: document.body}); 
  if(!wasOpen) panel.classList.add('open');
}
function closeDropdownsEvent(e) {
  if(!e.target.closest('.msel')) {
    let changed=false;
    document.querySelectorAll('.msel-panel.open').forEach(p=>{ p.classList.remove('open'); changed=true; });
    if(changed) applyMultiselectFromDOM();
  }
}

function buildMultiselect(kind,options,selArr){
  const panel=document.getElementById('panel-'+kind);
  panel.innerHTML='';
  if(kind==='sector'){
    const div=document.createElement('div'); div.className='msel-item';
    const id='msel-sector-all';
    div.innerHTML=`<label><input type="checkbox" id="${id}" data-kind="sector" data-all="1" ${selArr.length===0?'checked':''}> Todos los sectores</label>`;
    div.querySelector('input').onclick=()=>{ document.querySelectorAll('#panel-sector input[data-kind="sector"]:not([data-all="1"])').forEach(c=>c.checked=false); };
    panel.appendChild(div);
  }
  options.forEach(opt=>{
    const div=document.createElement('div'); div.className='msel-item';
    const checked=selArr.includes(opt);
    const safeId='msel-'+kind+'-'+opt.replace(/[^a-zA-Z0-9]/g,'_');
    div.innerHTML=`<label><input type="checkbox" id="${safeId}" data-kind="${kind}" value="${opt.replace(/"/g,'&quot;')}" ${checked?'checked':''}> ${opt}</label>`;
    if(kind==='sector'){
      div.querySelector('input').onclick=(e)=>{ if(e.target.checked){ const all=document.getElementById('msel-sector-all'); if(all) all.checked=false; } };
    }
    panel.appendChild(div);
  });
  updateMselLabel(kind);
}

function applyMultiselectFromDOM(){
  const actChecked=[...document.querySelectorAll('#panel-actividad input[data-kind="actividad"]:checked')].map(c=>c.value);
  const secAllChecked=document.getElementById('msel-sector-all')?.checked;
  const secChecked=[...document.querySelectorAll('#panel-sector input[data-kind="sector"]:not([data-all="1"]):checked')].map(c=>c.value);

  let newAct=actChecked;
  let newSec=secAllChecked?[]:secChecked;
  if(newAct.length>1 && newSec.length>1) newSec=newSec.slice(0,1);
  if(newSec.length>1 && newAct.length>1) newAct=newAct.slice(0,1);

  const changed = JSON.stringify(newAct)!==JSON.stringify(state.actSel) || JSON.stringify(newSec)!==JSON.stringify(state.secSel);
  state.actSel=newAct; state.secSel=newSec;
  if(changed){
    buildMultiselect('actividad',state.actsAvail,state.actSel);
    buildMultiselect('sector',state.secsAvail,state.secSel);
    render();
  } else {
    updateMselLabel('actividad'); updateMselLabel('sector');
  }
}
function afterSelChange(){
  buildMultiselect('actividad',state.actsAvail,state.actSel);
  buildMultiselect('sector',state.secsAvail,state.secSel);
  render();
}
function updateMselLabel(kind){
  const arr=kind==='actividad'?state.actSel:state.secSel;
  const btn=document.getElementById('btn-'+kind);
  if(kind==='sector' && arr.length===0){ btn.innerHTML='Todos los sectores <span>▼</span>'; return; }
  btn.innerHTML = (arr.length<=1 ? (arr[0]||'(ninguno)') : arr.length+' sel.') + ' <span>▼</span>';
}

/* ===================== CHIPS (cross filter) ===================== */
function renderChips(){
  const c=document.getElementById('chips'); c.innerHTML='';
  const add=(label,clearFn)=>{
    const d=document.createElement('div'); d.className='chip'; d.innerHTML=`<span>${label}</span>`;
    const b=document.createElement('button'); b.textContent='✕'; b.onclick=clearFn;

/* ===================== TABS ===================== */
function showTab(name){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  const idx = name==='resumen'?0:name==='avanzado'?1:2;

/* ===================== DATA CORE ===================== */
function rowsFor(raw,ciclo,sector,actList){ return raw.filter(r=>isComasa(r) && get(r,'ciclo')===ciclo && actList.includes(get(r,'actividad')) && (sector===null||get(r,'sector')===sector)); }
function applyCross(rows,isTab2){ return rows.filter(r=>{ if(state.crossFinca && get(r,'finca')!==state.crossFinca) return false; if(state.crossCat && isTab2 && norm(get(r,'categoria equipo'))!==norm(state.crossCat)) return false; if(state.crossWeek){ const d=parseDate(get(r,'fecha')); if(!d||isoWeek(d)!==state.crossWeek) return false; } return true; }); }
function maxDateOf(rows){ let maxD=null; rows.forEach(r=>{ const d=parseDate(get(r,'fecha')); if(d&&(!maxD||d>maxD)) maxD=d; }); return maxD; }
function applyPeriodo(rows,periodo,maxD){ if(periodo==='todo'||!maxD) return rows; const minD=new Date(maxD); minD.setDate(minD.getDate()-(parseInt(periodo)-1)); return rows.filter(r=>{ const d=parseDate(get(r,'fecha')); return d&&d>=minD&&d<=maxD; }); }
function buildGroupSeries(rows1g,rows2g){
  const byDate={};
  rows1g.forEach(r=>{ const d=parseDate(get(r,'fecha')); if(!d) return; const k=dkey(d); if(!byDate[k]) byDate[k]={mz:0,lts:0,hm:0,date:d}; byDate[k].mz+=rowAvance(r); byDate[k].lts+=rowLts(r); });
  rows2g.forEach(r=>{ const d=parseDate(get(r,'fecha')); if(!d) return; const k=dkey(d); if(!byDate[k]) byDate[k]={mz:0,lts:0,hm:0,date:d}; byDate[k].hm+=rowHme(r); });
  const dates=Object.keys(byDate).sort();
  let accMz=0,accLts=0,accHm=0; const cum={};
  dates.forEach(k=>{ accMz+=byDate[k].mz; accLts+=byDate[k].lts; accHm+=byDate[k].hm; cum[k]={accMz,accLts,accHm}; });
  const byFinca={}; rows1g.forEach(r=>{ const f=get(r,'finca')||'Sin finca'; byFinca[f]=(byFinca[f]||0)+rowAvance(r); });
  const byWeek={}; rows1g.forEach(r=>{ const d=parseDate(get(r,'fecha')); if(!d) return; const w=isoWeek(d); if(!byWeek[w]) byWeek[w]={lts:0,mz:0}; byWeek[w].lts+=rowLts(r); byWeek[w].mz+=rowAvance(r); });
  return {byDate,dates,cum,totalMz:accMz,totalLts:accLts,totalHm:accHm,byFinca,byWeek};
}
function forwardFill(dates,cum,field,unionDate){ let val=0; for(const d of dates){ if(d<=unionDate) val=cum[d][field]; else break; } return val; }
function weightedPpto(rows1g,actList){
  const mzByAct={}; rows1g.forEach(r=>{ const a=get(r,'actividad'); mzByAct[a]=(mzByAct[a]||0)+rowAvance(r); });
  let sumMzLts=0,sumMzHm=0,sumMzL=0,sumMzH=0;
  actList.forEach(a=>{ const p=PRESUPUESTOS[a]; const mz=mzByAct[a]||0; if(p&&mz>0){ sumMzLts+=mz*p.lts; sumMzL+=mz; sumMzHm+=mz*p.hm; sumMzH+=mz; } });
  return { lts: sumMzL>0?sumMzLts/sumMzL:undefined, hm: sumMzH>0?sumMzHm/sumMzH:undefined };
}
function statusBadge(real,ppto,hayDatos){
  if(!hayDatos||ppto===undefined) return {cls:'status-na',txt:'Sin ppto'};
  const dif=real-ppto; if(Math.abs(dif)<=ppto*0.05) return {cls:'status-ok',txt:'Óptimo'};
  if(dif>0) return {cls:'status-bad',txt:'Exceso'}; return {cls:'status-ok',txt:'Ahorro'};
}

/* REGLA EN-US PARA ETIQUETAS: miles con coma, decimales con punto */
function lineLabelOpts(){ return { display:(ctx)=>{ const data=ctx.dataset.data; const n=data.length; const i=ctx.dataIndex; if(data[i]==null) return false; const step=Math.max(1,Math.ceil(n/6)); return i===n-1||i%step===0; }, formatter:(v)=> typeof v==='number'? v.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}):v, font:{size:9, weight: '600'}, color:'#64748B', align:'top' }; }
function barLabelOpts(fmt){ return { display:true, formatter:fmt||((v)=>v.toLocaleString('en-US', {minimumFractionDigits:1, maximumFractionDigits:1})), font:{size:10, weight: '700'}, color:'#1b4332', anchor:'end', align:'end' }; }

/* ===================== RENDER MASTER ===================== */
function render(){
  if(!raw1.length) return;
  updateMselLabel('actividad'); updateMselLabel('sector'); renderChips();
  if(state.actSel.length===0){
    document.getElementById('content').innerHTML='<div class="status-msg">Selecciona al menos una actividad.</div>';
    document.getElementById('content-avanzado').innerHTML=''; document.getElementById('content-equipos').innerHTML=''; return;
  }
  const secGroups = state.secSel.length>0 ? state.secSel : [null];
  const allR1 = rowsFor(raw1,state.ciclo,null,state.actSel);
  const globalMax = maxDateOf(allR1);

  const groups = secGroups.map(sec=>{
    let r1=applyCross(rowsFor(raw1,state.ciclo,sec,state.actSel),false); r1=applyPeriodo(r1,state.periodo,globalMax);
    let r2=applyCross(rowsFor(raw2,state.ciclo,sec,state.actSel).filter(isHmCat),true); r2=applyPeriodo(r2,state.periodo,globalMax);
    return {sector:sec||'Todos',r1,r2,series:buildGroupSeries(r1,r2),ppto:weightedPpto(r1,state.actSel)};
  });

  try{ renderResumen(groups); }catch(e){ console.error(e); }
  try{ renderAvanzado(groups); }catch(e){ console.error(e); }
  try{ renderEquipos(groups); }catch(e){ console.error(e); }
}

/* ===================== TAB: RESUMEN OPERATIVO ===================== */
function renderResumen(groups){
  let unionDates=new Set(); groups.forEach(g=>g.series.dates.forEach(d=>unionDates.add(d))); unionDates=[...unionDates].sort();
  const labels=unionDates.map(k=>{ for(const g of groups){ if(g.series.byDate[k]) return fmtShort(g.series.byDate[k].date); } return k; });

  let kpiHtml='';
  groups.forEach((g)=>{
    const s=g.series, totalMz=s.totalMz,totalLts=s.totalLts,totalHm=s.totalHm;

      <div class="kpi"><div class="kpi-label">Litros acumulados</div><div class="kpi-val">${totalLts.toLocaleString('en-US',{maximumFractionDigits:0})} L</div><div class="kpi-sub">Total consumido</div></div>
      <div class="kpi"><div class="kpi-label">Avance promedio</div><div class="kpi-val">${avg.toLocaleString('en-US',{maximumFractionDigits:2})}</div><div class="kpi-sub">Mz / día</div></div>
      <div class="kpi ${stLts.cls==='status-bad'?'bad':''}"><div class="kpi-label">Lts/Mz ${g.ppto.lts!==undefined?'(Ppto '+g.ppto.lts.toLocaleString('en-US',{minimumFractionDigits:2, maximumFractionDigits:2})+')':''}</div><div class="kpi-val">${totalMz>0?realLts.toLocaleString('en-US',{minimumFractionDigits:2, maximumFractionDigits:2}):'-'}</div><div class="kpi-sub">${g.ppto.lts!==undefined?('Dif: '+(realLts-g.ppto.lts>=0?'+':'')+(realLts-g.ppto.lts).toLocaleString('en-US',{minimumFractionDigits:2, maximumFractionDigits:2})):''}</div><span class="kpi-status ${stLts.cls}">${stLts.txt}</span></div>
      <div class="kpi ${stHm.cls==='status-bad'?'bad':''}"><div class="kpi-label">HM/Mz ${g.ppto.hm!==undefined?'(Ppto '+g.ppto.hm.toLocaleString('en-US',{minimumFractionDigits:2, maximumFractionDigits:2})+')':''}</div><div class="kpi-val">${totalMz>0?realHm.toLocaleString('en-US',{minimumFractionDigits:2, maximumFractionDigits:2}):'-'}</div><div class="kpi-sub">${g.ppto.hm!==undefined?('Dif: '+(realHm-g.ppto.hm>=0?'+':'')+(realHm-g.ppto.hm).toLocaleString('en-US',{minimumFractionDigits:2, maximumFractionDigits:2})):''}</div><span class="kpi-status ${stHm.cls}">${stHm.txt}</span></div>
    </div>`;
  });

  const actTit = state.actSel.length>1 ? state.actSel.join(' + ') : state.actSel[0];
  document.getElementById('content').innerHTML = kpiHtml + `
    <div class="section-title">1. Avance general del ciclo</div>
    <div class="grid1 card"><div class="card-title">Avance acumulado (Mz) - ${actTit}</div><div style="position:relative;width:100%;height:220px"><canvas id="c1"></canvas></div></div>
    <div class="grid2">
      <div class="card"><div class="card-title">Manzanas por día</div><div style="position:relative;width:100%;height:200px"><canvas id="c2"></canvas></div></div>
      <div class="card"><div class="card-title">Avance por finca (Top 10)</div><div style="position:relative;width:100%;height:200px"><canvas id="c3"></canvas></div></div>
    </div>

    <div class="grid2">
      <div class="card"><div class="card-title">Lts/Mz acumulado vs Ppto</div><div style="position:relative;width:100%;height:200px"><canvas id="c4"></canvas></div><div class="legend"><span><span class="ldot" style="background:#40916c"></span>Real</span><span><span class="ldash"></span>Ppto</span></div></div>
      <div class="card"><div class="card-title">HM/Mz acumulado vs Ppto</div><div style="position:relative;width:100%;height:200px"><canvas id="c5"></canvas></div><div class="legend"><span><span class="ldot" style="background:#f4a261"></span>Real</span><span><span class="ldash"></span>Ppto</span></div></div>
    </div>
    <div class="grid2">
      <div class="card"><div class="card-title">Lts/Mz por actividad vs Ppto</div><div style="position:relative;width:100%;height:220px"><canvas id="c6"></canvas></div><div class="legend"><span><span class="ldot" style="background:#40916c"></span>Real</span><span><span class="ldot" style="background:#e76f51"></span>Ppto</span></div></div>
      <div class="card"><div class="card-title">HM/Mz por actividad vs Ppto</div><div style="position:relative;width:100%;height:220px"><canvas id="c7"></canvas></div><div class="legend"><span><span class="ldot" style="background:#f4a261"></span>Real</span><span><span class="ldot" style="background:#e76f51"></span>Ppto</span></div></div>

function drawResumenCharts(groups,unionDates,labels){
  const colorForGroup = (i) => COLORS[i%COLORS.length];

  const ds1=groups.map((g,i)=>({label:g.sector,data:unionDates.map(d=>forwardFill(g.series.dates,g.series.cum,'accMz',d)),

  destroy('c3');
  const byFincaAll={}; groups.forEach(g=>Object.entries(g.series.byFinca).forEach(([f,v])=>{ byFincaAll[f]=(byFincaAll[f]||0)+v; }));
  const fincaEntries=Object.entries(byFincaAll).filter(e=>e[1]>0).sort((a,b)=>b[1]-a[1]).slice(0,10);
  document.getElementById('c3').parentElement.style.height=Math.max(200,fincaEntries.length*30+50)+'px';
  charts.c3=new Chart(document.getElementById('c3'),{type:'bar',data:{labels:fincaEntries.map(e=>e[0]),datasets:[{data:fincaEntries.map(e=>+(e[1])),backgroundColor:'#1b4332',borderRadius:4,datalabels:barLabelOpts(v=>v.toLocaleString('en-US', {maximumFractionDigits:1}))}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true},y:{ticks:{font:{size:10}}}}, onClick:(evt,els)=>{ if(els.length){ state.crossFinca=state.crossFinca===fincaEntries[els[0].index][0]?null:fincaEntries[els[0].index][0]; render(); } }}});

  destroy('c4');
  const ds4=[]; groups.forEach((g,i)=>{ ds4.push({label:'Real '+g.sector,data:unionDates.map(d=>{ const mz=forwardFill(g.series.dates,g.series.cum,'accMz',d); const lts=forwardFill(g.series.dates,g.series.cum,'accLts',d); return mz>0?+(lts/mz):null; }), borderColor:colorForGroup(i),backgroundColor:'transparent',borderWidth:2.5,pointRadius:2,tension:.3, datalabels: groups.length===1?lineLabelOpts():{display:false}}); });
  if(groups.length===1 && groups[0].ppto.lts!==undefined) ds4.push({label:'Ppto',data:labels.map(()=>groups[0].ppto.lts),borderColor:'#e76f51',borderWidth:2,borderDash:[5,5],pointRadius:0,fill:false,datalabels:{display:false}});
  charts.c4=new Chart(document.getElementById('c4'),{type:'line',data:{labels,datasets:ds4}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:groups.length>1}},scales:{x:{ticks:{font:{size:9},maxRotation:45},grid:{display:false}},y:{ticks:{font:{size:10}},beginAtZero:true}}}});

  destroy('c5');

function renderAlertTable(payload){
  if(!payload) return; const {data,pptoLts,pptoHm}=payload, onlyAlerts=document.getElementById('chk-alertas')?.checked, sectores={};

    const alertLts = difLts!==null && pptoLts!==undefined && difLts>pptoLts*0.05, alertHm = difHm!==null && pptoHm!==undefined && difHm>pptoHm*0.05;
    const estado = (alertLts&&alertHm)?'critico':(alertLts||alertHm)?'alerta':'ok';
    if(onlyAlerts && estado==='ok') return;
    if(!sectores[d.sector]) sectores[d.sector]={rows:[],tot:{mz:0,lts:0,hmP:0,hmM:0,hmG:0,hmC:0}};

  const totGen={mz:0,lts:0,hmP:0,hmM:0,hmG:0,hmC:0};
  Object.keys(sectores).sort().forEach(sec=>{
    const g=sectores[sec]; if(window._sortKey) g.rows.sort((a,b)=>{ const va=a[window._sortKey],vb=b[window._sortKey]; return typeof va==='string'?va.localeCompare(vb):(vb||0)-(va||0); });
    g.rows.forEach(r=>{ html+=`<tr><td>${sec}</td><td style="font-weight:700;">${r.finca}</td><td>${fmt(r.mz)}</td><td>${fmt(r.lts,0)}</td><td>${pptoLts!==undefined?pptoLts.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):'-'}</td><td style="font-weight:700;">${fmt(r.ltsMz,2)}</td>${difCell(r.difLts,pptoLts,2)}<td>${fmt(r.hmP)}</td><td>${fmt(r.hmM)}</td><td>${fmt(r.hmG)}</td><td>${fmt(r.hmC)}</td><td>${fmt(r.totalHoras)}</td><td>${pptoHm!==undefined?pptoHm.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):'-'}</td><td style="font-weight:700;">${fmt(r.hmMz,2)}</td><td class="${r.estado==='ok'?'cell-ok':r.estado==='alerta'?'cell-warn':'cell-bad'}" style="text-align:center;">${r.estado==='ok'?'ÓPTIMO':r.estado==='alerta'?'ALERTA':'CRÍTICO'}</td></tr>`; });
    const t=g.tot, totH=t.hmP+t.hmM+t.hmG+t.hmC, ltsMz=t.mz>0?t.lts/t.mz:0, hmMz=t.mz>0?totH/t.mz:0;

  document.getElementById('alert-table-wrap').innerHTML=html;

    groups.forEach(g => { g.r1.forEach(r => { const f=get(r,'finca')||'Sin finca', act=get(r,'actividad'); if(!dataFincas[f]) dataFincas[f]={realLts:0, pptoLts:0}; const mz = rowAvance(r), lts = rowLts(r); dataFincas[f].realLts += lts; const ppto = PRESUPUESTOS[act] ? PRESUPUESTOS[act].lts : 0; dataFincas[f].pptoLts += (mz * ppto); }); });
    const labels = [], dataArr = [], bgColors = [];
    Object.entries(dataFincas).forEach(([f, d]) => { if(d.pptoLts > 0) { const diff = d.realLts - d.pptoLts; labels.push(f); dataArr.push(+diff); bgColors.push(diff > 0 ? '#e76f51' : '#52b788'); } });
    charts.chartD2 = new Chart(document.getElementById('chartD2'), {
        type: 'bar', data: { labels: labels, datasets: [{ data: dataArr, backgroundColor: bgColors, borderRadius: 4 }] },
        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: {display:false}, tooltip:{callbacks:{label:(ctx)=>ctx.raw.toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1})}} }, scales: { x: { title: {display:true, text:'Litros Totales (Real - Presupuesto)'}, grid: { color: (ctx) => ctx.tick.value === 0 ? '#1b4332' : '#e2e8f0', lineWidth: (ctx) => ctx.tick.value === 0 ? 2 : 1 } } } }
    });
}

function drawD3(groups) {
    destroy('chartD3'); const actData = {};
    groups.forEach(g => { g.r2.forEach(r => { const a = get(r,'actividad'), c = norm(get(r,'categoria equipo')); if(!actData[a]) actData[a] = {}; actData[a][c] = (actData[a][c] || 0) + rowHme(r); }); });
    const acts = Object.keys(actData).sort(actSort); if(acts.length === 0) return;
    const dsSmall = [], dsMed = [], dsLarge = [], dsComb = [];
    acts.forEach(a => { const d = actData[a], tP = d['tractor pequeño']||0, tM = d['tractor mediano']||0, tG = d['tractor grande']||0, tC = (d['combinas']||0) + (d['combina']||0); const total = tP+tM+tG+tC; if(total > 0) { dsSmall.push(tP/total*100); dsMed.push(tM/total*100); dsLarge.push(tG/total*100); dsComb.push(tC/total*100); } else { dsSmall.push(0); dsMed.push(0); dsLarge.push(0); dsComb.push(0); } });
    charts.chartD3 = new Chart(document.getElementById('chartD3'), {
        type: 'bar', data: { labels: acts, datasets: [ { label: 'T. Pequeño', data: dsSmall, backgroundColor: '#52b788' }, { label: 'T. Mediano', data: dsMed, backgroundColor: '#2d6a4f' }, { label: 'T. Grande', data: dsLarge, backgroundColor: '#e76f51' }, { label: 'Combinas', data: dsComb, backgroundColor: '#f4a261' } ] },
        options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true, grid: {display: false} }, y: { stacked: true, max: 100, title: {display:true, text:'% HM'} } }, plugins: { datalabels: { display: (ctx) => ctx.dataset.data[ctx.dataIndex] > 5, formatter: v => v.toLocaleString('en-US',{maximumFractionDigits:0})+'%' } } }
    });
}

function renderHeatmapD4(groups, type){
  const acts=Object.keys(PRESUPUESTOS).sort(actSort); let r1All=[], r2All=[];
  const globalMax = maxDateOf(rowsFor(raw1,state.ciclo,null,acts));
  (state.secSel.length>0?state.secSel:[null]).forEach(sec=>{ r1All=r1All.concat(applyPeriodo(rowsFor(raw1,state.ciclo,sec,acts),state.periodo,globalMax)); r2All=r2All.concat(applyPeriodo(rowsFor(raw2,state.ciclo,sec,acts).filter(isHmCat),state.periodo,globalMax)); });
  const data={};
  r1All.forEach(r=>{ const f=get(r,'finca')||'Sin finca', a=get(r,'actividad'); if(!data[f]) data[f]={}; if(!data[f][a]) data[f][a]={mz:0,lts:0,hm:0}; data[f][a].mz+=rowAvance(r); data[f][a].lts+=rowLts(r); });
  r2All.forEach(r=>{ const f=get(r,'finca')||'Sin finca', a=get(r,'actividad'); if(!data[f]) data[f]={}; if(!data[f][a]) data[f][a]={mz:0,lts:0,hm:0}; data[f][a].hm+=rowHme(r); });
  const fincas=Object.keys(data).filter(f=>Object.values(data[f]).some(v=>v.mz>0)).sort();

  let html='<table class="heat-table"><thead><tr><th>Finca</th>'+acts.map(a=>`<th>${a}</th>`).join('')+'</tr></thead><tbody>';
  fincas.forEach(f=>{
    html+=`<tr><td>${f}</td>`;
    acts.forEach(a=>{
      const d=data[f][a]; if(!d||d.mz<=0){ html+='<td>-</td>'; return; }
      const ppto = PRESUPUESTOS[a];
      if(type === 'lts') { const real = d.lts/d.mz, p = ppto.lts, dif = real-p; let cls='cell-ok'; if(dif>p*0.05) cls='cell-bad'; else if(dif<-p*0.05) cls='cell-ok'; else cls='cell-warn'; html+=`<td class="${cls}">${real.toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1})}</td>`;
      } else { const real = d.hm/d.mz, p = ppto.hm, dif = real-p; let cls='cell-ok'; if(dif>p*0.05) cls='cell-bad'; else if(dif<-p*0.05) cls='cell-ok'; else cls='cell-warn'; html+=`<td class="${cls}">${real.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</td>`; }
    });
    html+='</tr>';
  });
  html+='</tbody></table>';
  if(!fincas.length) html='<div class="status-msg">Sin datos para los filtros actuales.</div>';
  document.getElementById('heatmap').innerHTML=html;
}

/* ===================== TAB: EQUIPOS ===================== */
function renderEquipos(groups){
  const hasEquipo = raw2.length && raw2[0].hasOwnProperty('equipo');
  if(!hasEquipo){ document.getElementById('content-equipos').innerHTML='<div class="card status-msg">Solicita agregar la columna "Equipo" a la hoja para habilitar este análisis.</div>'; return; }
  const data={}; groups.forEach(g=>g.r2.forEach(r=>{ const eq=get(r,'equipo')||'Sin equipo'; if(!data[eq]) data[eq]={hm:0,lts:0,cat:get(r,'categoria equipo')}; data[eq].hm+=rowHme(r); data[eq].lts+=rowLts(r); }));
  const entries=Object.entries(data).filter(e=>e[1].hm>0||e[1].lts>0).sort((a,b)=>b[1].hm-a[1].hm);
  let html=`<div class="section-title">E1. Horas motor y combustible por equipo</div><div class="card" style="overflow-x:auto; width:100%;"><table class="alert-table"><thead><tr><th>Equipo</th><th>Categoría</th><th>HM total</th><th>Litros total</th><th>Lts/HM</th></tr></thead><tbody>`;
  entries.forEach(([eq,d])=>{ html+=`<tr><td style="font-weight:700;">${eq}</td><td>${d.cat||'-'}</td><td>${d.hm.toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1})}</td><td>${d.lts.toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1})}</td><td style="font-weight:700;">${d.hm>0?(d.lts/d.hm).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):'-'}</td></tr>`; });
  html+='</tbody></table></div>';
  if(!entries.length) html=`<div class="section-title">E1. Análisis de Equipos</div><div class="card status-msg">Sin datos para los filtros actuales.</div>`;
  document.getElementById('content-equipos').innerHTML=html;
}

init();
</script>
