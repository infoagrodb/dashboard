<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matriz Pivot Germinación Agrícola - Maní Premium</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bg-main: #fbfaf5;          /* Arena ultra claro */
    --text-main: #0f172a;        /* Slate 900 */
    --text-muted: #475569;       /* Slate 600 */
    --primary: #0f2a11;          /* Verde Industrial Profundo */
    --primary-hover: #071508;
    --primary-light: #e4ede6;    /* Verde cabecera suave */
    --accent-peanut: #b35c04;    /* Tostado Premium */
    --accent-peanut-hover: #8f4a03;
    --border-color: #dcd4c4;      /* Arcilla suave */
    --card-bg: #ffffff;
    --shadow-sm: 0 4px 6px -1px rgba(15, 23, 42, 0.04), 0 2px 4px -1px rgba(15, 23, 42, 0.02);
    --shadow-md: 0 12px 20px -3px rgba(15, 23, 42, 0.08), 0 4px 6px -2px rgba(15, 23, 42, 0.04);
  }

  * { box-sizing: border-box; transition: background-color 0.25s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.25s; }

  /* Barra de Scroll Estilizada */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #ebdcb9; border-radius: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--accent-peanut); border-radius: 10px; border: 2px solid #ebdcb9; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent-peanut-hover); }

  html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background-color: var(--bg-main);
    color: var(--text-main);
    line-height: 1.5;
    display: flex;
    flex-direction: column;
  }

  .header-wrapper { background-color: var(--primary); box-shadow: 0 4px 20px rgba(15,42,17,0.25); width: 100%; z-index: 100; }

  header {
    max-width: 1400px; margin: 0 auto; color: #ffffff; padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px;
  }

  .header-title-area h1 { margin: 0 0 2px 0; font-size: 20px; font-weight: 700; letter-spacing: -0.4px; }
  .header-title-area p { margin: 0; font-size: 11px; color: #cbdccb; }
  .header-action-area { display: flex; align-items: flex-end; gap: 14px; }

  .header-filter-group { display: flex; flex-direction: column; gap: 4px; width: 240px; position: relative; }
  .header-filter-group .label-container { display: flex; justify-content: space-between; align-items: center; height: 16px; }
  .header-filter-group label { font-size: 10px; font-weight: 700; color: #cbdccb; text-transform: uppercase; letter-spacing: 0.5px; }

  .header-filter-group .multiselect-dropdown {
    background-color: rgba(255, 255, 255, 0.15); color: white; border: 1px solid rgba(255, 255, 255, 0.3);
    padding: 6px 12px; border-radius: 6px; height: 34px;
  }
  .header-filter-group .multiselect-dropdown:hover { border-color: #ffffff; background-color: rgba(255, 255, 255, 0.25); transform: translateY(-1px); }

  .btn-toggle-filters {
    background-color: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
    color: white; height: 34px; font-size: 13px; padding: 0 14px; border-radius: 6px; cursor: pointer;
    display: inline-flex; align-items: center; transition: background 0.2s;
  }
  .btn-toggle-filters:hover { background-color: rgba(255, 255, 255, 0.2); transform: translateY(-1px); }

  .container { max-width: 1400px; width: 100%; margin: 0 auto; padding: 16px 24px; display: flex; flex-direction: column; flex: 1; min-height: 0; }

  /* Animación Desplegable de Filtros */
  .toolbar-wrapper { 
    max-height: 250px; overflow: visible; opacity: 1; margin-bottom: 16px; flex-shrink: 0;
    transition: max-height 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1), margin-bottom 0.4s ease, opacity 0.3s ease;
  }
  .toolbar-wrapper.collapsed { max-height: 0; margin-bottom: 0; opacity: 0; overflow: hidden; pointer-events: none; }

  .toolbar {
    background-color: var(--card-bg); padding: 16px 20px; border-radius: 12px; border: 1px solid var(--border-color);
    box-shadow: var(--shadow-sm); display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end;
  }

  .filter-group { flex: 1 1 160px; display: flex; flex-direction: column; gap: 4px; position: relative; }
  .label-container { display: flex; justify-content: space-between; align-items: center; width: 100%; height: 16px; }
  .filter-group label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

  .btn-clear-individual {
    background: none; border: none; padding: 0; cursor: pointer; display: none; align-items: center; justify-content: center; width: 16px; height: 16px; color: #ef4444;
  }
  .btn-clear-individual:hover { transform: scale(1.2); color: #dc2626; }
  .header-filter-group .btn-clear-individual { color: #f87171; }
  .btn-clear-individual svg { width: 15px; height: 15px; fill: currentColor; }

  .multiselect-dropdown {
    width: 100%; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 6px;
    font-size: 13px; background-color: white; cursor: pointer; user-select: none;
    display: flex; justify-content: space-between; align-items: center; height: 34px;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .multiselect-dropdown:hover { border-color: var(--accent-peanut); box-shadow: 0 2px 8px rgba(179,92,4,0.1); }
  .multiselect-dropdown::after { content: "▼"; font-size: 8px; color: var(--text-muted); margin-left: 6px; }

  .multiselect-options {
    display: none; position: absolute; top: 100%; left: 0; right: 0; background-color: white;
    border: 1px solid var(--border-color); border-radius: 8px; max-height: 220px; overflow-y: auto;
    z-index: 110; box-shadow: var(--shadow-md); margin-top: 6px; padding: 6px 0;
    animation: dropdownFadeIn 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .multiselect-options.show { display: block; }
  @keyframes dropdownFadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

  .multiselect-item { padding: 8px 14px; display: flex; align-items: center; gap: 10px; font-size: 13px; cursor: pointer; color: #1e293b; }
  .multiselect-item:hover { background-color: var(--primary-light); }
  .multiselect-item input[type="checkbox"] { accent-color: var(--primary); cursor: pointer; }

  .table-toolbar {
    background-color: #ebdcb9; border: 1px solid var(--border-color); border-bottom: none;
    border-top-left-radius: 12px; border-top-right-radius: 12px; padding: 8px 16px;
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .table-toolbar-left { display: flex; align-items: center; gap: 12px; width: 100%; }

  .inline-column-selector { display: flex; align-items: center; gap: 6px; flex-wrap: nowrap; overflow: hidden; }
  .inline-column-selector span { font-size: 11px; font-weight: 700; color: #1e293b; text-transform: uppercase; margin-right: 2px; }

  .col-label-btn {
    display: inline-flex; align-items: center; gap: 6px; background-color: #ffffff; border: 1px solid var(--border-color);
    padding: 3px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; user-select: none;
  }
  .col-label-btn:hover { background-color: var(--bg-main); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .col-label-btn input[type="checkbox"] { accent-color: var(--accent-peanut); margin: 0; }

  /* Selector de Pivot */
  .pivot-mode-selector {
    display: inline-flex; background-color: #fff; border: 1px solid var(--border-color);
    padding: 2px; border-radius: 8px; margin-left: 8px;
  }
  .pivot-mode-btn {
    background: none; border: none; font-size: 11px; font-weight: 700; color: var(--text-muted);
    padding: 4px 10px; border-radius: 6px; cursor: pointer; text-transform: uppercase;
  }
  .pivot-mode-btn.active { background-color: var(--accent-peanut); color: white; }

  .btn-excel {
    background-color: #107c41; color: white; border: none; font-size: 12px; font-weight: 600;
    padding: 0 12px; height: 28px; border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-excel:hover { background-color: #0a5c30; transform: translateY(-1px); }

  .ellipsis-menu-container { display: none; position: relative; }
  .btn-ellipsis { background: none; border: 1px solid var(--border-color); background-color: #fff; font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 6px; cursor: pointer; }
  .ellipsis-dropdown { display: none; position: absolute; top: 100%; right: 0; background-color: white; border: 1px solid var(--border-color); border-radius: 8px; box-shadow: var(--shadow-md); z-index: 120; padding: 8px; flex-direction: column; gap: 6px; }
  .ellipsis-dropdown.show { display: flex; }

  .table-container { background-color: var(--card-bg); border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; border: 1px solid var(--border-color); overflow: auto; flex: 1; box-shadow: var(--shadow-sm); }

  table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; white-space: nowrap; }

  /* ──────────────────────────────────────────────────────── */
  /* ❄️ ARQUITECTURA DE COLUMNAS CONGELADAS (ESTILO EXCEL STICKY) */
  /* ──────────────────────────────────────────────────────── */
  
  /* Cabeceras de Nivel 1 y Nivel 2 Superiores */
  #tablaHeader th {
    position: sticky; top: 0; z-index: 30; background-color: var(--primary-light); color: var(--primary);
    font-weight: 700; padding: 12px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px;
    border-right: 1px solid var(--border-color); border-bottom: 2px solid var(--border-color);
  }
  #tablaHeader tr:nth-child(2) th { top: 41px; z-index: 25; }

  /* Congelar cabecera fija superior de Finca */
  #tablaHeader tr:first-child th:first-child {
    position: sticky; left: 0; top: 0; z-index: 55; background-color: #cbdccb !important; min-width: 160px; max-width: 160px;
  }
  /* Congelar cabecera fija superior de Lote con Sombra */
  #tablaHeader tr:first-child th:nth-child(2) {
    position: sticky; left: 160px; top: 0; z-index: 55; background-color: #cbdccb !important; min-width: 160px; max-width: 160px;
    box-shadow: 4px 0 8px -2px rgba(15, 23, 42, 0.15); border-right: 2px solid var(--border-color);
  }

  /* Celdas del cuerpo congeladas para filas normales de lotes y subtotales */
  .freeze-col-1 {
    position: sticky; left: 0; z-index: 15; background-color: inherit; min-width: 160px; max-width: 160px;
  }
  .freeze-col-2 {
    position: sticky; left: 160px; z-index: 15; background-color: inherit; min-width: 160px; max-width: 160px;
    box-shadow: 4px 0 8px -2px rgba(15, 23, 42, 0.15); border-right: 2px solid var(--border-color) !important;
  }

  /* CORRECCIÓN CRÍTICA DE SOBREPOSICIÓN: Forzar fondo sólido beige y z-index superior a las celdas de Finca */
  .row-finca-header td:first-child {
    position: sticky; left: 0; z-index: 22; background-color: #ded4bf !important;
  }
  .row-finca-header td:nth-child(2) {
    position: sticky; left: 160px; z-index: 22; background-color: #ded4bf !important;
    box-shadow: 4px 0 8px -2px rgba(15, 23, 42, 0.15); border-right: 2px solid var(--border-color) !important;
  }
  /* ──────────────────────────────────────────────────────── */

  td { padding: 10px 14px; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); vertical-align: middle; }
  table th:first-child, table td:first-child { border-left: 1px solid var(--border-color); }

  /* Microinteracción de Celda Interactiva */
  .interactive-cell { cursor: pointer; position: relative; transition: all 0.2s ease; }
  .interactive-cell:hover { background-color: rgba(179, 92, 4, 0.08) !important; color: var(--accent-peanut); font-weight: 600; transform: scale(1.01); box-shadow: inset 0 0 0 1px var(--accent-peanut); }

  .row-finca-header { background-color: #ded4bf; font-weight: 700; cursor: pointer; user-select: none; }
  .row-finca-header:hover { background-color: #cfc4ad; }
  .toggle-icon { display: inline-block; margin-right: 8px; color: var(--primary); transition: transform 0.2s ease; }

  /* Efecto de Entrada Fluida Escalonada */
  .row-lote { background-color: #ffffff; animation: fadeInUp 0.35s cubic-bezier(0.4, 0, 0.2, 1) both; }
  .row-lote:hover { background-color: var(--bg-main); }
  .row-total-finca { background-color: #f2e9d3; font-weight: 700; border-top: 2px solid var(--border-color); border-bottom: 2px solid var(--border-color); }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hidden-row { display: none !important; }

  .badge-pct { display: inline-block; padding: 3px 8px; border-radius: 20px; font-weight: 700; font-size: 11px; background-color: #d1fae5; color: #065f46; min-width: 55px; text-align: center; }
  .badge-pct.low { background-color: #fee2e2; color: #991b1b; }

  .btn { background-color: var(--accent-peanut); color: white; border: none; padding: 6px 14px; font-size: 13px; font-weight: 600; border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; height: 34px; transition: all 0.2s ease; }
  .btn:hover { background-color: var(--accent-peanut-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(179,92,4,0.2); }
  .btn-secondary { background-color: var(--primary); }
  .btn-secondary:hover { background-color: var(--primary-hover); }
  .btn-clear-filters { background-color: #ffffff; color: #475569; border: 1px solid #cbd5e1; }
  .btn-clear-filters:hover { background-color: #f1f5f9; color: #0f172a; }

  .text-right { text-align: right; }
  .text-center { text-align: center; }
  .text-left { text-align: left; }
  .loading { padding: 40px; text-align: center; color: var(--text-main); font-weight: 600; }

  /* Pop-up Moderno Blur Backdrop */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-color: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center;
    transition: opacity 0.3s ease;
  }
  .modal-overlay.show { display: flex; }
  
  .modal-card {
    background-color: white; border-radius: 16px; width: 560px; max-width: 92%;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); display: flex; flex-direction: column; overflow: hidden;
    transform: scale(0.92); opacity: 0; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .modal-overlay.show .modal-card { transform: scale(1); opacity: 1; }
  
  .modal-header { background-color: var(--primary); color: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
  .modal-header h3 { margin: 0; font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
  .modal-close { background: none; border: none; color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; }
  .modal-close:hover { color: #f87171; }
  
  .modal-body { padding: 20px; max-height: 450px; overflow-y: auto; background-color: #fcfcf9; }
  
  .popup-data-grid { display: flex; flex-direction: column; gap: 12px; }
  .popup-item { display: flex; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid var(--border-color); font-size: 13px; }
  .popup-item:nth-child(even) { background-color: #fbfaf5; }
  .popup-label { font-weight: 600; color: #475569; }
  .popup-value { font-weight: 600; color: var(--text-main); text-align: right; }
  
  .popup-multi-block { border: 1px solid var(--border-color); border-radius: 8px; background-color: #fff; overflow: hidden; box-shadow: var(--shadow-sm); }
  .popup-block-title { background-color: var(--primary-light); color: var(--primary); font-size: 11px; font-weight: 700; padding: 6px 12px; text-transform: uppercase; letter-spacing: 0.5px; }

  @media (max-width: 1100px) { .inline-column-selector { display: none; } .ellipsis-menu-container { display: block; margin-left: auto; } }
  @media (max-width: 768px) {
    header { flex-direction: column; text-align: center; align-items: stretch; padding: 14px 16px; }
    .header-action-area { flex-direction: column; align-items: stretch; }
    .toolbar { flex-direction: column; align-items: stretch; }
    .btn-clear-filters { width: 100%; justify-content: center; }
    .table-toolbar { flex-direction: row; }
  }
</style>
</head>
<body>

<div class="header-wrapper">
  <header>
    <div class="header-title-area">
      <h1>Control de Siembra y Germinación</h1>
      <p>Matriz Pivot Tridimensional • Umbral Mínimo: 55% • Sincronización: <span id="fechaActualizacion">-</span></p>
    </div>
    
    <div class="header-action-area">
      <button class="btn-toggle-filters" onclick="toggleFiltrosPanel()">🔍 Filtros</button>
      <div class="header-filter-group">
        <div class="label-container">
          <label>Compañía</label>
          <button class="btn-clear-individual" id="btn_clear_compania" title="Quitar filtro" onclick="limpiarFiltroIndividual(event, 'compania', 'dropCompania', 'optsCompania', 'btn_clear_compania')">
            <svg viewBox="0 0 24 24"><path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></svg>
          </button>
        </div>
        <div class="multiselect-dropdown" id="dropCompania" onclick="toggleDropdown(event, 'optsCompania')">Todos</div>
        <div class="multiselect-options" id="optsCompania"></div>
      </div>
      <button class="btn" onclick="cargarDatosDesdeGitHub()">🔄 Actualizar</button>
    </div>
  </header>
</div>

<div class="container">
  <div class="toolbar-wrapper collapsed" id="panelFiltrosWrapper">
    <div class="toolbar">
      <div class="filter-group">
        <div class="label-container">
          <label>Sector</label>
          <button class="btn-clear-individual" id="btn_clear_sector" title="Quitar filtro" onclick="limpiarFiltroIndividual(event, 'sector', 'dropSector', 'optsSector', 'btn_clear_sector')">
            <svg viewBox="0 0 24 24"><path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></svg>
          </button>
        </div>
        <div class="multiselect-dropdown" id="dropSector" onclick="toggleDropdown(event, 'optsSector')">Todos</div>
        <div class="multiselect-options" id="optsSector"></div>
      </div>
      <div class="filter-group">
        <div class="label-container">
          <label>Ciclo</label>
          <button class="btn-clear-individual" id="btn_clear_ciclo" title="Quitar filtro" onclick="limpiarFiltroIndividual(event, 'ciclo', 'dropCiclo', 'optsCiclo', 'btn_clear_ciclo')">
            <svg viewBox="0 0 24 24"><path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></svg>
          </button>
        </div>
        <div class="multiselect-dropdown" id="dropCiclo" onclick="toggleDropdown(event, 'optsCiclo')">Todos</div>
        <div class="multiselect-options" id="optsCiclo"></div>
      </div>
      <div class="filter-group">
        <div class="label-container">
          <label>Finca</label>
          <button class="btn-clear-individual" id="btn_clear_finca" title="Quitar filtro" onclick="limpiarFiltroIndividual(event, 'finca', 'dropFinca', 'optsFinca', 'btn_clear_finca')">
            <svg viewBox="0 0 24 24"><path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></svg>
          </button>
        </div>
        <div class="multiselect-dropdown" id="dropFinca" onclick="toggleDropdown(event, 'optsFinca')">Todos</div>
        <div class="multiselect-options" id="optsFinca"></div>
      </div>
      <div class="filter-group">
        <div class="label-container">
          <label>Tipo Recuento</label>
          <button class="btn-clear-individual" id="btn_clear_tipo" title="Quitar filtro" onclick="limpiarFiltroIndividual(event, 'tipo', 'dropTipo', 'optsTipo', 'btn_clear_tipo')">
            <svg viewBox="0 0 24 24"><path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></svg>
          </button>
        </div>
        <div class="multiselect-dropdown" id="dropTipo" onclick="toggleDropdown(event, 'optsTipo')">Todos</div>
        <div class="multiselect-options" id="optsTipo"></div>
      </div>
      <button class="btn btn-clear-filters" onclick="limpiarTodosLosFiltros()">🧹 Limpiar Todo</button>
    </div>
  </div>

  <div class="table-toolbar">
    <div class="table-toolbar-left">
      <button class="btn btn-secondary" id="btnToggleGlobal" style="height:28px; padding:0 12px; font-size:12px;" onclick="alternarColapsoGlobal()">📁 Colapsar Fincas</button>
      
      <div class="pivot-mode-selector">
        <button class="pivot-mode-btn active" id="mode_ciclo_recuento" onclick="cambiarModoPivot('ciclo_recuento')">Ciclo > Recuentos</button>
        <button class="pivot-mode-btn" id="mode_recuento_ciclo" onclick="cambiarModoPivot('recuento_ciclo')">Recuentos > Ciclos</button>
      </div>

      <button class="btn-excel" onclick="exportarTablaAExcel()">📥 Descargar Excel</button>
      
      <div class="inline-column-selector" id="desktopColumnSelector">
        <span>Mostrar Métricas:</span>
        <label class="col-label-btn"><input type="checkbox" id="col_semillas" checked onchange="actualizarVisibilidadColumnas()"> Semillas m.l.</label>
        <label class="col-label-btn"><input type="checkbox" id="col_10dds" checked onchange="actualizarVisibilidadColumnas()"> Plantas 10 DDS</label>
        <label class="col-label-btn"><input type="checkbox" id="col_15dds" checked onchange="actualizarVisibilidadColumnas()"> Plantas 15 DDS</label>
        <label class="col-label-btn"><input type="checkbox" id="col_g10" checked onchange="actualizarVisibilidadColumnas()"> % Germ 10DDS</label>
        <label class="col-label-btn"><input type="checkbox" id="col_g15" checked onchange="actualizarVisibilidadColumnas()"> % Germ 15DDS</label>
      </div>

      <div class="ellipsis-menu-container">
        <button class="btn-ellipsis" onclick="toggleEllipsisMenu(event)">⋮ Columnas</button>
        <div class="ellipsis-dropdown" id="ellipsisMenuOpts" onclick="event.stopPropagation();">
          <label class="col-label-btn"><input type="checkbox" id="col_semillas_m" checked onchange="sincronizarCheckboxes('col_semillas_m', 'col_semillas')"> Semillas m.l.</label>
          <label class="col-label-btn"><input type="checkbox" id="col_10dds_m" checked onchange="sincronizarCheckboxes('col_10dds_m', 'col_10dds')"> Plantas 10 DDS</label>
          <label class="col-label-btn"><input type="checkbox" id="col_15dds_m" checked onchange="sincronizarCheckboxes('col_15dds_m', 'col_15dds')"> Plantas 15 DDS</label>
          <label class="col-label-btn"><input type="checkbox" id="col_g10_m" checked onchange="sincronizarCheckboxes('col_g10_m', 'col_g10')"> % Germ 10DDS</label>
          <label class="col-label-btn"><input type="checkbox" id="col_g15_m" checked onchange="sincronizarCheckboxes('col_g15_m', 'col_g15')"> % Germ 15DDS</label>
        </div>
      </div>
    </div>
  </div>

  <div class="table-container">
    <table id="tablaGerminacionMaster">
      <thead id="tablaHeader">
        <tr>
          <th class="loading">Estructurando dimensiones matriciales...</th>
        </tr>
      </thead>
      <tbody id="pivotBody">
        <tr>
          <td class="loading">Sincronizando orígenes de datos remotos...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="popupDetalleOverlay" onclick="cerrarModalPopup()">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="popupTitle">Detalle Operativo</h3>
      <button class="modal-close" onclick="cerrarModalPopup()">&times;</button>
    </div>
    <div class="modal-body" id="popupBodyContent"></div>
  </div>
</div>

<script>
let datosMaestrosUnificados = []; 
let universosUnicos = { compania: [], sector: [], ciclo: [], finca: [], tipo: [] };
let seleccionesFiltros = { compania: [], sector: [], ciclo: [], finca: [], tipo: [] };
let ciclosDetectados = [];

const METRICAS_LLAVES = ['semillas', '10dds', '15dds', 'g10', 'g15'];
const METRICAS_NOMBRES = {
  'semillas': 'Semillas m.l.',
  '10dds': 'Plantas 10 DDS',
  '15dds': 'Plantas 15 DDS',
  'g10': '% Germ 10DDS',
  'g15': '% Germ 15DDS'
};

let CURRENT_PIVOT_MODE = 'ciclo_recuento'; 

let estadoFincasColapso = {}; 
let estadoGlobalColapsado = false; 
let visibilidadColumnas = { semillas: true, '10dds': true, '15dds': true, g10: true, g15: true };

document.getElementById('pivotBody').addEventListener('click', function(e) {
  const cell = e.target.closest('.interactive-cell');
  if (!cell) return;
  
  const tipoColumna = cell.getAttribute('data-tipo');
  const finca = cell.getAttribute('data-finca');
  const lote = cell.getAttribute('data-lote');
  const ciclo = cell.getAttribute('data-ciclo');
  
  if (tipoColumna && finca && lote && ciclo) {
    abrirModalPopupDetalle(tipoColumna, finca, lote, ciclo);
  }
});

window.onclick = function(event) {
  if (!event.target.matches('.multiselect-dropdown') && !event.target.closest('.multiselect-options')) {
    document.querySelectorAll('.multiselect-options').forEach(el => el.classList.remove('show'));
  }
  if (!event.target.matches('.btn-ellipsis') && !event.target.closest('.ellipsis-dropdown')) {
    document.getElementById('ellipsisMenuOpts').classList.remove('show');
  }
}

function toggleFiltrosPanel() { document.getElementById('panelFiltrosWrapper').classList.toggle('collapsed'); }
function toggleEllipsisMenu(event) { event.stopPropagation(); document.getElementById('ellipsisMenuOpts').classList.toggle('show'); }
function sincronizarCheckboxes(idOrigen, idDestino) { const val = document.getElementById(idOrigen).checked; document.getElementById(idDestino).checked = val; actualizarVisibilidadColumnas(); }

function cambiarModoPivot(modo) {
  if (CURRENT_PIVOT_MODE === modo) return;
  CURRENT_PIVOT_MODE = modo;
  
  document.getElementById('mode_ciclo_recuento').classList.toggle('active', modo === 'ciclo_recuento');
  document.getElementById('mode_recuento_ciclo').classList.toggle('active', modo === 'recuento_ciclo');
  
  document.getElementById('desktopColumnSelector').style.opacity = (modo === 'recuento_ciclo') ? '0.4' : '1';
  document.getElementById('desktopColumnSelector').style.pointerEvents = (modo === 'recuento_ciclo') ? 'none' : 'auto';
  
  filtrarYMostrar();
}

function toggleDropdown(event, idOpts) {
  event.stopPropagation();
  const optionsDiv = document.getElementById(idOpts);
  const estaAbierto = optionsDiv.classList.contains('show');
  document.querySelectorAll('.multiselect-options').forEach(el => el.classList.remove('show'));
  if (!estaAbierto) {
    optionsDiv.classList.add('show');
  }
}

function toggleFincaRows(fincaNombre) {
  estadoFincasColapso[fincaNombre] = !estadoFincasColapso[fincaNombre];
  filtrarYMostrar(); 
}

function alternarColapsoGlobal() {
  estadoGlobalColapsado = !estadoGlobalColapsado;
  document.getElementById('btnToggleGlobal').textContent = estadoGlobalColapsado ? '📂 Expandir Fincas' : '📁 Colapsar Fincas';
  Object.keys(estadoFincasColapso).forEach(finca => { estadoFincasColapso[finca] = estadoGlobalColapsado; });
  filtrarYMostrar();
}

function actualizarVisibilidadColumnas() {
  visibilidadColumnas.semillas = document.getElementById('col_semillas').checked;
  visibilidadColumnas['10dds'] = document.getElementById('col_10dds').checked;
  visibilidadColumnas['15dds'] = document.getElementById('col_15dds').checked;
  visibilidadColumnas.g10 = document.getElementById('col_g10').checked;
  visibilidadColumnas.g15 = document.getElementById('col_g15').checked;
  
  document.getElementById('col_semillas_m').checked = visibilidadColumnas.semillas;
  document.getElementById('col_10dds_m').checked = visibilidadColumnas['10dds'];
  document.getElementById('col_15dds_m').checked = visibilidadColumnas['15dds'];
  document.getElementById('col_g10_m').checked = visibilidadColumnas.g10;
  document.getElementById('col_g15_m').checked = visibilidadColumnas.g15;

  filtrarYMostrar();
}

function obtenerColumnasActivasPorCicloCount() { 
  if (CURRENT_PIVOT_MODE === 'recuento_ciclo') return ciclosDetectados.length;
  return METRICAS_LLAVES.filter(v => visibilidadColumnas[v]).length; 
}

function normalizeTextId(text) { return normalizeText(text).replace(/[^a-z0-9]/g, ""); }

function limpiarDescripcion(valor) {
  if (!valor) return 'N/A';
  if (Array.isArray(valor)) {
    return valor.length > 1 ? String(valor[1]).trim() : String(valor[0]).trim();
  }
  let str = String(valor).trim();
  if (str.startsWith('[')) {
    str = str.replace(/^\[?\d+\]?\s*[-_]?\s*/, '');
  }
  return str || 'N/A';
}

function normalizeText(text) {
  return limpiarDescripcion(text).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
}

function inicializarEstructuraFiltrosDOM() {
  poblarOpcionesFijasHTML('optsCompania', 'compania', 'dropCompania', 'btn_clear_compania');
  poblarOpcionesFijasHTML('optsSector', 'sector', 'dropSector', 'btn_clear_sector');
  poblarOpcionesFijasHTML('optsCiclo', 'ciclo', 'dropCiclo', 'btn_clear_ciclo');
  poblarOpcionesFijasHTML('optsFinca', 'finca', 'dropFinca', 'btn_clear_finca');
  poblarOpcionesFijasHTML('optsTipo', 'tipo', 'dropTipo', 'btn_clear_tipo');
}

function poblarOpcionesFijasHTML(idOpts, llaveFiltro, idDrop, idBtnClear) {
  const contenedor = document.getElementById(idOpts);
  let universo = universosUnicos[llaveFiltro];
  let html = '';
  universo.forEach(item => {
    html += `<div class="multiselect-item" id="item_${llaveFiltro}_${normalizeTextId(item)}" onclick="event.stopPropagation();">
              <input type="checkbox" value="${item}" checked onchange="manejarCambioCheckbox('${llaveFiltro}', '${idDrop}', '${idOpts}', '${idBtnClear}')">
              <span class="text-span">${item}</span>
            </div>`;
  });
  contenedor.innerHTML = html;
}

function manejarCambioCheckbox(llaveFiltro, idDrop, idOpts, idBtnClear) {
  const contenedor = document.getElementById(idOpts);
  const marcados = Array.from(contenedor.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
  seleccionesFiltros[llaveFiltro] = marcados;
  
  actualizarTextoDropdown(idDrop, marcados.length, universosUnicos[llaveFiltro].length, marcados);
  
  const btn = document.getElementById(idBtnClear);
  if (btn) {
    btn.style.display = (marcados.length < universosUnicos[llaveFiltro].length) ? "inline-flex" : "none";
  }
  
  filtrarYMostrar();
}

function limpiarFiltroIndividual(event, llaveFiltro, idDrop, idOpts, idBtnClear) {
  if(event) event.stopPropagation();
  const contenedor = document.getElementById(idOpts);
  if(contenedor) {
    contenedor.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
  }
  seleccionesFiltros[llaveFiltro] = [...universosUnicos[llaveFiltro]];
  actualizarTextoDropdown(idDrop, universosUnicos[llaveFiltro].length, universosUnicos[llaveFiltro].length, universosUnicos[llaveFiltro]);
  
  const btn = document.getElementById(idBtnClear);
  if (btn) btn.style.display = "none";
  
  filtrarYMostrar();
}

function limpiarTodosLosFiltros() {
  Object.keys(seleccionesFiltros).forEach(llave => {
    seleccionesFiltros[llave] = [...universosUnicos[llave]];
    let capitalizada = llave.charAt(0).toUpperCase() + llave.slice(1);
    const contenedor = document.getElementById('opts' + capitalizada);
    if(contenedor) {
      contenedor.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
    }
    actualizarTextoDropdown('drop' + capitalizada, universosUnicos[llave].length, universosUnicos[llave].length, universosUnicos[llave]);
    
    const btn = document.getElementById('btn_clear_' + llave);
    if (btn) btn.style.display = "none";
  });
  filtrarYMostrar();
}

function refrescarVisibilidadCrucesFiltros() {
  Object.keys(universosUnicos).forEach(llaveObjetivo => {
    let dataCruzada = datosMaestrosUnificados.filter(d => {
      return (llaveObjetivo === 'compania' || seleccionesFiltros.compania.includes(d.compania)) &&
             (llaveObjetivo === 'sector'   || seleccionesFiltros.sector.includes(d.sector)) &&
             (llaveObjetivo === 'ciclo'    || seleccionesFiltros.ciclo.includes(d.ciclo)) &&
             (llaveObjetivo === 'finca'    || seleccionesFiltros.finca.includes(d.finca)) &&
             (llaveObjetivo === 'tipo'     || seleccionesFiltros.tipo.includes(d.tipo));
    });

    let existentesEnCruce = [...new Set(dataCruzada.map(d => d[llaveObjetivo]))];
    
    universosUnicos[llaveObjetivo].forEach(item => {
      const itemElement = document.getElementById(`item_${llaveObjetivo}_${normalizeTextId(item)}`);
      if(itemElement) {
        if(existentesEnCruce.includes(item)) {
          itemElement.style.display = "flex";
        } else {
          itemElement.style.display = "none";
        }
      }
    });
  });
}

function actualizarTextoDropdown(idDrop, marcadosCount, totalCount, listaMarcados) {
  const drop = document.getElementById(idDrop);
  if (marcadosCount === totalCount && totalCount > 0) { drop.textContent = "Todos"; }
  else if (marcadosCount === 0) { drop.textContent = "Ninguno"; }
  else if (marcadosCount === 1) { drop.textContent = listaMarcados[0]; }
  else { drop.textContent = `${marcadosCount} sel.`; }
}

function abrirModalPopupDetalle(tipoColumna, finca, lote, ciclo) {
  const overlay = document.getElementById('popupDetalleOverlay');
  const title = document.getElementById('popupTitle');
  const body = document.getElementById('popupBodyContent');
  
  const itemsCelda = datosMaestrosUnificados.filter(d => d.finca === finca && d.lote === lote && d.ciclo === ciclo);
  if (itemsCelda.length === 0) return;
  
  let html = `<div class="popup-data-grid">`;
  
  if (tipoColumna === 'semillas') {
    title.textContent = `Detalle de Siembra - Lote: ${lote}`;
    itemsCelda.forEach((item, idx) => {
      const s = item.rawSiembra || {};
      const e_m = parseFloat(s.x_studio_semilla_entre_x_mtrs_lineal || 0).toFixed(2);
      const q_m = parseFloat(s.x_studio_semilla_quebradas_x_mtrs_lineal || 0).toFixed(2);
      const pct_e = (parseFloat(s.x_studio_porcenjate_enteras || 0) * 100).toFixed(2);

      html += `
        <div class="popup-multi-block">
          <div class="popup-block-title">Reporte de Siembra #${idx + 1}</div>
          <div class="popup-item"><span class="popup-label">Ciclo:</span><span class="popup-value">${item.ciclo}</span></div>
          <div class="popup-item"><span class="popup-label">Finca:</span><span class="popup-value">${item.finca}</span></div>
          <div class="popup-item"><span class="popup-label">Lote de la finca:</span><span class="popup-value">${item.lote}</span></div>
          <div class="popup-item"><span class="popup-label">Reporte:</span><span class="popup-value">${s.x_name || 'N/A'}</span></div>
          <div class="popup-item"><span class="popup-label">Sector:</span><span class="popup-value">${item.sector}</span></div>
          <div class="popup-item"><span class="popup-label">Tipo Recuento:</span><span class="popup-value">${item.tipo}</span></div>
          <div class="popup-item"><span class="popup-label">Variedad:</span><span class="popup-value">${limpiarDescripcion(s.x_studio_variedad)}</span></div>
          <div class="popup-item"><span class="popup-label">Calibre:</span><span class="popup-value">${limpiarDescripcion(s.x_studio_calibre)}</span></div>
          <div class="popup-item"><span class="popup-label">Lote Comasa:</span><span class="popup-value">${s.x_studio_lote_comasa || 'N/A'}</span></div>
          <div class="popup-item"><span class="popup-label">Semillas enteras:</span><span class="popup-value">${e_m}</span></div>
          <div class="popup-item"><span class="popup-label">Semillas quebradas:</span><span class="popup-value">${q_m}</span></div>
          <div class="popup-item"><span class="popup-label">% Enteras:</span><span class="popup-value">${pct_e}%</span></div>
          <div class="popup-item" style="background-color:#fff3cd;"><span class="popup-label">Total Semillas m.l.:</span><span class="popup-value" style="color:var(--accent-peanut);">${item.total_semillas.toFixed(2)}</span></div>
        </div>`;
    });
  } else {
    const ddsObjetivo = tipoColumna.includes('10') ? 10 : 15;
    title.textContent = `Muestras Germinación (${ddsObjetivo} DDS)`;
    
    let reportesProcesados = new Set();
    let contadorBloques = 1;

    itemsCelda.forEach((item) => {
      const muestrasFiltradas = (item.rawMuestrasOriginales || []).filter(m => Math.round(parseFloat(m.x_studio_dds)) === ddsObjetivo);
      
      muestrasFiltradas.forEach((m) => {
        const idReporte = m.x_name || 'N/A';
        if (reportesProcesados.has(idReporte)) return;
        reportesProcesados.add(idReporte);

        const r_area = m.x_studio_area_en_mzn ? parseFloat(m.x_studio_area_en_mzn).toFixed(2) : 'N/A';
        const r_cant = m.x_studio_cant_plantas_x_mtr_lineal ? parseFloat(m.x_studio_cant_plantas_x_mtr_lineal).toFixed(2) : '0.00';

        html += `
          <div class="popup-multi-block">
            <div class="popup-block-title">Reporte Germinación #${contadorBloques}</div>
            <div class="popup-item"><span class="popup-label">Ciclo:</span><span class="popup-value">${item.ciclo}</span></div>
            <div class="popup-item"><span class="popup-label">Finca:</span><span class="popup-value">${item.finca}</span></div>
            <div class="popup-item"><span class="popup-label">Lote de la finca:</span><span class="popup-value">${item.lote}</span></div>
            <div class="popup-item"><span class="popup-label">Reporte Germinacion:</span><span class="popup-value">${idReporte}</span></div>
            <div class="popup-item"><span class="popup-label">DDS:</span><span class="popup-value">${m.x_studio_dds ? parseFloat(m.x_studio_dds).toFixed(2) : ddsObjetivo + '.00'}</span></div>
            <div class="popup-item"><span class="popup-label">Area (mzn) evaluada:</span><span class="popup-value">${r_area}</span></div>
            <div class="popup-item"><span class="popup-label">Cantidad de plantas Germinadas:</span><span class="popup-value" style="color:#0284c7;">${r_cant}</span></div>
            <div class="popup-item"><span class="popup-label">Observacion:</span><span class="popup-value">${m.x_studio_observacion || 'Sin observaciones'}</span></div>
          </div>`;
          contadorBloques++;
      });
    });

    if (reportesProcesados.size === 0) {
      html += `<div class="popup-item"><span style="color:var(--text-muted); font-style:italic;">No existen registros físicos directos en x_germinaciones para ${ddsObjetivo} DDS en este lote.</span></div>`;
    }
  }
  
  html += `</div>`;
  body.innerHTML = html;
  overlay.classList.add('show');
}

function cerrarModalPopup() { document.getElementById('popupDetalleOverlay').classList.remove('show'); }

async function cargarDatosDesdeGitHub() {
  const tbody = document.getElementById('pivotBody');
  tbody.innerHTML = '<tr><td class="loading">Sincronizando orígenes de datos remotos y cruzando dimensiones...</td></tr>';
  try {
    const siembraRes = await fetch('https://raw.githubusercontent.com/infoagrodb/dashboard/main/Odoo_RecuentosSiembra.json').then(r => r.json());
    const germinacionRes = await fetch('https://raw.githubusercontent.com/infoagrodb/dashboard/main/Odoo_RecuentoGerminacio.json').then(r => r.json());

    const siembraData = siembraRes.result || [];
    const germinacionData = germinacionRes.result || [];

    ciclosDetectados = [...new Set(
      siembraData
        .map(s => limpiarDescripcion(s.x_studio_ciclo))
        .filter(c => c && c !== 'N/A' && c !== 'false')
    )].sort();

    datosMaestrosUnificados = siembraData.map(s => {
      const finca = limpiarDescripcion(s.x_studio_finca);
      const lote = limpiarDescripcion(s.x_studio_lote_de_finca);
      const ciclo = limpiarDescripcion(s.x_studio_ciclo);
      const sectorSiembra = limpiarDescripcion(s.x_studio_sector_1);
      const compania = limpiarDescripcion(s.x_studio_compaia || s.x_studio_company_id);

      const cNorm = normalizeText(s.x_studio_ciclo);
      const fNorm = normalizeText(s.x_studio_finca);
      const lNorm = normalizeText(s.x_studio_lote_de_finca);
      const sNorm = normalizeText(s.x_studio_sector_1);

      const muestrasRelacionadas = germinacionData.filter(g => {
        const matchFinca = normalizeText(g.x_studio_finca) === fNorm;
        const matchLote = normalizeText(g.x_studio_lote_de_la_finca) === lNorm;
        const matchSector = normalizeText(g.x_studio_sector) === sNorm;
        
        if (!matchFinca || !matchLote || !matchSector) return false;

        const matchCicloEstricto = normalizeText(g.x_studio_ciclo) === cNorm;
        if (matchCicloEstricto) return true;

        const numAñoSiembra = cNorm.match(/\d+/);
        if (numAñoSiembra && g.x_studio_ciclo) {
          const añoGerminacionStr = String(g.x_studio_ciclo).toLowerCase();
          return añoGerminacionStr.includes(numAñoSiembra[0]);
        }
        return !g.x_studio_ciclo || String(g.x_studio_ciclo).toLowerCase() === 'false';
      });

      const muestras10 = muestrasRelacionadas.filter(g => g.x_studio_dds && Math.round(parseFloat(g.x_studio_dds)) === 10);
      const muestras15 = muestrasRelacionadas.filter(g => g.x_studio_dds && Math.round(parseFloat(g.x_studio_dds)) === 15);

      const plantas10 = muestras10.length > 0 ? (muestras10.reduce((acc, curr) => acc + (parseFloat(curr.x_studio_cant_plantas_x_mtr_lineal) || 0), 0) / muestras10.length) : 0;
      let plantas15 = muestras15.length > 0 ? (muestras15.reduce((acc, curr) => acc + (parseFloat(curr.x_studio_cant_plantas_x_mtr_lineal) || 0), 0) / muestras15.length) : 0;

      if (plantas15 === 0 && plantas10 > 0 && muestras15.length === 0) plantas15 = plantas10;

      const total_semillas = parseFloat(s.x_studio_semilla_total) || ((parseFloat(s.x_studio_semilla_entre_x_mtrs_lineal) || 0) + (parseFloat(s.x_studio_semilla_quebradas_x_mtrs_lineal) || 0));
      let tipoNorm = (s.x_studio_tipo || '').toLowerCase().includes('re') ? 'Re-siembra' : 'Siembra';

      if (estadoFincasColapso[finca] === undefined) estadoFincasColapso[finca] = false;

      return { 
        finca, lote, sector: sectorSiembra, ciclo, compania, tipo: tipoNorm, total_semillas, 
        plantas_10dds: plantas10, plantas_15dds: plantas15,
        rawSiembra: s, rawMuestrasOriginales: muestrasRelacionadas
      };
    }).filter(d => d.ciclo && d.ciclo !== 'N/A' && d.ciclo !== 'false');

    universosUnicos.compania = [...new Set(datosMaestrosUnificados.map(d => d.compania))].sort();
    universosUnicos.sector   = [...new Set(datosMaestrosUnificados.map(d => d.sector))].sort();
    universosUnicos.ciclo    = [...ciclosDetectados];
    universosUnicos.finca    = [...new Set(datosMaestrosUnificados.map(d => d.finca))].sort();
    universosUnicos.tipo     = [...new Set(datosMaestrosUnificados.map(d => d.tipo))].sort();

    Object.keys(seleccionesFiltros).forEach(key => { seleccionesFiltros[key] = [...universosUnicos[key]]; });

    inicializarEstructuraFiltrosDOM();

    actualizarTextoDropdown('dropCompania', universosUnicos.compania.length, universosUnicos.compania.length, universosUnicos.compania);
    actualizarTextoDropdown('dropSector', universosUnicos.sector.length, universosUnicos.sector.length, universosUnicos.sector);
    actualizarTextoDropdown('dropCiclo', universosUnicos.ciclo.length, universosUnicos.ciclo.length, universosUnicos.ciclo);
    actualizarTextoDropdown('dropFinca', universosUnicos.finca.length, universosUnicos.finca.length, universosUnicos.finca);
    actualizarTextoDropdown('dropTipo', universosUnicos.tipo.length, universosUnicos.tipo.length, universosUnicos.tipo);

    filtrarYMostrar();

    document.getElementById('fechaActualizacion').textContent = new Date().toLocaleString();
  } catch (e) {
    console.error(e);
    tbody.innerHTML = '<tr><td class="loading" style="color:#b45309;">Error crítico al sincronizar archivos de Odoo desde GitHub.</td></tr>';
  }
}

function filtrarYMostrar() {
  let filtrados = datosMaestrosUnificados.filter(d => 
    seleccionesFiltros.compania.includes(d.compania) && 
    seleccionesFiltros.sector.includes(d.sector) && 
    seleccionesFiltros.ciclo.includes(d.ciclo) && 
    seleccionesFiltros.finca.includes(d.finca) && 
    seleccionesFiltros.tipo.includes(d.tipo)
  );
  
  refrescarVisibilidadCrucesFiltros();
  generarEncabezadosDinamicos();
  renderPivot(filtrados);
}

function generarEncabezadosDinamicos() {
  const header = document.getElementById('tablaHeader');
  const subCabecerasCount = obtenerColumnasActivasPorCicloCount();
  let tr1 = `<tr><th rowspan="2" style="text-align: left; min-width:160px; max-width:160px;">Finca</th><th rowspan="2" style="text-align: left; min-width:160px; max-width:160px;">Lote de finca</th>`;
  let tr2 = `<tr>`;

  if (CURRENT_PIVOT_MODE === 'ciclo_recuento') {
    ciclosDetectados.forEach(ciclo => {
      if (subCabecerasCount > 0) {
        tr1 += `<th colspan="${subCabecerasCount}" style="border-right: 1px solid var(--border-color); background-color: var(--primary-light);">Ciclo: ${ciclo}</th>`;
        if(visibilidadColumnas.semillas) tr2 += `<th style="border-right: 1px solid var(--border-color);">Semillas m.l.</th>`;
        if(visibilidadColumnas['10dds']) tr2 += `<th style="color: #0284c7; border-right: 1px solid var(--border-color);">Plantas 10 DDS</th>`;
        if(visibilidadColumnas['15dds']) tr2 += `<th style="color: var(--primary); border-right: 1px solid var(--border-color);">Plantas 15 DDS</th>`;
        if(visibilidadColumnas.g10)      tr2 += `<th style="border-right: 1px solid var(--border-color);">% Germ 10DDS</th>`;
        if(visibilidadColumnas.g15)      tr2 += `<th style="border-right: 1px solid var(--border-color);">% Germ 15DDS</th>`;
      }
    });
  } else {
    METRICAS_LLAVES.forEach(metricaKey => {
      tr1 += `<th colspan="${subCabecerasCount}" style="border-right: 1px solid var(--border-color); background-color: var(--primary-light); color: var(--accent-peanut);">${METRICAS_NOMBRES[metricaKey]}</th>`;
      ciclosDetectados.forEach(ciclo => {
        let colorSub = metricaKey.includes('10') ? 'color:#0284c7;' : metricaKey.includes('15') ? 'color:var(--primary);' : '';
        tr2 += `<th style="border-right: 1px solid var(--border-color); font-size:11px; ${colorSub}">${ciclo.replace('Mani ','')}</th>`;
      });
    });
  }
  header.innerHTML = tr1 + "</tr>" + tr2 + "</tr>";
}

function construirCeldaHTML(valor, metricaKey, finca, lote, ciclo) {
  const vStr = valor.toFixed(2);
  if (metricaKey === 'g10' || metricaKey === 'g15') {
    return `<td class="text-center interactive-cell" data-tipo="${metricaKey === 'g10'?'10dds':'15dds'}" data-finca="${finca}" data-lote="${lote}" data-ciclo="${ciclo}"><span class="badge-pct ${valor < 55 ? 'low' : ''}">${vStr}%</span></td>`;
  }
  let estiloColor = metricaKey === '10dds' ? 'style="color: #0284c7;"' : metricaKey === '15dds' ? 'style="color: var(--primary); font-weight:600;"' : '';
  return `<td class="text-right interactive-cell" ${estiloColor} data-tipo="${metricaKey}" data-finca="${finca}" data-lote="${lote}" data-ciclo="${ciclo}">${vStr}</td>`;
}

function renderPivot(data) {
  const tbody = document.getElementById('pivotBody');
  let htmlBuffer = [];
  const subCabecerasCount = obtenerColumnasActivasPorCicloCount();
  
  if (data.length === 0) {
    let totalCols = CURRENT_PIVOT_MODE === 'ciclo_recuento' ? (2 + (ciclosDetectados.length * subCabecerasCount)) : (2 + (5 * ciclosDetectados.length));
    tbody.innerHTML = `<tr><td colspan="${totalCols}" class="loading">No hay registros que coincidan.</td></tr>`;
    return;
  }

  const matrizPivot = {};
  data.forEach(reg => {
    if (!matrizPivot[reg.finca]) matrizPivot[reg.finca] = { lotes: {} };
    if (!matrizPivot[reg.finca].lotes[reg.lote]) matrizPivot[reg.finca].lotes[reg.lote] = {};
    if (!matrizPivot[reg.finca].lotes[reg.lote][reg.ciclo]) matrizPivot[reg.finca].lotes[reg.lote][reg.ciclo] = [];
    matrizPivot[reg.finca].lotes[reg.lote][reg.ciclo].push(reg);
  });

  Object.keys(matrizPivot).sort().forEach((fincaName, fincaIdx) => {
    const fincaObj = matrizPivot[fincaName];
    const esColapsado = estadoFincasColapso[fincaName];
    const hiddenClass = esColapsado ? 'hidden-row' : '';

    const fincaCiclosTotales = {};
    ciclosDetectados.forEach(c => { fincaCiclosTotales[c] = { sumS: 0, sumP10: 0, sumP15: 0, totalLotes: 0 }; });

    Object.keys(fincaObj.lotes).forEach(loteKey => {
      ciclosDetectados.forEach(ciclo => {
        const regs = fincaObj.lotes[loteKey][ciclo] || [];
        if (regs.length > 0) {
          fincaCiclosTotales[ciclo].sumS += regs.reduce((acc, curr) => acc + curr.total_semillas, 0) / regs.length;
          fincaCiclosTotales[ciclo].sumP10 += regs.reduce((acc, curr) => acc + curr.plantas_10dds, 0) / regs.length;
          fincaCiclosTotales[ciclo].sumP15 += regs.reduce((acc, curr) => acc + curr.plantas_15dds, 0) / regs.length;
          fincaCiclosTotales[ciclo].totalLotes++;
        }
      });
    });

    let fincaHeaderHtml = `<tr class="row-finca-header" onclick="toggleFincaRows('${fincaName}')">`;
    fincaHeaderHtml += `<td><span class="toggle-icon">${esColapsado ? '📁' : '📂'}</span> Finca: ${fincaName}</td>`;
    fincaHeaderHtml += `<td style="font-style: italic; color: #4a3b32; text-align: left;">${esColapsado ? 'Promedio Finca' : 'Lotes'}</td>`;

    if (CURRENT_PIVOT_MODE === 'ciclo_recuento') {
      ciclosDetectados.forEach(ciclo => {
        const cTot = fincaCiclosTotales[ciclo];
        if (subCabecerasCount > 0) {
          if (esColapsado && cTot.totalLotes > 0) {
            const avgS = cTot.sumS / cTot.totalLotes, avgP10 = cTot.sumP10 / cTot.totalLotes, avgP15 = cTot.sumP15 / cTot.totalLotes;
            const tg10 = avgS > 0 ? (avgP10 / avgS) * 100 : 0, tg15 = avgS > 0 ? (avgP15 / avgS) * 100 : 0;
            if(visibilidadColumnas.semillas) fincaHeaderHtml += `<td class="text-right">${avgS.toFixed(2)}</td>`;
            if(visibilidadColumnas['10dds']) fincaHeaderHtml += `<td class="text-right" style="color: #0284c7; font-weight:700;">${avgP10.toFixed(2)}</td>`;
            if(visibilidadColumnas['15dds']) fincaHeaderHtml += `<td class="text-right" style="color: var(--primary); font-weight:700;">${avgP15.toFixed(2)}</td>`;
            if(visibilidadColumnas.g10)      fincaHeaderHtml += `<td class="text-center"><span class="badge-pct ${tg10 < 55 ? 'low' : ''}">${tg10.toFixed(2)}%</span></td>`;
            if(visibilidadColumnas.g15)      fincaHeaderHtml += `<td class="text-center"><span class="badge-pct ${tg15 < 55 ? 'low' : ''}">${tg15.toFixed(2)}%</span></td>`;
          } else {
            for (let i = 0; i < subCabecerasCount; i++) fincaHeaderHtml += `<td>-</td>`;
          }
        }
      });
    } else {
      METRICAS_LLAVES.forEach(mKey => {
        ciclosDetectados.forEach(ciclo => {
          const cTot = fincaCiclosTotales[ciclo];
          if (esColapsado && cTot.totalLotes > 0) {
            const avgS = cTot.sumS / cTot.totalLotes, avgP10 = cTot.sumP10 / cTot.totalLotes, avgP15 = cTot.sumP15 / cTot.totalLotes;
            let valCalculado = mKey==='semillas'? avgS : mKey==='10dds'? avgP10 : mKey==='15dds'? avgP15 : mKey==='g10'? (avgS>0?(avgP10/avgS)*100:0) : (avgS>0?(avgP15/avgS)*100:0);
            if(mKey==='g10' || mKey==='g15') {
              fincaHeaderHtml += `<td class="text-center"><span class="badge-pct ${valCalculado < 55 ? 'low' : ''}">${valCalculado.toFixed(2)}%</span></td>`;
            } else {
              fincaHeaderHtml += `<td class="text-right">${valCalculado.toFixed(2)}</td>`;
            }
          } else {
            fincaHeaderHtml += `<td>-</td>`;
          }
        });
      });
    }
    htmlBuffer.push(fincaHeaderHtml + "</tr>");

    Object.keys(fincaObj.lotes).sort().forEach((loteKey, loteIdx) => {
      const staggerDelay = ((fincaIdx * 3) + loteIdx) * 18;
      let filaHtml = `<tr class="row-lote ${hiddenClass}" style="animation-delay: ${staggerDelay}ms;"><td class="freeze-col-1" style="color: var(--text-muted); text-align: left;">${fincaName}</td><td class="freeze-col-2" style="font-weight: 600; text-align: left;">${loteKey}</td>`;
      
      if (CURRENT_PIVOT_MODE === 'ciclo_recuento') {
        ciclosDetectados.forEach(ciclo => {
          const regs = fincaObj.lotes[loteKey][ciclo] || [];
          if (subCabecerasCount > 0) {
            if (regs.length > 0) {
              const avgS = regs.reduce((acc, curr) => acc + curr.total_semillas, 0) / regs.length;
              const avgP10 = regs.reduce((acc, curr) => acc + curr.plantas_10dds, 0) / regs.length;
              const avgP15 = regs.reduce((acc, curr) => acc + curr.plantas_15dds, 0) / regs.length;
              
              if(visibilidadColumnas.semillas) filaHtml += construirCeldaHTML(avgS, 'semillas', fincaName, loteKey, ciclo);
              if(visibilidadColumnas['10dds']) filaHtml += construirCeldaHTML(avgP10, '10dds', fincaName, loteKey, ciclo);
              if(visibilidadColumnas['15dds']) filaHtml += construirCeldaHTML(avgP15, '15dds', fincaName, loteKey, ciclo);
              if(visibilidadColumnas.g10)      filaHtml += construirCeldaHTML(avgS > 0 ? (avgP10 / avgS) * 100 : 0, 'g10', fincaName, loteKey, ciclo);
              if(visibilidadColumnas.g15)      filaHtml += construirCeldaHTML(avgS > 0 ? (avgP15 / avgS) * 100 : 0, 'g15', fincaName, loteKey, ciclo);
            } else {
              for (let i = 0; i < subCabecerasCount; i++) filaHtml += `<td style="color: #cbd5e1;">-</td>`;
            }
          }
        });
      } else {
        METRICAS_LLAVES.forEach(mKey => {
          ciclosDetectados.forEach(ciclo => {
            const regs = fincaObj.lotes[loteKey][ciclo] || [];
            if (regs.length > 0) {
              const avgS = regs.reduce((acc, curr) => acc + curr.total_semillas, 0) / regs.length;
              const avgP10 = regs.reduce((acc, curr) => acc + curr.plantas_10dds, 0) / regs.length;
              const avgP15 = regs.reduce((acc, curr) => acc + curr.plantas_15dds, 0) / regs.length;
              let v = mKey==='semillas'? avgS : mKey==='10dds'? avgP10 : mKey==='15dds'? avgP15 : mKey==='g10'? (avgS>0?(avgP10/avgS)*100:0) : (avgS>0?(avgP15/avgS)*100:0);
              filaHtml += construirCeldaHTML(v, mKey, fincaName, loteKey, ciclo);
            } else {
              filaHtml += `<td style="color: #cbd5e1;">-</td>`;
            }
          });
        });
      }
      htmlBuffer.push(filaHtml + "</tr>");
    });

    let subtotalHtml = `<tr class="row-total-finca ${hiddenClass}"><td class="freeze-col-1" style="text-align: left;">Total Promedios ${fincaName}</td><td class="freeze-col-2" style="font-weight: 600; text-align: left;">-</td>`;
    if (CURRENT_PIVOT_MODE === 'ciclo_recuento') {
      ciclosDetectados.forEach(ciclo => {
        const cTot = fincaCiclosTotales[ciclo];
        if (subCabecerasCount > 0) {
          if (cTot.totalLotes > 0) {
            const avgS = cTot.sumS / cTot.totalLotes, avgP10 = cTot.sumP10 / cTot.totalLotes, avgP15 = cTot.sumP15 / cTot.totalLotes;
            const tg10 = avgS > 0 ? (avgP10 / avgS) * 100 : 0, tg15 = avgS > 0 ? (avgP15 / avgS) * 100 : 0;
            if(visibilidadColumnas.semillas) subtotalHtml += `<td class="text-right">${avgS.toFixed(2)}</td>`;
            if(visibilidadColumnas['10dds']) subtotalHtml += `<td class="text-right" style="color: #0284c7;">${avgP10.toFixed(2)}</td>`;
            if(visibilidadColumnas['15dds']) subtotalHtml += `<td class="text-right" style="color: var(--primary);">${avgP15.toFixed(2)}</td>`;
            if(visibilidadColumnas.g10)      subtotalHtml += `<td class="text-center"><span class="badge-pct ${tg10 < 55 ? 'low' : ''}">${tg10.toFixed(2)}%</span></td>`;
            if(visibilidadColumnas.g15)      subtotalHtml += `<td class="text-center"><span class="badge-pct ${tg15 < 55 ? 'low' : ''}">${tg15.toFixed(2)}%</span></td>`;
          } else {
            for (let i = 0; i < subCabecerasCount; i++) subtotalHtml += `<td style="color: #cbd5e1;">-</td>`;
          }
        }
      });
    } else {
      METRICAS_LLAVES.forEach(mKey => {
        ciclosDetectados.forEach(ciclo => {
          const cTot = fincaCiclosTotales[ciclo];
          if (cTot.totalLotes > 0) {
            const avgS = cTot.sumS / cTot.totalLotes, avgP10 = cTot.sumP10 / cTot.totalLotes, avgP15 = cTot.sumP15 / cTot.totalLotes;
            let valCalculado = mKey==='semillas'? avgS : mKey==='10dds'? avgP10 : mKey==='15dds'? avgP15 : mKey==='g10'? (avgS>0?(avgP10/avgS)*100:0) : (avgS>0?(avgP15/avgS)*100:0);
            if(mKey==='g10' || mKey==='g15') {
              subtotalHtml += `<td class="text-center"><span class="badge-pct ${valCalculado < 55 ? 'low' : ''}">${valCalculado.toFixed(2)}%</span></td>`;
            } else {
              subtotalHtml += `<td class="text-right">${valCalculado.toFixed(2)}</td>`;
            }
          } else {
            subtotalHtml += `<td style="color: #cbd5e1;">-</td>`;
          }
        });
      });
    }
    htmlBuffer.push(subtotalHtml + "</tr>");
  });
  tbody.innerHTML = htmlBuffer.join('');
}

function exportarTablaAExcel() {
  const table = document.getElementById("tablaGerminacionMaster");
  const clonedTable = table.cloneNode(true);
  clonedTable.querySelectorAll('.toggle-icon').forEach(el => el.remove());
  const wb = XLSX.utils.table_to_book(clonedTable, { sheet: "Germinación Maní", raw: true });
  XLSX.writeFile(wb, `Reporte_Pivot_Fijo_Mani_${new Date().toLocaleDateString().replace(/\//g, '-')}.xlsx`);
}
