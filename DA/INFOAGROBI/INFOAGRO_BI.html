<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFOAGRO BI</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<style>
  :root{
    --verde-oscuro:#1B4332;
    --verde-medio:#2D6A4F;
    --ambar:#C9963B;
    --fondo:#FAFAF8;
    --panel:#FFFFFF;
    --borde:#E1E0D8;
    --texto:#22302A;
    --sidebar-w-colapsada:64px;
    --sidebar-w-expandida:230px;
    --transicion:.32s cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--fondo);color:var(--texto);}

  .app{display:flex;height:100vh;overflow:hidden;}

  /* ============ SIDEBAR ============ */
  .sidebar{
    width:var(--sidebar-w-colapsada);
    flex-shrink:0;
    background:var(--verde-oscuro);
    color:#EDEDE8;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    padding:16px 0;
    transition:width var(--transicion);
    position:relative;
    z-index:40;
  }
  @media (hover:hover) and (pointer:fine){
    .sidebar:hover{width:var(--sidebar-w-expandida);}
  }
  .sidebar.expandida{width:var(--sidebar-w-expandida);}

  .sidebar-encabezado{
    display:flex;
    align-items:center;
    gap:12px;
    padding:4px 18px 18px;
    white-space:nowrap;
  }
  .marca-icono{
    width:32px;height:32px;border-radius:9px;
    background:var(--ambar);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    font-weight:800;
    font-size:13px;
    color:#2A1F0A;
  }
  .marca-texto{
    font-weight:700;font-size:14px;letter-spacing:.2px;color:#fff;
    opacity:0;transition:opacity .2s;
  }
  .sidebar:hover .marca-texto,
  .sidebar.expandida .marca-texto{opacity:1;transition-delay:.08s;}

  .btn-toggle-sidebar{
    display:none;
    margin-left:auto;
    background:rgba(255,255,255,.08);
    border:none;color:#fff;
    width:26px;height:26px;border-radius:6px;
    align-items:center;justify-content:center;
    cursor:pointer;flex-shrink:0;
  }

  .sidebar-nav{display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto;overflow-x:hidden;}
  .sidebar-seccion-titulo{
    padding:14px 18px 4px;
    font-size:10px;font-weight:800;letter-spacing:.08em;
    color:rgba(237,237,232,.45);
    white-space:nowrap;opacity:0;transition:opacity .15s;
  }
  .sidebar:hover .sidebar-seccion-titulo,
  .sidebar.expandida .sidebar-seccion-titulo{opacity:1;transition-delay:.06s;}
  .sidebar-inferior{display:flex;flex-direction:column;gap:2px;border-top:1px solid rgba(255,255,255,.1);padding-top:10px;margin-top:10px;}

  .item{
    display:flex;
    align-items:center;
    gap:14px;
    padding:10px 18px;
    margin:1px 8px;
    color:#D9D9D2;
    text-decoration:none;
    white-space:nowrap;
    border-radius:22px;
    transition:background .18s, color .18s;
    cursor:pointer;
    border:none;background:none;
    width:calc(100% - 16px);
    font-family:inherit;
    text-align:left;
  }
  .item i{
    font-size:17px;
    width:20px;
    flex-shrink:0;
    text-align:center;
  }
  .item span{
    opacity:0;
    transition:opacity .15s;
    font-size:13.5px;
  }
  .sidebar:hover .item span,
  .sidebar.expandida .item span{opacity:1;transition-delay:.06s;}

  .item:hover{
    background:rgba(255,255,255,.95);
    color:var(--verde-oscuro);
  }
  .item.activo{
    background:rgba(255,255,255,.95);
    color:var(--verde-oscuro);
    font-weight:600;
  }
  .item.activo i{color:var(--ambar);}
  .item:hover i{color:var(--verde-oscuro);}

  /* ============ ZONA PRINCIPAL ============ */
  .principal{flex:1;display:flex;flex-direction:column;min-width:0;}

  .topbar{
    display:none; /* En escritorio cada sección construye su propio título dentro
                     de su toolbar-una-fila; el shell ya no muestra nada aquí. */
    align-items:center;gap:14px;
    padding:14px 20px;
    background:var(--panel);
    border-bottom:1px solid var(--borde);
    flex-shrink:0;
    flex-wrap:wrap;
  }
  .btn-menu-movil{
    display:none;
    background:var(--verde-oscuro);color:#fff;border:none;
    width:36px;height:36px;border-radius:8px;
    align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
  }

  .contenido{flex:1;position:relative;background:var(--fondo);overflow:hidden;}
  iframe.panel-iframe{width:100%;height:100%;border:none;display:block;}

  .estado-carga{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:var(--fondo);color:#8a9690;font-size:13px;gap:10px;
    transition:opacity .2s;pointer-events:none;
  }
  .estado-carga.oculto{opacity:0;}
  .spinner{
    width:16px;height:16px;border:2px solid var(--borde);border-top-color:var(--verde-medio);
    border-radius:50%;animation:girar .7s linear infinite;
  }
  @keyframes girar{to{transform:rotate(360deg);}}

  /* ============ MÓVIL ============ */
  @media (max-width:820px){
    .sidebar{
      position:fixed;top:0;left:0;height:100vh;
      width:0;padding-left:0;padding-right:0;
      box-shadow:2px 0 16px rgba(0,0,0,.25);
    }
    .sidebar.expandida{width:230px;padding:16px 0;}
    .sidebar .btn-toggle-sidebar{display:flex;}
    .btn-menu-movil{display:flex;}
    .overlay-sidebar{
      display:none;position:fixed;inset:0;background:rgba(20,26,43,.4);z-index:35;
    }
    .overlay-sidebar.activo{display:block;}
    .topbar{display:flex;gap:8px;}
  }
</style>
</head>
<body>

<div class="app">

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-encabezado">
      <div class="marca-icono">IA</div>
      <div class="marca-texto">INFOAGRO BI</div>
      <button class="btn-toggle-sidebar" id="btnCerrarSidebar" type="button" title="Cerrar menú">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="sidebar-nav" id="sidebarNav">
      <div class="sidebar-seccion-titulo">Clima</div>
      <button class="item activo" data-archivo="DbPluviosidad_INFOAGRO_BI.html" data-vista="Pluviosidad" data-sub="Análisis histórico">
        <i class="bi bi-cloud-rain"></i><span>Pluviosidad</span>
      </button>

      <div class="sidebar-seccion-titulo">Operaciones</div>
      <button class="item" data-archivo="GANTT_avancesdeActividades_INFOAGRO_BI.html" data-vista="Avance de Actividades" data-sub="Monitoreo cruzado">
        <i class="bi bi-bar-chart-steps"></i><span>Avance de Actividades</span>
      </button>

      <div class="sidebar-seccion-titulo">Campo</div>
      <button class="item" data-archivo="DbSiembrayGerminacion_INFOAGRO_BI.html" data-vista="Siembra y Germinación" data-sub="Maní">
        <i class="bi bi-flower2"></i><span>Siembra y Germinación</span>
      </button>
      <button class="item" data-archivo="Recuentos_INFOAGRO_BI.html" data-vista="Recuentos de Enfermedades" data-sub="Fitosanitario · 2012-2026">
        <i class="bi bi-clipboard2-pulse"></i><span>Recuentos de Enfermedades</span>
      </button>

      <div class="sidebar-seccion-titulo">Mapeo</div>
      <button class="item" data-archivo="INFOAGRO_MAPS_INFOAGRO_BI.html" data-vista="Mapa de Fincas" data-sub="INFOAGRO-MAPs">
        <i class="bi bi-geo-alt"></i><span>Mapa de Fincas</span>
      </button>
    </div>

    <div class="sidebar-inferior">
      <button class="item" type="button"><i class="bi bi-gear"></i><span>Configuración</span></button>
      <button class="item" type="button"><i class="bi bi-box-arrow-right"></i><span>Cerrar sesión</span></button>
    </div>
  </nav>

  <div class="overlay-sidebar" id="overlaySidebar"></div>

  <div class="principal">
    <div class="topbar">
      <button class="btn-menu-movil" id="btnAbrirSidebar" type="button" title="Abrir menú">
        <i class="bi bi-list"></i>
      </button>
    </div>

    <div class="contenido">
      <div class="estado-carga" id="estadoCarga"><span class="spinner"></span> Cargando sección…</div>
      <iframe class="panel-iframe" id="frameSeccion" src="DbPluviosidad_INFOAGRO_BI.html"></iframe>
    </div>
  </div>

</div>

<script>
(function(){
  const sidebar = document.getElementById('sidebar');
  const btnAbrir = document.getElementById('btnAbrirSidebar');
  const btnCerrar = document.getElementById('btnCerrarSidebar');
  const overlay = document.getElementById('overlaySidebar');
  const items = document.querySelectorAll('.sidebar .item[data-archivo]');
  const frame = document.getElementById('frameSeccion');
  const estadoCarga = document.getElementById('estadoCarga');

  function abrirSidebar(){ sidebar.classList.add('expandida'); overlay.classList.add('activo'); }
  function cerrarSidebar(){ sidebar.classList.remove('expandida'); overlay.classList.remove('activo'); }

  btnAbrir.addEventListener('click', abrirSidebar);
  btnCerrar.addEventListener('click', cerrarSidebar);
  overlay.addEventListener('click', cerrarSidebar);

  // ================= CAMBIO DE SECCIÓN =================
  // El shell ya NO maneja filtros: cada sección tiene su propio panel de filtros
  // (Compañía/Sector/Ciclo/Finca), visible dentro de su propio iframe, tal como
  // funcionaba antes de intentar centralizarlo aquí.
  let archivoActivo = null;

  items.forEach((item) => {
    item.addEventListener('click', (e) => {
      e.preventDefault();
      if(item.classList.contains('activo')) return; // ya está activa, no recargar
      items.forEach(i => i.classList.remove('activo'));
      item.classList.add('activo');
      cambiarSeccion(item.dataset.archivo);
      if(window.innerWidth <= 820) cerrarSidebar();
    });
  });

  function cambiarSeccion(archivo){
    archivoActivo = archivo;
    estadoCarga.classList.remove('oculto');
    frame.src = archivo;
  }

  frame.addEventListener('load', () => {
    estadoCarga.classList.add('oculto');
  });

})();
</script>

</body>
</html>
