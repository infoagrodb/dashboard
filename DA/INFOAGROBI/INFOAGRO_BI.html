<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFOAGRO BI</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%231B4332%22/><text x=%2250%22 y=%2264%22 font-size=%2258%22 text-anchor=%22middle%22>🌾</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%231B4332%22/><text x=%2250%22 y=%2264%22 font-size=%2258%22 text-anchor=%22middle%22>🌾</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<style>
  :root{
    --verde-oscuro:#1B4332;
    --verde-medio:#2D6A4F;
    --ambar:#C9963B;
    --fondo:#FAFAF8;
    --panel:#FFFFFF;
    --borde:#E1E0D8;
    --texto:#22302A;
    --sidebar-w-colapsada:64px;
    --sidebar-w-expandida:230px;
    --transicion:.32s cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--fondo);color:var(--texto);}

  .app{display:flex;height:100vh;overflow:hidden;}

  /* ============ SIDEBAR ============ */
  .sidebar{
    width:var(--sidebar-w-colapsada);
    flex-shrink:0;
    background:var(--verde-oscuro);
    color:#EDEDE8;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    padding:16px 0;
    transition:width var(--transicion);
    position:relative;
    z-index:40;
  }
  @media (hover:hover) and (pointer:fine){
    .sidebar:hover{width:var(--sidebar-w-expandida);}
  }
  .sidebar.expandida{width:var(--sidebar-w-expandida);}

  .sidebar-encabezado{
    display:flex;
    align-items:center;
    gap:12px;
    padding:4px 18px 18px;
    white-space:nowrap;
  }
  .marca-icono{
    width:36px;height:36px;border-radius:10px;
    background:linear-gradient(145deg, var(--ambar), #a97c28);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;position:relative;
    font-weight:800;
    font-size:10px;letter-spacing:.3px;
    color:#2A1F0A;
    box-shadow:0 2px 6px rgba(0,0,0,.18);
  }
  .marca-icono::after{
    content:'🌾';
    position:absolute;bottom:-5px;right:-5px;
    width:17px;height:17px;border-radius:50%;
    background:var(--verde-oscuro);
    display:flex;align-items:center;justify-content:center;
    font-size:9px;line-height:1;
    border:2px solid var(--verde-oscuro);
    box-shadow:0 1px 3px rgba(0,0,0,.3);
  }
  .marca-texto{
    font-weight:700;font-size:14px;letter-spacing:.2px;color:#fff;
    opacity:0;transition:opacity .2s;
  }
  .sidebar:hover .marca-texto,
  .sidebar.expandida .marca-texto{opacity:1;transition-delay:.08s;}

  .btn-toggle-sidebar{
    display:none;
    margin-left:auto;
    background:rgba(255,255,255,.08);
    border:none;color:#fff;
    width:26px;height:26px;border-radius:6px;
    align-items:center;justify-content:center;
    cursor:pointer;flex-shrink:0;
  }

  .sidebar-nav{display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto;overflow-x:hidden;}
  .sidebar-seccion-titulo{
    padding:14px 18px 4px;
    font-size:10px;font-weight:800;letter-spacing:.08em;
    color:rgba(237,237,232,.45);
    white-space:nowrap;opacity:0;transition:opacity .15s;
  }
  .sidebar:hover .sidebar-seccion-titulo,
  .sidebar.expandida .sidebar-seccion-titulo{opacity:1;transition-delay:.06s;}
  .sidebar-inferior{display:flex;flex-direction:column;gap:2px;border-top:1px solid rgba(255,255,255,.1);padding-top:10px;margin-top:10px;}

  .item{
    display:flex;
    align-items:center;
    gap:14px;
    padding:10px 18px;
    margin:1px 8px;
    color:#D9D9D2;
    text-decoration:none;
    white-space:nowrap;
    border-radius:22px;
    transition:background .18s, color .18s;
    cursor:pointer;
    border:none;background:none;
    width:calc(100% - 16px);
    font-family:inherit;
    text-align:left;
  }
  .item i{
    font-size:17px;
    width:20px;
    flex-shrink:0;
    text-align:center;
  }
  .item span{
    opacity:0;
    transition:opacity .15s;
    font-size:13.5px;
  }
  .sidebar:hover .item span,
  .sidebar.expandida .item span{opacity:1;transition-delay:.06s;}

  .item:hover{
    background:rgba(255,255,255,.95);
    color:var(--verde-oscuro);
  }
  .item.activo{
    background:rgba(255,255,255,.95);
    color:var(--verde-oscuro);
    font-weight:600;
  }
  .item.activo i{color:var(--ambar);}
  .item:hover i{color:var(--verde-oscuro);}

  /* ============ ZONA PRINCIPAL ============ */
  .principal{flex:1;display:flex;flex-direction:column;min-width:0;}

  .topbar{
    display:none; /* En escritorio cada sección construye su propio título dentro
                     de su toolbar-una-fila; el shell ya no muestra nada aquí. */
    align-items:center;gap:14px;
    padding:14px 20px;
    background:var(--panel);
    border-bottom:1px solid var(--borde);
    flex-shrink:0;
    flex-wrap:wrap;
  }
  .btn-menu-movil{
    display:none;
    background:var(--verde-oscuro);color:#fff;border:none;
    width:36px;height:36px;border-radius:8px;
    align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
  }

  .contenido{flex:1;position:relative;background:var(--fondo);overflow:hidden;}
  iframe.panel-iframe{width:100%;height:100%;border:none;display:block;}

  .estado-carga{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:var(--fondo);color:#8a9690;font-size:13px;gap:10px;
    transition:opacity .2s;pointer-events:none;
  }
  .estado-carga.oculto{opacity:0;}
  .spinner{
    width:16px;height:16px;border:2px solid var(--borde);border-top-color:var(--verde-medio);
    border-radius:50%;animation:girar .7s linear infinite;
  }
  @keyframes girar{to{transform:rotate(360deg);}}

  /* ============ PRESENCIA DE USUARIOS ============ */
  .presencia-flotante{position:fixed;top:14px;right:16px;z-index:999;display:none;align-items:center;gap:8px;}
  .presencia-avatares{display:flex;align-items:center;cursor:pointer;}
  .avatar-usuario{
    width:32px;height:32px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:700;color:#fff;
    border:2.5px solid #fff;box-shadow:0 3px 10px rgba(27,67,50,.22);
    margin-left:-11px;transition:transform .18s ease;flex-shrink:0;
  }
  .presencia-avatares .avatar-usuario:first-child{margin-left:0;}
  .avatar-usuario:hover{transform:translateY(-3px) scale(1.06);z-index:5;}
  .presencia-contador{
    margin-left:9px;font-size:11px;font-weight:600;color:var(--verde-oscuro);
    background:rgba(255,255,255,.85);backdrop-filter:blur(8px);
    padding:4px 10px;border-radius:14px;border:1px solid rgba(225,224,216,.8);
    box-shadow:0 3px 10px rgba(27,67,50,.1);white-space:nowrap;
  }
  .mi-cuenta{
    display:flex;align-items:center;gap:7px;cursor:pointer;
    background:rgba(255,255,255,.72);backdrop-filter:blur(14px) saturate(180%);
    -webkit-backdrop-filter:blur(14px) saturate(180%);
    border:1px solid rgba(255,255,255,.9);border-radius:24px;
    padding:4px 12px 4px 4px;
    box-shadow:0 6px 20px rgba(27,67,50,.14), inset 0 1px 0 rgba(255,255,255,.6);
    flex-shrink:0;transition:box-shadow .2s ease, transform .2s ease;
  }
  .mi-cuenta:hover{box-shadow:0 8px 26px rgba(27,67,50,.2), inset 0 1px 0 rgba(255,255,255,.7);transform:translateY(-1px);}
  .mi-cuenta .avatar-usuario{
    margin-left:0;width:30px;height:30px;
    box-shadow:0 0 0 2px #fff, 0 0 0 3.5px var(--ambar);
    position:relative;
  }
  .mi-cuenta .avatar-usuario::after{
    content:'';position:absolute;bottom:-1px;right:-1px;
    width:9px;height:9px;border-radius:50%;
    background:#4CAF6D;border:2px solid #fff;
  }
  .mi-cuenta-nombre{font-size:12px;font-weight:600;color:var(--verde-oscuro);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .mi-cuenta-caret{font-size:9px;color:#a8b3ac;transition:transform .2s ease;}
  .presencia-panel{
    display:none;position:absolute;top:44px;right:0;
    background:rgba(255,255,255,.82);backdrop-filter:blur(20px) saturate(180%);
    -webkit-backdrop-filter:blur(20px) saturate(180%);
    border:1px solid rgba(255,255,255,.9);border-radius:16px;
    box-shadow:0 16px 40px rgba(27,67,50,.18), inset 0 1px 0 rgba(255,255,255,.6);
    min-width:220px;max-width:270px;padding:8px;max-height:310px;overflow-y:auto;
  }
  .presencia-panel.abierto{display:block;animation:aparecerPanel .16s ease;}
  @keyframes aparecerPanel{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
  .presencia-fila{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:10px;font-size:12.5px;}
  .presencia-fila:hover{background:rgba(201,150,59,.1);}
  .presencia-fila .avatar-usuario{margin-left:0;width:28px;height:28px;box-shadow:0 2px 6px rgba(27,67,50,.18);}
  .presencia-fila small{color:#8a9690;display:block;font-size:10.5px;}
  .presencia-encabezado{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#a8b3ac;padding:6px 9px 3px;}
  .presencia-cambiar{
    display:block;text-align:center;font-size:11.5px;font-weight:600;color:var(--verde-medio);
    padding:9px 4px 4px;cursor:pointer;border-top:1px solid rgba(225,224,216,.8);margin-top:5px;
  }
  .presencia-cambiar:hover{color:var(--verde-oscuro);}

  /* ============ MODAL IDENTIFICACIÓN (acceso directo) ============ */
  .modal-id-overlay{
    position:fixed;inset:0;background:rgba(20,26,43,.55);
    display:none;align-items:center;justify-content:center;z-index:2000;padding:20px;
  }
  .modal-id-overlay.activo{display:flex;}
  .modal-id-tarjeta{
    background:#fff;border-radius:14px;padding:26px 24px;width:100%;max-width:340px;
    box-shadow:0 12px 40px rgba(0,0,0,.25);
  }
  .modal-id-tarjeta h3{margin:0 0 6px;font-size:16px;color:var(--verde-oscuro);}
  .modal-id-tarjeta p{margin:0 0 16px;font-size:12.5px;color:#5b675f;}
  .modal-id-tarjeta input{
    width:100%;padding:10px 12px;border:1px solid var(--borde);border-radius:8px;
    font-size:14px;margin-bottom:6px;box-sizing:border-box;
  }
  .modal-id-tarjeta input:focus{outline:none;border-color:var(--verde-medio);}
  .modal-id-error{color:#b3413a;font-size:12px;min-height:16px;margin-bottom:10px;}
  .modal-id-btn{
    width:100%;background:var(--verde-oscuro);color:#fff;border:none;border-radius:8px;
    padding:10px;font-size:13.5px;font-weight:600;cursor:pointer;
  }
  .modal-id-btn:disabled{opacity:.6;cursor:default;}

  .modal-orden-tarjeta{max-width:380px;}
  .lista-orden{display:flex;flex-direction:column;gap:6px;margin:14px 0;max-height:340px;overflow-y:auto;}
  .fila-orden{
    display:flex;align-items:center;gap:10px;padding:9px 11px;
    border:1px solid var(--borde);border-radius:9px;background:#fbfbf9;font-size:13px;
  }
  .fila-orden i.bi{color:var(--verde-oscuro);font-size:15px;flex-shrink:0;width:16px;text-align:center;}
  .fila-orden span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--texto);}
  .fila-orden .flechas{display:flex;flex-direction:column;gap:3px;}
  .fila-orden .flechas button{
    border:none;background:var(--verde-oscuro);color:#fff;width:22px;height:17px;border-radius:4px;
    cursor:pointer;font-size:9px;line-height:1;display:flex;align-items:center;justify-content:center;
  }
  .fila-orden .flechas button:hover{background:var(--verde-medio);}
  .fila-orden .flechas button:disabled{opacity:.3;cursor:default;background:#a8b3ac;}
  .modal-orden-acciones{display:flex;gap:8px;margin-top:4px;}
  .modal-orden-acciones .modal-id-btn{flex:1;margin:0;}
  .modal-id-btn.secundario{background:#fff;color:var(--verde-oscuro);border:1px solid var(--borde);}
  .modal-id-btn.secundario:hover{background:var(--fondo);}
  .presencia-cambiar{
    display:block;text-align:center;font-size:11px;color:#8a9690;
    padding:6px 4px 2px;cursor:pointer;border-top:1px solid var(--borde);margin-top:4px;
  }
  .presencia-cambiar:hover{color:var(--verde-oscuro);}

  /* ============ MÓVIL ============ */
  @media (max-width:820px){
    .sidebar{
      position:fixed;top:0;left:0;height:100vh;
      width:0;padding-left:0;padding-right:0;
      box-shadow:2px 0 16px rgba(0,0,0,.25);
    }
    .sidebar.expandida{width:230px;padding:16px 0;}
    .sidebar .btn-toggle-sidebar{display:flex;}
    .btn-menu-movil{display:flex;}
    .overlay-sidebar{
      display:none;position:fixed;inset:0;background:rgba(20,26,43,.4);z-index:35;
    }
    .overlay-sidebar.activo{display:block;}
    .topbar{display:flex;gap:8px;}
  }
</style>
</head>
<body>

<div class="app">

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-encabezado">
      <div class="marca-icono">IFBI</div>
      <div class="marca-texto">INFOAGRO BI</div>
      <button class="btn-toggle-sidebar" id="btnCerrarSidebar" type="button" title="Cerrar menú">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="sidebar-nav" id="sidebarNav">
      <div class="sidebar-seccion-titulo">Campo</div>
      <button class="item activo" data-archivo="DbSiembrayGerminacion_INFOAGRO_BI.html" data-vista="Siembra y Germinación" data-sub="Maní">
        <i class="bi bi-flower2"></i><span>Siembra y Germinación</span>
      </button>
      <button class="item" data-archivo="Recuentos_INFOAGRO_BI.html" data-vista="Recuentos de Enfermedades" data-sub="Fitosanitario · 2012-2026">
        <i class="bi bi-clipboard2-pulse"></i><span>Recuentos de Enfermedades</span>
      </button>

      <div class="sidebar-seccion-titulo">Operaciones</div>
      <button class="item" data-archivo="GANTT_avancesdeActividades_INFOAGRO_BI.html" data-vista="Avance de Actividades" data-sub="Monitoreo cruzado">
        <i class="bi bi-bar-chart-steps"></i><span>Avance de Actividades</span>
      </button>
      <button class="item" data-archivo="Requerimiento_Presupuesto_INFOAGRO_BI.html" data-vista="Requerimiento y Presupuesto" data-sub="Insumos para Fungicidas">
        <i class="bi bi-cart-check"></i><span>Requerimiento y Presupuesto</span>
      </button>

      <div class="sidebar-seccion-titulo">Clima</div>
      <button class="item" data-archivo="DbPluviosidad_INFOAGRO_BI.html" data-vista="Pluviosidad" data-sub="Análisis histórico">
        <i class="bi bi-cloud-rain"></i><span>Pluviosidad</span>
      </button>

      <div class="sidebar-seccion-titulo">Mapeo</div>
      <button class="item" data-archivo="INFOAGRO_MAPS_INFOAGRO_BI.html" data-vista="Mapa de Fincas" data-sub="INFOAGRO-MAPs">
        <i class="bi bi-geo-alt"></i><span>Mapa de Fincas</span>
      </button>
    </div>

    <div class="sidebar-inferior">
      <button class="item" type="button" id="btnConfigOrden"><i class="bi bi-gear"></i><span>Configuración</span></button>
      <button class="item" type="button"><i class="bi bi-box-arrow-right"></i><span>Cerrar sesión</span></button>
    </div>
  </nav>

  <div class="overlay-sidebar" id="overlaySidebar"></div>

  <div class="presencia-flotante" id="presenciaFlotante">
    <div class="presencia-avatares" id="presenciaAvatares"></div>
    <div class="mi-cuenta" id="miCuenta">
      <div class="avatar-usuario" id="miAvatar"></div>
      <span class="mi-cuenta-nombre" id="miNombre"></span>
      <span class="mi-cuenta-caret">▾</span>
    </div>
    <div class="presencia-panel" id="presenciaPanel"></div>
  </div>

  <div class="modal-id-overlay" id="modalIdOverlay">
    <div class="modal-id-tarjeta">
      <h3>¿Quién eres?</h3>
      <p>Entraste por acceso directo. Escribe tu usuario de Odoo para identificarte en el panel.</p>
      <input type="text" id="modalIdInput" placeholder="ej. isomoza" autocomplete="off" autocapitalize="off">
      <div class="modal-id-error" id="modalIdError"></div>
      <button class="modal-id-btn" id="modalIdBtn" type="button">Continuar</button>
    </div>
  </div>

  <div class="modal-id-overlay" id="modalOrdenOverlay">
    <div class="modal-id-tarjeta modal-orden-tarjeta">
      <h3>Orden del menú</h3>
      <p>Ordena las secciones como prefieras. La primera de la lista es la que se carga al abrir el panel.</p>
      <div class="lista-orden" id="listaOrdenSecciones"></div>
      <div class="modal-orden-acciones">
        <button class="modal-id-btn secundario" id="btnRestablecerOrden" type="button">Por defecto</button>
        <button class="modal-id-btn" id="btnGuardarOrden" type="button">Guardar</button>
      </div>
    </div>
  </div>

  <div class="principal">
    <div class="topbar">
      <button class="btn-menu-movil" id="btnAbrirSidebar" type="button" title="Abrir menú">
        <i class="bi bi-list"></i>
      </button>
    </div>

    <div class="contenido">
      <div class="estado-carga" id="estadoCarga"><span class="spinner"></span> Cargando sección…</div>
      <iframe class="panel-iframe" id="frameSeccion" src="DbSiembrayGerminacion_INFOAGRO_BI.html"></iframe>
    </div>
  </div>

</div>

<script>
(function(){
  const sidebar = document.getElementById('sidebar');
  const btnAbrir = document.getElementById('btnAbrirSidebar');
  const btnCerrar = document.getElementById('btnCerrarSidebar');
  const overlay = document.getElementById('overlaySidebar');
  const items = document.querySelectorAll('.sidebar .item[data-archivo]');
  const frame = document.getElementById('frameSeccion');
  const estadoCarga = document.getElementById('estadoCarga');

  function abrirSidebar(){ sidebar.classList.add('expandida'); overlay.classList.add('activo'); }
  function cerrarSidebar(){ sidebar.classList.remove('expandida'); overlay.classList.remove('activo'); }

  btnAbrir.addEventListener('click', abrirSidebar);
  btnCerrar.addEventListener('click', cerrarSidebar);
  overlay.addEventListener('click', cerrarSidebar);

  // ================= CAMBIO DE SECCIÓN =================
  // El shell ya NO maneja filtros: cada sección tiene su propio panel de filtros
  // (Compañía/Sector/Ciclo/Finca), visible dentro de su propio iframe, tal como
  // funcionaba antes de intentar centralizarlo aquí.
  let archivoActivo = 'DbSiembrayGerminacion_INFOAGRO_BI.html';

  items.forEach((item) => {
    item.addEventListener('click', (e) => {
      e.preventDefault();
      if(item.classList.contains('activo')) return; // ya está activa, no recargar
      items.forEach(i => i.classList.remove('activo'));
      item.classList.add('activo');
      cambiarSeccion(item.dataset.archivo);
      if(window.innerWidth <= 820) cerrarSidebar();
    });
  });

  function cambiarSeccion(archivo){
    archivoActivo = archivo;
    window.archivoActivo = archivo;
    estadoCarga.classList.remove('oculto');
    frame.src = archivo;
    document.dispatchEvent(new CustomEvent('infoagro:seccion', { detail: { archivo } }));
  }
  window.archivoActivo = archivoActivo;
  window._cambiarSeccion = cambiarSeccion; // usado por el módulo de "orden del menú"
  window._itemsSidebar = items;            // idem

  frame.addEventListener('load', () => {
    estadoCarga.classList.add('oculto');
  });

})();

// ============ ORDEN PERSONALIZADO DEL MENÚ ============
(function(){
  const URL_PRESENCIA = 'https://weathered-recipe-d18c.ignagher.workers.dev';
  const sidebarNav   = document.getElementById('sidebarNav');
  const btnConfig    = document.getElementById('btnConfigOrden');
  const overlay      = document.getElementById('modalOrdenOverlay');
  const lista        = document.getElementById('listaOrdenSecciones');
  const btnGuardar   = document.getElementById('btnGuardarOrden');
  const btnReset     = document.getElementById('btnRestablecerOrden');
  if(!sidebarNav || !btnConfig) return;

  // Orden por defecto = el orden con el que quedó el HTML (fuente de verdad si
  // el usuario nunca configuró nada, o si le da "Por defecto").
  const ORDEN_DEFECTO = [...sidebarNav.querySelectorAll('.item[data-archivo]')].map(b => b.dataset.archivo);

  const botones = () => [...sidebarNav.querySelectorAll('.item[data-archivo]')];

  function aplicarOrden(orden){
    if(!orden || !orden.length) return;
    const porArchivo = {};
    botones().forEach(b => { porArchivo[b.dataset.archivo] = b; });

    // Los títulos de sección (Campo/Operaciones/Clima/Mapeo) asumen el orden
    // por defecto — con un orden personalizado ya no aplican, se quitan.
    sidebarNav.querySelectorAll('.sidebar-seccion-titulo').forEach(t => t.remove());

    orden.forEach(archivo => { if(porArchivo[archivo]) sidebarNav.appendChild(porArchivo[archivo]); });
    // Si el sistema agrega una sección nueva que el usuario no tenía guardada,
    // se agrega al final en vez de desaparecer.
    botones().forEach(b => { if(!orden.includes(b.dataset.archivo)) sidebarNav.appendChild(b); });

    const primero = sidebarNav.querySelector('.item[data-archivo]');
    if(primero && window._cambiarSeccion){
      botones().forEach(b => b.classList.remove('activo'));
      primero.classList.add('activo');
      window._cambiarSeccion(primero.dataset.archivo);
    }
  }

  async function cargarPreferencia(usuario){
    try{
      const r = await fetch(`${URL_PRESENCIA}/preferencias?usuario=${encodeURIComponent(usuario)}`, { cache: 'no-store' });
      const data = await r.json();
      if(data.ok && data.orden && data.orden.length) aplicarOrden(data.orden);
    }catch(e){ /* silencioso: si falla, se queda con el orden por defecto */ }
  }

  document.addEventListener('infoagro:identificado', (e) => cargarPreferencia(e.detail.usuario));
  const usuarioGuardado = localStorage.getItem('ib_usuario');
  if(usuarioGuardado) cargarPreferencia(usuarioGuardado); // cubre recargas normales

  // ---- Modal de configuración (flechas ▲▼, sin depender de drag & drop) ----
  let ordenTemporal = [];

  function renderLista(){
    lista.innerHTML = ordenTemporal.map((archivo, idx) => {
      const b = botones().find(x => x.dataset.archivo === archivo);
      if(!b) return '';
      const icono = b.querySelector('i.bi')?.className || 'bi bi-circle';
      const texto = b.querySelector('span')?.textContent || b.dataset.vista || archivo;
      return `
        <div class="fila-orden" data-archivo="${archivo}">
          <i class="${icono}"></i><span>${texto}</span>
          <div class="flechas">
            <button type="button" data-dir="-1" ${idx===0?'disabled':''}>▲</button>
            <button type="button" data-dir="1" ${idx===ordenTemporal.length-1?'disabled':''}>▼</button>
          </div>
        </div>`;
    }).join('');

    lista.querySelectorAll('button[data-dir]').forEach(btn => {
      btn.addEventListener('click', () => {
        const fila = btn.closest('.fila-orden');
        const idx  = ordenTemporal.indexOf(fila.dataset.archivo);
        const destino = idx + parseInt(btn.dataset.dir);
        if(destino < 0 || destino >= ordenTemporal.length) return;
        [ordenTemporal[idx], ordenTemporal[destino]] = [ordenTemporal[destino], ordenTemporal[idx]];
        renderLista();
      });
    });
  }

  btnConfig.addEventListener('click', () => {
    ordenTemporal = botones().map(b => b.dataset.archivo); // el orden actual como punto de partida
    renderLista();
    overlay.classList.add('activo');
  });
  overlay.addEventListener('click', (e) => { if(e.target === overlay) overlay.classList.remove('activo'); });

  async function guardarEnServidor(orden){
    const usuario = window._usuarioActual || localStorage.getItem('ib_usuario');
    if(!usuario) return; // se aplica localmente, pero no hay a quién ligarlo en el servidor
    try{
      await fetch(`${URL_PRESENCIA}/preferencias`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ usuario, orden })
      });
    }catch(e){ /* silencioso */ }
  }

  btnGuardar.addEventListener('click', () => {
    aplicarOrden(ordenTemporal);
    overlay.classList.remove('activo');
    guardarEnServidor(ordenTemporal);
  });

  btnReset.addEventListener('click', () => {
    aplicarOrden(ORDEN_DEFECTO);
    overlay.classList.remove('activo');
    guardarEnServidor(null);
  });
})();

// ============ MÉTRICAS DE USO (adopción real, no presencia en vivo) ============
// No usa KV: acumula eventos en localStorage y los manda en lotes al Worker,
// que los agrega a data/metricas_uso.json en GitHub — mismo patrón que ya usa
// el Worker para muestreo_gps.json. Un commit por hora como mucho, no por evento.
(function(){
  const URL_PRESENCIA      = 'https://weathered-recipe-d18c.ignagher.workers.dev';
  const CLAVE_BUFFER       = 'ib_metricas_buffer';
  const INTERVALO_ENVIO_MS = 60 * 60 * 1000; // 1 hora

  function leerBuffer(){
    try{ return JSON.parse(localStorage.getItem(CLAVE_BUFFER) || '[]'); }catch(e){ return []; }
  }
  function guardarBuffer(buf){
    try{ localStorage.setItem(CLAVE_BUFFER, JSON.stringify(buf)); }catch(e){}
  }

  function registrarEvento(evento, archivo){
    const usuario = window._usuarioActual || localStorage.getItem('ib_usuario');
    if(!usuario) return; // sin identidad no se registra nada
    const buf = leerBuffer();
    buf.push({
      usuario,
      nombre:  localStorage.getItem('ib_nombre') || usuario,
      evento,                                            // 'inicio' | 'vista'
      seccion: (archivo || '').replace('_INFOAGRO_BI.html', ''),
      fecha:   new Date().toISOString(),
    });
    guardarBuffer(buf);
  }

  function enviarBuffer(usarBeacon){
    const buf = leerBuffer();
    if(!buf.length) return;
    const payload = JSON.stringify({ eventos: buf });
    if(usarBeacon){
      const enviado = navigator.sendBeacon(
        URL_PRESENCIA + '/metricas/registrar',
        new Blob([payload], { type: 'application/json' })
      );
      if(enviado) guardarBuffer([]);
    } else {
      fetch(URL_PRESENCIA + '/metricas/registrar', {
        method: 'POST', headers: {'Content-Type':'application/json'}, body: payload,
      }).then(()=> guardarBuffer([])).catch(()=>{});
    }
  }

  document.addEventListener('infoagro:identificado', () => registrarEvento('inicio', window.archivoActivo));
  document.addEventListener('infoagro:seccion', (e) => registrarEvento('vista', e.detail.archivo));

  setInterval(() => enviarBuffer(false), INTERVALO_ENVIO_MS);
  window.addEventListener('pagehide', () => enviarBuffer(true));
  window.addEventListener('beforeunload', () => enviarBuffer(true));
})();

// ============ PRESENCIA DE USUARIOS CONECTADOS ============
(function(){
  const URL_PRESENCIA = 'https://weathered-recipe-d18c.ignagher.workers.dev';

  const cont = document.getElementById('presenciaFlotante');
  const avataresEl = document.getElementById('presenciaAvatares');
  const panelEl = document.getElementById('presenciaPanel');
  const modalOverlay = document.getElementById('modalIdOverlay');
  const modalInput = document.getElementById('modalIdInput');
  const modalError = document.getElementById('modalIdError');
  const modalBtn = document.getElementById('modalIdBtn');

  let usuario = null, nombreCompleto = null, inic = null;

  function iniciales(nombre, loginFallback){
    if(!nombre) return (loginFallback||'').slice(0,2).toUpperCase();
    const partes = nombre.trim().split(/\s+/);
    return ((partes[0]?.[0]||'') + (partes[1]?.[0]||'')).toUpperCase();
  }

  const PALETA = ['#2D6A4F','#1B4332','#C9963B','#3D5A80','#7B506F','#8A5A44','#4A6741','#59595C'];
  function colorDe(txt){
    let h = 0;
    for(let i=0;i<txt.length;i++) h = txt.charCodeAt(i) + ((h<<5)-h);
    return PALETA[Math.abs(h) % PALETA.length];
  }

  function guardarIdentidad(u, n){
    usuario = u; nombreCompleto = n; inic = iniciales(n, u);
    localStorage.setItem('ib_usuario', u);
    localStorage.setItem('ib_nombre', n || u);
    window._usuarioActual = u;
    document.dispatchEvent(new CustomEvent('infoagro:identificado', { detail: { usuario: u, nombre: n } }));
  }

  function limpiarIdentidad(){
    localStorage.removeItem('ib_usuario');
    localStorage.removeItem('ib_nombre');
    usuario = null; nombreCompleto = null; inic = null;
  }

  // ---- Verificación de login real contra Odoo (vía Worker) ----
  async function verificarLogin(login){
    modalError.textContent = '';
    modalBtn.disabled = true;
    modalBtn.textContent = 'Verificando…';
    try{
      const r = await fetch(URL_PRESENCIA + '/usuarios/verificar', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ login })
      });
      const data = await r.json();
      if(!r.ok || !data.ok){
        modalError.textContent = data.error || 'Usuario no encontrado. Verifica tu usuario de Odoo.';
        modalBtn.disabled = false;
        modalBtn.textContent = 'Continuar';
        return;
      }
      guardarIdentidad(data.login, data.nombre);
      modalOverlay.classList.remove('activo');
      iniciarPresencia();
    }catch(e){
      modalError.textContent = 'No se pudo verificar (revisa tu conexión).';
      modalBtn.disabled = false;
      modalBtn.textContent = 'Continuar';
    }
  }

  modalBtn.addEventListener('click', ()=>{
    const login = modalInput.value.trim();
    if(!login){ modalError.textContent = 'Escribe tu usuario.'; return; }
    verificarLogin(login);
  });
  modalInput.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') modalBtn.click(); });

  function mostrarModalLogin(){
    modalOverlay.classList.add('activo');
    setTimeout(()=> modalInput.focus(), 50);
  }

  const miAvatarEl = document.getElementById('miAvatar');
  const miNombreEl = document.getElementById('miNombre');
  const miCuentaEl = document.getElementById('miCuenta');

  // ---- Resolución de identidad al cargar ----
  const params = new URLSearchParams(location.search);
  const uParam = params.get('u');
  const nParam = params.get('n') ? decodeURIComponent(params.get('n')) : null;

  if(uParam){
    // Viene desde el botón de Odoo: manda siempre, sobreescribe lo guardado
    guardarIdentidad(uParam, nParam || uParam);
    iniciarPresencia();
  } else {
    const uGuardado = localStorage.getItem('ib_usuario');
    const nGuardado = localStorage.getItem('ib_nombre');
    if(uGuardado){
      guardarIdentidad(uGuardado, nGuardado);
      iniciarPresencia();
    } else {
      mostrarModalLogin();
    }
  }

  // ---- Presencia (ping + polling) ----

  function pintarMiCuenta(){
    cont.style.display = 'flex';
    miAvatarEl.style.background = colorDe(usuario);
    miAvatarEl.textContent = inic;
    miAvatarEl.title = nombreCompleto || usuario;
    miNombreEl.textContent = (nombreCompleto || usuario).split(' ')[0];
  }

  function iniciarPresencia(){
    pintarMiCuenta(); // se ve de inmediato, sin depender de que el Worker responda

    async function sincronizar(){
      try{
        const r = await fetch(URL_PRESENCIA + '/presencia/sync', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          cache: 'no-store',
          body: JSON.stringify({
            usuario, nombre: nombreCompleto || usuario, iniciales: inic,
            seccion: (window.archivoActivo || '')
          })
        });
        const lista = await r.json();
        renderizar(Array.isArray(lista) ? lista : []);
      }catch(e){ /* silencioso */ }
    }

    function renderizar(lista){
      // "otros" = todos menos yo, para el stack de avatares a la izquierda de mi cuenta
      const otros = lista.filter(u => u.usuario !== usuario)
        .sort((a,b)=> (a.nombre||'').localeCompare(b.nombre||''));

      avataresEl.innerHTML = otros.slice(0,5).map(u=>{
        const tip = (u.nombre||u.usuario) + (u.seccion ? (' · '+u.seccion.replace('_INFOAGRO_BI.html','')) : '');
        return `<div class="avatar-usuario" style="background:${colorDe(u.usuario)}" title="${tip}">${u.iniciales}</div>`;
      }).join('');
      if(otros.length > 5){
        avataresEl.innerHTML += `<div class="presencia-contador">+${otros.length-5}</div>`;
      }

      // Panel: primero yo ("Conectado como"), luego el resto
      const filaYo = `
        <div class="presencia-encabezado">Conectado como</div>
        <div class="presencia-fila">
          <div class="avatar-usuario" style="background:${colorDe(usuario)}">${inic}</div>
          <div>${nombreCompleto || usuario}<small>${(window.archivoActivo||'—').replace('_INFOAGRO_BI.html','')}</small></div>
        </div>`;
      const filaOtros = otros.length ? `
        <div class="presencia-encabezado">${otros.length} más conectado${otros.length>1?'s':''}</div>
        ` + otros.map(u=>`
        <div class="presencia-fila">
          <div class="avatar-usuario" style="background:${colorDe(u.usuario)}">${u.iniciales}</div>
          <div>${u.nombre||u.usuario}<small>${(u.seccion||'—').replace('_INFOAGRO_BI.html','')}</small></div>
        </div>`).join('') : '';

      panelEl.innerHTML = filaYo + filaOtros + `<div class="presencia-cambiar" id="presenciaCambiar">Cambiar usuario</div>`;

      const btnCambiar = document.getElementById('presenciaCambiar');
      if(btnCambiar) btnCambiar.addEventListener('click', (e)=>{
        e.stopPropagation();
        if(window._salirPresencia) window._salirPresencia();
        limpiarIdentidad();
        panelEl.classList.remove('abierto');
        cont.style.display = 'none';
        modalInput.value = '';
        mostrarModalLogin();
      });
    }

    miCuentaEl.addEventListener('click', ()=>{
      panelEl.classList.toggle('abierto');
      miCuentaEl.querySelector('.mi-cuenta-caret').style.transform =
        panelEl.classList.contains('abierto') ? 'rotate(180deg)' : 'rotate(0)';
    });
    document.addEventListener('click', (e)=>{
      if(!cont.contains(e.target)){
        panelEl.classList.remove('abierto');
        miCuentaEl.querySelector('.mi-cuenta-caret').style.transform = 'rotate(0)';
      }
    });

    // Aviso inmediato al cerrar/recargar la pestaña — no depende del TTL de KV
    function salirPresencia(){
      if(!usuario) return;
      const datos = new Blob([JSON.stringify({ usuario })], { type: 'application/json' });
      navigator.sendBeacon(URL_PRESENCIA + '/presencia/salir', datos);
    }
    window.addEventListener('pagehide', salirPresencia);
    window.addEventListener('beforeunload', salirPresencia);
    window._salirPresencia = salirPresencia; // usado también por "Cambiar usuario"

    // ---- Retiro automático por inactividad ----
    // Si dejan la pestaña abierta sin tocar nada (mouse, teclado, scroll, touch)
    // durante INACTIVIDAD_MS, se retira de la lista de "conectados" — así
    // solamente aparece quien de verdad está usando el panel, y de paso se
    // dejan de mandar sync (menos consumo de cuota de KV). En cuanto vuelve a
    // interactuar, se reincorpora en el siguiente ciclo automáticamente.
    const INACTIVIDAD_MS = 5 * 60 * 1000; // 5 minutos
    let ultimaActividad = Date.now();
    let ausente = false;
    ['mousemove','mousedown','keydown','scroll','touchstart','click'].forEach(evt=>{
      document.addEventListener(evt, ()=>{ ultimaActividad = Date.now(); }, { passive: true });
    });

    async function tickPresencia(){
      const inactivo = (Date.now() - ultimaActividad) > INACTIVIDAD_MS;
      if(inactivo){
        if(!ausente){ salirPresencia(); ausente = true; }
        // mientras esté inactivo no se sigue sincronizando (ahorra cuota)
      } else {
        ausente = false;
        await sincronizar();
      }
    }

    tickPresencia();
    setInterval(tickPresencia, 180000); // cada 3 minutos (antes 45s) — cuida la cuota de KV
  }
})();

</script>
