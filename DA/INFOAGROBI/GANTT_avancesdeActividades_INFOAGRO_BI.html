  let METRICAS_VISIBLES_INS = { cant: true, area: true, dosis: true };

  function toggleMetricIns(metric, visible) {
    // Evita quedarse sin ninguna métrica visible (tabla vacía / colspan=0)
    const activasSinEsta = Object.keys(METRICAS_VISIBLES_INS).filter(m => m !== metric && METRICAS_VISIBLES_INS[m]);
    if(!visible && activasSinEsta.length === 0) {
      document.querySelector(`.metric-toggle-chip input[onchange*="'${metric}'"]`).checked = true;
      return;
    }
    METRICAS_VISIBLES_INS[metric] = visible;
    renderMatrixIns();
  }

  function avgArr(arr) {
    return arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0;
  }

  function renderMatrixIns() {
    const fFechaTipo = document.getElementById("filterFechaTipoIns").value;
    const hoy = new Date();
    const curYear = hoy.getFullYear();
    const curMonth = hoy.getMonth();

    TOOLTIP_REGISTRY_INS = {};

    function pasaFecha(r) {
      if(fFechaTipo === "all" || !r.fecha) return true;
      const parts = r.fecha.split("-");
      if(parts.length !== 3) return true;
      const rYear = parseInt(parts[0], 10);
      const rMonth = parseInt(parts[1], 10) - 1;
      if(fFechaTipo === "este_mes") return (rYear === curYear && rMonth === curMonth);
      if(fFechaTipo === "mes_pasado") {
        let targetMonth = curMonth - 1; let targetYear = curYear;
        if(targetMonth < 0) { targetMonth = 11; targetYear--; }
        return (rYear === targetYear && rMonth === targetMonth);
      }
      if(fFechaTipo === "ano_curso") return rYear === curYear;
      if(fFechaTipo === "personalizada") {
        const desde = document.getElementById("filterFechaDesdeIns").value;
        const hasta = document.getElementById("filterFechaHastaIns").value;
        if(desde && r.fecha < desde) return false;
        if(hasta && r.fecha > hasta) return false;
        return true;
      }
      return true;
    }

    const filtered = DB_INSUMOS.filter(r => {
      if (r.compaia !== COMPAIA_SELECCIONADA) return false;
      for (let prop in SELECCIONES_INS) {
        if (SELECCIONES_INS[prop].length > 0 && !SELECCIONES_INS[prop].includes(r[prop])) return false;
      }
      return pasaFecha(r);
    });

    // Combustible respeta Sector / Ciclo / Finca. Si el usuario filtra por Categoría, Producto o Lote
    // (filtros propios de Insumos, sin sentido para Combustible), se oculta el bloque por completo
    // en vez de mostrarlo sin filtrar — eso es lo que generaba el comportamiento "errático".
    const filtrosInsumoEspecificosActivos = SELECCIONES_INS.categoria.length > 0 || SELECCIONES_INS.producto.length > 0 || SELECCIONES_INS.lote.length > 0;
    const filteredCombustible = filtrosInsumoEspecificosActivos ? [] : DB_COMBUSTIBLE.filter(r => {
      if (r.compaia !== COMPAIA_SELECCIONADA) return false;
      if (SELECCIONES_INS.sector.length > 0 && !SELECCIONES_INS.sector.includes(r.sector)) return false;
      if (SELECCIONES_INS.ciclo.length > 0 && !SELECCIONES_INS.ciclo.includes(r.ciclo)) return false;
      if (SELECCIONES_INS.finca.length > 0 && !SELECCIONES_INS.finca.includes(r.finca)) return false;
      return pasaFecha(r);
    });

    document.getElementById("recordCounterIns").textContent = `${filtered.length + filteredCombustible.length} movimientos coincidentes`;

    const container = document.getElementById("matrixContainerIns");

    let warningHtml = "";
    if(INSUMOS_LOAD_ERROR) {
      warningHtml += `<div class="alert alert-danger d-flex justify-content-between align-items-center m-2" style="font-size:12px;">
        <span>⚠️ No se pudo cargar <strong>Consumo de Insumos</strong> (fallo de red/worker). La tabla de abajo puede estar incompleta.</span>
        <button class="btn-organic-action" style="background:var(--grad-naranja);" onclick="INSUMOS_LOAD_ERROR=false; loadDataInsumos();">↻ Reintentar</button>
      </div>`;
    }
    if(COMBUSTIBLE_LOAD_ERROR) {
      warningHtml += `<div class="alert alert-danger d-flex justify-content-between align-items-center m-2" style="font-size:12px;">
        <span>⚠️ No se pudo cargar <strong>Combustible</strong> (fallo de red/worker). La tabla de abajo puede estar incompleta.</span>
        <button class="btn-organic-action" style="background:var(--grad-naranja);" onclick="COMBUSTIBLE_LOAD_ERROR=false; loadDataCombustible().then(renderMatrixIns);">↻ Reintentar</button>
      </div>`;
    }
    if(filtrosInsumoEspecificosActivos && DB_COMBUSTIBLE.length) {
      warningHtml += `<div class="alert alert-warning m-2" style="font-size:12px;">
        ℹ️ Ocultando <strong>Combustible</strong> mientras haya un filtro de Categoría, Producto o Lote activo (no aplican a ese origen). Límpialos para volver a verlo.
      </div>`;
    }

    if(!filtered.length && !filteredCombustible.length) {
      container.innerHTML = warningHtml + `<div class="p-4 text-center text-muted fw-medium">Sin datos coincidentes para los criterios seleccionados.</div>`;
      return;
    }

    const fincas = [...new Set([...filtered.map(r => r.finca), ...filteredCombustible.map(r => r.finca)])].filter(Boolean).sort();

    // Construir árbol: ciclo -> categoria -> producto -> { um, fincaData:{}, totalCant, totalArea, allDosis:[] }
    const tree = {};
    const catTotals = {};

    function addTooltip(cellKey, item) {
      if(!TOOLTIP_REGISTRY_INS[cellKey]) TOOLTIP_REGISTRY_INS[cellKey] = [];
      TOOLTIP_REGISTRY_INS[cellKey].push(item);
    }

    filtered.forEach(r => {
      const ciclo = r.ciclo || "Sin Ciclo";
      const cat = r.categoria || "Sin Categoría";
      const prod = r.producto || "Sin Producto";
      if(!tree[ciclo]) tree[ciclo] = {};
      if(!tree[ciclo][cat]) tree[ciclo][cat] = {};
      if(!tree[ciclo][cat][prod]) tree[ciclo][cat][prod] = { um: r.um, fincaData: {}, totalCant: 0, totalArea: 0, allDosis: [] };
      const node = tree[ciclo][cat][prod];
      if(!node.fincaData[r.finca]) node.fincaData[r.finca] = { cant: 0, area: 0, dosisVals: [] };
      node.fincaData[r.finca].cant += r.cantidad;
      node.fincaData[r.finca].area += r.area;
      if(r.dosis) node.fincaData[r.finca].dosisVals.push(r.dosis);
      node.totalCant += r.cantidad;
      node.totalArea += r.area;
      if(r.dosis) node.allDosis.push(r.dosis);

      const item = { orden: r.orden, actividad: r.actividad, lote: r.lote, sector: r.sector, finca: r.finca, cantidad: r.cantidad, area: r.area, dosis: r.dosis, um: r.um };
      addTooltip(`${ciclo}|||${cat}|||${prod}|||${r.finca}`, item);
      addTooltip(`${ciclo}|||${cat}|||${prod}|||__TOTAL__`, item);

      // Rollup de categoría — usado para la fila de Subtotal (ej. Semilla, donde varios SKU son equivalentes)
      const catKey = `${ciclo}|||${cat}`;
      if(!catTotals[catKey]) catTotals[catKey] = { fincaData: {}, totalCant: 0, totalArea: 0, allDosis: [] };
      const ct = catTotals[catKey];
      if(!ct.fincaData[r.finca]) ct.fincaData[r.finca] = { cant: 0, area: 0, dosisVals: [] };
      ct.fincaData[r.finca].cant += r.cantidad;
      ct.fincaData[r.finca].area += r.area;
      if(r.dosis) ct.fincaData[r.finca].dosisVals.push(r.dosis);
      ct.totalCant += r.cantidad;
      ct.totalArea += r.area;
      if(r.dosis) ct.allDosis.push(r.dosis);

      addTooltip(`${ciclo}|||${cat}|||__SUBTOTAL__|||${r.finca}`, item);
      addTooltip(`${ciclo}|||${cat}|||__SUBTOTAL__|||__TOTAL__`, item);
    });

    // ----- Combustible: Cantidad real (Litros); Área tomada del modelo de Avance por Ciclo+Finca+Actividad -----
    const CAT_COMBUSTIBLE = "Combustible";
    const fincasVistasPorProd = {}; // evita sumar el Área más de una vez por finca (viene de un índice, no de un acumulado)
    filteredCombustible.forEach(r => {
      const ciclo = r.ciclo || "Sin Ciclo";
      const cat = CAT_COMBUSTIBLE;
      const prod = r.actividad || "Sin Actividad";
      if(!tree[ciclo]) tree[ciclo] = {};
      if(!tree[ciclo][cat]) tree[ciclo][cat] = {};
      if(!tree[ciclo][cat][prod]) tree[ciclo][cat][prod] = { um: "Litros", fincaData: {}, totalCant: 0, totalArea: 0, allDosis: [] };
      const node = tree[ciclo][cat][prod];
      const areaKey = `${r.compaia}|||${ciclo}|||${r.finca}|||${prod}`;
      const areaVal = AREA_INDEX[areaKey] || 0;
      const vistoKey = `${ciclo}|||${prod}|||${r.finca}`;

      if(!node.fincaData[r.finca]) {
        node.fincaData[r.finca] = { cant: 0, area: 0, dosisVals: [] };
      }
      if(!fincasVistasPorProd[vistoKey]) {
        fincasVistasPorProd[vistoKey] = true;
        node.fincaData[r.finca].area = areaVal;
        node.totalArea += areaVal;
      }
      node.fincaData[r.finca].cant += r.cantidad;
      node.totalCant += r.cantidad;

      const item = { orden: r.reporte, actividad: prod, lote: "—", sector: r.sector, finca: r.finca, cantidad: r.cantidad, area: areaVal, dosis: 0, um: "Litros" };
      addTooltip(`${ciclo}|||${cat}|||${prod}|||${r.finca}`, item);
      addTooltip(`${ciclo}|||${cat}|||${prod}|||__TOTAL__`, item);
    });
    // Dosis de Combustible = Cantidad / Área (no hay campo propio como en Insumos)
    Object.keys(tree).forEach(ciclo => {
      if(!tree[ciclo][CAT_COMBUSTIBLE]) return;
      Object.keys(tree[ciclo][CAT_COMBUSTIBLE]).forEach(prod => {
        const node = tree[ciclo][CAT_COMBUSTIBLE][prod];
        Object.keys(node.fincaData).forEach(f => {
          const fd = node.fincaData[f];
          fd.dosisVals = fd.area > 0 ? [fd.cant / fd.area] : [];
        });
        node.allDosis = node.totalArea > 0 ? [node.totalCant / node.totalArea] : [];
      });
    });

    const ciclosKeys = Object.keys(tree).sort();
    LAST_TREE_KEYS_INS = { ciclos: [...ciclosKeys], cats: [] };
    ciclosKeys.forEach(ciclo => {
      Object.keys(tree[ciclo]).sort().forEach(cat => {
        LAST_TREE_KEYS_INS.cats.push(`${ciclo}|||${cat}`);
      });
    });

    // Categorías que agrupan SKUs equivalentes y por eso llevan fila de Subtotal
    const CATEGORIAS_CON_SUBTOTAL = ["semilla"];
    // Combustible se dibuja siempre al final de cada Ciclo, con una fila separadora antes
    function ordenarCategorias(ciclo) {
      const cats = Object.keys(tree[ciclo]);
      const normales = cats.filter(c => c !== CAT_COMBUSTIBLE).sort();
      const conCombustible = cats.includes(CAT_COMBUSTIBLE) ? [...normales, CAT_COMBUSTIBLE] : normales;
      return conCombustible;
    }

    const METRIC_DEFS = [
      { key: "cant", headerShort: "Cant.<br>Gastada", totalLabel: "Total<br>Cant. Gastada", cls: "col-m-cant", totalCls: "col-total-cant" },
      { key: "area", headerShort: "Área Mzn<br>aplicada", totalLabel: "Total<br>Área Mzn aplicada", cls: "col-m-area", totalCls: "col-total-area" },
      { key: "dosis", headerShort: "Dosis x Mzn", totalLabel: "Total<br>Dosis x Mzn", cls: "col-m-dosis", totalCls: "col-total-dosis" }
    ];
    const metricasActivas = METRIC_DEFS.filter(m => METRICAS_VISIBLES_INS[m.key]);
    const nMetricas = metricasActivas.length;

    let html = `<table class="pivot-gantt pivot-insumos"><thead>`;
    html += `<tr class="main-hdr-row">`;
    html += `<th class="col-tree-sticky c1" rowspan="2">Ciclo</th>`;
    html += `<th class="col-tree-sticky c2" rowspan="2">Categoría Insumo</th>`;
    html += `<th class="col-tree-sticky c3" rowspan="2">Producto Utilizado</th>`;
    html += `<th class="col-tree-sticky c4" rowspan="2">UM</th>`;
    fincas.forEach(f => {
      html += `<th colspan="${nMetricas}" class="finca-group-hdr">${escHtml(f)}</th>`;
    });
    metricasActivas.forEach(m => {
      html += `<th class="${m.cls} ${m.totalCls}" rowspan="2">${m.totalLabel}</th>`;
    });
    html += `</tr><tr class="sub-hdr-row">`;
    fincas.forEach(() => {
      metricasActivas.forEach(m => {
        html += `<th class="${m.cls}">${m.headerShort}</th>`;
      });
    });
    html += `</tr></thead><tbody>`;

    function celda(popupIdBase, cant, area, dosisVals, isTotal) {
      const vals = { cant, area, dosis: avgArr(dosisVals) };
      const isBlank = (cant === 0 && area === 0 && !dosisVals.length);
      const safeId = escHtml(popupIdBase);
      let out = "";
      metricasActivas.forEach(m => {
        const cls = isTotal ? `${m.cls} ${m.totalCls}` : m.cls;
        if(isBlank) {
          out += `<td class="${cls}" style="color:#cbd5e1;">-</td>`;
        } else {
          out += `<td class="${cls}"><div class="cell-interactive" data-popup-id="${safeId}"><div class="mzn-badge-container">${vals[m.key].toFixed(2)}</div></div></td>`;
        }
      });
      return out;
    }

    function metricasDe(ciclo, cat, prodOSubtotal, node, esSubtotal) {
      const prefix = esSubtotal ? `${ciclo}|||${cat}|||__SUBTOTAL__` : `${ciclo}|||${cat}|||${prodOSubtotal}`;
      let out = "";
      fincas.forEach(f => {
        const fd = node.fincaData[f];
        out += fd ? celda(`${prefix}|||${f}`, fd.cant, fd.area, fd.dosisVals, false) : celda("", 0, 0, [], false);
      });
      out += celda(`${prefix}|||__TOTAL__`, node.totalCant, node.totalArea, node.allDosis, true);
      return out;
    }

    function metricasBlancas() {
      let out = "";
      fincas.forEach(() => { out += celda("", 0, 0, [], false); });
      out += celda("", 0, 0, [], true);
      return out;
    }

    ciclosKeys.forEach(ciclo => {
      const cicloCollapsed = COLLAPSED_CICLOS_INS.has(ciclo);

      if(cicloCollapsed) {
        html += `<tr class="tree-row-ciclo">
                   <td class="col-tree-sticky c1"><span class="tree-toggle tree-toggle-ciclo" data-ciclo="${escHtml(ciclo)}">▸ ${escHtml(ciclo)}</span></td>
                   <td class="col-tree-sticky c2"></td>
                   <td class="col-tree-sticky c3" colspan="2">(colapsado)</td>
                   ${metricasBlancas()}
                 </tr>`;
        return;
      }

      // ----- Prepaso: construir filas del bloque de Insumos (para calcular rowspan del Ciclo) -----
      const catsOrdenadas = ordenarCategorias(ciclo).filter(c => c !== CAT_COMBUSTIBLE);
      const filasInsumos = [];
      catsOrdenadas.forEach(cat => {
        const catKey = `${ciclo}|||${cat}`;
        const catCollapsed = COLLAPSED_CATS_INS.has(catKey);
        const hasSubtotal = CATEGORIAS_CON_SUBTOTAL.includes(cat.toLowerCase());
        if(catCollapsed) {
          filasInsumos.push({ type: "cat-collapsed", cat, catKey, hasSubtotal });
          return;
        }
        const prods = Object.keys(tree[ciclo][cat]).sort();
        const catRowspan = prods.length + (hasSubtotal ? 1 : 0);
        prods.forEach((prod, idx) => {
          filasInsumos.push({ type: "leaf", cat, catKey, prod, node: tree[ciclo][cat][prod], firstOfCat: idx === 0, catRowspan });
        });
        if(hasSubtotal && catTotals[catKey]) {
          filasInsumos.push({ type: "subtotal", cat, catKey, node: catTotals[catKey] });
        }
      });

      const cicloRowspan = Math.max(filasInsumos.length, 1); // ya no se usa para rowspan, pero se mantiene por si acaso

      filasInsumos.forEach((row, i) => {
        html += `<tr class="tree-row-${row.type === 'leaf' ? 'leaf' : (row.type === 'subtotal' ? 'subtotal' : 'categoria')}">`;
        // Ciclo se repite en cada fila (sin rowspan) igual que en el bloque de Combustible
        html += `<td class="col-tree-sticky c1">${escHtml(ciclo)}</td>`;
        if(row.type === "cat-collapsed") {
          html += `<td class="col-tree-sticky c2"><span class="tree-toggle tree-toggle-cat" data-key="${escHtml(row.catKey)}">▸ ${escHtml(row.cat)}</span></td>`;
          html += `<td class="col-tree-sticky c3" colspan="2">(colapsado)</td>`;
          if(row.hasSubtotal && catTotals[row.catKey]) {
            html += metricasDe(ciclo, row.cat, null, catTotals[row.catKey], true);
          } else {
            html += metricasBlancas();
          }
        } else if(row.type === "leaf") {
          // Categoría se repite en cada fila de hoja (sin rowspan)
          const catToggle = row.firstOfCat
            ? `<span class="tree-toggle tree-toggle-cat" data-key="${escHtml(row.catKey)}">▾ ${escHtml(row.cat)}</span>`
            : escHtml(row.cat);
          html += `<td class="col-tree-sticky c2">${catToggle}</td>`;
          html += `<td class="col-tree-sticky c3">${escHtml(row.prod)}</td><td class="col-tree-sticky c4">${escHtml(row.node.um)}</td>`;
          html += metricasDe(ciclo, row.cat, row.prod, row.node, false);
        } else if(row.type === "subtotal") {
          html += `<td class="col-tree-sticky c2">${escHtml(row.cat)}</td>`;
          html += `<td class="col-tree-sticky c3" colspan="2">Subtotal ${escHtml(row.cat)}</td>`;
          html += metricasDe(ciclo, row.cat, null, row.node, true);
        }
        html += `</tr>`;
      });

      // ----- Bloque Combustible (si existe para este ciclo) -----
      if(tree[ciclo][CAT_COMBUSTIBLE]) {
        const catKey = `${ciclo}|||${CAT_COMBUSTIBLE}`;
        const catCollapsed = COLLAPSED_CATS_INS.has(catKey);

        html += `<tr class="tree-row-spacer"><td class="col-tree-sticky c1"></td><td class="col-tree-sticky c2"></td><td class="col-tree-sticky c3" colspan="2"></td>${metricasBlancas()}</tr>`;

        if(catCollapsed) {
          html += `<tr class="tree-row-categoria">
                     <td class="col-tree-sticky c1">${escHtml(ciclo)}</td>
                     <td class="col-tree-sticky c2"><span class="tree-toggle tree-toggle-cat" data-key="${escHtml(catKey)}">▸ ${escHtml(CAT_COMBUSTIBLE)}</span></td>
                     <td class="col-tree-sticky c3" colspan="2">(colapsado)</td>
                     ${metricasBlancas()}
                   </tr>`;
        } else {
          const prods = Object.keys(tree[ciclo][CAT_COMBUSTIBLE]).sort();
          prods.forEach((prod, idx) => {
            const node = tree[ciclo][CAT_COMBUSTIBLE][prod];
            html += `<tr class="tree-row-leaf">
                       <td class="col-tree-sticky c1">${escHtml(ciclo)}</td>
                       ${idx === 0 ? `<td class="col-tree-sticky c2" rowspan="${prods.length}"><span class="tree-toggle tree-toggle-cat" data-key="${escHtml(catKey)}">▾ ${escHtml(CAT_COMBUSTIBLE)}</span></td>` : ''}
                       <td class="col-tree-sticky c3">${escHtml(prod)}</td>
                       <td class="col-tree-sticky c4">${escHtml(node.um)}</td>
                       ${metricasDe(ciclo, CAT_COMBUSTIBLE, prod, node, false)}
                     </tr>`;
          });
        }
      }

      html += `<tr class="tree-row-fin"><td class="col-tree-sticky c1" colspan="4">Fin ${escHtml(ciclo)}</td>${metricasBlancas()}</tr>`;
    });

    html += `</tbody></table>`;
    container.innerHTML = warningHtml + html;

    container.querySelectorAll(".tree-toggle-ciclo").forEach(el => {
      el.addEventListener("click", () => toggleCicloIns(el.getAttribute("data-ciclo")));
    });
    container.querySelectorAll(".tree-toggle-cat").forEach(el => {
      el.addEventListener("click", () => toggleCategoriaIns(el.getAttribute("data-key")));
    });
    container.querySelectorAll(".cell-interactive").forEach(el => {
      el.addEventListener("click", () => showDetailModalIns(el.getAttribute("data-popup-id")));
    });
  }


  let CURRENT_DETAIL_DATA_INS = [];
  let CURRENT_DETAIL_LABEL_INS = "detalle";

  function showDetailModalIns(key) {
    const dataset = TOOLTIP_REGISTRY_INS[key];
    if (!dataset) return;

    const parts = key.split("|||");
    const ciclo = parts[0], cat = parts[1], prod = parts[2], finca = parts[3];
    const isTotal = finca === "__TOTAL__";
    const isSubtotal = prod === "__SUBTOTAL__";
    const prodLabel = isSubtotal ? `Subtotal ${cat}` : prod;
    const um = dataset[0] ? dataset[0].um : "";

    CURRENT_DETAIL_DATA_INS = dataset;
    CURRENT_DETAIL_LABEL_INS = `${prodLabel}_${isTotal ? 'TODAS_FINCAS' : finca}`;

    document.getElementById("insumoModalTitle").textContent = `Desglose de Consumo — ${prodLabel}${um ? ' (' + um + ')' : ''}`;
    document.getElementById("insumoModalSubtitle").textContent = `${ciclo} · ${cat} · ${isTotal ? "Todas las Fincas" : finca}`;
    document.getElementById("insumoModalCount").textContent = `${dataset.length} movimiento(s)`;

    let html = `<thead><tr>
      <th>Orden</th><th>Sector</th><th>Finca</th><th>Lote</th><th>Actividad</th><th>Cant. Gastada</th><th>UM</th><th>Área Mzn</th><th>Dosis x Mzn</th>
    </tr></thead><tbody>`;
    dataset.forEach(item => {
      html += `<tr>
        <td>#${escHtml(item.orden)}</td>
        <td>${escHtml(item.sector)}</td>
        <td>${escHtml(item.finca)}</td>
        <td>${escHtml(item.lote)}</td>
        <td>${escHtml(item.actividad)}</td>
        <td>${item.cantidad.toFixed(2)}</td>
        <td>${escHtml(item.um)}</td>
        <td>${item.area.toFixed(2)}</td>
        <td>${item.dosis.toFixed(2)}</td>
      </tr>`;
    });
    html += `</tbody>`;
    document.getElementById("insumoModalTable").innerHTML = html;

    document.getElementById("insumoModalOverlay").classList.add("show");
  }

  function hideDetailModalIns() {
    document.getElementById("insumoModalOverlay").classList.remove("show");
  }

  function exportDetailToExcelIns() {
    const table = document.getElementById("insumoModalTable");
    if(!table) return;
    const wb = XLSX.utils.table_to_book(table, { raw: false });
    XLSX.writeFile(wb, `INFOAGRO_DETALLE_${CURRENT_DETAIL_LABEL_INS.replace(/[^a-zA-Z0-9]/g, '_')}.xlsx`);
  }

  // ===================================================================
  // TAB "RESUMEN DE ACTIVIDADES" — tabla plana estilo Excel: una columna por
  // dimensión (Ciclo, Sector, Finca, Lote, Actividad), sumando avance_mzn por
  // combinación única. El orden de columnas se define arrastrando y soltando
  // los encabezados (drag & drop nativo). Subtotales por la primera columna
  // son opcionales (checkbox). Reutiliza DB_RAW (ya cargado por Avance de
  // Actividades) y respeta Compañía/Sector/Ciclo/Finca/Período compartidos —
  // no hace ninguna consulta nueva a Odoo. El export es el ícono general de
  // la toolbar de INFOAGRO BI (usa exportActivo(), no un botón propio aquí).
  // ===================================================================
  const DIMENSIONES_RESUMEN = [
    { valor:'ciclo', etiqueta:'Ciclo' },
    { valor:'sector', etiqueta:'Sector' },
    { valor:'finca', etiqueta:'Finca' },
    { valor:'lote_agricola', etiqueta:'Lote' },
    { valor:'actividad', etiqueta:'Actividad' },
    { valor:'grupo_siembra', etiqueta:'Grupo de Siembra' }
  ];
  let ORDEN_COLUMNAS_RESUMEN = ['ciclo','sector','finca','lote_agricola','actividad']; // orden por defecto (Grupo de Siembra queda disponible para arrastrar, no aparece de entrada
  let _filasResumenActuales = []; // filtro de dimensiones por índice de fila renderizada, usado por el modal de detalle

  // Aplica los mismos filtros COMPARTIDOS que Avance de Actividades (Compañía, Sector,
  // Ciclo, Finca, Actividad) pero NO el filtro de Período — como esta tabla pivotea el
  // avance por mes, tiene más sentido ver siempre el histórico completo y dejar que el
  // propio pivot muestre la evolución mes a mes, en vez de acotar a "Este Mes".
  // Aplica los mismos filtros COMPARTIDOS que Avance de Actividades (Compañía, Sector,
  // Ciclo, Finca, Actividad, Período) — Período es opcional aquí: aunque el pivot ya
  // muestra varios meses a la vez, el usuario puede acotar el rango si lo necesita
  // (ej. "Histórico" para ver todo, o un rango personalizado concreto).
  function datosFiltradosResumen(){
    const fFechaTipo = document.getElementById("filterFechaTipo").value;
    const hoy = new Date();
    const curYear = hoy.getFullYear();
    const curMonth = hoy.getMonth();

    return DB_RAW.filter(r => {
      if (r.compaia !== COMPAIA_SELECCIONADA) return false;
      for (let prop in SELECCIONES) {
        if (SELECCIONES[prop].length > 0 && !SELECCIONES[prop].includes(r[prop])) return false;
      }
      if(fFechaTipo !== "all" && r.fecha) {
        const parts = r.fecha.split("-");
        if(parts.length === 3) {
          const rYear = parseInt(parts[0], 10);
          const rMonth = parseInt(parts[1], 10) - 1;
          if(fFechaTipo === "este_mes") {
            if(rYear !== curYear || rMonth !== curMonth) return false;
          } else if(fFechaTipo === "mes_pasado") {
            let targetMonth = curMonth - 1; let targetYear = curYear;
            if(targetMonth < 0) { targetMonth = 11; targetYear--; }
            if(rYear !== targetYear || rMonth !== targetMonth) return false;
          } else if(fFechaTipo === "ano_curso") {
            if(rYear !== curYear) return false;
          } else if(fFechaTipo === "personalizada") {
            const desde = document.getElementById("filterFechaDesde").value;
            const hasta = document.getElementById("filterFechaHasta").value;
            if(desde && r.fecha < desde) return false;
            if(hasta && r.fecha > hasta) return false;
          }
        }
      }
      return true;
    });
  }

  // Agrupa por la combinación única de TODAS las columnas (en el orden actual) y
  // suma avance_mzn — cada fila resultante es una combinación distinta, no un árbol.
  // Agrupa por la combinación única de las columnas de dimensión + MES (extraído de
  // r.fecha), sumando avance_mzn — cada combinación de dimensiones se convierte en una
  // fila, y cada mes distinto se convierte en una columna (pivot), igual patrón que
  // las matrices de Pluviosidad/Siembra.
  const MESES_CORTOS_RESUMEN = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  function agruparFilasResumen(datos){
    const mapa = new Map();
    const mesesVistos = new Set();
    datos.forEach(r=>{
      const valores = ORDEN_COLUMNAS_RESUMEN.map(col => r[col] || 'Sin dato');
      const clave = valores.join('|||');
      let mesClave = 'Sin fecha';
      if(r.fecha){
        const partes = r.fecha.split('-');
        if(partes.length===3){
          mesClave = `${MESES_CORTOS_RESUMEN[parseInt(partes[1],10)-1]} ${partes[0]}`;
        }
      }
      mesesVistos.add(mesClave);
      if(!mapa.has(clave)) mapa.set(clave, { valores, porMes:{}, total:0 });
      const fila = mapa.get(clave);
      fila.porMes[mesClave] = (fila.porMes[mesClave]||0) + (r.avance || 0);
      fila.total += (r.avance || 0);
    });
    // Orden cronológico real de meses (no alfabético) para las columnas del pivot
    const mesesOrdenados = Array.from(mesesVistos).sort((a,b)=>{
      if(a==='Sin fecha') return 1; if(b==='Sin fecha') return -1;
      const [ma,ya] = a.split(' '); const [mb,yb] = b.split(' ');
      const ia = MESES_CORTOS_RESUMEN.indexOf(ma), ib = MESES_CORTOS_RESUMEN.indexOf(mb);
      return (parseInt(ya,10)*12+ia) - (parseInt(yb,10)*12+ib);
    });
    const filas = Array.from(mapa.values()).sort((a,b)=>{
      for(let i=0;i<a.valores.length;i++){
        const cmp = String(a.valores[i]).localeCompare(String(b.valores[i]));
        if(cmp !== 0) return cmp;
      }
      return 0;
    });
    return { filas, mesesOrdenados };
  }

  // Columna(s) de dimensión marcadas para subtotal — se activan/desactivan con clic
  // derecho sobre el encabezado correspondiente (en vez de un checkbox global fijo
  // a la primera columna).
  let COLUMNAS_SUBTOTAL_RESUMEN = new Set();

  function renderResumenActividades(){
    const datos = datosFiltradosResumen();
    const cont = document.getElementById('matrixContainerResumen');
    document.getElementById('recordCounterResumen').textContent = `${datos.length} operaciones coincidentes`;

    if(!datos.length){
      cont.innerHTML = `<div class="alert alert-light text-center m-3">Sin datos para los filtros seleccionados.</div>`;
      return;
    }

    const { filas, mesesOrdenados } = agruparFilasResumen(datos);
    const totalGeneral = datos.reduce((a,r)=>a+(r.avance||0), 0);
    const totalesPorMes = {};
    mesesOrdenados.forEach(m=>{ totalesPorMes[m] = filas.reduce((a,f)=>a+(f.porMes[m]||0),0); });

    const encabezados = ORDEN_COLUMNAS_RESUMEN.map((col, idx) => {
      const etiqueta = DIMENSIONES_RESUMEN.find(d=>d.valor===col).etiqueta;
      const marcada = COLUMNAS_SUBTOTAL_RESUMEN.has(col);
      return `<th draggable="true" data-col="${col}" data-idx="${idx}"
        ondragstart="dragStartColResumen(event)" ondragover="dragOverColResumen(event)"
        ondrop="dropColResumen(event)" ondragend="dragEndColResumen(event)"
        oncontextmenu="return toggleSubtotalColResumen(event, '${col}')"
        class="th-arrastrable ${marcada?'th-subtotal-activo':''}" title="Arrastra para reordenar · clic derecho para subtotal">
        <span class="th-drag-handle">⠿</span> ${etiqueta}${marcada?' <span class="th-subtotal-badge">Σ</span>':''}
        ${ORDEN_COLUMNAS_RESUMEN.length>1 ? `<span class="th-quitar-col" onclick="event.stopPropagation(); quitarColResumen('${col}')" title="Quitar columna">✕</span>` : ''}
      </th>`;
    }).join('');
    const encabezadosMes = mesesOrdenados.map(m => `<th class="text-end">${m}</th>`).join('');

    // Refresca el selector "+ Agregar columna" con las dimensiones que aún no están
    // visibles en la tabla (así "Grupo de Siembra" y cualquier columna quitada
    // manualmente quedan disponibles para volver a agregarlas).
    const selAgregar = document.getElementById('selAgregarColResumen');
    const disponibles = DIMENSIONES_RESUMEN.filter(d => !ORDEN_COLUMNAS_RESUMEN.includes(d.valor));
    selAgregar.innerHTML = '<option value="">+ Agregar columna...</option>' +
      disponibles.map(d => `<option value="${d.valor}">${d.etiqueta}</option>`).join('');

    _filasResumenActuales = [];
    function pintarFila(fila, indent){
      const celdasMes = mesesOrdenados.map(m => `<td class="text-end">${fila.porMes[m] ? fila.porMes[m].toFixed(1) : ''}</td>`).join('');
      const primeraCelda = `<td style="padding-left:${12+indent}px;">${fila.valores[0]}</td>`;
      const restoCeldas = fila.valores.slice(1).map(v=>`<td>${v}</td>`).join('');
      const idxFila = _filasResumenActuales.length;
      _filasResumenActuales.push(ORDEN_COLUMNAS_RESUMEN.reduce((acc,col,i)=>{ acc[col]=fila.valores[i]; return acc; },{}));
      return `<tr class="fila-resumen-clicable" onclick="abrirDetalleFilaResumen(${idxFila})" title="Ver detalle de registros">${primeraCelda}${restoCeldas}${celdasMes}<td class="text-end fw-bold">${fila.total.toFixed(1)}</td></tr>`;
    }

    // Columnas marcadas Σ, en el orden en que aparecen en la tabla actual (izquierda a
    // derecha) — el anidamiento de subtotales sigue ese mismo orden, igual que una
    // tabla dinámica: subtotal de la primera columna marcada por fuera, luego dentro
    // de ese grupo el subtotal de la segunda marcada, y así sucesivamente.
    const idxsSubtotal = ORDEN_COLUMNAS_RESUMEN
      .map((c,i)=>i)
      .filter(i => COLUMNAS_SUBTOTAL_RESUMEN.has(ORDEN_COLUMNAS_RESUMEN[i]));

    let filasHtml = '';

    if(idxsSubtotal.length){
      // Recorre recursivamente: agrupa por el primer nivel marcado, dentro de cada
      // grupo agrupa por el siguiente nivel marcado, y así hasta el último — al final
      // pinta las filas de detalle que quedan dentro del grupo más interno.
      function renderGrupo(filasGrupo, nivelesRestantes, indent){
        if(!nivelesRestantes.length){
          filasGrupo.forEach(fila => { filasHtml += pintarFila(fila, indent); });
          return;
        }
        const [idxActual, ...resto] = nivelesRestantes;
        let grupoActual = null, filasDelGrupo = [];
        const cerrarGrupo = () => {
          if(grupoActual === null) return;
          renderGrupo(filasDelGrupo, resto, indent + 16);
          const subtotalPorMes = {};
          let subtotalGeneral = 0;
          filasDelGrupo.forEach(f=>{
            mesesOrdenados.forEach(m => { subtotalPorMes[m] = (subtotalPorMes[m]||0) + (f.porMes[m]||0); });
            subtotalGeneral += f.total;
          });
          const celdasMes = mesesOrdenados.map(m => `<td class="text-end">${subtotalPorMes[m] ? subtotalPorMes[m].toFixed(1) : ''}</td>`).join('');
          const etiquetaCol = DIMENSIONES_RESUMEN.find(d=>d.valor===ORDEN_COLUMNAS_RESUMEN[idxActual]).etiqueta;
          filasHtml += `<tr class="fila-resumen-subtotal">
            <td colspan="${ORDEN_COLUMNAS_RESUMEN.length}" style="padding-left:${12+indent}px;">Subtotal ${etiquetaCol} — ${grupoActual}</td>
            ${celdasMes}
            <td class="text-end">${subtotalGeneral.toFixed(1)}</td>
          </tr>`;
        };
        filasGrupo.forEach(fila=>{
          const valorAgrupador = fila.valores[idxActual];
          if(valorAgrupador !== grupoActual){
            cerrarGrupo();
            grupoActual = valorAgrupador; filasDelGrupo = [];
          }
          filasDelGrupo.push(fila);
        });
        cerrarGrupo();
      }
      renderGrupo(filas, idxsSubtotal, 0);
    } else {
      filas.forEach(fila => { filasHtml += pintarFila(fila, 0); });
    }

    const celdasTotalMes = mesesOrdenados.map(m => `<td class="text-end">${totalesPorMes[m].toFixed(1)}</td>`).join('');

    cont.innerHTML = `
      <table class="pivot-gantt table-resumen-actividades">
        <thead>
          <tr>
            ${encabezados}
            ${encabezadosMes}
            <th class="text-end">Total (mz)</th>
          </tr>
        </thead>
        <tbody>
          ${filasHtml}
          <tr class="fila-resumen-total">
            <td colspan="${ORDEN_COLUMNAS_RESUMEN.length}">TOTAL GENERAL</td>
            ${celdasTotalMes}
            <td class="text-end">${totalGeneral.toFixed(1)}</td>
          </tr>
        </tbody>
      </table>`;
  }

  // Clic derecho en un encabezado de dimensión activa/desactiva el subtotal por esa
  // columna — devuelve false para evitar que el navegador abra su menú contextual.
  window.toggleSubtotalColResumen = function(ev, col){
    ev.preventDefault();
    if(COLUMNAS_SUBTOTAL_RESUMEN.has(col)) COLUMNAS_SUBTOTAL_RESUMEN.delete(col);
    else COLUMNAS_SUBTOTAL_RESUMEN.add(col);
    renderResumenActividades();
    return false;
  };

  window.agregarColResumen = function(col){
    if(!col || ORDEN_COLUMNAS_RESUMEN.includes(col)) return;
    ORDEN_COLUMNAS_RESUMEN.push(col);
    renderResumenActividades();
  };
  window.quitarColResumen = function(col){
    ORDEN_COLUMNAS_RESUMEN = ORDEN_COLUMNAS_RESUMEN.filter(c => c !== col);
    COLUMNAS_SUBTOTAL_RESUMEN.delete(col);
    renderResumenActividades();
  };

  const MESES_NOMBRE_LARGO_RESUMEN = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  function formatoFechaResumen(fechaStr){
    if(!fechaStr) return '—';
    const p = fechaStr.split('-');
    if(p.length!==3) return fechaStr;
    return `${p[2]}-${MESES_NOMBRE_LARGO_RESUMEN[parseInt(p[1],10)-1].slice(0,3)}-${p[0]}`;
  }

  // Abre un modal con el detalle de TODOS los registros individuales (Orden de Trabajo,
  // Fecha, Avance, etc.) que componen una fila del Resumen — filtra sobre los mismos
  // datos ya acotados por Compañía/Período/Sector/Ciclo/Finca/Actividad (datosFiltradosResumen),
  // y además por la combinación exacta de columnas visibles en esa fila específica.
  window.abrirDetalleFilaResumen = function(idxFila){
    const filtroCombinacion = _filasResumenActuales[idxFila];
    if(!filtroCombinacion) return;
    const base = datosFiltradosResumen();
    const registros = base.filter(r => {
      return Object.keys(filtroCombinacion).every(col => (r[col] || 'Sin dato') === filtroCombinacion[col]);
    }).sort((a,b) => (a.fecha||'').localeCompare(b.fecha||''));

    const tituloPartes = Object.keys(filtroCombinacion).map(col => {
      const etiqueta = DIMENSIONES_RESUMEN.find(d=>d.valor===col)?.etiqueta || col;
      return `<span class="detalle-modal-chip"><b>${etiqueta}:</b> ${filtroCombinacion[col]}</span>`;
    }).join('');

    const totalAvance = registros.reduce((a,r)=>a+(r.avance||0),0);

    const filasTabla = registros.map(r => `
      <tr>
        <td>${r.orden}</td>
        <td>${formatoFechaResumen(r.fecha)}</td>
        <td class="text-end fw-bold">${(r.avance||0).toFixed(1)}</td>
        <td>${r.proveedor}</td>
        <td>${r.compaia}</td>
      </tr>`).join('');

    const modalHtml = `
      <div class="detalle-modal-overlay" id="detalleModalResumenOverlay" onclick="if(event.target===this) cerrarDetalleFilaResumen()">
        <div class="detalle-modal-caja">
          <div class="detalle-modal-header">
            <div>
              <div class="detalle-modal-titulo">Detalle de registros</div>
              <div class="detalle-modal-chips">${tituloPartes}</div>
            </div>
            <button class="detalle-modal-cerrar" onclick="cerrarDetalleFilaResumen()">✕</button>
          </div>
          <div class="detalle-modal-body">
            <table class="detalle-modal-tabla">
              <thead>
                <tr>
                  <th>Orden de Trabajo</th>
                  <th>Fecha</th>
                  <th class="text-end">Avance (mz)</th>
                  <th>Proveedor</th>
                  <th>Compañía</th>
                </tr>
              </thead>
              <tbody>${filasTabla}</tbody>
              <tfoot>
                <tr>
                  <td colspan="2" class="fw-bold">TOTAL (${registros.length} registro${registros.length!==1?'s':''})</td>
                  <td class="text-end fw-bold">${totalAvance.toFixed(1)}</td>
                  <td colspan="2"></td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      </div>`;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
  };
  window.cerrarDetalleFilaResumen = function(){
    const overlay = document.getElementById('detalleModalResumenOverlay');
    if(overlay) overlay.remove();
  };

  // ---- Drag & drop de columnas (nativo HTML5) ----
  let _colArrastrada = null;
  window.dragStartColResumen = function(ev){
    _colArrastrada = ev.currentTarget.getAttribute('data-col');
    ev.currentTarget.classList.add('th-arrastrando');
    ev.dataTransfer.effectAllowed = 'move';
  };
  window.dragOverColResumen = function(ev){
    ev.preventDefault();
    ev.currentTarget.classList.add('th-drop-target');
  };
  window.dragEndColResumen = function(ev){
    document.querySelectorAll('.th-arrastrable').forEach(th=>th.classList.remove('th-arrastrando','th-drop-target'));
  };
  window.dropColResumen = function(ev){
    ev.preventDefault();
    const colDestino = ev.currentTarget.getAttribute('data-col');
    document.querySelectorAll('.th-arrastrable').forEach(th=>th.classList.remove('th-arrastrando','th-drop-target'));
    if(!_colArrastrada || _colArrastrada === colDestino) return;

    const idxOrigen = ORDEN_COLUMNAS_RESUMEN.indexOf(_colArrastrada);
    const idxDestino = ORDEN_COLUMNAS_RESUMEN.indexOf(colDestino);
    ORDEN_COLUMNAS_RESUMEN.splice(idxOrigen, 1);
    ORDEN_COLUMNAS_RESUMEN.splice(idxDestino, 0, _colArrastrada);
    _colArrastrada = null;
    renderResumenActividades();
  };

  function exportPivotToExcelIns() {
    const table = document.querySelector("#matrixContainerIns table.pivot-gantt");
    if(!table) return;
    const wb = XLSX.utils.table_to_book(table, { raw: false });
    XLSX.writeFile(wb, `INFOAGRO_CONSUMO_INSUMOS_${COMPAIA_SELECCIONADA.replace(/ /g, '_')}.xlsx`);
  }

  function closeAllDropdowns() {
    document.querySelectorAll(".ms-panel").forEach(d => d.classList.remove("show"));
  }

  function toggleFechaInputs() {
    const tipo = document.getElementById("filterFechaTipo").value;
    document.getElementById("customDateInputs").style.display = (tipo === "personalizada") ? "flex" : "none";
    construirFiltrosGantt();
    renderMatrix();
    if(document.getElementById('tabPanelResumen').style.display !== 'none') renderResumenActividades();
    checkGlobalClearVisibility();
  }

  function onCustomDateChange() {
    construirFiltrosGantt();
    renderMatrix();
    if(document.getElementById('tabPanelResumen').style.display !== 'none') renderResumenActividades();
    checkGlobalClearVisibility();
  }

  function checkGlobalClearVisibility() {
    // El botón "Limpiar filtros" de la toolbar unificada (🧹) siempre está visible —
    // ya no se oculta/muestra condicionalmente como antes (btnGlobalClear ya no existe).
  }

  function renderMatrix() {
    const fFechaTipo = document.getElementById("filterFechaTipo").value;
    const orderMode = document.getElementById("pivotGroupingOrder").value;
    const hoy = new Date();
    const curYear = hoy.getFullYear();
    const curMonth = hoy.getMonth();

    TOOLTIP_REGISTRY = {};

    const filtered = DB_RAW.filter(r => {
      if (r.compaia !== COMPAIA_SELECCIONADA) return false;

      for (let prop in SELECCIONES) {
        if (SELECCIONES[prop].length > 0 && !SELECCIONES[prop].includes(r[prop])) return false;
      }

      if(fFechaTipo !== "all" && r.fecha) {
        const parts = r.fecha.split("-");
        if(parts.length === 3) {
          const rYear = parseInt(parts[0], 10);
          const rMonth = parseInt(parts[1], 10) - 1; 
          if(fFechaTipo === "este_mes") {
            if(rYear !== curYear || rMonth !== curMonth) return false;
          } else if(fFechaTipo === "mes_pasado") {
            let targetMonth = curMonth - 1; let targetYear = curYear;
            if(targetMonth < 0) { targetMonth = 11; targetYear--; }
            if(rYear !== targetYear || rMonth !== targetMonth) return false;
          } else if(fFechaTipo === "ano_curso") {
            if(rYear !== curYear) return false;
          } else if(fFechaTipo === "personalizada") {
            const desde = document.getElementById("filterFechaDesde").value;
            const hasta = document.getElementById("filterFechaHasta").value;
            if(desde && r.fecha < desde) return false;
            if(hasta && r.fecha > hasta) return false;
          }
        }
      }
      return true;
    });

    document.getElementById("recordCounter").textContent = `${filtered.length} operaciones coincidentes`;

    const container = document.getElementById("matrixContainer");
    if(!filtered.length) {
      container.innerHTML = `<div class="p-4 text-center text-muted fw-medium">Sin datos coincidentes para los criterios seleccionados.</div>`;
      return;
    }

    const listaFechasBase = [...new Set(filtered.map(r => r.fecha))].sort();
    const columnasMapeadas = {}; 
    filtered.forEach(r => {
      const key = (orderMode === "finca_actividad") ? `${r.finca}|||${r.actividad}` : `${r.actividad}|||${r.finca}`;
      columnasMapeadas[key] = { 
        padre: (orderMode === "finca_actividad") ? r.finca : r.actividad, 
        hijo: (orderMode === "finca_actividad") ? r.actividad : r.finca 
      };
    });

    const llavesColumnas = Object.keys(columnasMapeadas).sort();
    const matrizValores = {};
    const totalesColumnas = {}; 
    
    llavesColumnas.forEach(colKey => { totalesColumnas[colKey] = 0; });

    filtered.forEach(r => {
      const colKey = (orderMode === "finca_actividad") ? `${r.finca}|||${r.actividad}` : `${r.actividad}|||${r.finca}`;
      if(!matrizValores[r.fecha]) matrizValores[r.fecha] = {};
      matrizValores[r.fecha][colKey] = (matrizValores[r.fecha][colKey] || 0) + r.avance;
      totalesColumnas[colKey] += r.avance;

      const popupId = `pop_${r.fecha}_${colKey.replace(/[^a-zA-Z0-9]/g, '_')}`;
      if(!TOOLTIP_REGISTRY[popupId]) TOOLTIP_REGISTRY[popupId] = [];
      TOOLTIP_REGISTRY[popupId].push({
        orden: r.orden,
        proveedor: r.proveedor,
        ciclo: r.ciclo,          
        lote: r.lote_agricola,
        avance: r.avance
      });
    });

    const bloquesPadre = {};
    llavesColumnas.forEach(k => {
      const p = columnasMapeadas[k].padre;
      bloquesPadre[p] = (bloquesPadre[p] || 0) + 1;
    });

    let html = `<table class="pivot-gantt"><thead><tr class="main-hdr-row">`;
    html += `<th rowspan="3" class="col-fecha-sticky">Fecha</th>`;

    // Renderizar Fila Nivel 1 (Padre)
    Object.keys(bloquesPadre).sort().forEach(padre => {
      html += `<th colspan="${bloquesPadre[padre]}">${padre}</th>`;
    });
    
    html += `</tr><tr class="sub-hdr-row">`;

    // Renderizar Fila Nivel 2 (Hijo - Aquí se evita el recorte del texto)
    llavesColumnas.forEach(k => {
      html += `<th>${columnasMapeadas[k].hijo}</th>`;
    });
    
    html += `</tr><tr class="total-hdr-row">`;
    llavesColumnas.forEach(colKey => {
      const totalCol = totalesColumnas[colKey] || 0;
      html += `<th>${totalCol > 0 ? totalCol.toFixed(1) : '0.0'}</th>`;
    });
    html += `</tr></thead><tbody>`;

    listaFechasBase.forEach(fechaBase => {
      html += `<tr><td class="col-fecha-sticky">${formatToCustomDate(fechaBase)}</td>`;
      llavesColumnas.forEach(colKey => {
        const val = (matrizValores[fechaBase] && matrizValores[fechaBase][colKey]) ? matrizValores[fechaBase][colKey] : 0;
        
        if(val > 0) {
          const pId = `pop_${fechaBase}_${colKey.replace(/[^a-zA-Z0-9]/g, '_')}`;
          html += `<td>
                    <div class="cell-interactive" data-popup-id="${pId}" onmouseenter="showPopup(event)" onmousemove="movePopup(event)" onmouseleave="hidePopup()">
                      <div class="mzn-badge-container">
                        ${val.toFixed(1)}
                      </div>
                    </div>
                   </td>`;
        } else {
          html += `<td style="color:#cbd5e1;">-</td>`;
        }
      });
      html += `</tr>`;
    });

    html += `</tbody></table>`;
    container.innerHTML = html;
  }

  const popupEl = document.getElementById("global-gantt-tooltip");

  function showPopup(e) {
    const key = e.currentTarget.getAttribute("data-popup-id");
    const dataset = TOOLTIP_REGISTRY[key];
    if (!dataset) return;

    let content = `<div class="popup-hdr">Desglose de Operación</div>`;
    dataset.forEach(item => {
      content += `
        <div class="popup-block">
          <div class="popup-item"><span class="p-label">Orden:</span><span class="p-val">#${item.orden}</span></div>
          <div class="popup-item"><span class="p-label">Proveedor:</span><span class="p-val" style="color:#ffffff;">${item.proveedor}</span></div>
          <div class="popup-item"><span class="p-label">Ciclo:</span><span class="p-val">${item.ciclo}</span></div>
          <div class="popup-item"><span class="p-label">Lote:</span><span class="p-val">${item.lote}</span></div>
          <div class="popup-item"><span class="p-label">Avance:</span><span class="p-val" style="color:#4ade80;">${item.avance.toFixed(1)} Mzn</span></div>
        </div>
        ${dataset.length > 1 ? '<hr style="margin:4px 0; opacity:0.1; border-color:#fff;">' : ''}
      `;
    });

    popupEl.innerHTML = content;
    popupEl.style.display = "block";
    movePopup(e);
  }

  function movePopup(e) {
    const width = 320; 
    const height = popupEl.offsetHeight || 120;
    let left = e.clientX - (width / 2);
    let top = e.clientY - height - 12;
    if (left + width > window.innerWidth) left = window.innerWidth - width - 10;
    if (left < 0) left = 10;
    if (top < 0) top = e.clientY + 15;

    popupEl.style.left = left + "px";
    popupEl.style.top = top + "px";
  }

  function hidePopup() { popupEl.style.display = "none"; }

  function exportPivotToExcel() {
    const table = document.querySelector("table.pivot-gantt");
    if(!table) return;
    const wb = XLSX.utils.table_to_book(table, { raw: false });
    XLSX.writeFile(wb, `INFOAGRO_MATRIZ_${COMPAIA_SELECCIONADA.replace(/ /g, '_')}.xlsx`);
  }

  // Ícono de exportar de la toolbar unificada: exporta la tabla de la pestaña visible.
  function exportActivo() {
    const esActividades = document.getElementById('tabPanelActividades').style.display !== 'none';
    const esInsumos = document.getElementById('tabPanelInsumos').style.display !== 'none';
    if(esActividades) exportPivotToExcel();
    else if(esInsumos) exportPivotToExcelIns();
    else {
      const table = document.querySelector("#matrixContainerResumen table");
      if(!table) return;
      const wb = XLSX.utils.table_to_book(table, { raw: false });
      const nombreCols = ORDEN_COLUMNAS_RESUMEN.map(c => DIMENSIONES_RESUMEN.find(d=>d.valor===c).etiqueta).join('_');
      XLSX.writeFile(wb, `INFOAGRO_RESUMEN_ACTIVIDADES_${nombreCols}.xlsx`);
    }
  }

  async function initAll() {
    await loadData();
    buildAreaIndex();
    await Promise.all([loadDataInsumos(), loadDataCombustible()]);
    renderMatrixIns();
    mostrarCamposSegunTab('actividades'); // arranca en la pestaña Actividades
  }

  // Los filtros Compañía/Sector/Ciclo/Finca ahora viven de nuevo dentro de esta misma
  // sección (toolbar propia, visible arriba) — ya no se reciben desde un panel del shell.
  initAll();
</script>

</body>
