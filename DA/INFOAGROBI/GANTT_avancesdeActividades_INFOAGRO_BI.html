<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>INFOAGRO · Monitoreo Cruzado de Avances</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-organic: #f4f7f5;
      --text-main: #1e293b;
      --text-muted: #64748b;
      
      --grad-header: linear-gradient(135deg, #1b4332 0%, #2d6a4f 50%, #40916c 100%);
      --grad-verde: linear-gradient(135deg, #2d6a4f 0%, #52b788 100%);
      --grad-naranja: linear-gradient(135deg, #e76f51 0%, #f4a261 100%);
      --grad-soft-bg: linear-gradient(180deg, #ffffff 0%, #f8faf9 100%);

      --shadow-sm: 0 4px 20px -2px rgba(45, 106, 79, 0.05);
      --shadow-md: 0 10px 30px -5px rgba(27, 67, 50, 0.08);
      --shadow-lg: 0 10px 25px -3px rgba(0, 0, 0, 0.1);
    }

    html, body {
      height: 100%;
      overflow: hidden; 
      background-color: var(--bg-organic);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
    }

    body {
      padding: 10px 15px;
      display: flex;
      flex-direction: column;
    }

    .dashboard-container {
      max-width: 100%;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0; 
    }

    /* HEADER */
    .page-hdr-container {
      background: var(--grad-header);
      border-radius: 12px 6px 12px 6px;
      padding: 8px 16px;
      color: #ffffff;
      box-shadow: 0 4px 15px -5px rgba(27, 67, 50, 0.2);
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    .hdr-title { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; display: inline-flex; align-items: center; gap: 6px; }
    .hdr-sub { font-size: 11px; color: #b7e4c7; font-weight: 400; margin-left: 10px; display: inline-block; }

    .hdr-controls-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hdr-compaia-box {
      display: flex;
      align-items: center;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      border-radius: 6px;
      padding: 0 6px 0 10px;
      height: 30px;
      border: 1px solid #74c69d;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .hdr-compaia-icon { font-size: 12px; margin-right: 6px; }
    .hdr-select-compaia {
      background-color: transparent !important;
      border: none !important;
      color: #ffffff !important;
      font-weight: 600;
      font-size: 11px;
      height: 100%;
      padding: 0 24px 0 0;
      cursor: pointer;
      min-width: 190px;
      box-shadow: none !important;
    }
    .hdr-select-compaia option {
      background-color: #ffffff !important;
      color: var(--text-main) !important;
      font-weight: 500;
    }

    .btn-toggle-ribbon {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: white;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 28px;
    }
    .btn-toggle-ribbon:hover { background: rgba(255, 255, 255, 0.25); }

    /* Variante flotante fija, esquina superior derecha del iframe (coincide con el
       hueco que deja el shell INFOAGRO BI en su topbar). */
    .btn-toggle-ribbon-fijo {
      position: fixed;
      top: 12px;
      right: 16px;
      z-index: 500;
      background: #ffffff;
      color: #1B4332;
      border: 1.5px solid #E1E0D8;
      font-size: 12.5px;
      font-weight: 700;
      padding: 0 14px;
      height: 34px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }
    .btn-toggle-ribbon-fijo:hover {
      background: #F1F4F1;
      border-color: #2D6A4F;
    }

    .btn-organic-action.clear-all {
      background: var(--grad-naranja);
      display: none;
      height: 28px;
      animation: fadeInBtn 0.2s ease-in-out forwards;
    }
    @keyframes fadeInBtn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    /* CINTA DE FILTROS COLAPSABLE */
    .filters-inline-container {
      background: var(--grad-soft-bg);
      border-radius: 10px;
      box-shadow: var(--shadow-sm);
      padding: 6px 14px;
      margin-bottom: 8px;
      border: 1px solid rgba(82, 183, 136, 0.15);
      display: flex;
      flex-wrap: wrap;
      gap: 10px 12px;
      align-items: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      max-height: 220px;
      opacity: 1;
      overflow: visible;
      flex-shrink: 0;
    }
    
    .filters-inline-container.collapsed {
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      margin-bottom: 0;
      opacity: 0;
      border-color: transparent;
      overflow: hidden;
    }

    .filter-item-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1 1 160px;
      min-width: 150px;
      position: relative;
    }

    .fg-label {
      font-size: 11px;
      color: var(--text-main);
      font-weight: 700;
      white-space: nowrap;
    }

    .multiselect-btn {
      background-color: #ffffff;
      border: 1px solid rgba(163, 177, 198, 0.4);
      border-radius: 6px 3px 6px 3px;
      color: var(--text-main);
      font-size: 11px;
      height: 28px;
      padding: 0 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      width: 100%;
      user-select: none;
    }
    .multiselect-btn::after { content: '▼'; font-size: 7px; color: var(--text-muted); margin-left: 4px; }

    .multiselect-dropdown {
      position: absolute;
      top: 105%;
      left: 0;
      width: 100%;
      min-width: 200px;
      background: #ffffff;
      border: 1px solid rgba(82, 183, 136, 0.2);
      border-radius: 6px;
      box-shadow: var(--shadow-lg);
      max-height: 280px;
      overflow: hidden;
      z-index: 1000;
      padding: 0;
      display: none;
      flex-direction: column;
    }
    .multiselect-dropdown.show { display: flex; }

    .multiselect-option {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 6px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }
    .multiselect-option:hover { background-color: rgba(82, 183, 136, 0.1); }

    .form-control, .form-select-native {
      background-color: #ffffff !important;
      border: 1px solid rgba(163, 177, 198, 0.4) !important;
      border-radius: 6px 3px 6px 3px !important;
      color: var(--text-main) !important;
      font-size: 11px;
      height: 28px;
      padding: 0 6px;
    }

    .btn-reset-individual {
      background: none; border: none; font-size: 12px; cursor: pointer;
      padding: 0 2px; display: inline-flex; align-items: center;
      justify-content: center; width: 18px; height: 18px; border-radius: 4px;
      transition: all 0.15s ease;
    }
    .btn-reset-individual.inactive { color: #cbd5e1; pointer-events: none; }
    .btn-reset-individual.active { color: #ef4444; background: rgba(239, 68, 68, 0.08); }
    .btn-reset-individual.active:hover { background: rgba(239, 68, 68, 0.18); transform: scale(1.1); }

    .btn-organic-action {
      border: none; height: 28px; border-radius: 6px 3px 6px 3px;
      font-weight: 600; font-size: 11px; padding: 0 10px;
      display: inline-flex; align-items: center; gap: 4px; color: white; transition: all 0.2s ease;
    }
    .btn-organic-action.excel { background: var(--grad-verde); }
    .btn-organic-action:hover { transform: translateY(-1px); color: white; }

    /* TABS DE ORIGEN DE DATOS */
    .tabs-switch-container {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    .tab-switch-btn {
      background: #ffffff;
      border: 1px solid rgba(82, 183, 136, 0.25);
      color: var(--text-muted);
      font-size: 11.5px;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 8px 3px 8px 3px;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
    }
    .tab-switch-btn:hover { color: #1b4332; border-color: #52b788; }
    .tab-switch-btn.active {
      background: var(--grad-verde);
      color: #ffffff;
      border-color: transparent;
      box-shadow: var(--shadow-md);
    }
    .tab-panel { display: flex; flex-direction: column; flex: 1; min-height: 0; }

    /* ARBOL JERARQUICO — MATRIZ DE INSUMOS */
    table.pivot-insumos th.col-tree-sticky,
    table.pivot-insumos td.col-tree-sticky {
      position: sticky;
      z-index: 15;
      text-align: left !important;
      border-right: 1px solid rgba(82, 183, 136, 0.15) !important;
      background: #ffffff;
    }
    table.pivot-insumos th.col-tree-sticky.c1, table.pivot-insumos td.col-tree-sticky.c1 { left: 0px; min-width: 100px; max-width: 100px; }
    table.pivot-insumos th.col-tree-sticky.c2, table.pivot-insumos td.col-tree-sticky.c2 { left: 100px; min-width: 150px; max-width: 150px; }
    table.pivot-insumos th.col-tree-sticky.c3, table.pivot-insumos td.col-tree-sticky.c3 { left: 250px; min-width: 260px; max-width: 260px; border-right: 2px solid rgba(82, 183, 136, 0.2) !important; }
    table.pivot-insumos th.col-tree-sticky.c4, table.pivot-insumos td.col-tree-sticky.c4 { left: 510px; min-width: 75px; max-width: 75px; text-align: center !important; border-right: 2px solid rgba(82, 183, 136, 0.2) !important; }
    table.pivot-insumos thead tr.main-hdr-row th.col-tree-sticky { z-index: 36; background: #1b4332 !important; color: #ffffff !important; }

    .tree-row-ciclo td.col-tree-sticky.c1 { background: #1b4332; color: #ffffff; font-weight: 700; }
    .tree-row-ciclo td { background: #edf7f2; }
    .tree-row-categoria td.col-tree-sticky.c2 { background: #eaf3ee; color: #1b4332; font-weight: 700; }
    .tree-row-categoria td { background: #f8faf9; }
    .tree-row-leaf td.col-tree-sticky.c3 { font-weight: 500; }
    .tree-row-subtotal td.col-tree-sticky.c3 { font-weight: 700; color: #1b4332; }
    .tree-row-subtotal td { background: #eaf6ee; border-top: 2px solid rgba(82, 183, 136, 0.35); font-weight: 700; }
    .tree-row-spacer td { height: 14px; background: #ffffff !important; border: none !important; }
    .tree-row-fin td { background: #1b4332 !important; color: #ffffff; font-weight: 700; text-align: center !important; }

    /* Coloreado por tipo de métrica (Cantidad / Área / Dosis) */
    .pivot-insumos .col-m-area { background: rgba(183, 228, 199, 0.32); }
    .pivot-insumos .col-m-dosis { background: rgba(244, 189, 189, 0.32); }

    .pivot-insumos thead th.finca-group-hdr {
      background: #ffffff !important; color: #1b4332 !important;
      font-weight: 700; text-align: center !important;
      border-left: 3px solid #1b4332 !important;
      border-right: 1px solid #e2e8f0 !important;
    }
    .pivot-insumos thead tr.sub-hdr-row th.col-m-cant { background: #ece7da !important; color: #4a4a4a !important; border-left: 3px solid #1b4332 !important; }
    .pivot-insumos thead tr.sub-hdr-row th.col-m-area { background: #c3e6cf !important; color: #1b4332 !important; }
    .pivot-insumos thead tr.sub-hdr-row th.col-m-dosis { background: #f2c6c6 !important; color: #7a2020 !important; border-right: 1px solid #e2e8f0 !important; }
    .pivot-insumos thead th.col-total-cant { background: #f3c9a0 !important; color: #5c3111 !important; border-left: 3px solid #1b4332 !important; }
    .pivot-insumos thead th.col-total-area { background: #c3e6cf !important; color: #1b4332 !important; }
    .pivot-insumos thead th.col-total-dosis { background: #f2c6c6 !important; color: #7a2020 !important; }
    .pivot-insumos tbody .col-total-cant { background: rgba(232, 137, 74, 0.20) !important; font-weight: 700; }
    .pivot-insumos tbody .col-total-area { background: rgba(45, 134, 89, 0.20) !important; font-weight: 700; }
    .pivot-insumos tbody .col-total-dosis { background: rgba(178, 58, 58, 0.20) !important; font-weight: 700; }
    .pivot-insumos tbody td.col-m-cant { border-left: 2px solid rgba(27, 67, 50, 0.18); }
    .th-sub { font-weight: 500; opacity: 0.85; font-size: 10px; }

    /* El toggle de métricas ahora regenera la tabla completa (ver renderMatrixIns) en vez de ocultar vía CSS,
       para evitar desalineación entre encabezados agrupados (colspan) y columnas de datos. */

    .metric-toggle-chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 600; color: var(--text-main);
      background: #ffffff; border: 1px solid rgba(163, 177, 198, 0.4);
      border-radius: 6px 3px 6px 3px; padding: 3px 8px; height: 26px;
      cursor: pointer; user-select: none;
    }
    .metric-toggle-chip input { cursor: pointer; }

    /* Tabla centrada y responsiva */
    .matrix-centered { max-width: 1700px; margin: 0 auto; width: 100%; }

    .tree-toggle { cursor: pointer; user-select: none; display: inline-block; }
    .tree-toggle:hover { opacity: 0.75; }
    .tree-indent-0 { padding-left: 10px; }
    .tree-indent-1 { padding-left: 26px; }
    .tree-indent-2 { padding-left: 42px; }

    /* TOOLBAR EXCLUSIVO */
    .table-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      padding: 0 4px;
      flex-shrink: 0;
    }

    #pivotGroupingOrder {
      width: 240px;
      font-weight: 600;
      border-color: #2d6a4f !important;
      color: #1b4332 !important;
    }

    /* AREA DE TABLA RE-ESTRUCTURADA CON CONTROL DE SCROLL EXCLUSIVO */
    .table-responsive-organic {
      overflow: auto; 
      flex: 1;
      min-height: 0;
      border-radius: 12px;
      padding: 1px;
      background: #ffffff;
      border: 1px solid rgba(82, 183, 136, 0.12);
      box-shadow: var(--shadow-md);
    }

    table.pivot-gantt {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 11px;
    }
    
    /* CONTROL LOGICO DE ENCABEZADOS FIJOS SIN ALTURAS RIGIDAS EN TR */
    table.pivot-gantt thead th {
      text-align: center;
      border-right: 1px solid #e2e8f0;
      position: sticky;
      z-index: 10;
      padding: 8px 10px;
      vertical-align: middle;
      /* Corrección de envoltura para que actividades largas no se corten */
      white-space: normal !important; 
      word-wrap: break-word;
    }

    /* Nivel 1: Fincas u Operaciones Maestras */
    table.pivot-gantt thead tr.main-hdr-row th {
      top: 0px;
      background: #1b4332 !important; 
      color: #ffffff !important;       
      font-weight: 700;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }

    /* Nivel 2: Sub-ítems/Actividades (Se quita altura estricta y se da ancho mínimo seguro) */
    table.pivot-gantt thead tr.sub-hdr-row th {
      top: 33px; /* Re-ajustado dinámicamente según espacio de padding */
      background: #f1f5f9 !important; 
      color: #334155 !important;       
      font-weight: 600;
      border-bottom: 1px solid #cbd5e1;
      min-width: 120px; /* Ancho mínimo para que quepa "Fungicida VIII" sin problemas */
    }

    /* Nivel 3: Totales de la columna */
    table.pivot-gantt thead tr.total-hdr-row th {
      top: 61px;
      background: #edf7f2 !important; 
      color: #1b4332 !important;
      font-weight: 800;
      border-bottom: 2px solid rgba(82, 183, 136, 0.3);
    }
    
    /* COLUMNA STICKY DE FECHAS */
    table.pivot-gantt th.col-fecha-sticky, 
    table.pivot-gantt td.col-fecha-sticky {
      position: sticky;
      left: 0;
      z-index: 15;
      font-weight: 700;
      text-align: center;
      border-right: 2px solid rgba(82, 183, 136, 0.2) !important;
      width: 95px;
      min-width: 95px;
    }
    
    table.pivot-gantt td.col-fecha-sticky {
      background: #f8faf9 !important;
    }

    /* Z-Index superior en las intersecciones izquierdas fijas */
    table.pivot-gantt thead tr.main-hdr-row th.col-fecha-sticky { z-index: 35; top: 0px; background: #1b4332 !important; color: #ffffff !important; }
    table.pivot-gantt thead tr.sub-hdr-row th.col-fecha-sticky { z-index: 35; top: 33px; background: #f1f5f9 !important; color: #334155 !important; }
    table.pivot-gantt thead tr.total-hdr-row th.col-fecha-sticky { z-index: 35; top: 61px; background: #edf7f2 !important; color: #1b4332 !important; }

    table.pivot-gantt tbody td {
      padding: 5px 6px;
      border-bottom: 1px solid #f1f5f9;
      border-right: 1px solid #f1f5f9;
      text-align: center;
    }
    table.pivot-gantt tbody tr:nth-child(even) { background-color: #f8faf9; }

    .cell-interactive { cursor: pointer; display: inline-block; width: 100%; }
    
    .mzn-badge-container {
      background: rgba(82, 183, 136, 0.12);
      color: #1b4332;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 700;
      display: inline-block;
      font-size: 11px;
    }
    tr:hover td { background-color: #eaeaea !important; }

    #global-gantt-tooltip {
      position: fixed; display: none; background: rgba(15, 23, 42, 0.96); backdrop-filter: blur(4px);
      color: #ffffff; padding: 10px 12px; border-radius: 8px; box-shadow: var(--shadow-lg);
      width: 320px; z-index: 999999; pointer-events: none; text-align: left;
    }
    .popup-hdr { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; border-bottom: 1px solid rgba(255,255,255,0.15); padding-bottom: 4px; margin-bottom: 6px; font-weight: 700; }
    .popup-block { margin-bottom: 6px; }
    .popup-item { display: flex; justify-content: space-between; font-size: 11px; padding: 1px 0; }
    .popup-item .p-label { color: #cbd5e1; }
    .popup-item .p-val { font-weight: 600; color: #38bdf8; }

    .loading-spinner { display: flex; align-items: center; justify-content: center; padding: 30px; }
    .spinner-blob { width: 12px; height: 12px; background-color: #2d6a4f; border-radius: 50%; animation: morphBlob 1.4s infinite ease-in-out alternate; }
    @keyframes morphBlob { 0% { transform: scale(0.8); } 100% { transform: scale(1.2); } }

    /* MODAL DE DETALLE — CONSUMO DE INSUMOS */
    .modal-overlay-ins {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      backdrop-filter: blur(2px);
      z-index: 999998;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay-ins.show { display: flex; }
    .modal-box-ins {
      background: #ffffff;
      border-radius: 12px 4px 12px 4px;
      width: min(820px, 92vw);
      max-height: 82vh;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }
    .modal-hdr-ins {
      background: var(--grad-header);
      color: #ffffff;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-shrink: 0;
    }
    .modal-title-ins { font-size: 14px; font-weight: 700; }
    .modal-subtitle-ins { font-size: 11px; color: #b7e4c7; margin-top: 2px; }
    .modal-close-ins {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: #ffffff;
      width: 24px; height: 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      flex-shrink: 0;
    }
    .modal-close-ins:hover { background: rgba(255, 255, 255, 0.3); }
    .modal-body-ins { overflow: auto; flex: 1; min-height: 0; }
    .modal-table-ins { width: 100%; border-collapse: collapse; font-size: 11px; }
    .modal-table-ins th {
      position: sticky; top: 0;
      background: #1b4332; color: #ffffff;
      padding: 8px 10px; text-align: left;
      font-weight: 700; white-space: nowrap;
    }
    .modal-table-ins td { padding: 6px 10px; border-bottom: 1px solid #f1f5f9; white-space: nowrap; }
    .modal-table-ins tbody tr:nth-child(even) td { background: #f8faf9; }
    .modal-footer-ins {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 16px; border-top: 1px solid #f1f5f9; flex-shrink: 0;
    }
  /* ---------- TOOLBAR DE UNA SOLA FILA — mismo patrón en las 5 secciones de INFOAGRO BI ---------- */
.toolbar-una-fila{
  display:flex; align-items:flex-end; gap:14px; flex-wrap:wrap;
  background:#fff; border:1px solid rgba(163,177,198,0.3); border-radius:10px;
  box-shadow:0 1px 3px rgba(0,0,0,.06); padding:10px 14px; margin-bottom:10px; flex-shrink:0;
}
.tf-campos-grupo{
  display:flex; align-items:flex-end; gap:14px; flex-wrap:wrap; flex:1;
  max-height:500px; overflow:visible; transition:max-height .3s cubic-bezier(.4,0,.2,1), margin-bottom .3s ease, opacity .3s ease;
  opacity:1;
}

  background:#fff; border:1px solid rgba(163,177,198,0.4); border-radius:8px; max-height:280px;

  font-size:12px; outline:none; font-family:inherit;
}
.ms-search input:focus{border-color:#1b4332;}
.ms-items{overflow-y:auto; flex:1 1 auto; min-height:0; padding:4px 0;}
.ms-item{display:flex; align-items:center; gap:8px; padding:6px 12px; font-size:12.5px; cursor:pointer;}
.ms-item:hover{background:#F1F4F1;}
.ms-item.selectall{border-bottom:1px solid rgba(163,177,198,0.3); font-weight:700;}
.ms-item input{margin:0; accent-color:#1b4332;}
.ms-footer{display:flex; gap:8px; padding:8px; border-top:1px solid rgba(163,177,198,0.3); flex-shrink:0;}
.ms-footer button{

}
.ms-footer .ok{background:#1b4332; color:#fff;}
.ms-footer .ok:hover{background:#2d6a4f;}
.ms-footer .cancel{background:#F1F4F1; color:#22302A;}

.ms-date{
  height:32px; padding:0 6px; border:1px solid rgba(163,177,198,0.4); border-radius:6px; font-size:11.5px; font-family:inherit;
}

.tf-acciones{display:flex; align-items:center; gap:6px; margin-left:auto; flex-wrap:wrap;}
.tf-titulo{display:flex; flex-direction:column; justify-content:center; margin-right:4px; flex-shrink:0; align-self:flex-end;}
.tf-titulo h1{margin:0; font-size:15px; font-weight:800; color:#1B4332; line-height:1.2; white-space:nowrap;}

/* ---------- Tab Resumen de Actividades: tabla plana + columnas arrastrables ---------- */

/* Encabezados arrastrables (drag & drop nativo) para reordenar columnas */

/* Responsive: en pantallas chicas los campos se apilan a ancho completo y las

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script>
  let DB_RAW = [];
  let TOOLTIP_REGISTRY = {};
  let SELECCIONES = { proveedor: [], sector: [], ciclo: [], finca: [], actividad: [] };
  let COMPAIA_SELECCIONADA = "Division Agricola Comasa"; 
  const MESES_ABR = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

  // ===== ESTADO TAB "CONSUMO DE INSUMOS" =====
  let DB_INSUMOS = [];
  let TOOLTIP_REGISTRY_INS = {};
  let SELECCIONES_INS = { sector: [], categoria: [], ciclo: [], finca: [], lote: [], producto: [] };
  let COLLAPSED_CICLOS_INS = new Set();
  let COLLAPSED_CATS_INS = new Set();
  let LAST_TREE_KEYS_INS = { ciclos: [], cats: [] };

  function escHtml(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  function switchTab(tab) {
    const paneles = { actividades:'tabPanelActividades', insumos:'tabPanelInsumos', resumen:'tabPanelResumen' };
    const botones = { actividades:'tabBtnActividades', insumos:'tabBtnInsumos', resumen:'tabBtnResumen' };
    Object.keys(paneles).forEach(k=>{
      document.getElementById(paneles[k]).style.display = (k===tab) ? 'flex' : 'none';
      document.getElementById(botones[k]).classList.toggle('active', k===tab);
    });
    mostrarCamposSegunTab(tab);
    if(tab==='resumen'){
      renderResumenActividades();
    }
  }

  // Sector/Ciclo/Finca son compartidos entre las 3 pestañas (mismos controles arriba);
  // Período/Proveedor/Actividad son propios de Actividades; Categoría/Lote/Producto son
  // propios de Insumos; Resumen no usa ninguno de esos (el usuario define sus propios
  // niveles de agrupación dentro del tab).
  function mostrarCamposSegunTab(tab){
    document.querySelectorAll('.campo-solo-actividades').forEach(el=>{
      el.style.display = (tab==='actividades') ? '' : 'none';
    });
    document.querySelectorAll('.campo-solo-insumos').forEach(el=>{
      el.style.display = (tab==='insumos') ? '' : 'none';
    });
    // Actividad es visible en Avance de Actividades y en Resumen (usa el mismo control
    // y la misma clave de SELECCIONES), pero no aplica en Consumo de Insumos.
    document.querySelectorAll('.campo-actividades-y-resumen').forEach(el=>{
      el.style.display = (tab==='insumos') ? 'none' : '';
    });
  }

  function toggleFiltrosExtra() {
    document.getElementById("filterRibbon").classList.toggle("collapsed");
  }

  function formatToCustomDate(dateStr) {
    if (!dateStr) return "";
    const parts = dateStr.split("-");
    if (parts.length !== 3) return dateStr;
    const yearShort = parts[0].substring(2); 
    const monthIdx = parseInt(parts[1], 10) - 1;
    return `${parts[2].padStart(2, "0")}-${MESES_ABR[monthIdx] || parts[1]}-${yearShort}`;
  }

  const WORKER = "https://weathered-recipe-d18c.ignagher.workers.dev";
  const GITHUB_FALLBACK = "https://raw.githubusercontent.com/infoagrodb/dashboard/main/info_AvancesActividades.json";

  // GitHub primero (estable, sync programado) — Worker como respaldo en vivo si el JSON de GitHub falla
  async function fetchGithubPrimero(githubUrl, workerUrl) {
    try {
      const r = await fetch(githubUrl + "?cache=" + Date.now());
      if (r.ok) return await r.json();
    } catch(e) {}
    const r2 = await fetch(workerUrl);
    return r2.json();
  }

  // Se conserva por compatibilidad — ya no se usa como ruta principal
  async function fetchConFallback(workerUrl, githubUrl) {
    return fetchGithubPrimero(githubUrl, workerUrl);
  }

  let INSUMOS_LOAD_ERROR = false;

  function buildHeaderCompaiaOptions() {
    const select = document.getElementById("filterHeaderCompaia");
    const compañiasUnicas = [...new Set([...DB_RAW.map(r => r.compaia), ...DB_INSUMOS.map(r => r.compaia)])].filter(Boolean).sort();
    
    select.innerHTML = "";
    compañiasUnicas.forEach(comp => {
      const option = document.createElement("option");
      option.value = comp;
      option.textContent = comp;
      if (comp === COMPAIA_SELECCIONADA) option.selected = true;
      select.appendChild(option);
    });

    if (select.selectedIndex === -1 && select.options.length > 0) {
      select.options[0].selected = true;
      COMPAIA_SELECCIONADA = select.value;
    }
  }

    COMPAIA_SELECCIONADA = document.getElementById("filterHeaderCompaia").value;
    construirFiltrosGantt();

  // Sector, Ciclo y Finca son compartidos entre Actividades e Insumos (misma selección
  // visual arriba) — CAMPOS_COMPARTIDOS define en qué llave escribe cada uno dentro de
  // SELECCIONES y SELECCIONES_INS a la vez.
  const CAMPOS_COMPARTIDOS = ['sector','ciclo','finca'];
  // Campos propios de cada pestaña (sólo existen en un lado)
  const CAMPOS_SOLO_ACT = ['proveedor','actividad'];
  const CAMPOS_SOLO_INS = ['categoria','lote','producto'];

  function idsMsGantt(campo){
    const mapaIds = {
      sector:'Sector', ciclo:'Ciclo', finca:'Finca',
      proveedor:'Proveedor', actividad:'Actividad',
      categoria:'Categoria', lote:'Lote', producto:'Producto'
    };
    const suf = mapaIds[campo];
    return { drop:'drop'+suf, panel:'ms'+suf };
  }

  function getOptionsFor(prop) {
    const esCompartido = CAMPOS_COMPARTIDOS.includes(prop);
    const esSoloIns = CAMPOS_SOLO_INS.includes(prop);
    const fuente = esSoloIns ? DB_INSUMOS : DB_RAW;
    const seleccionRef = esSoloIns ? SELECCIONES_INS : SELECCIONES;
    const fFechaTipoId = esSoloIns ? "filterFechaTipoIns" : "filterFechaTipo";
    const fFechaTipo = document.getElementById(fFechaTipoId).value;
    const hoy = new Date();
    const curYear = hoy.getFullYear();
    const curMonth = hoy.getMonth();

    const dataFiltered = fuente.filter(r => {
      if (r.compaia !== COMPAIA_SELECCIONADA) return false;

      if(fFechaTipo !== "all" && r.fecha) {
        const parts = r.fecha.split("-");
        if(parts.length === 3) {
          const rYear = parseInt(parts[0], 10);
          const rMonth = parseInt(parts[1], 10) - 1;
          const idDesde = esSoloIns ? "filterFechaDesdeIns" : "filterFechaDesde";
          const idHasta = esSoloIns ? "filterFechaHastaIns" : "filterFechaHasta";
          if(fFechaTipo === "este_mes") {
            if(rYear !== curYear || rMonth !== curMonth) return false;
          } else if(fFechaTipo === "mes_pasado") {
            let targetMonth = curMonth - 1; let targetYear = curYear;
            if(targetMonth < 0) { targetMonth = 11; targetYear--; }
            if(rYear !== targetYear || rMonth !== targetMonth) return false;
          } else if(fFechaTipo === "ano_curso") {
            if(rYear !== curYear) return false;
          } else if(fFechaTipo === "personalizada") {
            const desde = document.getElementById(idDesde).value;
            const hasta = document.getElementById(idHasta).value;
            if(desde && r.fecha < desde) return false;
            if(hasta && r.fecha > hasta) return false;
          }
        }
      }

      for (let targetFilterKey in seleccionRef) {
        if (targetFilterKey !== prop && seleccionRef[targetFilterKey].length > 0 && !seleccionRef[targetFilterKey].includes(r[targetFilterKey])) {
          return false;
        }
      }
      return true;
    });
    return [...new Set(dataFiltered.map(r => r[prop]))].filter(Boolean).sort();
  }

  function normalizarBusqueda(t){ return String(t||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,''); }

  // Construye TODOS los dropdowns visibles (compartidos + los propios de la pestaña activa)
  function construirFiltrosGantt(){
    [...CAMPOS_COMPARTIDOS, ...CAMPOS_SOLO_ACT, ...CAMPOS_SOLO_INS].forEach(campo => construirMsGantt(campo));
  }

  function construirMsGantt(campo){
    const { drop, panel: idPanel } = idsMsGantt(campo);
    const dropEl = document.getElementById(drop);
    const panel = document.getElementById(idPanel);
    if(!dropEl || !panel) return;

    const esSoloIns = CAMPOS_SOLO_INS.includes(campo);
    const seleccionRef = esSoloIns ? SELECCIONES_INS : SELECCIONES;
    const universo = getOptionsFor(campo);
    const seleccionActual = seleccionRef[campo];

    let itemsHtml = universo.map(v=>{
      const marcado = !seleccionActual.length || seleccionActual.includes(v);
      return `<div class="ms-item" data-val="${v}" data-texto="${normalizarBusqueda(v)}">
        <input type="checkbox" value="${v}" ${marcado?'checked':''} onchange="actualizarSelectAllGantt('${campo}')">
        <span>${v}</span>
      </div>`;
    }).join('');
    panel.onclick = (ev)=>ev.stopPropagation();
    panel.innerHTML = `
      <div class="ms-search"><input type="text" placeholder="Buscar..." oninput="buscarMsGantt('${campo}', this.value)"></div>
      <div class="ms-item selectall">
        <input type="checkbox" class="selectall-cb" checked onchange="toggleTodoMsGantt('${campo}', this.checked)">
        <span>(Seleccionar todo)</span>
      </div>
      <div class="ms-items">${itemsHtml}</div>
      <div class="ms-footer">
        <button class="cancel" onclick="cerrarMsGantt('${campo}')">Cancelar</button>
        <button class="ok" onclick="aplicarMsGantt('${campo}')">Aceptar</button>
      </div>`;

    const defaults = { sector:'Todos', ciclo:'Todos', finca:'Todas', proveedor:'Todos', actividad:'Todas', categoria:'Todas', lote:'Todos', producto:'Todos' };
    if(!universo.length){ dropEl.textContent='—'; }
    else if(!seleccionActual.length) dropEl.textContent = defaults[campo] || 'Todos';
    else if(seleccionActual.length===1) dropEl.textContent = seleccionActual[0];
    else dropEl.textContent = seleccionActual.length+' sel.';
  }

  window.toggleMsGantt = function(ev, campo){
    ev.stopPropagation();
    const { panel: idPanel } = idsMsGantt(campo);
    const panel = document.getElementById(idPanel);
    const abierto = panel.classList.contains('show');
    document.querySelectorAll('.ms-panel').forEach(p=>p.classList.remove('show'));
    if(!abierto) panel.classList.add('show');
  };
  document.addEventListener('click', ()=>document.querySelectorAll('.ms-panel').forEach(p=>p.classList.remove('show')));

  window.actualizarSelectAllGantt = function(campo){
    const { panel: idPanel } = idsMsGantt(campo);
    const panel = document.getElementById(idPanel);
    const selCb = panel.querySelector('.selectall-cb');
    const visibles = Array.from(panel.querySelectorAll('.ms-items .ms-item')).filter(el=>el.style.display!=='none');
    const cbs = visibles.map(el=>el.querySelector('input[type=checkbox]'));
    const marcados = cbs.filter(cb=>cb.checked).length;
    if(!cbs.length){ selCb.checked=false; selCb.indeterminate=false; return; }
    selCb.checked = marcados===cbs.length;
    selCb.indeterminate = marcados>0 && marcados<cbs.length;
  };
  window.toggleTodoMsGantt = function(campo, marcar){
    const { panel: idPanel } = idsMsGantt(campo);
    const panel = document.getElementById(idPanel);
    panel.querySelectorAll('.ms-items .ms-item').forEach(el=>{
      if(el.style.display==='none') return;
      const cb = el.querySelector('input[type=checkbox]'); if(cb) cb.checked = marcar;
    });
    actualizarSelectAllGantt(campo);
  };
  window.buscarMsGantt = function(campo, texto){
    const { panel: idPanel } = idsMsGantt(campo);
    const panel = document.getElementById(idPanel);
    const t = normalizarBusqueda(texto);
    panel.querySelectorAll('.ms-items .ms-item').forEach(el=>{
      el.style.display = (!t || (el.getAttribute('data-texto')||'').includes(t)) ? 'flex' : 'none';
    });
    actualizarSelectAllGantt(campo);
  };
  window.aplicarMsGantt = function(campo){
    const { panel: idPanel } = idsMsGantt(campo);
    const panel = document.getElementById(idPanel);
    const marcados = Array.from(panel.querySelectorAll('.ms-items input[type=checkbox]:checked')).map(cb=>cb.value);
    const universoActual = getOptionsFor(campo);
    const nuevaSeleccion = (marcados.length && marcados.length < universoActual.length) ? marcados : [];

    if(CAMPOS_COMPARTIDOS.includes(campo)){
      // Escribe en AMBOS objetos a la vez, ya que este campo es compartido entre pestañas
      SELECCIONES[campo] = [...nuevaSeleccion];
      SELECCIONES_INS[campo] = [...nuevaSeleccion];
    } else if(CAMPOS_SOLO_INS.includes(campo)){
      SELECCIONES_INS[campo] = nuevaSeleccion;
    } else {
      SELECCIONES[campo] = nuevaSeleccion;
    }

    panel.classList.remove('show');
    construirFiltrosGantt();
    renderMatrix();
    renderMatrixIns();
    if(document.getElementById('tabPanelResumen').style.display !== 'none') renderResumenActividades();
    checkGlobalClearVisibility();
  };
  window.cerrarMsGantt = function(campo){
    const { panel: idPanel } = idsMsGantt(campo);
    document.getElementById(idPanel).classList.remove('show');
    construirFiltrosGantt();
  };

  function resetAllFiltersGantt(){
    CAMPOS_COMPARTIDOS.forEach(c=>{ SELECCIONES[c]=[]; SELECCIONES_INS[c]=[]; });
    CAMPOS_SOLO_ACT.forEach(c=>{ SELECCIONES[c]=[]; });
    CAMPOS_SOLO_INS.forEach(c=>{ SELECCIONES_INS[c]=[]; });
    document.getElementById('filterFechaTipo').value = 'este_mes';
    document.getElementById('filterFechaTipoIns').value = 'este_mes';
    toggleFechaInputs();
    construirFiltrosGantt();
    renderMatrix();
    renderMatrixIns();
    if(document.getElementById('tabPanelResumen').style.display !== 'none') renderResumenActividades();
    checkGlobalClearVisibility();
  }
