<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>INFOAGRO · Monitoreo Cruzado de Avances</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-organic: #f4f7f5;
      --text-main: #1e293b;
      --text-muted: #64748b;
      
      --grad-header: linear-gradient(135deg, #1b4332 0%, #2d6a4f 50%, #40916c 100%);
      --grad-verde: linear-gradient(135deg, #2d6a4f 0%, #52b788 100%);
      --grad-naranja: linear-gradient(135deg, #e76f51 0%, #f4a261 100%);
      --grad-soft-bg: linear-gradient(180deg, #ffffff 0%, #f8faf9 100%);

      --shadow-sm: 0 4px 20px -2px rgba(45, 106, 79, 0.05);
      --shadow-md: 0 10px 30px -5px rgba(27, 67, 50, 0.08);
      --shadow-lg: 0 10px 25px -3px rgba(0, 0, 0, 0.1);
    }

    body {
      background-color: var(--bg-organic);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      padding: 20px;
    }

    .dashboard-container {
      max-width: 1750px;
      margin: 0 auto;
    }

    .page-hdr-container {
      background: var(--grad-header);
      border-radius: 20px 8px 20px 8px;
      padding: 16px 24px;
      color: #ffffff;
      box-shadow: 0 6px 20px -5px rgba(27, 67, 50, 0.2);
      margin-bottom: 16px;
    }
    .hdr-title { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
    .hdr-sub { font-size: 12px; color: #b7e4c7; font-weight: 400; }

    /* CONTENEDOR DE FILTROS HORIZONTAL */
    .filters-inline-container {
      background: var(--grad-soft-bg);
      border-radius: 16px;
      box-shadow: var(--shadow-sm);
      padding: 14px 20px;
      margin-bottom: 16px;
      border: 1px solid rgba(82, 183, 136, 0.15);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }

    .filter-item-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 165px;
      position: relative;
    }

    .fg-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      font-weight: 700;
    }

    /* ESTILADO DE DROPDOWNS MULTISELECT PERSONALIZADOS */
    .multiselect-btn {
      background-color: #ffffff;
      border: 1px solid rgba(163, 177, 198, 0.3);
      border-radius: 10px 4px 10px 4px;
      color: var(--text-main);
      font-size: 12px;
      height: 36px;
      padding: 0 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      width: 100%;
      user-select: none;
      text-align: left;
    }
    .multiselect-btn::after {
      content: '▼'; font-size: 8px; color: var(--text-muted); margin-left: 6px;
    }

    .multiselect-dropdown {
      position: absolute;
      top: 105%;
      left: 0;
      width: 100%;
      background: #ffffff;
      border: 1px solid rgba(82, 183, 136, 0.2);
      border-radius: 8px;
      box-shadow: var(--shadow-lg);
      max-height: 220px;
      overflow-y: auto;
      z-index: 1000;
      padding: 6px;
      display: none;
    }
    .multiselect-dropdown.show { display: block; }

    .multiselect-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      user-select: none;
    }
    .multiselect-option:hover { background-color: rgba(82, 183, 136, 0.1); }
    .multiselect-option input { cursor: pointer; }

    .form-control, .form-select-native {
      background-color: #ffffff !important;
      border: 1px solid rgba(163, 177, 198, 0.3) !important;
      border-radius: 10px 4px 10px 4px !important;
      color: var(--text-main) !important;
      font-size: 12px;
      height: 36px;
    }

    .btn-reset-individual {
      background: #ffffff;
      border: 1px solid rgba(163, 177, 198, 0.3);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    .btn-reset-individual:hover { color: #e76f51; border-color: #e76f51; transform: rotate(-180deg); }

    .btn-organic-action {
      border: none; height: 36px; border-radius: 10px 4px 10px 4px;
      font-weight: 600; font-size: 12px; padding: 0 14px;
      display: inline-flex; align-items: center; gap: 6px; color: white; transition: all 0.2s ease;
    }
    .btn-organic-action.excel { background: var(--grad-verde); }
    .btn-organic-action.clear-all { background: var(--grad-naranja); }
    .btn-organic-action:hover { transform: translateY(-1px); color: white; }

    /* TABLA PIVOT VERTICAL */
    .table-responsive-organic {
      overflow-x: auto;
      max-height: 680px;
      border-radius: 16px;
      padding: 2px;
      background: #ffffff;
      border: 1px solid rgba(82, 183, 136, 0.12);
      box-shadow: var(--shadow-md);
    }

    table.pivot-gantt {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 12px;
    }
    
    table.pivot-gantt thead th {
      background: #f8faf9;
      color: #1b4332;
      font-weight: 700;
      padding: 10px 12px;
      text-align: center;
      border-bottom: 2px solid rgba(82, 183, 136, 0.2);
      border-right: 1px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    table.pivot-gantt thead tr.sub-hdr th {
      top: 38px;
      font-size: 11px;
      background: #ffffff;
      color: var(--text-muted);
    }
    
    table.pivot-gantt th.col-fecha-sticky, 
    table.pivot-gantt td.col-fecha-sticky {
      position: sticky;
      left: 0;
      background: #f8faf9 !important;
      z-index: 15;
      font-weight: 700;
      text-align: center;
      border-right: 2px solid rgba(82, 183, 136, 0.2) !important;
      width: 110px;
      min-width: 110px;
    }
    table.pivot-gantt thead th.col-fecha-sticky { z-index: 25; }

    table.pivot-gantt tbody td {
      padding: 8px 10px;
      border-bottom: 1px solid #f1f5f9;
      border-right: 1px solid #f1f5f9;
      text-align: center;
    }
    table.pivot-gantt tbody tr:nth-child(even) { background-color: #f8faf9; }

    .cell-interactive { cursor: pointer; display: inline-block; width: 100%; }
    .mzn-badge-container {
      background: rgba(82, 183, 136, 0.12);
      color: #1b4332;
      padding: 4px 12px;
      border-radius: 30px;
      font-weight: 700;
      display: inline-block;
      font-size: 11px;
    }

    /* TOOLTIP POP-UP - Aumentado a 320px para la nueva etiqueta */
    #global-gantt-tooltip {
      position: fixed; display: none; background: rgba(15, 23, 42, 0.96); backdrop-filter: blur(6px);
      color: #ffffff; padding: 12px 14px; border-radius: 12px; box-shadow: var(--shadow-lg);
      width: 320px; z-index: 999999; pointer-events: none; text-align: left;
    }
    .popup-hdr { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; border-bottom: 1px solid rgba(255,255,255,0.15); padding-bottom: 6px; margin-bottom: 8px; font-weight: 700; }
    .popup-block { margin-bottom: 8px; }
    .popup-item { display: flex; justify-content: space-between; font-size: 11px; padding: 2px 0; gap: 8px; }
    .popup-item .p-label { color: #cbd5e1; flex-shrink: 0; }
    .popup-item .p-val { font-weight: 600; color: #38bdf8; text-align: right; }

    .loading-spinner { display: flex; align-items: center; justify-content: center; padding: 40px; gap: 12px; }
    .spinner-blob { width: 14px; height: 14px; background-color: #2d6a4f; border-radius: 50%; animation: morphBlob 1.4s infinite ease-in-out alternate; }
    @keyframes morphBlob { 0% { transform: scale(0.8); } 100% { transform: scale(1.2); } }
  </style>
</head>
<body>

<div class="dashboard-container">

  <div class="page-hdr-container d-flex flex-column flex-sm-row align-items-sm-center justify-content-between gap-2">
    <div>
      <div class="hdr-title">🌱 Matriz de Labores Diarias por Finca y Actividad</div>
      <div class="hdr-sub">Análisis continuo de avance físico (Manzanas) con selección múltiple en cascada</div>
    </div>
    <div class="d-flex gap-2">
      <button class="btn-organic-action clear-all" onclick="resetAllFilters()">↺ Limpiar</button>
      <button class="btn-organic-action excel" onclick="exportPivotToExcel()">⬇︎ Excel</button>
    </div>
  </div>

  <div class="filters-inline-container" onclick="closeDropdownsEvent(event)">
    
    <div class="filter-item-wrap" style="flex: 1.2; min-width: 220px;">
      <div class="fg-label">🔀 Orden de Estructura</div>
      <select id="pivotGroupingOrder" class="form-select-native form-control" onchange="renderMatrix()">
        <option value="finca_actividad">Finca  ➔  Actividad Realizada</option>
        <option value="actividad_finca">Actividad Realizada  ➔  Finca</option>
      </select>
    </div>

    <div class="filter-item-wrap">
      <div class="fg-label">Compañía</div>
      <div class="d-flex gap-1">
        <div class="multiselect-btn" id="btnCompaia" onclick="toggleDropdown(event, 'dropCompaia')">Todas</div>
        <div class="multiselect-dropdown" id="dropCompaia"></div>
        <button class="btn-reset-individual" onclick="resetSingleFilter('Compaia')">↺</button>
      </div>
    </div>

    <div class="filter-item-wrap">
      <div class="fg-label">Proveedor</div>
      <div class="d-flex gap-1">
        <div class="multiselect-btn" id="btnProveedor" onclick="toggleDropdown(event, 'dropProveedor')">Todos</div>
        <div class="multiselect-dropdown" id="dropProveedor"></div>
        <button class="btn-reset-individual" onclick="resetSingleFilter('Proveedor')">↺</button>
      </div>
    </div>

    <div class="filter-item-wrap">
      <div class="fg-label">Sector</div>
      <div class="d-flex gap-1">
        <div class="multiselect-btn" id="btnSector" onclick="toggleDropdown(event, 'dropSector')">Todos</div>
        <div class="multiselect-dropdown" id="dropSector"></div>
        <button class="btn-reset-individual" onclick="resetSingleFilter('Sector')">↺</button>
      </div>
    </div>

    <div class="filter-item-wrap">
      <div class="fg-label">Ciclo</div>
      <div class="d-flex gap-1">
        <div class="multiselect-btn" id="btnCiclo" onclick="toggleDropdown(event, 'dropCiclo')">Todos</div>
        <div class="multiselect-dropdown" id="dropCiclo"></div>
        <button class="btn-reset-individual" onclick="resetSingleFilter('Ciclo')">↺</button>
      </div>
    </div>

    <div class="filter-item-wrap">
      <div class="fg-label">Finca</div>
      <div class="d-flex gap-1">
        <div class="multiselect-btn" id="btnFinca" onclick="toggleDropdown(event, 'dropFinca')">Todas</div>
        <div class="multiselect-dropdown" id="dropFinca"></div>
        <button class="btn-reset-individual" onclick="resetSingleFilter('Finca')">↺</button>
      </div>
    </div>

    <div class="filter-item-wrap">
      <div class="fg-label">Actividad</div>
      <div class="d-flex gap-1">
        <div class="multiselect-btn" id="btnActividad" onclick="toggleDropdown(event, 'dropActividad')">Todas</div>
        <div class="multiselect-dropdown" id="dropActividad"></div>
        <button class="btn-reset-individual" onclick="resetSingleFilter('Actividad')">↺</button>
      </div>
    </div>

    <div class="filter-item-wrap">
      <div class="fg-label">Período</div>
      <div class="d-flex gap-1">
        <select id="filterFechaTipo" class="form-select-native form-control w-100" onchange="toggleFechaInputs()">
          <option value="all">Histórico</option>
          <option value="este_mes" selected>Este Mes</option>
          <option value="mes_pasado">Mes Pasado</option>
          <option value="ano_curso">Año Curso</option>
          <option value="personalizada">Rango...</option>
        </select>
        <button class="btn-reset-individual" onclick="resetSingleFilter('FechaTipo')">↺</button>
      </div>
    </div>

    <div id="customDateInputs" style="display: none; flex: 1.5; min-width: 240px;">
      <div class="d-flex gap-1">
        <div class="w-50">
          <div class="fg-label">Desde</div>
          <input type="date" id="filterFechaDesde" class="form-control" onchange="renderMatrix()">
        </div>
        <div class="w-50">
          <div class="fg-label">Hasta</div>
          <input type="date" id="filterFechaHasta" class="form-control" onchange="renderMatrix()">
        </div>
      </div>
    </div>

  </div>

  <div class="table-responsive-organic" id="matrixContainer">
    <div class="loading-box text-center py-5">
      <div class="loading-spinner">
        <div class="spinner-blob"></div>
      </div>
      <span class="text-muted fw-medium d-block mt-2">Cargando datos operacionales...</span>
    </div>
  </div>

</div>

<div id="global-gantt-tooltip"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script>
  let DB_RAW = [];
  let TOOLTIP_REGISTRY = {};
  
  // Estructura de Selección del Usuario (Vacio = Todo seleccionado)
  let SELECCIONES = { compaia: [], proveedor: [], sector: [], ciclo: [], finca: [], actividad: [] };
  const MESES_ABR = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

  function formatToCustomDate(dateStr) {
    if (!dateStr) return "";
    const parts = dateStr.split("-");
    if (parts.length !== 3) return dateStr;
    const yearShort = parts[0].substring(2); 
    const monthIdx = parseInt(parts[1], 10) - 1;
    return `${parts[2].padStart(2, "0")}-${MESES_ABR[monthIdx] || parts[1]}-${yearShort}`;
  }

  async function loadData() {
    const url = "https://raw.githubusercontent.com/infoagrodb/dashboard/main/odoo.json";
    try {
      const response = await fetch(url + "?cache=" + Date.now());
      const json = await response.json();
      
      let records = Array.isArray(json) ? json : (json.result ? (Array.isArray(json.result) ? json.result : json.result.records || []) : []);
      if(!records.length && json.records) records = json.records;

      DB_RAW = records.map(r => {
        const ordenArr = Array.isArray(r.x_orden_campo_id) ? r.x_orden_campo_id : [0, "—"];
        return {
          id: r.id,
          orden: ordenArr[1] || "—",
          turno: !r.x_name ? "Único / General" : r.x_name,
          compaia: Array.isArray(r.x_studio_compaia) ? r.x_studio_compaia[1] : (r.x_studio_compaia || "Sin Compañía"),
          proveedor: Array.isArray(r.x_studio_proveedor_del_servicio) ? r.x_studio_proveedor_del_servicio[1] : (r.x_studio_proveedor_del_servicio || "Sin Proveedor"),
          sector: Array.isArray(r.x_studio_sector_1) ? r.x_studio_sector_1[1] : (r.x_studio_sector_1 || "Sin Sector"),
          ciclo: Array.isArray(r.x_studio_ciclo) ? r.x_studio_ciclo[1] : (r.x_studio_ciclo || "Sin Ciclo"),
          finca: Array.isArray(r.x_studio_finca) ? r.x_studio_finca[1] : (r.x_studio_finca || "Sin Finca"),
          lote_agricola: Array.isArray(r.x_studio_lote_agricola) ? r.x_studio_lote_agricola[1] : (r.x_studio_lote_agricola || "Sin Lote"),
          actividad: Array.isArray(r.x_studio_activiadad_realizada) ? r.x_studio_activiadad_realizada[1] : (r.x_studio_activiadad_realizada || "Sin Actividad"),
          avance: Number(r.x_studio_avance_mzn || 0),
          fecha: r.x_studio_fecha || "" 
        };
      }).filter(r => r.fecha !== "");

      buildCascadingFilters();
      renderMatrix();
    } catch (e) {
      document.getElementById("matrixContainer").innerHTML = `<div class="alert alert-danger text-center m-3">⚠️ Error al sincronizar odoo.json de GitHub.</div>`;
    }
  }

  // LÓGICA DE FILTRADO EN CASCADA CON SELECCIÓN MÚLTIPLE
  function buildCascadingFilters() {
    const getOptionsFor = (prop) => {
      const dataFiltered = DB_RAW.filter(r => {
        for (let key in SELECCIONES) {
          if (key !== prop && SELECCIONES[key].length > 0 && !SELECCIONES[key].includes(r[key])) {
            return false;
          }
        }
        return true;
      });
      return [...new Set(dataFiltered.map(r => r[prop]))].filter(Boolean).sort();
    };

    const updateDropdown = (idDrop, idBtn, prop) => {
      const dropdown = document.getElementById(idDrop);
      const btn = document.getElementById(idBtn);
      const validOptions = getOptionsFor(prop);

      const prevChecked = SELECCIONES[prop];

      dropdown.innerHTML = "";
      validOptions.forEach(val => {
        const isChecked = prevChecked.includes(val);
        const item = document.createElement("div");
        item.className = "multiselect-option";
        item.innerHTML = `<input type="checkbox" data-prop="${prop}" value="${val}" ${isChecked ? 'checked' : ''}> <span>${val}</span>`;
        
        item.addEventListener("click", (e) => {
          if(e.target.tagName !== "INPUT") {
            const cb = item.querySelector("input");
            cb.checked = !cb.checked;
            handleCheckboxChange(cb);
          }
        });
        item.querySelector("input").addEventListener("change", (e) => {
          handleCheckboxChange(e.target);
        });

        dropdown.appendChild(item);
      });

      if (prevChecked.length === 0) {
        btn.textContent = "Todos";
      } else if (prevChecked.length === 1) {
        btn.textContent = prevChecked[0];
      } else {
        btn.textContent = `${prevChecked.length} Seleccionados`;
      }
    };

    updateDropdown("dropCompaia", "btnCompaia", "compaia");
    updateDropdown("dropProveedor", "btnProveedor", "proveedor");
    updateDropdown("dropSector", "btnSector", "sector");
    updateDropdown("dropCiclo", "btnCiclo", "ciclo");
    updateDropdown("dropFinca", "btnFinca", "finca");
    updateDropdown("dropActividad", "btnActividad", "actividad");
  }

  function handleCheckboxChange(cb) {
    const prop = cb.getAttribute("data-prop");
    const val = cb.value;

    if(cb.checked) {
      if(!SELECCIONES[prop].includes(val)) SELECCIONES[prop].push(val);
    } else {
      SELECCIONES[prop] = SELECCIONES[prop].filter(v => v !== val);
    }

    buildCascadingFilters();
    renderMatrix();
  }

  // CONTROL INTERACTIVO DE MENÚS FLOTANTES
  function toggleDropdown(e, idDrop) {
    e.stopPropagation();
    const dropdown = document.getElementById(idDrop);
    const wasOpen = dropdown.classList.contains("show");
    closeAllDropdowns();
    if(!wasOpen) dropdown.classList.add("show");
  }

  function closeAllDropdowns() {
    document.querySelectorAll(".multiselect-dropdown").forEach(d => d.classList.remove("show"));
  }

  function closeDropdownsEvent(e) {
    if(!e.target.closest(".filter-item-wrap")) closeAllDropdowns();
  }

  function toggleFechaInputs() {
    const tipo = document.getElementById("filterFechaTipo").value;
    document.getElementById("customDateInputs").style.display = (tipo === "personalizada") ? "block" : "none";
    renderMatrix();
  }

  function resetSingleFilter(id) {
    if (id === "FechaTipo") {
      document.getElementById("filterFechaTipo").value = "este_mes";
      document.getElementById("customDateInputs").style.display = "none";
      document.getElementById("filterFechaDesde").value = "";
      document.getElementById("filterFechaHasta").value = "";
    } else {
      const prop = id.toLowerCase();
      SELECCIONES[prop] = [];
    }
    buildCascadingFilters();
    renderMatrix();
  }

  function resetAllFilters() {
    for(let key in SELECCIONES) SELECCIONES[key] = [];
    document.getElementById("filterFechaTipo").value = "este_mes";
    document.getElementById("customDateInputs").style.display = "none";
    document.getElementById("filterFechaDesde").value = "";
    document.getElementById("filterFechaHasta").value = "";
    buildCascadingFilters();
    renderMatrix();
  }

  // MOTOR DE CÁLCULO Y RENDERIZADO
  function renderMatrix() {
    const fFechaTipo = document.getElementById("filterFechaTipo").value;
    const orderMode = document.getElementById("pivotGroupingOrder").value;

    const hoy = new Date();
    const curYear = hoy.getFullYear();
    const curMonth = hoy.getMonth();

    TOOLTIP_REGISTRY = {};

    const filtered = DB_RAW.filter(r => {
      // Validar selecciones múltiples acumuladas
      for (let prop in SELECCIONES) {
        if (SELECCIONES[prop].length > 0 && !SELECCIONES[prop].includes(r[prop])) {
          return false;
        }
      }

      // Validar Período de Tiempo
      if(fFechaTipo !== "all" && r.fecha) {
        const parts = r.fecha.split("-");
        if(parts.length === 3) {
          const rYear = parseInt(parts[0], 10);
          const rMonth = parseInt(parts[1], 10) - 1; 
          if(fFechaTipo === "este_mes") {
            if(rYear !== curYear || rMonth !== curMonth) return false;
          } else if(fFechaTipo === "mes_pasado") {
            let targetMonth = curMonth - 1; let targetYear = curYear;
            if(targetMonth < 0) { targetMonth = 11; targetYear--; }
            if(rYear !== targetYear || rMonth !== targetMonth) return false;
          } else if(fFechaTipo === "ano_curso") {
            if(rYear !== curYear) return false;
          } else if(fFechaTipo === "personalizada") {
            const desde = document.getElementById("filterFechaDesde").value;
            const hasta = document.getElementById("filterFechaHasta").value;
            if(desde && r.fecha < desde) return false;
            if(hasta && r.fecha > hasta) return false;
          }
        }
      }
      return true;
    });

    const container = document.getElementById("matrixContainer");
    if(!filtered.length) {
      container.innerHTML = `<div class="p-5 text-center text-muted fw-medium">No se encontraron registros para los filtros seleccionados.</div>`;
      return;
    }

    const listaFechasBase = [...new Set(filtered.map(r => r.fecha))].sort();
    const columnasMapeadas = {}; 
    filtered.forEach(r => {
      const key = (orderMode === "finca_actividad") ? `${r.finca}|||${r.actividad}` : `${r.actividad}|||${r.finca}`;
      columnasMapeadas[key] = { 
        padre: (orderMode === "finca_actividad") ? r.finca : r.actividad, 
        hijo: (orderMode === "finca_actividad") ? r.actividad : r.finca 
      };
    });

    const llavesColumnas = Object.keys(columnasMapeadas).sort();
    const matrizValores = {};
    
    filtered.forEach(r => {
      const colKey = (orderMode === "finca_actividad") ? `${r.finca}|||${r.actividad}` : `${r.actividad}|||${r.finca}`;
      
      if(!matrizValores[r.fecha]) matrizValores[r.fecha] = {};
      matrizValores[r.fecha][colKey] = (matrizValores[r.fecha][colKey] || 0) + r.avance;

      // Inyectar datos en la memoria del Popup (¡Aquí se captura el Ciclo también!)
      const popupId = `pop_${r.fecha}_${colKey.replace(/[^a-zA-Z0-9]/g, '_')}`;
      if(!TOOLTIP_REGISTRY[popupId]) TOOLTIP_REGISTRY[popupId] = [];
      TOOLTIP_REGISTRY[popupId].push({
        orden: r.orden,
        turno: r.turno,
        proveedor: r.proveedor,
        ciclo: r.ciclo,          // Captura del ciclo agregada
        lote: r.lote_agricola,
        avance: r.avance
      });
    });

    const bloquesPadre = {};
    llavesColumnas.forEach(k => {
      const p = columnasMapeadas[k].padre;
      bloquesPadre[p] = (bloquesPadre[p] || 0) + 1;
    });

    let html = `<table class="pivot-gantt"><thead><tr>`;
    html += `<th rowspan="2" class="col-fecha-sticky">Fecha</th>`;

    Object.keys(bloquesPadre).sort().forEach(padre => {
      html += `<th colspan="${bloquesPadre[padre]}">${padre}</th>`;
    });
    html += `</tr><tr class="sub-hdr">`;

    llavesColumnas.forEach(k => {
      html += `<th style="min-width:130px; font-size:11px;">${columnasMapeadas[k].hijo}</th>`;
    });
    html += `</tr></thead><tbody>`;

    listaFechasBase.forEach(fechaBase => {
      html += `<tr><td class="col-fecha-sticky">${formatToCustomDate(fechaBase)}</td>`;
      llavesColumnas.forEach(colKey => {
        const val = (matrizValores[fechaBase] && matrizValores[fechaBase][colKey]) ? matrizValores[fechaBase][colKey] : 0;
        if(val > 0) {
          const pId = `pop_${fechaBase}_${colKey.replace(/[^a-zA-Z0-9]/g, '_')}`;
          html += `<td>
                    <div class="cell-interactive" data-popup-id="${pId}" onmouseenter="showPopup(event)" onmousemove="movePopup(event)" onmouseleave="hidePopup()">
                      <div class="mzn-badge-container">${val.toFixed(1)}</div>
                    </div>
                   </td>`;
        } else {
          html += `<td>-</td>`;
        }
      });
      html += `</tr>`;
    });

    html += `</tbody></table>`;
    container.innerHTML = html;
  }

  // ── SCRIPT DEL POP-UP FLOTANTE (Con Proveedor de Servicio y Ciclo) ──
  const popupEl = document.getElementById("global-gantt-tooltip");

  function showPopup(e) {
    const key = e.currentTarget.getAttribute("data-popup-id");
    const dataset = TOOLTIP_REGISTRY[key];
    if (!dataset) return;

    let content = `<div class="popup-hdr">Desglose de Operaciones</div>`;
    dataset.forEach(item => {
      content += `
        <div class="popup-block">
          <div class="popup-item"><span class="p-label">N° Orden:</span><span class="p-val">#${item.orden}</span></div>
          <div class="popup-item"><span class="p-label">Turno:</span><span class="p-val">${item.turno}</span></div>
          <div class="popup-item"><span class="p-label">Proveedor de Servicio:</span><span class="p-val">${item.proveedor}</span></div>
          <div class="popup-item"><span class="p-label">Ciclo:</span><span class="p-val">${item.ciclo}</span></div>
          <div class="popup-item"><span class="p-label">Lote:</span><span class="p-val">${item.lote}</span></div>
          <div class="popup-item"><span class="p-label">Avance:</span><span class="p-val" style="color:#4ade80;">${item.avance.toFixed(1)} Mzn</span></div>
        </div>
        ${dataset.length > 1 ? '<hr style="margin:6px 0; opacity:0.15; border-color:#fff;">' : ''}
      `;
    });

    popupEl.innerHTML = content;
    popupEl.style.display = "block";
    movePopup(e);
  }

  function movePopup(e) {
    // Ampliado a 320px para ajustar el nombre de la etiqueta "Proveedor de Servicio"
    const width = 320; 
    const height = popupEl.offsetHeight || 140;
    let left = e.clientX - (width / 2);
    let top = e.clientY - height - 15;
    if (left + width > window.innerWidth) left = window.innerWidth - width - 15;
    if (left < 0) left = 15;
    if (top < 0) top = e.clientY + 20;

    popupEl.style.left = left + "px";
    popupEl.style.top = top + "px";
  }

  function hidePopup() { popupEl.style.display = "none"; }

  function exportPivotToExcel() {
    const table = document.querySelector("table.pivot-gantt");
    if(!table) return;
    const wb = XLSX.utils.table_to_book(table, { raw: false });
    XLSX.writeFile(wb, `INFOAGRO_MATRIZ_DIARIA_LABORES.xlsx`);
  }

  // Cerrar menús al hacer clic fuera
  document.addEventListener("click", () => closeAllDropdowns());

  loadData();
</script>

</body>
