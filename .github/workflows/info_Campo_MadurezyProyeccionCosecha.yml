name: Odoo Proxy Recuentos Madurez y Cosecha

on:
  schedule:
    - cron: "*/10 * * * *"   # Ejecuta cada 10 minutos
  workflow_dispatch:          # Permite ejecución manual

permissions:
  contents: write   # Permite hacer commit y push

jobs:
  fetch-odoo-recuentos-myc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Llamar a Odoo JSON-RPC y guardar resultado
        env:
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
        run: |
          echo "Llamando a Odoo Recuentos de Madurez y Cosecha..."
          curl -s -X POST https://infoagro.odoo.com/jsonrpc/ \
          -H "Content-Type: application/json" \
          -d '{
            "jsonrpc": "2.0",
            "method": "call",
            "id": 1,
            "params": {
              "service": "object",
              "method": "execute",
              "args": [
                "infoagro",
                2,
                "'"$ODOO_PASSWORD"'",
                "x_madurez_y_estimacion_line_bca41",
                "search_read",
                [],
                [
                  "id","x_studio_sector","x_studio_reporte","x_studio_ciclo",
                  "x_studio_finca","x_studio_lote","x_studio_fecha","x_studio_dds",
                  "x_studio_variedad","x_name","x_studio_plantas_en_mtrs",
                  "x_studio_cap_sana","x_studio_cap_podrida","x_studio_cap_germinada",
                  "x_studio_total_cap","x_studio_cap_negras","x_studio_cap_cafe",
                  "x_studio_cap_naranja","x_studio_cap_amarilla","x_studio_cap_blanca",
                  "x_studio_totalanalisiscapsanas","x_studio_amarillablanca",
                  "x_studio_porcentajecapsanas","x_studio_porcentajecappodridas",
                  "x_studio_porcentajecapgerminadas","x_studio_porcentajecapnegra",
                  "x_studio_porcentajecapcafe","x_studio_porcentajecapnegramascafe",
                  "x_studio_porcentajecapnaranja","x_studio_porcentajecafemasnaranja",
                  "x_studio_porcentajecapamarilla","x_studio_porcentajecapblanca",
                  "x_studio_porcentajecapamarillamasblanca","x_studio_semillaporlibra",
                  "x_studio_estimacionqqxmzn","x_studio_compaia"
                ]
              ]
            }
          }' > info_Campo_MadurezyProyeccionCosecha.json

          echo "Verificando contenido..."
          if [ ! -s info_Campo_MadurezyProyeccionCosecha.json ]; then
            echo "❌ Error: info_Campo_MadurezyProyeccionCosecha.json está vacío o no se generó correctamente."
            exit 1
          fi

          echo "✅ Archivo generado correctamente:"
          head -n 10 info_Campo_MadurezyProyeccionCosecha.json

      - name: Commit y push del JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add info_Campo_MadurezyProyeccionCosecha.json
          git commit -m "Actualización automática de datos Recuentos Madurez y Cosecha desde Odoo" || echo "No hay cambios"
          intento=1
          maximo_intentos=5
          while [ $intento -le $maximo_intentos ]; do
            echo "Intento de push #$intento..."
            if git pull --rebase origin main && git push origin main; then
              echo "Push exitoso."
              break
            fi
            if [ $intento -eq $maximo_intentos ]; then
              echo "Se agotaron los intentos de push."
              exit 1
            fi
            espera=$(( (RANDOM % 5) + 3 ))
            echo "Push rechazado (probablemente otro workflow empujo al mismo tiempo). Esperando ${espera}s..."
            sleep $espera
            intento=$((intento + 1))
          done
