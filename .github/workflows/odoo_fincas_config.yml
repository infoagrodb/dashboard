name: Odoo - Fincas Config (Compañía-Lote)

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-fincas-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Crear carpeta data si no existe
        run: mkdir -p data

      - name: Llamar a Odoo y obtener lotes con compañía, finca, sector y productor
        env:
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
        run: |
          echo "Llamando a Odoo — modelo x_fincas_line_0e624..."
          curl -s -X POST https://infoagro.odoo.com/jsonrpc/ \
          -H "Content-Type: application/json" \
          -d '{
            "jsonrpc": "2.0",
            "method": "call",
            "id": 1,
            "params": {
              "service": "object",
              "method": "execute",
              "args": [
                "infoagro",
                2,
                "'"$ODOO_PASSWORD"'",
                "x_fincas_line_0e624",
                "search_read",
                [],
                [
                  "id",
                  "x_name",
                  "x_studio_finca",
                  "x_studio_compaia",
                  "x_studio_sector",
                  "x_studio_productor",
                  "x_studio_area_en_mzn_perimetro",
                  "x_studio_area_agricola_en_mzn",
                  "x_studio_estado"
                ],
                0,
                500
              ]
            }
          }' > raw_lotes.json

          echo "Verificando contenido..."
          if [ ! -s raw_lotes.json ]; then
            echo "❌ Error: raw_lotes.json está vacío."
            exit 1
          fi
          echo "✅ Datos crudos obtenidos:"
          head -c 300 raw_lotes.json

      - name: Transformar JSON — generar fincas_config.json
        run: |
          python3 << 'PYEOF'
          import json, sys, os
          from datetime import datetime, timezone

          with open('raw_lotes.json') as f:
              raw = json.load(f)

          if 'result' not in raw:
              print("❌ Error en respuesta Odoo:", raw.get('error', 'Sin detalle'))
              sys.exit(1)

          lotes_raw = raw['result']
          print(f"✅ {len(lotes_raw)} lotes recibidos de Odoo")

          # ── Compañías ─────────────────────────────────────────────
          companias_set = {l.get('x_studio_compaia') or 'Sin compañía' for l in lotes_raw}
          companias_lista = sorted(companias_set)
          compania_id_map = {nombre: idx+1 for idx, nombre in enumerate(companias_lista)}

          COLORES = ["#2D6A8A", "#3A8A5A", "#8A6A2D", "#6A3A8A", "#8A3A5A", "#5A5A5A"]
          companias = [
              {"id": compania_id_map[nombre], "nombre": nombre, "color": COLORES[i % len(COLORES)]}
              for i, nombre in enumerate(companias_lista)
          ]

          # ── Fincas ────────────────────────────────────────────────
          fincas_map = {}
          for l in lotes_raw:
              fn = l.get('x_studio_finca') or 'Sin finca'
              c  = l.get('x_studio_compaia') or 'Sin compañía'
              if fn not in fincas_map:
                  fincas_map[fn] = compania_id_map[c]

          fincas = [{"nombre": fn, "compania_id": cid} for fn, cid in sorted(fincas_map.items())]

          # ── Lotes completos ───────────────────────────────────────
          lotes = []
          for l in lotes_raw:
              fn = l.get('x_studio_finca') or 'Sin finca'
              c  = l.get('x_studio_compaia') or 'Sin compañía'
              lotes.append({
                  "id":          l['id'],
                  "nombre":      l.get('x_name') or '',
                  "finca":       fn,
                  "compania":    c,
                  "compania_id": compania_id_map[c],
                  "sector":      l.get('x_studio_sector') or '',
                  "productor":   l.get('x_studio_productor') or '',
                  "area_p":      l.get('x_studio_area_en_mzn_perimetro') or 0,
                  "area_a":      l.get('x_studio_area_agricola_en_mzn') or 0,
                  "estado":      l.get('x_studio_estado') or ''
              })

          config = {
              "_meta": {
                  "generado": datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC'),
                  "total_lotes": len(lotes),
                  "total_fincas": len(fincas),
                  "companias_encontradas": len(companias)
              },
              "companias": companias,
              "fincas": fincas,
              "lotes": lotes
          }

          os.makedirs('data', exist_ok=True)
          with open('data/fincas_config.json', 'w', encoding='utf-8') as f:
              json.dump(config, f, ensure_ascii=False, indent=2)

          print("✅ fincas_config.json generado correctamente")
          PYEOF

      - name: Commit y push de fincas_config.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/fincas_config.json
          git commit -m "🗺️ Actualización automática fincas_config.json (compañía-finca-sector-productor-lote) desde Odoo" || echo "Sin cambios"
          git pull --rebase origin main
          git push origin main
