name: Info Campo - Madurez Proyección Cosecha

on:
  schedule:
    # Todos los días a las 06:00 AM Nicaragua (12:00 UTC)
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  calcular-madurez-proyeccion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Crear carpeta data si no existe
        run: mkdir -p data

      - name: Llamar a Odoo — obtener datos de madurez y proyección
        env:
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
        run: |
          echo "Llamando a Odoo — modelo x_campo_madurez_proyeccion..."
          curl -s -X POST https://infoagro.odoo.com/jsonrpc/ \
          -H "Content-Type: application/json" \
          -d '{
            "jsonrpc": "2.0",
            "method": "call",
            "id": 1,
            "params": {
              "service": "object",
              "method": "execute",
              "args": [
                "infoagro",
                2,
                "'"$ODOO_PASSWORD"'",
                "x_campo_madurez_proyeccion",
                "search_read",
                [],
                [
                  "id",
                  "x_name",
                  "x_studio_finca",
                  "x_studio_compaia",
                  "x_studio_sector",
                  "x_studio_productor",
                  "x_studio_fecha_siembra",
                  "x_studio_fecha_cosecha_estimada",
                  "x_studio_dias_transcurridos",
                  "x_studio_porcentaje_madurez",
                  "x_studio_estado"
                ],
                0,
                500
              ]
            }
          }' > raw_madurez.json

          echo "Verificando contenido..."
          if [ ! -s raw_madurez.json ]; then
            echo "❌ Error: raw_madurez.json está vacío."
            exit 1
          fi
          echo "✅ Datos crudos obtenidos:"
          head -c 300 raw_madurez.json

      - name: Transformar JSON — generar madurez_proyeccion.json
        run: |
          python3 << 'PYEOF'
          import json, sys, os
          from datetime import datetime, timezone

          with open('raw_madurez.json') as f:
              raw = json.load(f)

          if 'result' not in raw:
              print("❌ Error en respuesta Odoo:", raw.get('error', 'Sin detalle'))
              sys.exit(1)

          registros = raw['result']
          print(f"✅ {len(registros)} registros recibidos de Odoo")

          companias_set = {r.get('x_studio_compaia') or 'Sin compañía' for r in registros}
          companias_lista = sorted(companias_set)
          compania_id_map = {nombre: idx+1 for idx, nombre in enumerate(companias_lista)}

          COLORES = ["#2D6A8A", "#3A8A5A", "#8A6A2D", "#6A3A8A", "#8A3A5A", "#5A5A5A"]
          companias = [
              {"id": compania_id_map[nombre], "nombre": nombre, "color": COLORES[i % len(COLORES)]}
              for i, nombre in enumerate(companias_lista)
          ]

          lotes = []
          for r in registros:
              fn = r.get('x_studio_finca') or 'Sin finca'
              c  = r.get('x_studio_compaia') or 'Sin compañía'
              lotes.append({
                  "id": r['id'],
                  "nombre": r.get('x_name') or '',
                  "finca": fn,
                  "compania": c,
                  "compania_id": compania_id_map[c],
                  "sector": r.get('x_studio_sector') or '',
                  "productor": r.get('x_studio_productor') or '',
                  "fecha_siembra": r.get('x_studio_fecha_siembra') or '',
                  "fecha_cosecha_estimada": r.get('x_studio_fecha_cosecha_estimada') or '',
                  "dias_transcurridos": r.get('x_studio_dias_transcurridos') or 0,
                  "porcentaje_madurez": r.get('x_studio_porcentaje_madurez') or 0,
                  "estado": r.get('x_studio_estado') or ''
              })

          config = {
              "_meta": {
                  "generado": datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC'),
                  "total_registros": len(lotes),
                  "companias_encontradas": len(companias)
              },
              "companias": companias,
              "lotes": lotes
          }

          os.makedirs('data', exist_ok=True)
          with open('data/madurez_proyeccion.json', 'w', encoding='utf-8') as f:
              json.dump(config, f, ensure_ascii=False, indent=2)

          print("✅ madurez_proyeccion.json generado correctamente")
          PYEOF

      - name: Commit y push de madurez_proyeccion.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/madurez_proyeccion.json
          git commit -m "🌾 Actualización automática madurez_proyeccion.json desde Odoo" || echo "Sin cambios"
          git pull --rebase origin main
          git push origin main
