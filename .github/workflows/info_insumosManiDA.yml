name: Odoo Proxy Insumos Consumo Mani DA

on:
  schedule:
    - cron: "0 */4 * * *"   # Ejecuta cada 4 horas
  workflow_dispatch:          # Permite ejecución manual

permissions:
  contents: write

jobs:
  fetch-odoo-insumos-mani-da:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Llamar a Odoo JSON-RPC y guardar resultado
        env:
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
        run: |
          echo "Llamando a Odoo - Insumos Consumo Mani Division Agricola..."
          curl -s -X POST https://infoagro.odoo.com/jsonrpc/ \
          -H "Content-Type: application/json" \
          -d '{
            "jsonrpc": "2.0",
            "method": "call",
            "id": 1,
            "params": {
              "service": "object",
              "method": "execute",
              "args": [
                "infoagro",
                2,
                "'"$ODOO_PASSWORD"'",
                "x_orden_campo_line_662d7",
                "search_read",
                [
                  ["x_studio_compaia", "=", 2],
                  ["x_studio_ciclo.name", "ilike", "Mani"]
                ],
                [
                  "id",
                  "x_studio_reporte_consolidado",
                  "x_orden_campo_id",
                  "x_studio_fecha",
                  "x_studio_ciclo",
                  "x_studio_sector_1",
                  "x_studio_keyfincainsumo",
                  "x_studio_lote_agricola",
                  "x_studio_categoria_actividad",
                  "x_studio_categoria_insumo",
                  "x_studio_actividad_realizada",
                  "x_studio_codigo_externo",
                  "x_studio_insumo_utilizado",
                  "x_studio_related_field_312_1j9n5lns3",
                  "x_studio_um",
                  "x_studio_cantidad_gastada",
                  "x_studio_area_mzn_aplicada",
                  "x_studio_salidas_de_bodega",
                  "x_studio_compaia"
                ]
              ]
            }
          }' > info_Insumos_Consumo_Mani_DA.json

          echo "Verificando contenido..."
          if [ ! -s info_Insumos_Consumo_Mani_DA.json ]; then
            echo "❌ Error: info_Insumos_Consumo_Mani_DA.json está vacío."
            exit 1
          fi

          # Verificar que es JSON válido
          python3 -c "
          import json,sys
          with open('info_Insumos_Consumo_Mani_DA.json') as f:
              d = json.load(f)
          regs = len(d.get('result', []))
          print(f'✅ JSON válido · {regs} registros Mani DA')
          # Verificar que todos son Mani y Division Agricola
          for r in d.get('result', []):
              ciclo = r.get('x_studio_ciclo', [None, ''])
              cia   = r.get('x_studio_compaia', [None, ''])
              ciclo_n = ciclo[1] if isinstance(ciclo, list) else ciclo
              cia_n   = cia[1]   if isinstance(cia, list)   else cia
              if 'Mani' not in str(ciclo_n):
                  print(f'⚠️ Registro fuera de Mani: id={r[\"id\"]} ciclo={ciclo_n}')
              if cia[0] != 2:
                  print(f'⚠️ Compañia incorrecta: id={r[\"id\"]} cia={cia_n}')
          print('✅ Validación completada')
          "

          echo "Primeros registros:"
          head -c 500 info_Insumos_Consumo_Mani_DA.json

      - name: Commit y push del JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add info_Insumos_Consumo_Mani_DA.json
          git commit -m "Actualización automática Insumos Consumo Mani DA desde Odoo" || echo "No hay cambios"
          intento=1
          maximo_intentos=5
          while [ $intento -le $maximo_intentos ]; do
            echo "Intento de push #$intento..."
            if git pull --rebase origin main && git push origin main; then
              echo "Push exitoso."
              break
            fi
            if [ $intento -eq $maximo_intentos ]; then
              echo "Se agotaron los intentos de push."
              exit 1
            fi
            espera=$(( (RANDOM % 5) + 3 ))
            echo "Push rechazado. Esperando ${espera}s..."
            sleep $espera
            intento=$((intento + 1))
          done
