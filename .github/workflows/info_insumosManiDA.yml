name: Odoo Proxy Insumos Consumo Mani DA

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-odoo-insumos-mani-da:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Llamar a Odoo JSON-RPC y guardar resultado
        env:
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
        run: |
          echo "Llamando a Odoo - Insumos Consumo Mani Division Agricola..."
          curl -s -X POST https://infoagro.odoo.com/jsonrpc/ \
          -H "Content-Type: application/json" \
          -d '{
            "jsonrpc": "2.0",
            "method": "call",
            "id": 1,
            "params": {
              "service": "object",
              "method": "execute",
              "args": [
                "infoagro",
                2,
                "'"$ODOO_PASSWORD"'",
                "x_orden_campo_line_662d7",
                "search_read",
                [],
                [
                  "id","x_studio_reporte_consolidado","x_orden_campo_id",
                  "x_studio_fecha","x_studio_ciclo","x_studio_sector_1",
                  "x_studio_keyfincainsumo","x_studio_lote_agricola",
                  "x_studio_categoria_actividad","x_studio_categoria_insumo",
                  "x_studio_actividad_realizada","x_studio_codigo_externo",
                  "x_studio_insumo_utilizado","x_studio_related_field_312_1j9n5lns3",
                  "x_studio_um","x_studio_cantidad_gastada",
                  "x_studio_area_mzn_aplicada","x_studio_salidas_de_bodega",
                  "x_studio_compaia"
                ]
              ]
            }
          }' > info_todos.json

          echo "Verificando contenido..."
          if [ ! -s info_todos.json ]; then
            echo "❌ Error: respuesta vacía"
            exit 1
          fi

          echo "Filtrando solo Mani + Division Agricola Comasa (compaia id=2)..."
          python3 << 'PYEOF'
          import json

          with open('info_todos.json') as f:
              data = json.load(f)

          todos = data.get('result', [])
          print(f"Total registros descargados: {len(todos)}")

          filtrados = []
          for r in todos:
              ciclo = r.get('x_studio_ciclo', [])
              cia   = r.get('x_studio_compaia', [])
              ciclo_nombre = ciclo[1] if isinstance(ciclo, list) and len(ciclo) > 1 else str(ciclo)
              cia_id = cia[0] if isinstance(cia, list) and len(cia) > 0 else None
              if 'Mani' in ciclo_nombre and cia_id == 2:
                  filtrados.append(r)

          print(f"Registros Mani + Division Agricola: {len(filtrados)}")

          resultado = {"jsonrpc": "2.0", "id": 1, "result": filtrados}
          with open('info_Insumos_Consumo_Mani_DA.json', 'w', encoding='utf-8') as f:
              json.dump(resultado, f, ensure_ascii=False, indent=2)

          print("✅ info_Insumos_Consumo_Mani_DA.json generado correctamente")
          PYEOF

          echo "Muestra del resultado:"
          head -c 500 info_Insumos_Consumo_Mani_DA.json

      - name: Commit y push del JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add info_Insumos_Consumo_Mani_DA.json
          git commit -m "Actualización automática Insumos Consumo Mani DA desde Odoo" || echo "No hay cambios"
          intento=1
          maximo_intentos=5
          while [ $intento -le $maximo_intentos ]; do
            echo "Intento de push #$intento..."
            if git pull --rebase origin main && git push origin main; then
              echo "Push exitoso."
              break
            fi
            if [ $intento -eq $maximo_intentos ]; then
              echo "Se agotaron los intentos de push."
              exit 1
            fi
            espera=$(( (RANDOM % 5) + 3 ))
            echo "Push rechazado. Esperando ${espera}s..."
            sleep $espera
            intento=$((intento + 1))
          done
