name: Test Campo Name PayslipLine

on:
  workflow_dispatch:   # Se ejecuta solo manualmente

jobs:
  test-name-field:
    name: Probar campo name en hr.payslip.line
    runs-on: ubuntu-latest

    steps:
      - name: Llamar a Odoo y probar campo name
        run: |
          echo "Probando campo 'name' en hr.payslip.line..."

          curl -s -X POST https://grupozp.odoo.com/jsonrpc \
          -H "Content-Type: application/json" \
          -d '{
            "jsonrpc": "2.0",
            "method": "call",
            "id": 1,
            "params": {
              "service": "object",
              "method": "execute_kw",
              "args": [
                "grupozp-main-13656030",
                7,
                "Meganet37**",
                "hr.payslip.line",
                "search_read",
                [],
                {
                  "fields": ["name"],
                  "limit": 10
                }
              ]
            }
          }' > test_name.json

          echo "Validando JSON..."
          if ! jq empty test_name.json 2>/dev/null; then
            echo "❌ ERROR: La respuesta NO es JSON válido."
            echo "Contenido recibido:"
            cat test_name.json
            exit 1
          fi

          echo "✅ JSON válido recibido. Primeros registros:"
          jq . test_name.json
