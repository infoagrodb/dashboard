name: Odoo_CostosYGastosMOGZP

on:
  schedule:
    - cron: "30 5 * * *"
    - cron: "30 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch desde Odoo — solo lotes agrícolas
        env:
          GZP_API_KEY: ${{ secrets.GZP_API_KEY }}
        run: |
          echo "Descargando hr.payslip.line (solo agrícola)..."
          # Dominio: excluir lotes de Administración (no tienen cuenta analítica agrícola)
          curl -sf -X POST https://grupozp.odoo.com/jsonrpc \
          -H "Content-Type: application/json" \
          -d "{\"jsonrpc\":\"2.0\",\"method\":\"call\",\"id\":1,\"params\":{\"service\":\"object\",\"method\":\"execute_kw\",\"args\":[\"grupozp-main-13656030\",7,\"$GZP_API_KEY\",\"hr.payslip.line\",\"search_read\",[[\"x_studio_cuenta_analitica_en_recibo_de_pago\",\"!=\",false]],{\"fields\":[\"name\",\"x_studio_nombre_del_lote\",\"x_studio_fecha_final_lote\",\"x_studio_cuenta_analitica_en_recibo_de_pago\",\"x_studio_empleado\",\"x_studio_puesto_historico\",\"x_studio_tipo_contrato\",\"x_studio_actividad_agricola_1\",\"x_studio_cuenta_contable_debito\",\"total\"],\"limit\":0}]}}" \
          > CostosyGastosMOGZP.json

          [ -s CostosyGastosMOGZP.json ] || { echo "❌ Vacío"; exit 1; }

          TOTAL=$(jq '.result | length' CostosyGastosMOGZP.json 2>/dev/null || echo 0)
          echo "✅ CostosyGastosMO filtrados: $TOTAL registros"
          echo "   Tamaño: $(wc -c < CostosyGastosMOGZP.json) bytes"

      - name: Commit y push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add CostosyGastosMOGZP.json
          git commit -m "Auto: CostosyGastosMO GZP (solo agrícola)" || echo "Sin cambios"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && break
            [ $i -eq 5 ] && exit 1
            sleep $(( (RANDOM % 5) + 3 ))
          done
