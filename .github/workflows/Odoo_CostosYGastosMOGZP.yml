ame: OdooGzp_ApuntesContables
 
on:
  schedule:
    - cron: "30 5 * * *"
    - cron: "30 18 * * *"
  workflow_dispatch:
 
permissions:
  contents: write
 
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
 
      - name: Fetch desde Odoo y filtrar con jq
        env:
          GZP_API_KEY: ${{ secrets.GZP_API_KEY }}
        run: |
          echo "Descargando account.move.line..."
          curl -sf -X POST https://grupozp.odoo.com/jsonrpc \
          -H "Content-Type: application/json" \
          -d "{\"jsonrpc\":\"2.0\",\"method\":\"call\",\"id\":1,\"params\":{\"service\":\"object\",\"method\":\"execute_kw\",\"args\":[\"grupozp-main-13656030\",7,\"$GZP_API_KEY\",\"account.move.line\",\"search_read\",[[]],{\"fields\":[\"date\",\"move_name\",\"account_id\",\"partner_id\",\"name\",\"product_uom_category_id\",\"debit\",\"credit\",\"parent_state\",\"x_studio_es_cierre_ab\",\"analytic_distribution\"],\"limit\":0}]}}" \
          > _raw_contables.json
 
          [ -s _raw_contables.json ] || { echo "❌ Vacío"; exit 1; }
 
          echo "Filtrando con jq..."
          jq '
            .result |= map(
              select(
                .account_id != false and
                .account_id != null and
                (
                  (.account_id[1] // "") | split(" ")[0]
                ) as $cod |
                ($cod | test("^(113|114|115)"))
              )
            )
          ' _raw_contables.json > OdooGzp_ApuntesContables.json
 
          rm _raw_contables.json
 
          TOTAL=$(jq '.result | length' OdooGzp_ApuntesContables.json)
          SIZE=$(wc -c < OdooGzp_ApuntesContables.json)
          echo "✅ ApuntesContables filtrados: $TOTAL registros — $SIZE bytes"
 
      - name: Commit y push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add OdooGzp_ApuntesContables.json
          git commit -m "Auto: ApuntesContables GZP (filtrado 113xx-115xx)" || echo "Sin cambios"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && break
            [ $i -eq 5 ] && exit 1
            sleep $(( (RANDOM % 5) + 3 ))
          done
 
