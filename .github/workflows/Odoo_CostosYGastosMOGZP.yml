name: Odoo Proxy CostosYGastosMOGZP

on:
schedule:
- cron: "*/10 * * * *"
workflow_dispatch:

permissions:
contents: write

jobs:
fetch-odoo-costosygastos:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repo
    uses: actions/checkout@v3

  - name: Instalar jq
    run: sudo apt-get update && sudo apt-get install -y jq

  - name: Descargar TODOS los registros desde Odoo
    run: |

      DB="grupozp-main-13656030"
      UID="7"
      PASS="Meganet37**"
      MODEL="hr.payslip.line"

      echo "Consultando cantidad total de registros..."

      TOTAL=$(curl -s -X POST https://grupozp.odoo.com/jsonrpc \
      -H "Content-Type: application/json" \
      -d "{
        \"jsonrpc\":\"2.0\",
        \"method\":\"call\",
        \"id\":1,
        \"params\":{
          \"service\":\"object\",
          \"method\":\"execute\",
          \"args\":[
            \"$DB\",
            $UID,
            \"$PASS\",
            \"$MODEL\",
            \"search_count\",
            []
          ]
        }
      }" | jq -r '.result')

      echo "Total registros en Odoo: $TOTAL"

      PAGE_SIZE=1000
      OFFSET=0

      echo '{"result":[]}' > CostosyGastosMOGZP.json

      while [ $OFFSET -lt $TOTAL ]
      do

        echo "Descargando registros $OFFSET a $(($OFFSET+$PAGE_SIZE-1))"

        curl -s -X POST https://grupozp.odoo.com/jsonrpc \
        -H "Content-Type: application/json" \
        -d "{
          \"jsonrpc\":\"2.0\",
          \"method\":\"call\",
          \"id\":1,
          \"params\":{
            \"service\":\"object\",
            \"method\":\"execute_kw\",
            \"args\":[
              \"$DB\",
              $UID,
              \"$PASS\",
              \"$MODEL\",
              \"search_read\",
              [[]]
            ],
            \"kwargs\":{
              \"fields\":[
                \"x_studio_nombre_del_lote\",
                \"x_studio_fecha_final_lote\",
                \"x_studio_cuenta_analitica_en_recibo_de_pago\",
                \"x_studio_empleado\",
                \"x_studio_puesto_historico\",
                \"x_studio_tipo_contrato\",
                \"x_studio_actividad_agricola_1\",
                \"x_studio_cuenta_contable_debito\",
                \"total\"
              ],
              \"offset\":$OFFSET,
              \"limit\":$PAGE_SIZE
            }
          }
        }" > page.json

        jq -s '
          {
            result:
            (
              .[0].result +
              .[1].result
            )
          }
        ' CostosyGastosMOGZP.json page.json > temp.json

        mv temp.json CostosyGastosMOGZP.json

        OFFSET=$((OFFSET + PAGE_SIZE))

      done

      echo "Verificando resultado..."

      REGISTROS=$(jq '.result | length' CostosyGastosMOGZP.json)

      echo "Registros descargados: $REGISTROS"

      if [ "$REGISTROS" -eq 0 ]; then
        echo "ERROR: No se descargaron registros"
        exit 1
      fi

      echo "Primeros registros:"
      jq '.result[0:3]' CostosyGastosMOGZP.json

  - name: Commit y push del JSON
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    run: |
      git config user.name "github-actions"
      git config user.email "actions@github.com"

      git add CostosyGastosMOGZP.json

      git commit -m "Actualización automática completa Costos y Gastos" || echo "Sin cambios"

      git push origin main
```
