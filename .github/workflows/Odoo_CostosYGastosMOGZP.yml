- name: Llamar a Odoo JSON-RPC y guardar resultado
  run: |
    echo "Llamando a Odoo Costos y Gastos..."
    curl -s -X POST https://grupozp.odoo.com/jsonrpc \
    -H "Content-Type: application/json" \
    -d '{
      "jsonrpc": "2.0",
      "method": "call",
      "id": 1,
      "params": {
        "service": "object",
        "method": "execute_kw",
        "args": [
          "grupozp-main-13656030",
          7,
          "Meganet37**",
          "hr.payslip.line",
          "search_read",
          [],
          {
            "fields": [
              "x_studio_nombre_del_lote",
              "x_studio_fecha_final_lote",
              "x_studio_cuenta_analitica_en_recibo_de_pago",
              "x_studio_empleado",
              "x_studio_puesto_historico",
              "x_studio_tipo_contrato",
              "x_studio_actividad_agricola_1",
              "x_studio_cuenta_contable_debito",
              "total"
            ],
            "limit": 0
          }
        ]
      }
    }' > CostosyGastosMOGZP.json

    echo "Verificando contenido..."
    if [ ! -s CostosyGastosMOGZP.json ]; then
      echo "❌ Error: CostosyGastosMOGZP.json está vacío o no se generó correctamente."
      exit 1
    fi

    echo "✅ Archivo generado correctamente:"
    head -n 10 CostosyGastosMOGZP.json
