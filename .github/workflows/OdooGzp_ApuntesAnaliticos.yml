name: OdooGzp_ApuntesAnaliticos

on:
  schedule:
    - cron: "*/10 * * * *"   # Ejecuta cada 10 minutos
  workflow_dispatch:          # Permite ejecución manual

permissions:
  contents: write   # Permite hacer commit y push

jobs:
  fetch-odoo-apuntes-analiticos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Llamar a Odoo JSON-RPC y guardar resultado
        run: |
          echo "Llamando a Odoo account.analytic.line..."
          curl -s -X POST https://grupozp.odoo.com/jsonrpc \
          -H "Content-Type: application/json" \
          -d '{
            "jsonrpc": "2.0",
            "method": "call",
            "id": 1,
            "params": {
              "service": "object",
              "method": "execute",
              "args": [
                "grupozp-main-13656030",
                7,
                "Meganet37**",
                "account.analytic.line",
                "search_read",
                [],
                [
                  "date",
                  "x_studio_cuenta_analitica_unificada",
                  "amount",
                  "x_studio_es_cierre_de_ab",
                  "move_line_id",
                  "name",
                  "product_id",
                  "unit_amount",
                  "product_uom_id",
                  "ref",
                  "general_account_id"
                ]
              ]
            }
          }' > OdooGzp_ApuntesAnaliticos.json

          echo "Verificando contenido..."
          if [ ! -s OdooGzp_ApuntesAnaliticos.json ]; then
            echo "❌ Error: OdooGzp_ApuntesAnaliticos.json está vacío o no se generó correctamente."
            exit 1
          fi

          echo "✅ Archivo generado correctamente:"
          head -n 10 OdooGzp_ApuntesAnaliticos.json

      - name: Commit y push del JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add OdooGzp_ApuntesAnaliticos.json
          git commit -m "Actualización automática de Apuntes Analíticos desde Odoo" || echo "No hay cambios"
          git push origin main
