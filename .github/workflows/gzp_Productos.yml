name: Odoo Proxy ProductosZP

on:
  schedule:
    # 08:00 AM Nicaragua (14:00 UTC)
    - cron: "0 14 * * *"
    # 12:00 PM Nicaragua (18:00 UTC)
    - cron: "0 18 * * *"
    # 05:30 PM Nicaragua (23:30 UTC)
    - cron: "30 23 * * *"
  workflow_dispatch:


permissions:
  contents: write            # Permite hacer commit y push

jobs:
  fetch-odoo-productos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Llamar a Odoo JSON-RPC y guardar resultado
        env:
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
        run: |
          echo "Llamando a Odoo product.template..."

          curl -s -X POST https://grupozp.odoo.com/jsonrpc \
          -H "Content-Type: application/json" \
          -d '{
            "jsonrpc": "2.0",
            "method": "call",
            "id": 1,
            "params": {
              "service": "object",
              "method": "execute_kw",
              "args": [
                "grupozp-main-13656030",
                7,
                "'"$ODOO_PASSWORD"'",
                "product.template",
                "search_read",
                [],
                {
                  "fields": [
                    "x_studio_id",
                    "default_code",
                    "name",
                    "part_number",
                    "uom_id",
                    "list_price",
                    "type",
                    "categ_id",
                    "standard_price",
                    "qty_available",
                    "virtual_available"
                  ],
                  "limit": 0
                }
              ]
            }
          }' > gzp_Productos.json

          echo "Verificando contenido..."
          if [ ! -s gzp_Productos.json ]; then
            echo "❌ Error: gzp_Productos.json está vacío o no se generó correctamente."
            exit 1
          fi

          echo "✅ Archivo generado correctamente:"
          head -n 10 gzp_Productos.json

      - name: Commit y push del JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add gzp_Productos.json
          git commit -m "Actualización automática de productos desde Odoo" || echo "No hay cambios"
          intento=1
          maximo_intentos=5
          while [ $intento -le $maximo_intentos ]; do
            echo "Intento de push #$intento..."
            if git pull --rebase origin main && git push origin main; then
              echo "Push exitoso."
              break
            fi
            if [ $intento -eq $maximo_intentos ]; then
              echo "Se agotaron los intentos de push."
              exit 1
            fi
            espera=$(( (RANDOM % 5) + 3 ))
            echo "Push rechazado (probablemente otro workflow empujo al mismo tiempo). Esperando ${espera}s..."
            sleep $espera
            intento=$((intento + 1))
          done
