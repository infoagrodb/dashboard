name: info_TarifaActividadesAgricolas
on:
  schedule:
    # Tarifas cambian con poca frecuencia — 2 veces al día es suficiente
    # (ajusta si necesitas que refleje cambios más rápido)
    - cron: "0 13 * * *"   # 07:00 AM Nicaragua
    - cron: "0 19 * * *"   # 01:00 PM Nicaragua
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch-odoo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Llamar a Odoo JSON-RPC y guardar resultado
        env:
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
        run: |
          echo "Llamando a Odoo..."
          curl -s -X POST https://infoagro.odoo.com/jsonrpc/ \
          -H "Content-Type: application/json" \
          -d '{
            "jsonrpc": "2.0",
            "method": "call",
            "id": 1,
            "params": {
              "service": "object",
              "method": "execute",
              "args": [
                "infoagro",
                2,
                "'"$ODOO_PASSWORD"'",
                "x_actividadesagricolas_line_d1f6d",
                "search_read",
                [],
                [
                  "id","x_studio_proveedor_del_servicio","x_studio_ciclo",
                  "x_studio_actividad_agricola","x_studio_precio_en_dolar",
                  "x_studio_cuenta_contable_erp","x_studio_compaia","x_name"
                ]
              ]
            }
          }' > tarifa_actividades_agricolas.json
          echo "Verificando contenido..."
          if [ ! -s tarifa_actividades_agricolas.json ]; then
            echo "❌ Error: tarifa_actividades_agricolas.json está vacío o no se generó correctamente."
            exit 1
          fi
          echo "✅ Archivo generado correctamente:"
          head -n 10 tarifa_actividades_agricolas.json
      - name: Commit y push del JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add tarifa_actividades_agricolas.json
          git commit -m "Actualización automática de tarifas actividades agrícolas" || echo "No hay cambios"
          intento=1
          maximo_intentos=5
          while [ $intento -le $maximo_intentos ]; do
            echo "Intento de push #$intento..."
            if git pull --rebase origin main && git push origin main; then
              echo "Push exitoso."
              break
            fi
            if [ $intento -eq $maximo_intentos ]; then
              echo "Se agotaron los intentos de push."
              exit 1
            fi
            espera=$(( (RANDOM % 5) + 3 ))
            echo "Push rechazado (probablemente otro workflow empujó al mismo tiempo). Esperando ${espera}s..."
            sleep $espera
            intento=$((intento + 1))
          done
