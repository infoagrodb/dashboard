name: Odoo Proxy OrdenesCompraGZP

on:
  schedule:
    - cron: "*/10 * * * *"   # Ejecuta cada 10 minutos
  workflow_dispatch:         # Permite ejecución manual

permissions:
  contents: write            # Permite hacer commit y push

jobs:
  fetch-odoo-ordenescompra:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Llamar a Odoo JSON-RPC y guardar resultado
        run: |
          echo "Llamando a Odoo purchase.report..."

          curl -s -X POST https://grupozp.odoo.com/jsonrpc \
          -H "Content-Type: application/json" \
          -d '{
            "jsonrpc": "2.0",
            "method": "call",
            "id": 1,
            "params": {
              "service": "object",
              "method": "execute_kw",
              "args": [
                "grupozp-main-13656030",
                7,
                "Meganet37**",
                "purchase.report",
                "search_read",
                [],
                {
                  "fields": [
                    "date_order",
                    "effective_date",
                    "order_id",
                    "partner_id",
                    "picking_type_id",
                    "product_id",
                    "category_id",
                    "user_id",
                    "qty_to_be_billed",
                    "qty_ordered",
                    "qty_received",
                    "qty_billed",
                    "currency_id",
                    "untaxed_total",
                    "price_total",
                    "state"
                  ],
                  "limit": 0
                }
              ]
            }
          }' > Odoo_OrdenCompraGZP.json

          echo "Verificando contenido..."
          if [ ! -s Odoo_OrdenCompraGZP.json ]; then
            echo "❌ Error: Odoo_OrdenCompraGZP.json está vacío o no se generó correctamente."
            exit 1
          fi

          echo "✅ Archivo generado correctamente:"
          head -n 10 Odoo_OrdenCompraGZP.json

      - name: Commit y push del JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Odoo_OrdenCompraGZP.json
          git commit -m "Actualización automática de purchase.report desde Odoo" || echo "No hay cambios"
          git push origin main
