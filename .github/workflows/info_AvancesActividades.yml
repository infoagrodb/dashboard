name: info_AvancesActividades

on:
  schedule:
    # Cada 10 minutos entre 07:00 AM y 01:00 PM Nicaragua (13:00-19:00 UTC)
    - cron: "*/10 13-18 * * *"
    - cron: "0 19 * * *"       # 01:00 PM Nicaragua exacto
    # Cada hora entre 01:00 PM y 07:00 PM Nicaragua (19:00-01:00 UTC)
    - cron: "0 20-23 * * *"   # 02 PM - 05 PM Nicaragua
    - cron: "0 0,1 * * *"     # 06 PM y 07 PM Nicaragua
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-odoo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Llamar a Odoo JSON-RPC y guardar resultado
        env:
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
        run: |
          echo "Llamando a Odoo..."
          curl -s -X POST https://infoagro.odoo.com/jsonrpc/ \
          -H "Content-Type: application/json" \
          -d '{
            "jsonrpc": "2.0",
            "method": "call",
            "id": 1,
            "params": {
              "service": "object",
              "method": "execute",
              "args": [
                "infoagro",
                2,
                "'"$ODOO_PASSWORD"'",
                "x_orden_campo_line_b660b",
                "search_read",
                [],
                [
                  "id","x_orden_campo_id","x_studio_fecha","x_studio_ciclo",
                  "x_studio_productor","x_studio_proveedor_del_servicio",
                  "x_studio_finca","x_studio_lote_agricola","x_studio_grupo_de_siembra",
                  "x_studio_activiadad_realizada","x_studio_avance_mzn",
                  "x_studio_compaia","x_name","x_studio_sector_1",
                  "x_studio_categoria_actividad"
                ]
              ]
            }
          }' > info_AvancesActividades.json

          echo "Verificando contenido..."
          if [ ! -s info_AvancesActividades.json ]; then
            echo "❌ Error: info_AvancesActividades.json está vacío o no se generó correctamente."
            exit 1
          fi

          echo "✅ Archivo generado correctamente:"
          head -n 10 info_AvancesActividades.json

      - name: Commit y push del JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add info_AvancesActividades.json
          git commit -m "Actualización automática de datos Odoo" || echo "No hay cambios"
          intento=1
          maximo_intentos=5
          while [ $intento -le $maximo_intentos ]; do
            echo "Intento de push #$intento..."
            if git pull --rebase origin main && git push origin main; then
              echo "Push exitoso."
              break
            fi
            if [ $intento -eq $maximo_intentos ]; then
              echo "Se agotaron los intentos de push."
              exit 1
            fi
            espera=$(( (RANDOM % 5) + 3 ))
            echo "Push rechazado (probablemente otro workflow empujo al mismo tiempo). Esperando ${espera}s..."
            sleep $espera
            intento=$((intento + 1))
          done
