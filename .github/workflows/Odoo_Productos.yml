name: Odoo Proxy ProductosZP

on:
  schedule:
    - cron: "*/10 * * * *"   # Ejecuta cada 10 minutos
  workflow_dispatch:         # Permite ejecución manual

permissions:
  contents: write            # Permite hacer commit y push

jobs:
  fetch-odoo-productos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Llamar a Odoo JSON-RPC y guardar resultado
        run: |
          echo "Llamando a Odoo product.template..."

          curl -s -X POST https://grupozp.odoo.com/jsonrpc \
          -H "Content-Type: application/json" \
          -d '{
            "jsonrpc": "2.0",
            "method": "call",
            "id": 1,
            "params": {
              "service": "object",
              "method": "execute_kw",
              "args": [
                "grupozp-main-13656030",
                7,
                "Meganet37**",
                "product.template",
                "search_read",
                [],
                {
                  "fields": [
                    "x_studio_id",
                    "default_code",
                    "name",
                    "part_number",
                    "uom_id",
                    "list_price",
                    "standard_price",
                    "qty_available",
                    "virtual_available"
                  ],
                  "limit": 0
                }
              ]
            }
          }' > OdooZP_Productos.json

          echo "Verificando contenido..."
          if [ ! -s OdooZP_Productos.json ]; then
            echo "❌ Error: OdooZP_Productos.json está vacío o no se generó correctamente."
            exit 1
          fi

          echo "✅ Archivo generado correctamente:"
          head -n 10 OdooZP_Productos.json

      - name: Commit y push del JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add OdooZP_Productos.json
          git commit -m "Actualización automática de productos desde Odoo" || echo "No hay cambios"
          git push origin main
