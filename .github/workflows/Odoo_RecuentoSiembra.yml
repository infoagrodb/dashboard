name: Odoo Proxy Recuentos Siembra

on:
  schedule:
    - cron: "*/10 * * * *"   # Ejecuta cada 10 minutos
  workflow_dispatch:          # Permite ejecución manual

permissions:
  contents: write   # Permite hacer commit y push

jobs:
  fetch-odoo-recuentos-siembra:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Llamar a Odoo JSON-RPC y guardar resultado
        run: |
          echo "Llamando a Odoo Recuentos de Siembra..."
          curl -s -X POST https://infoagro.odoo.com/jsonrpc/ \
          -H "Content-Type: application/json" \
          -d '{
            "jsonrpc": "2.0",
            "method": "call",
            "id": 1,
            "params": {
              "service": "object",
              "method": "execute",
              "args": [
                "infoagro",
                2,
                "Meganet37**",
                "x_siembra",
                "search_read",
                [],
                [
                  "id","x_name","x_studio_tipo","x_studio_fecha","x_studio_ciclo",
                  "x_studio_finca","x_studio_lote_de_finca","x_studio_variedad",
                  "x_studio_calibre","x_studio_lote_comasa","x_studio_qq_sembrados",
                  "x_studio_mzn_sembrada","x_studio_semilla_entre_x_mtrs_lineal",
                  "x_studio_sector_1","x_studio_semilla_quebradas_x_mtrs_lineal",
                  "x_studio_semilla_total","x_studio_porcenjate_enteras",
                  "x_studio_porcentaje_quebradas","x_studio_remision_comasa",
                  "x_studio_company_id"
                ]
              ]
            }
          }' > Odoo_RecuentosSiembra.json

          echo "Verificando contenido..."
          if [ ! -s Odoo_RecuentosSiembra.json ]; then
            echo "❌ Error: Odoo_RecuentosSiembra.json está vacío o no se generó correctamente."
            exit 1
          fi

          echo "✅ Archivo generado correctamente:"
          head -n 10 Odoo_RecuentosSiembra.json

      - name: Commit y push del JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Odoo_RecuentosSiembra.json
          git commit -m "Actualización automática de datos Recuentos de Siembra desde Odoo" || echo "No hay cambios"
          git push origin main
