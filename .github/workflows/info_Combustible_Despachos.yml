name: Odoo Proxy Detalle Despachos Combustible

on:
  schedule:
    # 08:00 AM Nicaragua (14:00 UTC)
    - cron: "0 14 * * *"
    # 12:00 PM Nicaragua (18:00 UTC)
    - cron: "0 18 * * *"
    # 05:30 PM Nicaragua (23:30 UTC)
    - cron: "30 23 * * *"
  workflow_dispatch:


permissions:
  contents: write

jobs:
  fetch-odoo-despachos-combustible:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Llamar a Odoo JSON-RPC y guardar resultado
        env:
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
        run: |
          echo "Llamando a Odoo Detalle de Despachos de Combustible..."
          curl -s -X POST https://infoagro.odoo.com/jsonrpc/ \
          -H "Content-Type: application/json" \
          -d '{
            "jsonrpc": "2.0",
            "method": "call",
            "id": 1,
            "params": {
              "service": "object",
              "method": "execute",
              "args": [
                "infoagro",
                12,
                "'"$ODOO_PASSWORD"'",
                "x_despacho_de_combusti_line_59f76",
                "search_read",
                [],
                [
                  "id","x_studio_reporte","x_studio_fecha","x_studio_ciclo",
                  "x_studio_sector_1","x_studio_sku_en_reporte","x_studio_finca",
                  "x_studio_equipo","x_studio_actividad","x_studio_um",
                  "x_studio_hora_motor","x_studio_cantidad_ltrs",
                  "x_studio_categoria_de_equipo","x_studio_compaia",
                  "x_studio_hme","x_studio_proveedor_del_servicio",
                  "x_studio_productor","x_studio_ticket",
                  "x_studio_reporte_consolidado","x_studio_estado_del_consolidado",
                  "x_studio_bodega","x_studio_categoria_actividad"
                ]
              ]
            }
          }' > info_Combustible_Despachos.json

          echo "Verificando contenido..."
          if [ ! -s info_Combustible_Despachos.json ]; then
            echo "❌ Error: info_Combustible_Despachos.json está vacío o no se generó correctamente."
            exit 1
          fi

          echo "✅ Archivo generado correctamente:"
          head -n 10 info_Combustible_Despachos.json

      - name: Commit y push del JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add info_Combustible_Despachos.json
          git commit -m "Actualización automática de datos Detalle Despachos Combustible desde Odoo" || echo "No hay cambios"
          intento=1
          maximo_intentos=5
          while [ $intento -le $maximo_intentos ]; do
            echo "Intento de push #$intento..."
            if git pull --rebase origin main && git push origin main; then
              echo "Push exitoso."
              break
            fi
            if [ $intento -eq $maximo_intentos ]; then
              echo "Se agotaron los intentos de push."
              exit 1
            fi
            espera=$(( (RANDOM % 5) + 3 ))
            echo "Push rechazado (probablemente otro workflow empujo al mismo tiempo). Esperando ${espera}s..."
            sleep $espera
            intento=$((intento + 1))
          done
