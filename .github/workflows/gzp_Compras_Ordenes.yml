name: Odoo Proxy OrdenesCompraGZP

on:
  schedule:
    # Cada hora entre 07:00 AM y 06:00 PM Nicaragua (13:00 - 00:00 UTC)
    - cron: "0 13-23 * * *"   # 07 AM - 05 PM Nicaragua
    - cron: "0 0 * * *"       # 06 PM Nicaragua
  workflow_dispatch:


permissions:
  contents: write            # Permite hacer commit y push

jobs:
  fetch-odoo-ordenescompra:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Llamar a Odoo JSON-RPC y guardar resultado
        env:
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
        run: |
          echo "Llamando a Odoo purchase.report..."

          curl -s -X POST https://grupozp.odoo.com/jsonrpc \
          -H "Content-Type: application/json" \
          -d '{
            "jsonrpc": "2.0",
            "method": "call",
            "id": 1,
            "params": {
              "service": "object",
              "method": "execute_kw",
              "args": [
                "grupozp-main-13656030",
                7,
                "'"$ODOO_PASSWORD"'",
                "purchase.report",
                "search_read",
                [],
                {
                  "fields": [
                    "date_order",
                    "effective_date",
                    "order_id",
                    "partner_id",
                    "picking_type_id",
                    "product_id",
                    "category_id",
                    "user_id",
                    "qty_to_be_billed",
                    "qty_ordered",
                    "qty_received",
                    "qty_billed",
                    "currency_id",
                    "untaxed_total",
                    "price_total",
                    "state"
                  ],
                  "limit": 0
                }
              ]
            }
          }' > gzp_Compras_Ordenes.json

          echo "Verificando contenido..."
          if [ ! -s gzp_Compras_Ordenes.json ]; then
            echo "❌ Error: gzp_Compras_Ordenes.json está vacío o no se generó correctamente."
            exit 1
          fi

          echo "✅ Archivo generado correctamente:"
          head -n 10 gzp_Compras_Ordenes.json

      - name: Commit y push del JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add gzp_Compras_Ordenes.json
          git commit -m "Actualización automática de purchase.report desde Odoo" || echo "No hay cambios"
          intento=1
          maximo_intentos=5
          while [ $intento -le $maximo_intentos ]; do
            echo "Intento de push #$intento..."
            if git pull --rebase origin main && git push origin main; then
              echo "Push exitoso."
              break
            fi
            if [ $intento -eq $maximo_intentos ]; then
              echo "Se agotaron los intentos de push."
              exit 1
            fi
            espera=$(( (RANDOM % 5) + 3 ))
            echo "Push rechazado (probablemente otro workflow empujo al mismo tiempo). Esperando ${espera}s..."
            sleep $espera
            intento=$((intento + 1))
          done
