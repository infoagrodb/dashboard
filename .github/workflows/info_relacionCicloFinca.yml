name: Odoo Proxy Relacion Ciclo Finca

on:
  schedule:
    - cron: "0 */6 * * *"   # Ejecuta cada 6 horas
  workflow_dispatch:          # Permite ejecución manual

permissions:
  contents: write

jobs:
  fetch-odoo-relacion-ciclo-finca:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Llamar a Odoo JSON-RPC y guardar resultado
        env:
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
        run: |
          echo "Llamando a Odoo - Relacion Ciclo Finca Centro de Costo..."
          curl -s -X POST https://infoagro.odoo.com/jsonrpc/ \
          -H "Content-Type: application/json" \
          -d '{
            "jsonrpc": "2.0",
            "method": "call",
            "id": 1,
            "params": {
              "service": "object",
              "method": "execute",
              "args": [
                "infoagro",
                2,
                "'"$ODOO_PASSWORD"'",
                "x_fincas_line_b51d1",
                "search_read",
                [],
                [
                  "id",
                  "x_studio_finca",
                  "x_studio_ciclo",
                  "x_studio_centro_de_costo_erp",
                  "x_studio_fecha_inicia_ciclo",
                  "x_studio_fecha_finaliza_ciclo"
                ]
              ]
            }
          }' > info_RelacionCicloFinca.json

          echo "Verificando contenido..."
          if [ ! -s info_RelacionCicloFinca.json ]; then
            echo "❌ Error: info_RelacionCicloFinca.json está vacío o no se generó correctamente."
            exit 1
          fi
          echo "✅ Archivo generado correctamente:"
          head -n 5 info_RelacionCicloFinca.json

      - name: Commit y push del JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add info_RelacionCicloFinca.json
          git commit -m "Actualización automática Relacion Ciclo-Finca-CentroCosto desde Odoo" || echo "No hay cambios"
          intento=1
          maximo_intentos=5
          while [ $intento -le $maximo_intentos ]; do
            echo "Intento de push #$intento..."
            if git pull --rebase origin main && git push origin main; then
              echo "Push exitoso."
              break
            fi
            if [ $intento -eq $maximo_intentos ]; then
              echo "Se agotaron los intentos de push."
              exit 1
            fi
            espera=$(( (RANDOM % 5) + 3 ))
            echo "Push rechazado. Esperando ${espera}s..."
            sleep $espera
            intento=$((intento + 1))
          done
