name: Odoo Proxy Pluviosidad

on:
  schedule:
    - cron: "*/10 * * * *"   # Ejecuta cada 10 minutos
  workflow_dispatch:          # Permite ejecución manual

permissions:
  contents: write   # Permite hacer commit y push

jobs:
  fetch-odoo-pluviosidad:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Llamar a Odoo JSON-RPC y guardar resultado
        run: |
          echo "Llamando a Odoo Pluviosidad..."
          curl -s -X POST https://infoagro.odoo.com/jsonrpc/ \
          -H "Content-Type: application/json" \
          -d '{
            "jsonrpc": "2.0",
            "method": "call",
            "id": 1,
            "params": {
              "service": "object",
              "method": "execute",
              "args": [
                "infoagro",
                2,
                "Meganet37**",
                "x_pluviosidad",
                "search_read",
                [],
                [
                  "id","x_studio_finca","x_studio_fecha","x_studio_cantidad_promedio",
                  "x_studio_cantidad_de_pluviometros","x_studio_pluviometro_1",
                  "x_studio_pluviometro_2","x_studio_pluviometro_3",
                  "x_studio_pluviometro_4","x_studio_pluviometro_5",
                  "x_studio_sector_1","x_studio_company_id"
                ]
              ]
            }
          }' > odooPV.json

          echo "Verificando contenido..."
          if [ ! -s odooPV.json ]; then
            echo "❌ Error: odooPV.json está vacío o no se generó correctamente."
            exit 1
          fi

          echo "✅ Archivo generado correctamente:"
          head -n 10 odooPV.json

      - name: Commit y push del JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add odooPV.json
          git commit -m "Actualización automática de datos Pluviosidad desde Odoo" || echo "No hay cambios"
          git push origin main
