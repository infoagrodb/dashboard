name: Odoo Proxy Recuentos Enfermedades

on:
  schedule:
    - cron: "*/10 * * * *"   # Ejecuta cada 10 minutos
  workflow_dispatch:          # Permite ejecución manual

permissions:
  contents: write   # Permite hacer commit y push

jobs:
  fetch-odoo-recuentos-enfermedades:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Llamar a Odoo JSON-RPC y guardar resultado
        run: |
          echo "Llamando a Odoo Recuentos de Enfermedades..."
          curl -s -X POST https://infoagro.odoo.com/jsonrpc/ \
          -H "Content-Type: application/json" \
          -d '{
            "jsonrpc": "2.0",
            "method": "call",
            "id": 1,
            "params": {
              "service": "object",
              "method": "execute",
              "args": [
                "infoagro",
                2,
                "Meganet37**",
                "x_recuentos_estado_del_line_715c7",
                "search_read",
                [],
                [
                  "id","x_studio_reporte","x_studio_fecha","x_studio_sector",
                  "x_studio_ciclo","x_studio_finca","x_studio_lote_de_la_finca",
                  "x_studio_familia_del_recuento","x_studio_n","x_studio_recuento",
                  "x_studio_dds","x_studio_total","x_studio_resultado_avg",
                  "x_studio_resultado_porcent","x_studio_resultado",
                  "x_studio_observacion","x_studio_compaia"
                ]
              ]
            }
          }' > Odoo_RecuentoEnfermedades.json

          echo "Verificando contenido..."
          if [ ! -s Odoo_RecuentoEnfermedades.json ]; then
            echo "❌ Error: Odoo_RecuentoEnfermedades.json está vacío o no se generó correctamente."
            exit 1
          fi

          echo "✅ Archivo generado correctamente:"
          head -n 10 Odoo_RecuentoEnfermedades.json

      - name: Commit y push del JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Odoo_RecuentoEnfermedades.json
          git commit -m "Actualización automática de datos Recuentos de Enfermedades desde Odoo" || echo "No hay cambios"
          git push origin main
