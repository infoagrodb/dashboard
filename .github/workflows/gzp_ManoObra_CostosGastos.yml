name: gzp_ManoObra_CostosGastos
 
on:
  schedule:
    # Una vez al día a las 05:30 PM Nicaragua (23:30 UTC)
    - cron: "30 23 * * *"
  workflow_dispatch:

 
permissions:
  contents: write
 
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
 
      - name: Fetch desde Odoo y filtrar con jq
        env:
          GZP_API_KEY: ${{ secrets.GZP_API_KEY }}
        run: |
          echo "Descargando hr.payslip.line..."
          curl -sf -X POST https://grupozp.odoo.com/jsonrpc \
          -H "Content-Type: application/json" \
          -d "{\"jsonrpc\":\"2.0\",\"method\":\"call\",\"id\":1,\"params\":{\"service\":\"object\",\"method\":\"execute_kw\",\"args\":[\"grupozp-main-13656030\",7,\"$GZP_API_KEY\",\"hr.payslip.line\",\"search_read\",[[]],{\"fields\":[\"name\",\"x_studio_nombre_del_lote\",\"x_studio_fecha_final_lote\",\"x_studio_cuenta_analitica_en_recibo_de_pago\",\"x_studio_empleado\",\"x_studio_puesto_historico\",\"x_studio_tipo_contrato\",\"x_studio_actividad_agricola_1\",\"x_studio_cuenta_contable_debito\",\"total\"],\"limit\":0}]}}" \
          > _raw_mo.json
 
          [ -s _raw_mo.json ] || { echo "❌ Vacío"; exit 1; }
 
          # Filtrar con jq: solo registros con cuenta analítica asignada (no false/null/"")
          jq '.result |= map(
            select(
              .x_studio_cuenta_analitica_en_recibo_de_pago != false and
              .x_studio_cuenta_analitica_en_recibo_de_pago != null and
              .x_studio_cuenta_analitica_en_recibo_de_pago != ""
            )
          )' _raw_mo.json > gzp_ManoObra_CostosGastos.json
 
          rm _raw_mo.json
 
          TOTAL=$(jq '.result | length' gzp_ManoObra_CostosGastos.json)
          echo "✅ CostosyGastosMO filtrados: $TOTAL registros"
          echo "   Tamaño: $(wc -c < gzp_ManoObra_CostosGastos.json) bytes"
 
      - name: Commit y push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add gzp_ManoObra_CostosGastos.json
          git commit -m "Auto: CostosyGastosMO GZP (filtrado)" || echo "Sin cambios"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && break
            [ $i -eq 5 ] && exit 1
            sleep $(( (RANDOM % 5) + 3 ))
          done
