name: Odoo Proxy Recuentos Enfermedades

on:
  schedule:
    # 08:00 AM Nicaragua (14:00 UTC)
    - cron: "0 14 * 7-12 *"
    # 12:00 PM Nicaragua (18:00 UTC)
    - cron: "0 18 * 7-12 *"
    # 05:30 PM Nicaragua (23:30 UTC)
    - cron: "30 23 * 7-12 *"
  workflow_dispatch:


permissions:
  contents: write   # Permite hacer commit y push

jobs:
  fetch-odoo-recuentos-enfermedades:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Llamar a Odoo JSON-RPC y guardar resultado
        env:
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
        run: |
          echo "Llamando a Odoo Recuentos de Enfermedades..."
          curl -s -X POST https://infoagro.odoo.com/jsonrpc/ \
          -H "Content-Type: application/json" \
          -d '{
            "jsonrpc": "2.0",
            "method": "call",
            "id": 1,
            "params": {
              "service": "object",
              "method": "execute",
              "args": [
                "infoagro",
                2,
                "'"$ODOO_PASSWORD"'",
                "x_recuentos_estado_del_line_715c7",
                "search_read",
                [],
                [
                  "id","x_studio_reporte","x_studio_fecha","x_studio_sector",
                  "x_studio_ciclo","x_studio_finca","x_studio_lote_de_la_finca",
                  "x_studio_familia_del_recuento","x_studio_n","x_studio_recuento",
                  "x_studio_dds","x_studio_total","x_studio_resultado_avg",
                  "x_studio_resultado_porcent","x_studio_resultado",
                  "x_studio_observacion","x_studio_compaia"
                ]
              ]
            }
          }' > info_Campo_Enfermedades.json

          echo "Verificando contenido..."
          if [ ! -s info_Campo_Enfermedades.json ]; then
            echo "❌ Error: info_Campo_Enfermedades.json está vacío o no se generó correctamente."
            exit 1
          fi

          echo "✅ Archivo generado correctamente:"
          head -n 10 info_Campo_Enfermedades.json

      - name: Commit y push del JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add info_Campo_Enfermedades.json
          git commit -m "Actualización automática de datos Recuentos de Enfermedades desde Odoo" || echo "No hay cambios"
          intento=1
          maximo_intentos=5
          while [ $intento -le $maximo_intentos ]; do
            echo "Intento de push #$intento..."
            if git pull --rebase origin main && git push origin main; then
              echo "Push exitoso."
              break
            fi
            if [ $intento -eq $maximo_intentos ]; then
              echo "Se agotaron los intentos de push."
              exit 1
            fi
            espera=$(( (RANDOM % 5) + 3 ))
            echo "Push rechazado (probablemente otro workflow empujo al mismo tiempo). Esperando ${espera}s..."
            sleep $espera
            intento=$((intento + 1))
          done
