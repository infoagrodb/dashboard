name: OdooGzp_ValuacionesInventario

on:
  schedule:
    - cron: "*/10 * * * *"   # Ejecuta cada 10 minutos
  workflow_dispatch:          # Permite ejecución manual

permissions:
  contents: write   # Permite hacer commit y push

jobs:
  fetch-odoo-valuaciones-inventario:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Llamar a Odoo JSON-RPC y guardar resultado
        run: |
          echo "Llamando a Odoo stock.valuation.layer..."
          curl -s -X POST https://grupozp.odoo.com/jsonrpc \
          -H "Content-Type: application/json" \
          -d '{
            "jsonrpc": "2.0",
            "method": "call",
            "id": 1,
            "params": {
              "service": "object",
              "method": "execute",
              "args": [
                "grupozp-main-13656030",
                7,
                "Meganet37**",
                "stock.valuation.layer",
                "search_read",
                [],
                [
                  "categ_id",
                  "product_id",
                  "x_studio_tipo_de_ubicacion_destino",
                  "x_studio_bodega",
                  "x_studio_cuenta_de_inventarios",
                  "create_date",
                  "x_studio_fecha_del_asiento",
                  "reference",
                  "x_studio_equipofinca",
                  "x_studio_numero_de_parte",
                  "quantity",
                  "uom_id",
                  "value",
                  "x_studio_distribucion_analitica",
                  "x_studio_cuenta_predeterminada_para_consumos",
                  "x_studio_tipo_producto"
                ]
              ]
            }
          }' > OdooGzp_ValuacionesInventario.json

          echo "Verificando contenido..."
          if [ ! -s OdooGzp_ValuacionesInventario.json ]; then
            echo "❌ Error: OdooGzp_ValuacionesInventario.json está vacío o no se generó correctamente."
            exit 1
          fi

          echo "✅ Archivo generado correctamente:"
          head -n 10 OdooGzp_ValuacionesInventario.json

      - name: Commit y push del JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add OdooGzp_ValuacionesInventario.json
          git commit -m "Actualización automática de Valuaciones de Inventario desde Odoo" || echo "No hay cambios"
          git push origin main
