name: OdooGzp_ApuntesContables

on:
  schedule:
    - cron: "*/10 * * * *"   # Ejecuta cada 10 minutos
  workflow_dispatch:          # Permite ejecución manual

permissions:
  contents: write   # Permite hacer commit y push

jobs:
  fetch-odoo-apuntes-contables:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Llamar a Odoo JSON-RPC y guardar resultado
        run: |
          echo "Llamando a Odoo account.move.line..."
          curl -s -X POST https://grupozp.odoo.com/jsonrpc \
          -H "Content-Type: application/json" \
          -d '{
            "jsonrpc": "2.0",
            "method": "call",
            "id": 1,
            "params": {
              "service": "object",
              "method": "execute",
              "args": [
                "grupozp-main-13656030",
                7,
                "Meganet37**",
                "account.move.line",
                "search_read",
                [],
                [
                  "date",
                  "move_name",
                  "account_id",
                  "partner_id",
                  "name",
                  "product_uom_category_id",
                  "debit",
                  "credit",
                  "x_studio_es_cierre_ab",
                  "analytic_distribution"
                ]
              ]
            }
          }' > OdooGzp_ApuntesContables.json

          echo "Verificando contenido..."
          if [ ! -s OdooGzp_ApuntesContables.json ]; then
            echo "❌ Error: OdooGzp_ApuntesContables.json está vacío o no se generó correctamente."
            exit 1
          fi

          echo "✅ Archivo generado correctamente:"
          head -n 10 OdooGzp_ApuntesContables.json

      - name: Commit y push del JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add OdooGzp_ApuntesContables.json
          git commit -m "Actualización automática de Apuntes Contables desde Odoo" || echo "No hay cambios"
          git push origin main
