<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>INFOAGRO · Monitoreo Cruzado de Avances</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-organic: #f4f7f5;
      --text-main: #1e293b;
      --text-muted: #64748b;
      
      --grad-header: linear-gradient(135deg, #1b4332 0%, #2d6a4f 50%, #40916c 100%);
      --grad-verde: linear-gradient(135deg, #2d6a4f 0%, #52b788 100%);
      --grad-naranja: linear-gradient(135deg, #e76f51 0%, #f4a261 100%);
      --grad-soft-bg: linear-gradient(180deg, #ffffff 0%, #f8faf9 100%);

      --shadow-sm: 0 4px 20px -2px rgba(45, 106, 79, 0.05);
      --shadow-md: 0 10px 30px -5px rgba(27, 67, 50, 0.08);
      --shadow-lg: 0 10px 25px -3px rgba(0, 0, 0, 0.1);
    }

    html, body {
      height: 100%;
      overflow: hidden; 
      background-color: var(--bg-organic);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
    }

    body {
      padding: 10px 15px;
      display: flex;
      flex-direction: column;
    }

    .dashboard-container {
      max-width: 100%;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0; 
    }

    /* HEADER */
    .page-hdr-container {
      background: var(--grad-header);
      border-radius: 12px 6px 12px 6px;
      padding: 8px 16px;
      color: #ffffff;
      box-shadow: 0 4px 15px -5px rgba(27, 67, 50, 0.2);
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    .hdr-title { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; display: inline-flex; align-items: center; gap: 6px; }
    .hdr-sub d-none d-md-inline { font-size: 11px; color: #b7e4c7; font-weight: 400; margin-left: 10px; display: inline-block; }

    .hdr-controls-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hdr-compaia-box {
      display: flex;
      align-items: center;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      border-radius: 6px;
      padding: 0 6px 0 10px;
      height: 30px;
      border: 1px solid #74c69d;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .hdr-compaia-icon { font-size: 12px; margin-right: 6px; }
    .hdr-select-compaia {
      background-color: transparent !important;
      border: none !important;
      color: #ffffff !important;
      font-weight: 600;
      font-size: 11px;
      height: 100%;
      padding: 0 24px 0 0;
      cursor: pointer;
      min-width: 190px;
      box-shadow: none !important;
    }
    .hdr-select-compaia option {
      background-color: #ffffff !important;
      color: var(--text-main) !important;
      font-weight: 500;
    }

    .btn-toggle-ribbon {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: white;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 28px;
    }
    .btn-toggle-ribbon:hover { background: rgba(255, 255, 255, 0.25); }

    .btn-organic-action.clear-all {
      background: var(--grad-naranja);
      display: none;
      height: 28px;
      animation: fadeInBtn 0.2s ease-in-out forwards;
    }
    @keyframes fadeInBtn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    /* CINTA DE FILTROS COLAPSABLE */
    .filters-inline-container {
      background: var(--grad-soft-bg);
      border-radius: 10px;
      box-shadow: var(--shadow-sm);
      padding: 6px 14px;
      margin-bottom: 8px;
      border: 1px solid rgba(82, 183, 136, 0.15);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      max-height: 120px;
      opacity: 1;
      overflow: visible;
      flex-shrink: 0;
    }
    
    .filters-inline-container.collapsed {
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      margin-bottom: 0;
      opacity: 0;
      border-color: transparent;
      overflow: hidden;
    }

    .filter-item-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 140px;
      position: relative;
    }

    .fg-label {
      font-size: 11px;
      color: var(--text-main);
      font-weight: 700;
      white-space: nowrap;
    }

    .multiselect-btn {
      background-color: #ffffff;
      border: 1px solid rgba(163, 177, 198, 0.4);
      border-radius: 6px 3px 6px 3px;
      color: var(--text-main);
      font-size: 11px;
      height: 28px;
      padding: 0 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      width: 100%;
      user-select: none;
    }
    .multiselect-btn::after { content: '▼'; font-size: 7px; color: var(--text-muted); margin-left: 4px; }

    .multiselect-dropdown {
      position: absolute;
      top: 105%;
      left: 0;
      width: 100%;
      background: #ffffff;
      border: 1px solid rgba(82, 183, 136, 0.2);
      border-radius: 6px;
      box-shadow: var(--shadow-lg);
      max-height: 240px;
      overflow-y: auto;
      z-index: 1000;
      padding: 4px;
      display: none;
    }
    .multiselect-dropdown.show { display: block; }

    .form-control, .form-select-native {
      background-color: #ffffff !important;
      border: 1px solid rgba(163, 177, 198, 0.4) !important;
      border-radius: 6px 3px 6px 3px !important;
      color: var(--text-main) !important;
      font-size: 11px;
      height: 28px;
      padding: 0 6px;
    }

    .btn-reset-individual {
      background: none; border: none; font-size: 12px; cursor: pointer;
      padding: 0 2px; display: inline-flex; align-items: center;
      justify-content: center; width: 18px; height: 18px; border-radius: 4px;
      transition: all 0.15s ease;
    }
    .btn-reset-individual.inactive { color: #cbd5e1; pointer-events: none; }
    .btn-reset-individual.active { color: #ef4444; background: rgba(239, 68, 68, 0.08); }
    .btn-reset-individual.active:hover { background: rgba(239, 68, 68, 0.18); transform: scale(1.1); }

    .btn-organic-action {
      border: none; height: 28px; border-radius: 6px 3px 6px 3px;
      font-weight: 600; font-size: 11px; padding: 0 10px;
      display: inline-flex; align-items: center; gap: 4px; color: white; transition: all 0.2s ease;
    }
    .btn-organic-action.excel { background: var(--grad-verde); }
    .btn-organic-action:hover { transform: translateY(-1px); color: white; }

    /* TOOLBAR EXCLUSIVO */
    .table-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      padding: 0 4px;
      flex-shrink: 0;
    }

    #pivotGroupingOrder {
      width: 240px;
      font-weight: 600;
      border-color: #2d6a4f !important;
      color: #1b4332 !important;
    }

    /* AREA DE TABLA RE-ESTRUCTURADA CON CONTROL DE SCROLL EXCLUSIVO */
    .table-responsive-organic {
      overflow: auto; 
      flex: 1;
      min-height: 0;
      border-radius: 12px;
      padding: 1px;
      background: #ffffff;
      border: 1px solid rgba(82, 183, 136, 0.12);
      box-shadow: var(--shadow-md);
    }

    table.pivot-gantt {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 11px;
    }
    
    table.pivot-gantt thead th {
      text-align: center;
      border-right: 1px solid #e2e8f0;
      position: sticky;
      z-index: 10;
      padding: 8px 10px;
      vertical-align: middle;
      white-space: normal !important; 
      word-wrap: break-word;
    }

    table.pivot-gantt thead tr.main-hdr-row th {
      top: 0px;
      background: #1b4332 !important; 
      color: #ffffff !important;       
      font-weight: 700;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }

    table.pivot-gantt thead tr.sub-hdr-row th {
      top: 33px; 
      background: #f1f5f9 !important; 
      color: #334155 !important;       
      font-weight: 600;
      border-bottom: 1px solid #cbd5e1;
      min-width: 120px; 
    }

    table.pivot-gantt thead tr.total-hdr-row th {
      top: 61px;
      background: #edf7f2 !important; 
      color: #1b4332 !important;
      font-weight: 800;
      border-bottom: 2px solid rgba(82, 183, 136, 0.3);
    }
    
    table.pivot-gantt th.col-fecha-sticky, 
    table.pivot-gantt td.col-fecha-sticky {
      position: sticky;
      left: 0;
      z-index: 15;
      font-weight: 700;
      text-align: center;
      border-right: 2px solid rgba(82, 183, 136, 0.2) !important;
      width: 95px;
      min-width: 95px;
    }
    
    table.pivot-gantt td.col-fecha-sticky {
      background: #f8faf9 !important;
    }

    table.pivot-gantt thead tr.main-hdr-row th.col-fecha-sticky { z-index: 35; top: 0px; background: #1b4332 !important; color: #ffffff !important; }
    table.pivot-gantt thead tr.sub-hdr-row th.col-fecha-sticky { z-index: 35; top: 33px; background: #f1f5f9 !important; color: #334155 !important; }
    table.pivot-gantt thead tr.total-hdr-row th.col-fecha-sticky { z-index: 35; top: 61px; background: #edf7f2 !important; color: #1b4332 !important; }

    table.pivot-gantt tbody td {
      padding: 5px 6px;
      border-bottom: 1px solid #f1f5f9;
      border-right: 1px solid #f1f5f9;
      text-align: center;
    }
    table.pivot-gantt tbody tr:nth-child(even) { background-color: #f8faf9; }

    .cell-interactive { cursor: pointer; display: inline-block; width: 100%; }
    
    .mzn-badge-container {
      background: rgba(82, 183, 136, 0.12);
      color: #1b4332;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 700;
      display: inline-block;
      font-size: 11px;
    }
    tr:hover td { background-color: #eaeaea !important; }

    #global-gantt-tooltip {
      position: fixed; display: none; background: rgba(15, 23, 42, 0.96); backdrop-filter: blur(4px);
      color: #ffffff; padding: 10px 12px; border-radius: 8px; box-shadow: var(--shadow-lg);
      width: 320px; z-index: 999999; pointer-events: none; text-align: left;
    }
    .popup-hdr { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; border-bottom: 1px solid rgba(255,255,255,0.15); padding-bottom: 4px; margin-bottom: 6px; font-weight: 700; }
    .popup-block { margin-bottom: 6px; }
    .popup-item { display: flex; justify-content: space-between; font-size: 11px; padding: 1px 0; }
    .popup-item .p-label { color: #cbd5e1; }
    .popup-item .p-val { font-weight: 600; color: #38bdf8; }

    .loading-spinner { display: flex; align-items: center; justify-content: center; padding: 30px; }
    .spinner-blob { width: 12px; height: 12px; background-color: #2d6a4f; border-radius: 50%; animation: morphBlob 1.4s infinite ease-in-out alternate; }
    @keyframes morphBlob { 0% { transform: scale(0.8); } 100% { transform: scale(1.2); } }
  </style>
</head>
<body>

<div class="dashboard-container">

  <div class="page-hdr-container d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center">
      <span class="hdr-title">🌱 Matriz de Labores Diarias</span>
      <span class="hdr-sub d-none d-md-inline">Análisis continuo de avance físico (Manzanas)</span>
    </div>
    
    <div class="hdr-controls-wrapper">
      <button class="btn-toggle-ribbon" onclick="toggleFilterRibbon()" id="btnToggleRibbon">
        📐 Ocultar Filtros
      </button>

      <button class="btn-organic-action clear-all" id="btnGlobalClear" onclick="resetAllFilters()">
        ↺ Limpiar Filtros
      </button>

      <div class="hdr-compaia-box">
        <span class="hdr-compaia-icon">🏢</span>
        <select id="filterHeaderCompaia" class="form-select hdr-select-compaia" onchange="onHeaderCompaiaChange()">
        </select>
      </div>
    </div>
  </div>

  <div class="filters-inline-container" id="filterRibbon" onclick="closeDropdownsEvent(event)">
    
    <div class="filter-item-wrap" style="min-width: 125px; flex: 0.8;">
      <div class="fg-label">Período:</div>
      <select id="filterFechaTipo" class="form-select-native form-control w-100" onchange="toggleFechaInputs()">
        <option value="all">Histórico</option>
        <option value="este_mes" selected>Este Mes</option>
        <option value="mes_pasado">Mes Pasado</option>
        <option value="ano_curso">Año Curso</option>
        <option value="personalizada">Rango...</option>
      </select>
    </div>

    <div id="customDateInputs" style="display: none; width: 190px;">
      <div class="d-flex gap-1 align-items-center" style="height: 28px;">
        <input type="date" id="filterFechaDesde" class="form-control" onchange="onCustomDateChange()">
        <span class="text-muted">al</span>
        <input type="date" id="filterFechaHasta" class="form-control" onchange="onCustomDateChange()">
      </div>
    </div>

    <div class="filter-item-wrap">
      <div class="fg-label">Sector:</div>
      <div class="multiselect-btn" id="btnSector" onclick="toggleDropdown(event, 'dropSector')">Todos</div>
      <div class="multiselect-dropdown" id="dropSector"></div>
      <button class="btn-reset-individual inactive" id="resetSector" onclick="resetSingleFilter('Sector')"> </button>
    </div>

    <div class="filter-item-wrap">
      <div class="fg-label">Proveedor:</div>
      <div class="multiselect-btn" id="btnProveedor" onclick="toggleDropdown(event, 'dropProveedor')">Todos</div>
      <div class="multiselect-dropdown" id="dropProveedor"></div>
      <button class="btn-reset-individual inactive" id="resetProveedor" onclick="resetSingleFilter('Proveedor')"> </button>
    </div>

    <div class="filter-item-wrap">
      <div class="fg-label">Ciclo:</div>
      <div class="multiselect-btn" id="btnCiclo" onclick="toggleDropdown(event, 'dropCiclo')">Todos</div>
      <div class="multiselect-dropdown" id="dropCiclo"></div>
      <button class="btn-reset-individual inactive" id="resetCiclo" onclick="resetSingleFilter('Ciclo')"> </button>
    </div>

    <div class="filter-item-wrap">
      <div class="fg-label">Finca:</div>
      <div class="multiselect-btn" id="btnFinca" onclick="toggleDropdown(event, 'dropFinca')">Todas</div>
      <div class="multiselect-dropdown" id="dropFinca"></div>
      <button class="btn-reset-individual inactive" id="resetFinca" onclick="resetSingleFilter('Finca')"> </button>
    </div>

    <div class="filter-item-wrap">
      <div class="fg-label">Actividad:</div>
      <div class="multiselect-btn" id="btnActividad" onclick="toggleDropdown(event, 'dropActividad')">Todas</div>
      <div class="multiselect-dropdown" id="dropActividad"></div>
      <button class="btn-reset-individual inactive" id="resetActividad" onclick="resetSingleFilter('Actividad')"> </button>
    </div>

  </div>

  <div class="table-toolbar">
    <div class="d-flex align-items-center gap-2">
      <span class="fw-bold text-secondary" style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em;">Estructura de Datos Analizada:</span>
      <select id="pivotGroupingOrder" class="form-select-native form-control" onchange="renderMatrix()">
        <option value="finca_actividad">Finca  ➔  Actividad Realizada</option>
        <option value="actividad_finca">Actividad Realizada  ➔  Finca</option>
      </select>
    </div>
    <div class="d-flex align-items-center gap-3">
      <div class="text-muted" style="font-size: 11px;" id="recordCounter">Procesando matriz...</div>
      <button class="btn-organic-action excel" onclick="exportPivotToExcel()">⬇︎ Exportar Tabla Excel</button>
    </div>
  </div>

  <div class="table-responsive-organic" id="matrixContainer">
    <div class="loading-box text-center py-4">
      <div class="loading-spinner"><div class="spinner-blob"></div></div>
    </div>
  </div>

</div>

<div id="global-gantt-tooltip"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script>
  let DB_RAW = [];
  let TOOLTIP_REGISTRY = {};
  let SELECCIONES = { proveedor: [], sector: [], ciclo: [], finca: [], actividad: [] };
  let COMPAIA_SELECCIONADA = "Grupo ZP"; 
  const MESES_ABR = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

  function toggleFilterRibbon() {
    const ribbon = document.getElementById("filterRibbon");
    const btn = document.getElementById("btnToggleRibbon");
    
    if (ribbon.classList.contains("collapsed")) {
      ribbon.classList.remove("collapsed");
      btn.innerHTML = "📐 Ocultar Filtros";
    } else {
      closeAllDropdowns();
      ribbon.classList.add("collapsed");
      btn.innerHTML = "🔍 Mostrar Filtros";
    }
  }

  function formatToCustomDate(dateStr) {
    if (!dateStr) return "";
    const parts = dateStr.split("-");
    if (parts.length !== 3) return dateStr;
    const yearShort = parts[0].substring(2); 
    const monthIdx = parseInt(parts[1], 10) - 1;
    return `${parts[2].padStart(2, "0")}-${MESES_ABR[monthIdx] || parts[1]}-${yearShort}`;
  }

  const WORKER = "https://weathered-recipe-d18c.ignagher.workers.dev";
  const GITHUB_FALLBACK = "https://raw.githubusercontent.com/infoagrodb/dashboard/main/odoo.json";

  async function fetchConFallback(workerUrl, githubUrl) {
    try {
      const r = await fetch(workerUrl);
      if (r.ok) { const j = await r.json(); if (j.ok) return j; }
    } catch(e) {}
    return fetch(githubUrl + "?cache=" + Date.now()).then(r => r.json());
  }

  async function loadData() {
    const workerUrl = WORKER + "/query?base=info&model=x_orden_campo_line_b660b";
    try {
      const json = await fetchConFallback(workerUrl, GITHUB_FALLBACK);
      
      let records = Array.isArray(json) ? json : (json.result ? (Array.isArray(json.result) ? json.result : json.result.records || []) : []);
      if(!records.length && json.records) records = json.records;

      DB_RAW = records.map(r => {
        const ordenArr = Array.isArray(r.x_orden_campo_id) ? r.x_orden_campo_id : [0, "—"];
        return {
          id: r.id,
          orden: ordenArr[1] || "—",
          compaia: Array.isArray(r.x_studio_compaia) ? r.x_studio_compaia[1] : (r.x_studio_compaia || "Sin Compañía"),
          proveedor: Array.isArray(r.x_studio_proveedor_del_servicio) ? r.x_studio_proveedor_del_servicio[1] : (r.x_studio_proveedor_del_servicio || "Sin Proveedor"),
          sector: Array.isArray(r.x_studio_sector_1) ? r.x_studio_sector_1[1] : (r.x_studio_sector_1 || "Sin Sector"),
          ciclo: Array.isArray(r.x_studio_ciclo) ? r.x_studio_ciclo[1] : (r.x_studio_ciclo || "Sin Ciclo"),
          finca: Array.isArray(r.x_studio_finca) ? r.x_studio_finca[1] : (r.x_studio_finca || "Sin Finca"),
          lote_agricola: Array.isArray(r.x_studio_lote_agricola) ? r.x_studio_lote_agricola[1] : (r.x_studio_lote_agricola || "Sin Lote"),
          actividad: Array.isArray(r.x_studio_activiadad_realizada) ? r.x_studio_activiadad_realizada[1] : (r.x_studio_activiadad_realizada || "Sin Actividad"),
          avance: Number(r.x_studio_avance_mzn || 0),
          fecha: r.x_studio_fecha || "" 
        };
      }).filter(r => r.fecha !== "");

      buildHeaderCompaiaOptions();
      buildCascadingFilters();
      renderMatrix();
    } catch (e) {
      document.getElementById("matrixContainer").innerHTML = `<div class="alert alert-danger text-center m-2">⚠️ Error de comunicación de datos.</div>`;
    }
  }

  function buildHeaderCompaiaOptions() {
    const select = document.getElementById("filterHeaderCompaia");
    select.innerHTML = "";
    
    const option = document.createElement("option");
    option.value = "Grupo ZP";
    option.textContent = "Grupo ZP";
    option.selected = true;
    select.appendChild(option);

    COMPAIA_SELECCIONADA = "Grupo ZP";
  }

  function onHeaderCompaiaChange() {
    COMPAIA_SELECCIONADA = document.getElementById("filterHeaderCompaia").value;
    buildCascadingFilters();
    renderMatrix();
    checkGlobalClearVisibility();
  }

  function getOptionsFor(prop) {
    const fFechaTipo = document.getElementById("filterFechaTipo").value;
    const hoy = new Date();
    const curYear = hoy.getFullYear();
    const curMonth = hoy.getMonth();

    const dataFiltered = DB_RAW.filter(r => {
      if (r.compaia !== COMPAIA_SELECCIONADA) return false;

      if(fFechaTipo !== "all" && r.fecha) {
        const parts = r.fecha.split("-");
        if(parts.length === 3) {
          const rYear = parseInt(parts[0], 10);
          const rMonth = parseInt(parts[1], 10) - 1; 
          if(fFechaTipo === "este_mes") {
            if(rYear !== curYear || rMonth !== curMonth) return false;
          } else if(fFechaTipo === "mes_pasado") {
            let targetMonth = curMonth - 1; let targetYear = curYear;
            if(targetMonth < 0) { targetMonth = 11; targetYear--; }
            if(rYear !== targetYear || rMonth !== targetMonth) return false;
          } else if(fFechaTipo === "ano_curso") {
            if(rYear !== curYear) return false;
          } else if(fFechaTipo === "personalizada") {
            const desde = document.getElementById("filterFechaDesde").value;
            const hasta = document.getElementById("filterFechaHasta").value;
            if(desde && r.fecha < desde) return false;
            if(hasta && r.fecha > hasta) return false;
          }
        }
      }

      for (let targetFilterKey in SELECCIONES) {
        if (targetFilterKey !== prop && SELECCIONES[targetFilterKey].length > 0 && !SELECCIONES[targetFilterKey].includes(r[targetFilterKey])) {
          return false;
        }
      }
      return true;
    });
    return [...new Set(dataFiltered.map(r => r[prop]))].filter(Boolean).sort();
  }

  function buildCascadingFilters() {
    updateDropdownUI("dropProveedor", "btnProveedor", "proveedor");
    updateDropdownUI("dropSector", "btnSector", "sector");
    updateDropdownUI("dropCiclo", "btnCiclo", "ciclo");
    updateDropdownUI("dropFinca", "btnFinca", "finca");
    updateDropdownUI("dropActividad", "btnActividad", "actividad");
  }

  function updateDropdownUI(idDrop, idBtn, prop) {
    const dropdown = document.getElementById(idDrop);
    const btn = document.getElementById(idBtn);
    const resetBtn = document.getElementById(`reset${idBtn.substring(3)}`);
    const validOptions = getOptionsFor(prop);
    const prevChecked = SELECCIONES[prop];

    dropdown.innerHTML = "";
    validOptions.forEach(val => {
      const isChecked = prevChecked.includes(val);
      const item = document.createElement("div");
      item.className = "multiselect-option";
      item.innerHTML = `<input type="checkbox" data-prop="${prop}" value="${val}" ${isChecked ? 'checked' : ''}> <span style="margin-left:4px;">${val}</span>`;
      
      item.addEventListener("click", (e) => {
        if(e.target.tagName !== "INPUT") {
          const cb = item.querySelector("input");
          cb.checked = !cb.checked;
          handleCheckboxChange(cb, idBtn, prop);
        }
      });
      
      item.querySelector("input").addEventListener("change", (e) => {
        handleCheckboxChange(e.target, idBtn, prop);
      });
      dropdown.appendChild(item);
    });

    updateButtonLabels(btn, resetBtn, prevChecked, prop);
  }

  function updateButtonLabels(btn, resetBtn, checkedList, prop) {
    if (checkedList.length === 0) {
      btn.textContent = prop === "actividad" || prop === "finca" ? "Todas" : "Todos";
      resetBtn.className = "btn-reset-individual inactive";
      resetBtn.innerHTML = " ";
    } else {
      if (checkedList.length === 1) btn.textContent = checkedList[0];
      else btn.textContent = `${checkedList.length} Sel.`;
      
      resetBtn.className = "btn-reset-individual active";
      resetBtn.innerHTML = "🧹";
    }
  }

  function handleCheckboxChange(cb, idBtn, prop) {
    const val = cb.value;
    if(cb.checked) {
      if(!SELECCIONES[prop].includes(val)) SELECCIONES[prop].push(val);
    } else {
      SELECCIONES[prop] = SELECCIONES[prop].filter(v => v !== val);
    }

    renderMatrix();
    checkGlobalClearVisibility();

    const btn = document.getElementById(idBtn);
    const resetBtn = document.getElementById(`reset${idBtn.substring(3)}`);
    updateButtonLabels(btn, resetBtn, SELECCIONES[prop], prop);
  }

  function toggleDropdown(e, idDrop) {
    e.stopPropagation();
    const dropdown = document.getElementById(idDrop);
    const wasOpen = dropdown.classList.contains("show");
    
    if(!wasOpen) {
      buildCascadingFilters();
    }
    
    closeAllDropdowns();
    if(!wasOpen) dropdown.classList.add("show");
  }

  function closeAllDropdowns() {
    document.querySelectorAll(".multiselect-dropdown").forEach(d => d.classList.remove("show"));
  }

  function closeDropdownsEvent(e) {
    if(!e.target.closest(".multiselect-btn") && !e.target.closest(".multiselect-dropdown")) {
      closeAllDropdowns();
    }
  }

  function toggleFechaInputs() {
    const tipo = document.getElementById("filterFechaTipo").value;
    document.getElementById("customDateInputs").style.display = (tipo === "personalizada") ? "block" : "none";
    buildCascadingFilters();
    renderMatrix();
    checkGlobalClearVisibility();
  }

  function onCustomDateChange() {
    buildCascadingFilters();
    renderMatrix();
    checkGlobalClearVisibility();
  }

  function resetSingleFilter(id) {
    SELECCIONES[id.toLowerCase()] = [];
    buildCascadingFilters();
    renderMatrix();
    checkGlobalClearVisibility();
  }

  function resetAllFilters() {
    for(let key in SELECCIONES) SELECCIONES[key] = [];
    document.getElementById("filterFechaTipo").value = "este_mes";
    document.getElementById("customDateInputs").style.display = "none";
    buildCascadingFilters();
    renderMatrix();
    checkGlobalClearVisibility();
  }

  function checkGlobalClearVisibility() {
    const clearBtn = document.getElementById("btnGlobalClear");
    let hasActiveFilter = false;

    for (let key in SELECCIONES) {
      if (SELECCIONES[key].length > 0) {
        hasActiveFilter = true;
        break;
      }
    }

    const fechaTipo = document.getElementById("filterFechaTipo").value;
    if (fechaTipo !== "este_mes") hasActiveFilter = true;

    if (hasActiveFilter) clearBtn.style.display = "inline-flex";
    else clearBtn.style.display = "none";
  }

  function renderMatrix() {
    const fFechaTipo = document.getElementById("filterFechaTipo").value;
    const orderMode = document.getElementById("pivotGroupingOrder").value;
    const hoy = new Date();
    const curYear = hoy.getFullYear();
    const curMonth = hoy.getMonth();

    TOOLTIP_REGISTRY = {};

    const filtered = DB_RAW.filter(r => {
      if (r.compaia !== COMPAIA_SELECCIONADA) return false;

      for (let prop in SELECCIONES) {
        if (SELECCIONES[prop].length > 0 && !SELECCIONES[prop].includes(r[prop])) return false;
      }

      if(fFechaTipo !== "all" && r.fecha) {
        const parts = r.fecha.split("-");
        if(parts.length === 3) {
          const rYear = parseInt(parts[0], 10);
          const rMonth = parseInt(parts[1], 10) - 1; 
          if(fFechaTipo === "este_mes") {
            if(rYear !== curYear || rMonth !== curMonth) return false;
          } else if(fFechaTipo === "mes_pasado") {
            let targetMonth = curMonth - 1; let targetYear = curYear;
            if(targetMonth < 0) { targetMonth = 11; targetYear--; }
            if(rYear !== targetYear || rMonth !== targetMonth) return false;
          } else if(fFechaTipo === "ano_curso") {
            if(rYear !== curYear) return false;
          } else if(fFechaTipo === "personalizada") {
            const desde = document.getElementById("filterFechaDesde").value;
            const hasta = document.getElementById("filterFechaHasta").value;
            if(desde && r.fecha < desde) return false;
            if(hasta && r.fecha > hasta) return false;
          }
        }
      }
      return true;
    });

    document.getElementById("recordCounter").textContent = `${filtered.length} operaciones coincidentes`;

    const container = document.getElementById("matrixContainer");
    if(!filtered.length) {
      container.innerHTML = `<div class="p-4 text-center text-muted fw-medium">Sin datos coincidentes para los criterios seleccionados.</div>`;
      return;
    }

    const listaFechasBase = [...new Set(filtered.map(r => r.fecha))].sort();
    const columnasMapeadas = {}; 
    filtered.forEach(r => {
      const key = (orderMode === "finca_actividad") ? `${r.finca}|||${r.actividad}` : `${r.actividad}|||${r.finca}`;
      columnasMapeadas[key] = { 
        padre: (orderMode === "finca_actividad") ? r.finca : r.actividad, 
        hijo: (orderMode === "finca_actividad") ? r.actividad : r.finca 
      };
    });

    const llavesColumnas = Object.keys(columnasMapeadas).sort();
    const matrizValores = {};
    const totalesColumnas = {}; 
    
    llavesColumnas.forEach(colKey => { totalesColumnas[colKey] = 0; });

    filtered.forEach(r => {
      const colKey = (orderMode === "finca_actividad") ? `${r.finca}|||${r.actividad}` : `${r.actividad}|||${r.finca}`;
      if(!matrizValores[r.fecha]) matrizValores[r.fecha] = {};
      matrizValores[r.fecha][colKey] = (matrizValores[r.fecha][colKey] || 0) + r.avance;
      totalesColumnas[colKey] += r.avance;

      const popupId = `pop_${r.fecha}_${colKey.replace(/[^a-zA-Z0-9]/g, '_')}`;
      if(!TOOLTIP_REGISTRY[popupId]) TOOLTIP_REGISTRY[popupId] = [];
      TOOLTIP_REGISTRY[popupId].push({
        orden: r.orden,
        proveedor: r.proveedor,
        ciclo: r.ciclo,          
        lote: r.lote_agricola,
        avance: r.avance
      });
    });

    const bloquesPadre = {};
    llavesColumnas.forEach(k => {
      const p = columnasMapeadas[k].padre;
      bloquesPadre[p] = (bloquesPadre[p] || 0) + 1;
    });

    let html = `<table class="pivot-gantt"><thead><tr class="main-hdr-row">`;
    html += `<th rowspan="3" class="col-fecha-sticky">Fecha</th>`;

    Object.keys(bloquesPadre).sort().forEach(padre => {
      html += `<th colspan="${bloquesPadre[padre]}">${padre}</th>`;
    });
    
    html += `</tr><tr class="sub-hdr-row">`;

    llavesColumnas.forEach(k => {
      html += `<th>${columnasMapeadas[k].hijo}</th>`;
    });
    
    html += `</tr><tr class="total-hdr-row">`;
    llavesColumnas.forEach(colKey => {
      const totalCol = totalesColumnas[colKey] || 0;
      html += `<th>${totalCol > 0 ? totalCol.toFixed(1) : '0.0'}</th>`;
    });
    html += `</tr></thead><tbody>`;

    listaFechasBase.forEach(fechaBase => {
      html += `<tr><td class="col-fecha-sticky">${formatToCustomDate(fechaBase)}</td>`;
      llavesColumnas.forEach(colKey => {
        const val = (matrizValores[fechaBase] && matrizValores[fechaBase][colKey]) ? matrizValores[fechaBase][colKey] : 0;
        
        if(val > 0) {
          const pId = `pop_${fechaBase}_${colKey.replace(/[^a-zA-Z0-9]/g, '_')}`;
          html += `<td>
                    <div class="cell-interactive" data-popup-id="${pId}" onmouseenter="showPopup(event)" onmousemove="movePopup(event)" onmouseleave="hidePopup()">
                      <div class="mzn-badge-container">
                        ${val.toFixed(1)}
                      </div>
                    </div>
                   </td>`;
        } else {
          html += `<td style="color:#cbd5e1;">-</td>`;
        }
      });
      html += `</tr>`;
    });

    html += `</tbody></table>`;
    container.innerHTML = html;
  }

  const popupEl = document.getElementById("global-gantt-tooltip");

  function showPopup(e) {
    const key = e.currentTarget.getAttribute("data-popup-id");
    const dataset = TOOLTIP_REGISTRY[key];
    if (!dataset) return;

    let content = `<div class="popup-hdr">Desglose de Operación</div>`;
    dataset.forEach(item => {
      content += `
        <div class="popup-block">
          <div class="popup-item"><span class="p-label">Orden:</span><span class="p-val">#${item.orden}</span></div>
          <div class="popup-item"><span class="p-label">Proveedor:</span><span class="p-val" style="color:#ffffff;">${item.proveedor}</span></div>
          <div class="popup-item"><span class="p-label">Ciclo:</span><span class="p-val">${item.ciclo}</span></div>
          <div class="popup-item"><span class="p-label">Lote:</span><span class="p-val">${item.lote}</span></div>
          <div class="popup-item"><span class="p-label">Avance:</span><span class="p-val" style="color:#4ade80;">${item.avance.toFixed(1)} Mzn</span></div>
        </div>
        ${dataset.length > 1 ? '<hr style="margin:4px 0; opacity:0.1; border-color:#fff;">' : ''}
      `;
    });

    popupEl.innerHTML = content;
    popupEl.style.display = "block";
    movePopup(e);
  }

  function movePopup(e) {
    const width = 320; 
    const height = popupEl.offsetHeight || 120;
    let left = e.clientX - (width / 2);
    let top = e.clientY - height - 12;
    if (left + width > window.innerWidth) left = window.innerWidth - width - 10;
    if (left < 0) left = 10;
    if (top < 0) top = e.clientY + 15;

    popupEl.style.left = left + "px";
    popupEl.style.top = top + "px";
  }

  function hidePopup() { popupEl.style.display = "none"; }

  function exportPivotToExcel() {
    const table = document.querySelector("table.pivot-gantt");
    if(!table) return;
    const wb = XLSX.utils.table_to_book(table, { raw: false });
    XLSX.writeFile(wb, `INFOAGRO_MATRIZ_${COMPAIA_SELECCIONADA.replace(/ /g, '_')}.xlsx`);
  }

  document.addEventListener("click", (e) => {
    if(!e.target.closest(".filter-item-wrap") && !e.target.closest(".multiselect-dropdown")) {
      closeAllDropdowns();
      buildCascadingFilters();
    }
  });
  
  loadData();
</script>

</body>
</html>
