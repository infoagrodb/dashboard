<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pluviosidad · Análisis Histórico por Mes</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue-dark:#1a3a6b;
  --blue-mid:#1a56a4;
  --blue-light:#3780cc;
  --blue-pale:#dbeafe;
  --blue-pale2:#bfdbfe;
  --green-bg:#dcfce7;
  --green-txt:#166534;
  --gray-bg:#f3f4f6;
  --gray-bg2:#f9fafb;
  --gray-border:#e5e7eb;
  --gray-border2:#d1d5db;
  --gray-txt:#6b7280;
  --txt:#111827;
  --white:#ffffff;
  --radius-sm:4px;
  --radius-md:6px;
  --radius-lg:10px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#eef2f7;min-height:100vh;padding:16px}

/* CARD */
.card{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);border:0.5px solid var(--gray-border);overflow:hidden}

/* HEADER */
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.page-hdr-left{display:flex;align-items:center;gap:10px}
.page-icon{width:34px;height:34px;background:var(--blue-mid);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.page-title{font-size:15px;font-weight:600;color:var(--txt)}
.page-sub{font-size:11px;color:var(--gray-txt);margin-top:1px}
.badge-live{display:flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:20px;background:var(--green-bg);color:var(--green-txt);font-weight:500}
.dot-live{width:6px;height:6px;border-radius:50%;background:#16a34a;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* FILTROS */
.filters-card{background:var(--white);border-radius:var(--radius-lg);border:0.5px solid var(--gray-border);box-shadow:var(--shadow-sm);padding:12px 14px;margin-bottom:12px}
.filters-row{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:3px}
.fg-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-txt);font-weight:600}
.fg-inner{display:flex;gap:5px;align-items:center}
select{font-size:12px;padding:4px 8px;border:1px solid var(--gray-border2);border-radius:var(--radius-md);background:var(--white);color:var(--txt);height:30px;width:148px;transition:border .15s}
select:focus{outline:none;border-color:var(--blue-mid)}

/* CHECKLIST */
.chk-wrap{position:relative;width:148px}
.chk-btn{font-size:12px;padding:4px 8px;border:1px solid var(--gray-border2);border-radius:var(--radius-md);background:var(--white);color:var(--txt);height:30px;width:100%;text-align:left;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:inherit;transition:border .15s}
.chk-btn:focus,.chk-btn:hover{border-color:var(--blue-mid)}
.chk-list{position:absolute;top:34px;left:0;min-width:170px;background:var(--white);border:1px solid var(--gray-border2);border-radius:var(--radius-md);padding:6px 4px;z-index:999;display:none;max-height:210px;overflow-y:auto;box-shadow:var(--shadow-md)}
.chk-list.open{display:block}
.chk-list li{list-style:none;font-size:12px;padding:3px 6px;border-radius:4px;color:var(--txt);cursor:pointer}
.chk-list li:hover{background:var(--gray-bg)}
.chk-list li label{display:flex;align-items:center;gap:6px;cursor:pointer;width:100%}

/* RESET BTN */
.reset-btn{background:none;border:1px solid var(--gray-border2);color:var(--gray-txt);border-radius:var(--radius-md);padding:0 7px;height:30px;cursor:pointer;font-size:13px;transition:all .15s;flex-shrink:0}
.reset-btn:hover{background:var(--gray-bg);border-color:var(--gray-txt)}

/* TOGGLE TOTAL */
.toggle-total{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--gray-txt);height:30px;cursor:pointer;user-select:none}
.toggle-total input{accent-color:var(--blue-mid);width:14px;height:14px;cursor:pointer}

/* DIVIDER filtros */
.filter-divider{width:1px;height:30px;background:var(--gray-border);align-self:flex-end;margin:0 2px;flex-shrink:0}

/* KPI SECTION */
.kpi-section{padding:0;margin-bottom:12px}
.kpi-table-wrap{border-radius:var(--radius-lg);overflow:hidden;border:0.5px solid var(--gray-border);box-shadow:var(--shadow-sm)}
.kpi-table{width:100%;border-collapse:collapse;font-size:11px}
.kpi-table thead tr{background:var(--blue-dark)}
.kpi-table th.row-label{
  background:var(--gray-bg2);color:var(--gray-txt);font-weight:600;
  padding:8px 12px;text-align:left;border-right:1px solid var(--gray-border);
  font-size:10px;text-transform:uppercase;letter-spacing:.04em;
  width:168px;min-width:168px;
}
.kpi-table th.yr-head{
  background:var(--blue-mid);color:#fff;font-weight:600;
  padding:7px 10px;text-align:center;border-right:1px solid rgba(255,255,255,.12);
  font-size:11px;white-space:nowrap
}
.kpi-table td.row-label{
  background:var(--gray-bg2);font-weight:500;color:var(--gray-txt);
  padding:7px 12px;border-right:1px solid var(--gray-border);
  white-space:nowrap;font-size:11px;border-top:1px solid var(--gray-border);
  width:168px;min-width:168px;
}
.kpi-table td.kv{
  text-align:center;padding:6px 10px;
  border-top:1px solid var(--gray-border);border-right:1px solid var(--gray-border);
  font-size:11px;color:var(--txt)
}
.kpi-table td.kv.has{font-weight:600}
.bar-cell{display:flex;align-items:center;justify-content:center;gap:6px}
.bar-bg{width:40px;height:8px;background:#e5e7eb;border-radius:99px;overflow:hidden;flex-shrink:0}
.bar-fill{height:100%;background:var(--blue-light);border-radius:99px;transition:width .4s ease}
.bar-fill.hi{background:var(--blue-dark)}

/* PIVOT SECTION */
.pivot-section{margin-top:0}
.pivot-label{font-size:11px;color:var(--gray-txt);font-weight:500;margin-bottom:8px;padding:0 2px;display:flex;align-items:center;gap:6px}
.pivot-label::before{content:"";display:inline-block;width:3px;height:12px;background:var(--blue-mid);border-radius:2px}
.tbl-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:0.5px solid var(--gray-border);box-shadow:var(--shadow-sm)}
table.pivot{border-collapse:collapse;width:100%;font-size:11px}
table.pivot thead th{
  background:var(--blue-mid);color:#fff;font-weight:600;
  padding:7px 10px;text-align:center;
  border-right:1px solid rgba(255,255,255,.12);
  white-space:nowrap;font-size:10px;text-transform:uppercase;letter-spacing:.04em
}
table.pivot thead th:first-child{
  background:var(--gray-bg2);color:var(--gray-txt);text-align:left;
  border-right:1px solid var(--gray-border);
  width:168px;min-width:168px;font-size:10px;
}
table.pivot thead th.total-col{background:#0d3d7a}
table.pivot tbody td{
  padding:5px 10px;text-align:center;
  border-bottom:1px solid var(--gray-border);border-right:1px solid var(--gray-border);
  font-size:11px;color:var(--txt)
}
table.pivot tbody td:first-child{
  text-align:left;font-weight:500;color:var(--gray-txt);
  background:var(--gray-bg2);white-space:nowrap;
  border-right:1px solid var(--gray-border);font-size:10px;
  width:168px;min-width:168px;
}
table.pivot tbody tr:hover td{background:rgba(219,234,254,.18)}
table.pivot tbody tr:hover td:first-child{background:var(--gray-bg)}
table.pivot tbody tr:last-child td{border-bottom:none}
table.pivot tfoot td{
  border-top:2px solid var(--blue-pale2);
  background:#f0f6ff;font-weight:600;font-size:11px;
  padding:6px 10px;text-align:center;color:var(--txt)
}
table.pivot tfoot td:first-child{text-align:left;color:var(--gray-txt);font-size:10px;text-transform:uppercase;letter-spacing:.04em;background:#eaf2ff}
.cv{background:var(--blue-pale);color:#1e3a5f;font-weight:500;border-radius:3px;padding:1px 5px;display:inline-block}
.cv2{background:var(--blue-pale2);color:#1a3a6b;font-weight:700;border-radius:3px;padding:1px 5px;display:inline-block}
.total-hidden .total-col{display:none}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;gap:10px;color:var(--gray-txt);font-size:13px}
.spinner{width:18px;height:18px;border:2px solid var(--gray-border);border-top-color:var(--blue-mid);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* EMPTY */
.empty-msg{text-align:center;padding:32px;color:var(--gray-txt);font-size:13px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="page-hdr">
  <div class="page-hdr-left">
    <div class="page-icon">🌧️</div>
    <div>
      <div class="page-title">Pluviosidad · Análisis Histórico por Mes</div>
      <div class="page-sub">Promedio de lluvia por día y año · INFOAGRO</div>
    </div>
  </div>
  <div class="badge-live"><span class="dot-live"></span>INFOAGRO · En vivo</div>
</div>

<!-- FILTROS -->
<div class="filters-card">
  <div class="filters-row">

    <div class="fg">
      <div class="fg-label">Mes</div>
      <div class="fg-inner">
        <select id="selMes"></select>
        <button class="reset-btn" title="Limpiar" onclick="clearSingle('selMes')">↺</button>
      </div>
    </div>

    <div class="filter-divider"></div>

    <div class="fg">
      <div class="fg-label">Compañía</div>
      <div class="fg-inner">
        <select id="selCo"><option value="">Todas</option></select>
        <button class="reset-btn" title="Limpiar" onclick="clearSingle('selCo')">↺</button>
      </div>
    </div>

    <div class="fg">
      <div class="fg-label">Sector</div>
      <div class="fg-inner">
        <select id="selSector"><option value="">Todos</option></select>
        <button class="reset-btn" title="Limpiar" onclick="clearSingle('selSector')">↺</button>
      </div>
    </div>

    <div class="fg">
      <div class="fg-label">Finca</div>
      <div class="fg-inner">
        <div class="chk-wrap">
          <button class="chk-btn" id="chkFincaBtn" onclick="toggleChk('chkFincaList','chkFincaBtn')">Todas las fincas</button>
          <ul class="chk-list" id="chkFincaList"></ul>
        </div>
        <button class="reset-btn" title="Limpiar" onclick="clearChecklist('chkFincaList','chkFincaBtn','fincas')">↺</button>
      </div>
    </div>

    <div class="filter-divider"></div>

    <div class="fg">
      <div class="fg-label">Años</div>
      <div class="fg-inner">
        <div class="chk-wrap">
          <button class="chk-btn" id="chkYearBtn" onclick="toggleChk('chkYearList','chkYearBtn')">Todos los años</button>
          <ul class="chk-list" id="chkYearList"></ul>
        </div>
        <button class="reset-btn" title="Limpiar" onclick="clearChecklist('chkYearList','chkYearBtn','años')">↺</button>
      </div>
    </div>

    <div class="filter-divider"></div>

    <div class="fg">
      <div class="fg-label">Opciones</div>
      <div class="fg-inner">
        <label class="toggle-total">
          <input type="checkbox" id="chkTotalCol" checked>
          Mostrar total
        </label>
        <button class="reset-btn" title="Exportar a Excel" onclick="exportPivotToExcel()">⬇︎ Excel</button>
      </div>
    </div>

  </div>
</div>

<!-- KPI TABLE -->
<div class="kpi-section">
  <div class="kpi-table-wrap" id="kpiWrap">
    <div class="loading"><div class="spinner"></div> Cargando datos…</div>
  </div>
</div>

<!-- PIVOT TABLE -->
<div class="pivot-section">
  <div class="pivot-label" id="pivotLabel">Promedio de lluvia · días del mes × año</div>
  <div class="tbl-wrap" id="pivotWrap">
    <table class="pivot">
      <thead id="pivotHead"></thead>
      <tbody id="pivotBody"></tbody>
      <tfoot id="pivotFoot"></tfoot>
    </table>
  </div>
</div>

<script>
let RAW=[];

const MESES_NOM={
  "01":"Enero","02":"Febrero","03":"Marzo","04":"Abril",
  "05":"Mayo","06":"Junio","07":"Julio","08":"Agosto",
  "09":"Septiembre","10":"Octubre","11":"Noviembre","12":"Diciembre"
};

function getM(f){return f.split("-")[1]}
function getY(f){return parseInt(f.split("-")[0])}
function getD(f){return parseInt(f.split("-")[2])}
function unique(arr,k){return[...new Set(arr.map(r=>r[k]).filter(Boolean))].sort()}

// ── CÁLCULO CORRECTO ──────────────────────────────────────────────────────────
function avgDay(rows){
  if(!rows.length) return 0;
  const sum=rows.reduce((s,r)=>s+r.v,0);
  const fincasDistintas=new Set(rows.map(r=>r.fi)).size||1;
  return sum/fincasDistintas;
}

function totalMes(rows){
  const dias=[...new Set(rows.map(r=>r.f))];
  return dias.reduce((s,fecha)=>s+avgDay(rows.filter(r=>r.f===fecha)),0);
}

// ─────────────────────────────────────────────────────────────────────────────

async function loadData(){
  const url="https://raw.githubusercontent.com/infoagrodb/dashboard/main/odooPV.json";
  try{
    const resp=await fetch(url+"?cache="+Date.now());
    const json=await resp.json();
    RAW=json.result.map(r=>{
      const finca=Array.isArray(r.x_studio_finca)?r.x_studio_finca[1]:r.x_studio_finca;
      const sector=Array.isArray(r.x_studio_sector_1)?r.x_studio_sector_1[1]:r.x_studio_sector_1;
      const co=Array.isArray(r.x_studio_company_id)?r.x_studio_company_id[1]:r.x_studio_company_id;
      return {f:r.x_studio_fecha, fi:finca, se:sector, co:co, v:Number(r.x_studio_cantidad_promedio||0)};
    });
    initFilters();
    render();
  }catch(e){
    document.getElementById("kpiWrap").innerHTML=`<div class="empty-msg">⚠️ Error al cargar datos. Verificá la conexión.</div>`;
  }
}

function initFilters(){
  const mesEl=document.getElementById("selMes");
  mesEl.innerHTML="";
  [...new Set(RAW.map(r=>getM(r.f)))].sort().forEach(m=>{
    const o=document.createElement("option");
    o.value=m; o.textContent=MESES_NOM[m]||m;
    mesEl.appendChild(o);
  });

  const coEl=document.getElementById("selCo");
  coEl.innerHTML='<option value="">Todas</option>';
  unique(RAW,"co").forEach(c=>{
    const o=document.createElement("option");
    o.value=c; o.textContent=c; coEl.appendChild(o);
  });

  populateCascadeFilters();
  populateYearChecklist();

  document.getElementById("chkTotalCol").addEventListener("change",render);
  ["selMes","selSector","selCo"].forEach(id=>{
    document.getElementById(id).addEventListener("change",()=>{
      populateCascadeFilters();
      render();
    });
  });
}

function populateCascadeFilters(){
  const co=document.getElementById("selCo").value;
  const base=RAW.filter(r=>!co||r.co===co);

  const secEl=document.getElementById("selSector");
  const curSec=secEl.value;
  secEl.innerHTML='<option value="">Todos</option>';
  unique(base,"se").forEach(s=>{
    const o=document.createElement("option");
    o.value=s; o.textContent=s; secEl.appendChild(o);
  });
  if(curSec&&[...secEl.options].some(o=>o.value===curSec)) secEl.value=curSec;

  const se=secEl.value;
  const baseFi=base.filter(r=>!se||r.se===se);
  const ul=document.getElementById("chkFincaList");
  ul.innerHTML="";
  unique(baseFi,"fi").forEach(fi=>{
    const li=document.createElement("li");
    li.innerHTML=`<label><input type="checkbox" value="${fi}"> ${fi}</label>`;
    li.querySelector("input").addEventListener("change",()=>{
      updateChkBtn("chkFincaList","chkFincaBtn","fincas");
      render();
    });
    ul.appendChild(li);
  });
  updateChkBtn("chkFincaList","chkFincaBtn","fincas");
}

function populateYearChecklist(){
  const years=[...new Set(RAW.map(r=>getY(r.f)))].sort();
  const ul=document.getElementById("chkYearList");
  ul.innerHTML="";
  years.forEach(y=>{
    const li=document.createElement("li");
    li.innerHTML=`<label><input type="checkbox" value="${y}" checked> ${y}</label>`;
    li.querySelector("input").addEventListener("change",()=>{
      updateChkBtn("chkYearList","chkYearBtn","años");
      render();
    });
    ul.appendChild(li);
  });
  updateChkBtn("chkYearList","chkYearBtn","años");
}

function toggleChk(listId,btnId){
  document.getElementById(listId).classList.toggle("open");
}

document.addEventListener("click",e=>{
  document.querySelectorAll(".chk-wrap").forEach(w=>{
    const list=w.querySelector(".chk-list");
    if(!w.contains(e.target)){
      list.classList.remove("open");
      if(list.id==="chkFincaList") updateChkBtn("chkFincaList","chkFincaBtn","fincas");
      if(list.id==="chkYearList")  updateChkBtn("chkYearList","chkYearBtn","años");
    }
  });
});

function getSelFromList(listId){
  return Array.from(document.querySelectorAll(`#${listId} input:checked`)).map(x=>x.value);
}

function updateChkBtn(listId,btnId,labelType){
  const sel=getSelFromList(listId);
  const btn=document.getElementById(btnId);
  if(!sel.length) btn.textContent=labelType==="fincas"?"Todas las fincas":"Todos los años";
  else if(sel.length<=2) btn.textContent=sel.join(", ");
  else btn.textContent=sel.length+" "+labelType+" seleccionados";
}

function clearSingle(id){
  document.getElementById(id).selectedIndex=0;
  populateCascadeFilters();
  render();
}

function clearChecklist(listId,btnId,labelType){
  document.querySelectorAll(`#${listId} input`).forEach(i=>i.checked=false);
  updateChkBtn(listId,btnId,labelType);
  render();
}

function getFiltered(){
  const mes=document.getElementById("selMes").value;
  const se=document.getElementById("selSector").value;
  const co=document.getElementById("selCo").value;
  const selFi=getSelFromList("chkFincaList");
  const selYears=getSelFromList("chkYearList").map(y=>parseInt(y));
  return RAW.filter(r=>
    getM(r.f)===mes&&
    (!se||r.se===se)&&
    (!co||r.co===co)&&
    (!selFi.length||selFi.includes(r.fi))&&
    (!selYears.length||selYears.includes(getY(r.f)))
  );
}

// ── KPI TABLE ─────────────────────────────────────────────────────────────────
function buildKPI(data){
  const wrap=document.getElementById("kpiWrap");
  const years=[...new Set(data.map(r=>getY(r.f)))].sort();
  if(!years.length){wrap.innerHTML=`<div class="empty-msg">Sin datos para los filtros seleccionados.</div>`;return}

  const kpis=[
    {
      label:"Cantidad de Mm en el mes",
      tipo:"bar",
      fn:(rows)=>totalMes(rows)
    },
    {
      label:"Cant. días de lluvia",
      tipo:"num",
      fn:(rows)=>[...new Set(rows.map(r=>r.f))].length
    },
    {
      label:"Promedio Mm por evento",
      tipo:"bar",
      fn:(rows)=>{
        const dias=[...new Set(rows.map(r=>r.f))];
        if(!dias.length) return 0;
        return totalMes(rows)/dias.length;
      }
    },
  ];

  let html=`<table class="kpi-table"><thead><tr><th class="row-label">Año</th>`;
  years.forEach(y=>html+=`<th class="yr-head">${y}</th>`);
  html+=`</tr></thead><tbody>`;

  kpis.forEach(k=>{
    const vals=years.map(y=>({y,val:k.fn(data.filter(r=>getY(r.f)===y))}));
    const maxV=Math.max(...vals.map(x=>x.val),1);
    html+=`<tr><td class="row-label">${k.label}</td>`;
    vals.forEach(({val})=>{
      const pct=Math.round((val/maxV)*100);
      const disp=val>0?val.toFixed(0):"";
      if(k.tipo==="bar"){
        html+=`<td class="kv${val>0?" has":""}">
          <div class="bar-cell">
            <div class="bar-bg"><div class="bar-fill${pct>74?" hi":""}" style="width:${pct}%"></div></div>
            <span>${disp}</span>
          </div></td>`;
      } else {
        html+=`<td class="kv${val>0?" has":""}">${disp}</td>`;
      }
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table>`;
  wrap.innerHTML=html;
}

// ── PIVOT TABLE ───────────────────────────────────────────────────────────────
function buildPivot(data){
  const mes=document.getElementById("selMes").value;
  const showTotal=document.getElementById("chkTotalCol").checked;
  const years=[...new Set(data.map(r=>getY(r.f)))].sort();
  const head=document.getElementById("pivotHead");
  const body=document.getElementById("pivotBody");
  const foot=document.getElementById("pivotFoot");
  head.innerHTML=""; body.innerHTML=""; foot.innerHTML="";

  if(!years.length||!data.length){
    body.innerHTML=`<tr><td colspan="2" class="empty-msg">Sin datos.</td></tr>`;
    return;
  }

  const anyYear=years[0];
  const daysInMonth=new Date(anyYear,parseInt(mes),0).getDate();

  const cellVals=[];
  for(let d=1;d<=daysInMonth;d++){
    years.forEach(y=>{
      const rows=data.filter(r=>getY(r.f)===y&&getD(r.f)===d);
      if(rows.length) cellVals.push(avgDay(rows));
    });
  }
  const sorted=[...cellVals].sort((a,b)=>a-b);
  const p75=sorted[Math.floor(sorted.length*0.75)]||0;

  // HEAD
  let h=`<tr><th>Día</th>`;
  years.forEach(y=>h+=`<th>${y}</th>`);
  if(showTotal) h+=`<th class="total-col">Total</th>`;
  h+=`</tr>`;
  head.innerHTML=h;

  // BODY — valor por celda = avgDay (promedio entre fincas ese día/año)
  for(let d=1;d<=daysInMonth;d++){
    const anyData=years.some(y=>data.some(r=>getY(r.f)===y&&getD(r.f)===d));
    if(!anyData) continue;

    const mStr=(MESES_NOM[mes]||mes).slice(0,3).toLowerCase();
    let tr=`<tr><td>${d}-${mStr}</td>`;
    let totalDia=0; let cols=0;

    years.forEach(y=>{
      const rows=data.filter(r=>getY(r.f)===y&&getD(r.f)===d);
      const val=avgDay(rows);
      if(rows.length){ totalDia+=val; cols++; }
      if(val>0){
        const cls=val>=p75?"cv2":"cv";
        tr+=`<td><span class="${cls}">${val.toFixed(1)}</span></td>`;
      } else {
        tr+=`<td></td>`;
      }
    });

    if(showTotal){
      const tdVal=cols>0?totalDia/cols:0;
      tr+=`<td class="total-col">${tdVal>0?tdVal.toFixed(1):""}</td>`;
    }
    tr+=`</tr>`;
    body.insertAdjacentHTML("beforeend",tr);
  }

  // FOOTER — total por año = suma de avgDay de todos los días (= totalMes)
  let tf=`<tr><td>Total Mm</td>`;
  let grandTotal=0; let grandCols=0;
  years.forEach(y=>{
    const val=totalMes(data.filter(r=>getY(r.f)===y));
    grandTotal+=val; grandCols++;
    tf+=`<td>${val>0?val.toFixed(0):""}</td>`;
  });
  if(showTotal){
    const gt=grandCols>0?grandTotal/grandCols:0;
    tf+=`<td class="total-col">${gt>0?gt.toFixed(0):""}</td>`;
  }
  tf+=`</tr>`;
  foot.innerHTML=tf;

  const mn=MESES_NOM[mes]||mes;
  document.getElementById("pivotLabel").textContent=`Promedio de lluvia · días de ${mn} × año  (promedio entre fincas por día, en mm)`;

  const pivotTable=document.querySelector("table.pivot");
  if(showTotal) pivotTable.classList.remove("total-hidden");
  else pivotTable.classList.add("total-hidden");
}

function render(){
  const data=getFiltered();
  buildKPI(data);
  buildPivot(data);
}

// Exportar pivot a CSV (Excel)
function exportPivotToExcel(){
  const table=document.querySelector("table.pivot");
  if(!table) return;
  let csv=[];
  const rows=table.querySelectorAll("tr");
  rows.forEach(tr=>{
    let row=[];
    tr.querySelectorAll("th,td").forEach(cell=>{
      let text=cell.innerText.replace(/\s+/g," ").trim();
      text=text.replace(/;/g,",");
      row.push('"'+text+'"');
    });
    csv.push(row.join(";"));
  });
  const blob=new Blob([csv.join("\n")],{type:"text/csv;charset=utf-8;"});
  const link=document.createElement("a");
  const mesSel=document.getElementById("selMes").value;
  const mesNom=MESES_NOM[mesSel]||mesSel||"mes";
  link.href=URL.createObjectURL(blob);
  link.download=`pluviosidad_${mesNom}.csv`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

loadData();
</script>
