<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Dashboard Avances Campo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />

    <!-- DataTables -->
    <link rel="stylesheet"
          href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" />

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <style>
        body { background-color: #f5f5f5; }
        .card { box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
        .kpi-value { font-size: 1.6rem; font-weight: 600; }
        .kpi-label { font-size: 0.85rem; text-transform: uppercase; color: #777; }
    </style>
</head>
<body>
<div class="container-fluid py-3">
    <!-- Header -->
    <div class="row mb-3">
        <div class="col-12 d-flex justify-content-between align-items-center">
            <div>
                <h3 class="mb-0">Avances Campo – Dashboard Operativo</h3>
                <small class="text-muted">Fuente: Odoo JSON-RPC (x_orden_campo_line_b660b)</small>
            </div>
            <div>
                <span class="badge bg-success">Operativo</span>
            </div>
        </div>
    </div>

    <!-- Filtros -->
    <div class="row mb-3">
        <div class="col-md-3">
            <label class="form-label">Compañía</label>
            <select id="filtroCompania" class="form-select">
                <option value="">Todas</option>
            </select>
        </div>
        <div class="col-md-3">
            <label class="form-label">Finca</label>
            <select id="filtroFinca" class="form-select">
                <option value="">Todas</option>
            </select>
        </div>
        <div class="col-md-3">
            <label class="form-label">Ciclo</label>
            <select id="filtroCiclo" class="form-select">
                <option value="">Todos</option>
            </select>
        </div>
        <div class="col-md-3">
            <label class="form-label">Actividad</label>
            <select id="filtroActividad" class="form-select">
                <option value="">Todas</option>
            </select>
        </div>
    </div>

    <!-- KPIs -->
    <div class="row mb-3">
        <div class="col-md-3 mb-2">
            <div class="card p-3">
                <div class="kpi-label">Total registros</div>
                <div id="kpiRegistros" class="kpi-value">0</div>
            </div>
        </div>
        <div class="col-md-3 mb-2">
            <div class="card p-3">
                <div class="kpi-label">Total Avance Mzn</div>
                <div id="kpiAvanceTotal" class="kpi-value">0</div>
            </div>
        </div>
        <div class="col-md-3 mb-2">
            <div class="card p-3">
                <div class="kpi-label">Fincas únicas</div>
                <div id="kpiFincas" class="kpi-value">0</div>
            </div>
        </div>
        <div class="col-md-3 mb-2">
            <div class="card p-3">
                <div class="kpi-label">Actividades únicas</div>
                <div id="kpiActividades" class="kpi-value">0</div>
            </div>
        </div>
    </div>

    <!-- Gráficos -->
    <div class="row mb-3">
        <div class="col-lg-6 mb-3">
            <div class="card p-3">
                <h6 class="mb-2">Avance por Finca</h6>
                <canvas id="chartFinca"></canvas>
            </div>
        </div>
        <div class="col-lg-6 mb-3">
            <div class="card p-3">
                <h6 class="mb-2">Avance por Actividad</h6>
                <canvas id="chartActividad"></canvas>
            </div>
        </div>
    </div>

    <!-- Tabla -->
    <div class="row">
        <div class="col-12">
            <div class="card p-3">
                <h6 class="mb-2">Detalle de Avances</h6>
                <div class="table-responsive">
                    <table id="tablaAvances" class="table table-striped table-bordered table-sm" style="width:100%">
                        <thead class="table-light">
                        <tr>
                            <th>Compañia</th>
                            <th>Fecha</th>
                            <th>Finca</th>
                            <th>Ciclo</th>
                            <th>Actividad</th>
                            <th>Lote</th>
                            <th>Orden</th>
                            <th>Avance Mzn</th>
                        </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- JS libs -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

<script>
// === Función que replica tu Power Query en JS ===
async function cargarAvancesCampo() {
    const url = "https://infoagro.odoo.com/jsonrpc/";

    const payload = {
        jsonrpc: "2.0",
        method: "call",
        id: 1,
        params: {
            service: "object",
            method: "execute",
            args: [
                "infoagro",
                2,
                "Meganet37**",
                "x_orden_campo_line_b660b",
                "search_read",
                [],
                [
                    "id", "x_orden_campo_id", "x_studio_fecha", "x_studio_ciclo",
                    "x_studio_finca", "x_studio_lote_agricola",
                    "x_studio_activiadad_realizada", "x_studio_avance_mzn",
                    "x_studio_compaia", "x_name", "x_studio_sector",
                    "x_studio_categoria_actividad"
                ]
            ]
        }
    };

    const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });

    const json = await response.json();
    const data = json.result || [];

    const toRecord = (v) => Array.isArray(v) ? { id: v[0], name: v[1] } : { id: null, name: null };

    const resultado = data.map(row => ({
        Compañia: toRecord(row.x_studio_compaia).name,
        Fecha: row.x_studio_fecha || null,
        Finca: toRecord(row.x_studio_finca).name,
        Ciclo: toRecord(row.x_studio_ciclo).name,
        Actividad: toRecord(row.x_studio_activiadad_realizada).name,
        Lote: toRecord(row.x_studio_lote_agricola).name,
        Orden: toRecord(row.x_orden_campo_id).name,
        AvanceMzn: row.x_studio_avance_mzn || 0
    }));

    return resultado;
}

// === Estado global simple ===
let datosOriginal = [];
let datosFiltrados = [];
let tablaDT = null;
let chartFinca = null;
let chartActividad = null;

// === Utilidades ===
function uniqueValues(arr, key) {
    return [...new Set(arr.map(d => d[key]).filter(v => v != null && v !== ""))].sort();
}

function aplicarFiltros() {
    const comp = document.getElementById("filtroCompania").value;
    const finca = document.getElementById("filtroFinca").value;
    const ciclo = document.getElementById("filtroCiclo").value;
    const act = document.getElementById("filtroActividad").value;

    datosFiltrados = datosOriginal.filter(d =>
        (comp === "" || d.Compañia === comp) &&
        (finca === "" || d.Finca === finca) &&
        (ciclo === "" || d.Ciclo === ciclo) &&
        (act === "" || d.Actividad === act)
    );

    actualizarKPIs();
    actualizarTabla();
    actualizarCharts();
}

function actualizarKPIs() {
    const totalReg = datosFiltrados.length;
    const totalAvance = datosFiltrados.reduce((s, d) => s + Number(d.AvanceMzn || 0), 0);
    const fincas = uniqueValues(datosFiltrados, "Finca").length;
    const acts = uniqueValues(datosFiltrados, "Actividad").length;

    document.getElementById("kpiRegistros").textContent = totalReg;
    document.getElementById("kpiAvanceTotal").textContent = totalAvance.toFixed(2);
    document.getElementById("kpiFincas").textContent = fincas;
    document.getElementById("kpiActividades").textContent = acts;
}

function actualizarTabla() {
    if (!tablaDT) return;

    tablaDT.clear();
    tablaDT.rows.add(datosFiltrados.map(d => ({
        Compañia: d.Compañia,
        Fecha: d.Fecha,
        Finca: d.Finca,
        Ciclo: d.Ciclo,
        Actividad: d.Actividad,
        Lote: d.Lote,
        Orden: d.Orden,
        AvanceMzn: d.AvanceMzn
    })));
    tablaDT.draw();
}

function actualizarCharts() {
    // Avance por Finca
    const porFinca = {};
    datosFiltrados.forEach(d => {
        const key = d.Finca || "Sin Finca";
        porFinca[key] = (porFinca[key] || 0) + Number(d.AvanceMzn || 0);
    });

    const labelsFinca = Object.keys(porFinca);
    const dataFinca = Object.values(porFinca);

    if (chartFinca) chartFinca.destroy();
    chartFinca = new Chart(document.getElementById("chartFinca"), {
        type: "bar",
        data: {
            labels: labelsFinca,
            datasets: [{
                label: "Avance Mzn",
                data: dataFinca,
                backgroundColor: "#4CAF50"
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { x: { ticks: { autoSkip: false } } }
        }
    });

    // Avance por Actividad
    const porActividad = {};
    datosFiltrados.forEach(d => {
        const key = d.Actividad || "Sin Actividad";
        porActividad[key] = (porActividad[key] || 0) + Number(d.AvanceMzn || 0);
    });

    const labelsAct = Object.keys(porActividad);
    const dataAct = Object.values(porActividad);

    if (chartActividad) chartActividad.destroy();
    chartActividad = new Chart(document.getElementById("chartActividad"), {
        type: "bar",
        data: {
            labels: labelsAct,
            datasets: [{
                label: "Avance Mzn",
                data: dataAct,
                backgroundColor: "#2196F3"
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { x: { ticks: { autoSkip: false } } }
        }
    });
}

// === Inicialización ===
document.addEventListener("DOMContentLoaded", async () => {
    try {
        datosOriginal = await cargarAvancesCampo();
        datosFiltrados = [...datosOriginal];

        // Filtros
        const compSel = document.getElementById("filtroCompania");
        const fincaSel = document.getElementById("filtroFinca");
        const cicloSel = document.getElementById("filtroCiclo");
        const actSel = document.getElementById("filtroActividad");

        uniqueValues(datosOriginal, "Compañia").forEach(v => {
            const opt = document.createElement("option");
            opt.value = v;
            opt.textContent = v;
            compSel.appendChild(opt);
        });

        uniqueValues(datosOriginal, "Finca").forEach(v => {
            const opt = document.createElement("option");
            opt.value = v;
            opt.textContent = v;
            fincaSel.appendChild(opt);
        });

        uniqueValues(datosOriginal, "Ciclo").forEach(v => {
            const opt = document.createElement("option");
            opt.value = v;
            opt.textContent = v;
            cicloSel.appendChild(opt);
        });

        uniqueValues(datosOriginal, "Actividad").forEach(v => {
            const opt = document.createElement("option");
            opt.value = v;
            opt.textContent = v;
            actSel.appendChild(opt);
        });

        compSel.addEventListener("change", aplicarFiltros);
        fincaSel.addEventListener("change", aplicarFiltros);
        cicloSel.addEventListener("change", aplicarFiltros);
        actSel.addEventListener("change", aplicarFiltros);

        // DataTable
        tablaDT = $('#tablaAvances').DataTable({
            data: datosFiltrados,
            columns: [
                { data: "Compañia" },
                { data: "Fecha" },
                { data: "Finca" },
                { data: "Ciclo" },
                { data: "Actividad" },
                { data: "Lote" },
                { data: "Orden" },
                { data: "AvanceMzn" }
            ],
            pageLength: 10,
            order: [[1, "asc"]]
        });

        actualizarKPIs();
        actualizarCharts();
    } catch (e) {
        console.error("Error cargando datos:", e);
        alert("Error cargando datos de Odoo.");
    }
});
</script>
</body>
</html>
